<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIO - Centro de Inteligencia Operativa</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos extra para que el historial se vea bien en el panel de control */
        .history-item {
            background: rgba(0, 100, 101, 0.15);
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #006465;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-delete {
            background: #ff4d4d !important;
            padding: 5px 10px !important;
            font-size: 0.8rem !important;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: white;
        }
    </style>
</head>
<body>

<div id="criticalPulse"></div>
<div id="drawerOverlay"></div>

<header class="control-header">
    <div class="left-zone">
        <button id="btnNew">＋ NUEVO</button>
        <button id="btnManage">☰ HISTORIAL</button>
        <button id="btnFullscreen">⛶ FULL</button>
    </div>
    <div class="live-clock" id="clock"></div>
</header>

<main id="display">
    <div id="ghostClock"></div>
    <div class="priority-indicator" id="priorityIndicator"></div>
    <div class="info-block">
        <div class="area" id="areaLabel">SISTEMA</div>
        <h1 id="titleDisplay" class="fullscreen-title">Conectando...</h1>
        <p id="messageDisplay" class="fullscreen-message">Sincronizando con la nube operativa</p>
    </div>
</main>

<footer class="footer-bar">
    <div id="progressBar"></div>
</footer>

<aside id="drawerForm" class="drawer">
    <h2>Nuevo Evento</h2>
    <form id="formRegistro">
        <label>Área</label>
        <select id="inputArea" required>
            <option value="Freschat">Freschat</option>
            <option value="Monitoreo">Monitoreo</option>
            <option value="Atención al Cliente">Atención al Cliente</option>
            <option value="Interno">Interno</option>
        </select>

        <label>Prioridad</label>
        <select id="inputPriority">
            <option value="low">Baja</option>
            <option value="medium">Media</option>
            <option value="high">Alta</option>
            <option value="critical">Crítica</option>
        </select>

        <label>Servicio</label>
        <input type="text" id="inputTitle" maxlength="50" required>

        <label>Novedad</label>
        <textarea id="inputMessage" rows="8" required style="resize:vertical;"></textarea>

        <button type="submit" style="width: 100%;">PUBLICAR</button>
    </form>
</aside>

<aside id="drawerHistory" class="drawer">
    <h2>Eventos Activos</h2>
    <div id="historyList" class="history-container"></div>
</aside>

<script>
    /* ================= CONFIGURACIÓN DE FIREBASE ================= */
    // AQUÍ DEBAJO PEGA TU LINK (Debe terminar en /eventos.json)
    const DATABASE_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";

    let registros = [];
    let currentIndex = 0;
    let startTime = null;
    const DURATION = 15; // Segundos que dura cada mensaje en pantalla

    /* ================= ELEMENTOS DEL DOM ================= */
    const progressBar = document.getElementById("progressBar");
    const clock = document.getElementById("clock");
    const ghostClock = document.getElementById("ghostClock");
    const criticalPulse = document.getElementById("criticalPulse");
    const areaLabel = document.getElementById("areaLabel");
    const titleDisplay = document.getElementById("titleDisplay");
    const messageDisplay = document.getElementById("messageDisplay");

    /* ================= FUNCIONES DE NUBE (EL PUENTE) ================= */

    // Envía los datos a Firebase
    async function pushData() {
        await fetch(DATABASE_URL, {
            method: 'PUT',
            body: JSON.stringify(registros)
        });
    }

    // Trae los datos de Firebase
    async function pullData() {
        try {
            const res = await fetch(DATABASE_URL);
            const data = await res.json();
            if (data) {
                // Solo actualizamos si lo que hay en la nube es diferente a lo que tenemos
                if (JSON.stringify(data) !== JSON.stringify(registros)) {
                    registros = data;
                    render(currentIndex);
                }
            } else {
                registros = [];
                render(0);
            }
        } catch (e) {
            console.error("Error de conexión con la nube");
        }
    }

    // Revisar cambios automáticamente cada 3 segundos
    setInterval(pullData, 3000);

    /* ================= LÓGICA DE VISUALIZACIÓN ================= */

    function updateClock(){
        const now = new Date();
        const time = now.toLocaleTimeString("es-UY",{hour12:false});
        clock.textContent = time;
        ghostClock.textContent = time;
    }
    setInterval(updateClock, 1000);

    function getColor(priority){
        const colors = {low:"#00ff88", medium:"#00ccff", high:"#ffcc00", critical:"#ff4d4d"};
        return colors[priority] || "#006465";
    }

    function render(index){
        if(!registros.length){
            areaLabel.textContent = "SISTEMA";
            titleDisplay.textContent = "SISTEMA EN ESPERA";
            messageDisplay.textContent = "No hay eventos activos";
            criticalPulse.classList.remove("pulse");
            progressBar.style.width = "0%";
            return;
        }
        
        const reg = registros[index % registros.length];
        areaLabel.textContent = reg.area.toUpperCase();
        titleDisplay.textContent = reg.title;
        messageDisplay.textContent = reg.message;
        progressBar.style.background = getColor(reg.priority);
        
        if(reg.priority === "critical") criticalPulse.classList.add("pulse");
        else criticalPulse.classList.remove("pulse");
    }

    function animate(timestamp){
        if(!registros.length) {
            requestAnimationFrame(animate);
            return;
        }
        if(!startTime) startTime = timestamp;
        const progress = (timestamp - startTime) / 1000;
        const percent = Math.min((progress / DURATION) * 100, 100);
        progressBar.style.width = percent + "%";

        if(progress >= DURATION){
            currentIndex = (currentIndex + 1) % registros.length;
            render(currentIndex);
            startTime = timestamp;
        }
        requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    /* ================= BOTONES Y FORMULARIOS ================= */

    const overlay = document.getElementById("drawerOverlay");
    const dForm = document.getElementById("drawerForm");
    const dHistory = document.getElementById("drawerHistory");

    document.getElementById("btnNew").onclick = () => { dForm.classList.add("active"); overlay.classList.add("active"); };
    document.getElementById("btnManage").onclick = () => { renderHistory(); dHistory.classList.add("active"); overlay.classList.add("active"); };
    
    overlay.onclick = () => {
        dForm.classList.remove("active");
        dHistory.classList.remove("active");
        overlay.classList.remove("active");
    };

    document.getElementById("formRegistro").onsubmit = async (e) => {
        e.preventDefault();
        const nuevo = {
            area: document.getElementById("inputArea").value,
            priority: document.getElementById("inputPriority").value,
            title: document.getElementById("inputTitle").value,
            message: document.getElementById("inputMessage").value
        };
        
        if(nuevo.priority === "critical") registros.unshift(nuevo);
        else registros.push(nuevo);
        
        await pushData(); // Guardar en la nube
        e.target.reset();
        overlay.onclick(); // Cerrar menú
    };

    function renderHistory() {
        const container = document.getElementById("historyList");
        container.innerHTML = "";
        registros.forEach((reg, i) => {
            const div = document.createElement("div");
            div.className = "history-item";
            div.innerHTML = `<div><strong>${reg.title}</strong><br><small>${reg.area}</small></div>
                             <button class="btn-delete" onclick="eliminar(${i})">BORRAR</button>`;
            container.appendChild(div);
        });
    }

    window.eliminar = async (i) => {
        registros.splice(i, 1);
        await pushData(); // Actualizar nube
        renderHistory();
    };

    document.getElementById("btnFullscreen").onclick = () => {
        if(!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
            document.body.classList.add("fullscreen");
        } else {
            document.exitFullscreen();
        }
    };

    document.addEventListener("fullscreenchange", () => {
        if(!document.fullscreenElement) document.body.classList.remove("fullscreen");
    });

    // Carga inicial al abrir el archivo
    pullData();
</script>

</body>
</html>
