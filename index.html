<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* CSS INTEGRADO - COLOR PRINCIPAL #006465 */
        :root {
            --bg-dark: #070a0a;
            --cio-primary: #006465;
            --cio-border: #1a3a3a;
            --text-main: #ffffff;
            --text-dim: #a0b0b0;
            --danger: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- DISPLAY PRINCIPAL CENTRADO --- */
        #display {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centrado vertical */
            align-items: center;     /* Centrado horizontal */
            text-align: center;
            padding: 40px;
            position: relative;
            background: radial-gradient(circle at center, #0c1c1c 0%, #070a0a 100%);
        }

        .info-block {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #areaLabel {
            font-size: 1.2rem;
            color: var(--cio-primary);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* CAPSULAS DE DATOS */
        #metaContainer {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .data-tag {
            background: rgba(0, 100, 101, 0.15);
            border: 1px solid var(--cio-primary);
            padding: 6px 16px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: var(--text-main);
            text-transform: uppercase;
        }

        #titleDisplay {
            font-weight: 800;
            line-height: 1.1;
            margin: 0;
            text-transform: uppercase;
        }

        #messageDisplay {
            margin-top: 25px;
            font-weight: 300;
            color: var(--text-dim);
            max-width: 900px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        /* --- CABECERA --- */
        .control-header {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 1000;
            background: rgba(7, 10, 10, 0.9);
            border-bottom: 1px solid var(--cio-border);
        }

        #clock {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .btn-tech {
            background: var(--cio-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: opacity 0.2s;
        }
        .btn-tech:hover { opacity: 0.8; }

        /* --- FULLSCREEN --- */
        :fullscreen .left-zone, :fullscreen .mobile-nav { display: none !important; }
        :fullscreen .control-header { border: none; justify-content: center !important; }
        :fullscreen #clock { font-size: 10rem !important; opacity: 0.15; position: absolute; top: 5%; }

        /* --- ANIMACIÓN CRÍTICA --- */
        @keyframes pulse-red { 0% { background: #070a0a; } 50% { background: #3d0000; } 100% { background: #070a0a; } }
        .critico-total { animation: pulse-red 1.2s infinite !important; }

        /* --- BARRA MÓVIL (SOLO 2 BOTONES) --- */
        .mobile-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
            background: #0c1414;
            border-top: 1px solid var(--cio-primary);
            display: none; justify-content: space-around; align-items: center;
            z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn {
            background: none; border: none; color: var(--text-dim);
            display: flex; flex-direction: column; align-items: center;
            font-size: 0.75rem; font-weight: bold; gap: 5px;
        }
        .nav-btn:active { color: var(--cio-primary); }

        /* --- DRAWERS --- */
        .drawer {
            position: fixed; right: 0; top: 0; width: 400px; height: 100vh;
            background: #0f1a1a; border-left: 2px solid var(--cio-primary);
            padding: 30px; transform: translateX(100%);
            transition: transform 0.3s ease; z-index: 5000; overflow-y: auto;
        }
        .drawer.active { transform: translateX(0); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 4000; }
        #overlay.active { display: block; }

        input, select, textarea {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px;
            background: #000; color: white; border: 1px solid var(--cio-border);
        }

        /* PROGRESO */
        .progress-bar-wrap { position: fixed; bottom: 0; width: 100%; height: 4px; z-index: 1500; }
        #progressBar { height: 100%; width: 0%; background: var(--cio-primary); }

        /* --- MOBILE AJUSTES --- */
        @media (max-width: 768px) {
            .mobile-nav { display: flex; }
            .left-zone, .control-header #clock { display: none; }
            .control-header { justify-content: center; }
            .drawer { width: 100%; top: auto; bottom: 0; height: 85vh; border-radius: 20px 20px 0 0; }
            #display { padding: 25px; padding-bottom: 100px; }
            #titleDisplay { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div id="overlay"></div>

<header class="control-header">
    <div class="left-zone">
        <button class="btn-tech" onclick="openNew()">＋ NUEVO</button>
        <button class="btn-tech" onclick="openHistory()" style="margin-left:10px;">☰ HISTORIAL</button>
        <button class="btn-tech" onclick="document.documentElement.requestFullscreen()" style="margin-left:10px; background: none; border: 1px solid var(--cio-primary);">⛶ TV</button>
    </div>
    <div id="clock">00:00:00</div>
</header>

<main id="display">
    <div class="info-block">
        <div id="areaLabel">CENTRO OPERATIVO</div>
        <div id="metaContainer">
            <div id="tagPrio" class="data-tag">PRIORIDAD</div>
            <div id="tagTurno" class="data-tag">TURNO</div>
            <div id="tagHora" class="data-tag">--:--</div>
        </div>
        <h1 id="titleDisplay">SISTEMA CIO</h1>
        <p id="messageDisplay">Sincronizando novedades con la base de datos...</p>
    </div>
</main>

<nav class="mobile-nav">
    <button class="nav-btn" onclick="openNew()">
        <span style="font-size: 1.5rem;">＋</span>
        <span>NUEVO</span>
    </button>
    <button class="nav-btn" onclick="openHistory()">
        <span style="font-size: 1.5rem;">📋</span>
        <span>LISTA</span>
    </button>
</nav>

<aside id="drawerForm" class="drawer">
    <h2 style="margin-bottom:20px; color: var(--cio-primary);">REGISTRO</h2>
    <form id="formRegistro">
        <input type="hidden" id="editIndex" value="-1">
        <label style="font-size: 0.8rem; color: var(--text-dim);">ÁREA</label>
        <select id="inputArea">
            <option value="Freschat">Freschat</option>
            <option value="Monitoreo">Monitoreo</option>
            <option value="Atención al Cliente">Atención al Cliente</option>
            <option value="Interno">Interno</option>
        </select>
        <label style="font-size: 0.8rem; color: var(--text-dim);">PRIORIDAD</label>
        <select id="inputPriority">
            <option value="Baja">Baja</option>
            <option value="Media">Media</option>
            <option value="Alta">Alta</option>
            <option value="Crítica">Crítica</option>
        </select>
        <input type="text" id="inputTitle" placeholder="TÍTULO" required>
        <textarea id="inputMessage" rows="6" placeholder="DESCRIPCIÓN..." required></textarea>
        <button type="submit" class="btn-tech" style="width:100%; padding:15px;">ACTUALIZAR MONITOR</button>
        <button type="button" onclick="closeAll()" style="width:100%; background:none; border:none; color:var(--danger); margin-top:15px; cursor:pointer;">Cerrar</button>
    </form>
</aside>

<aside id="drawerHistory" class="drawer">
    <h2 style="margin-bottom:20px; color: var(--cio-primary);">HISTORIAL</h2>
    <button onclick="descargarPDF()" style="background:#2ecc71; color:black; width:100%; padding:12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; margin-bottom:20px;">📥 GENERAR REPORTE PDF</button>
    <div id="historyList"></div>
</aside>

<div class="progress-bar-wrap"><div id="progressBar"></div></div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let registros = [];
    let currentIndex = 0;
    let startTime = null;
    const DURATION = 15;

    function getTurnoNombre() {
        const h = new Date().getHours();
        if (h >= 6 && h < 14) return "Mañana";
        if (h >= 14 && h < 22) return "Tarde";
        return "Noche";
    }

    function fitText() {
        const title = document.getElementById('titleDisplay');
        const message = document.getElementById('messageDisplay');
        const display = document.getElementById('display');
        const esM = window.innerWidth <= 768;
        
        let sT = esM ? 40 : 100; 
        let sM = esM ? 20 : 45;

        title.style.fontSize = sT + "px";
        message.style.fontSize = sM + "px";

        let limit = 0;
        while ((title.offsetHeight + message.offsetHeight > display.offsetHeight * 0.7) && limit < 100) {
            sT -= 1; sM -= 0.5;
            title.style.fontSize = sT + "px";
            message.style.fontSize = sM + "px";
            limit++;
        }
    }

    async function pull() {
        try {
            const r = await fetch(DB_URL);
            const d = await r.json();
            registros = d || [];
            render(currentIndex);
        } catch (e) {}
    }

    function render(idx){
        const container = document.getElementById("display");
        if(!registros.length) {
            container.classList.remove("critico-total");
            document.getElementById("tagPrio").textContent = "IDLE";
            document.getElementById("tagTurno").textContent = "---";
            document.getElementById("tagHora").textContent = "--:--";
            document.getElementById("titleDisplay").textContent = "SIN NOVEDADES";
            document.getElementById("messageDisplay").textContent = "Esperando reportes...";
            return;
        }
        
        const r = registros[idx % registros.length];
        container.className = (r.priority === "Crítica") ? "critico-total" : "";
        
        document.getElementById("areaLabel").textContent = r.area;
        document.getElementById("tagPrio").textContent = r.priority;
        document.getElementById("tagTurno").textContent = "TURNO: " + r.turno;
        document.getElementById("tagHora").textContent = r.hora;
        document.getElementById("titleDisplay").textContent = r.title;
        document.getElementById("messageDisplay").textContent = r.message;
        
        document.getElementById("progressBar").style.background = (r.priority === "Crítica") ? "#ffffff" : "var(--cio-primary)";
        
        setTimeout(fitText, 50);
    }

    document.getElementById("formRegistro").onsubmit = async (e) => {
        e.preventDefault();
        const now = new Date();
        const nuevo = {
            area: document.getElementById("inputArea").value,
            priority: document.getElementById("inputPriority").value,
            title: document.getElementById("inputTitle").value,
            message: document.getElementById("inputMessage").value,
            hora: now.toLocaleTimeString("es-UY", {hour:'2-digit', minute:'2-digit'}),
            turno: getTurnoNombre()
        };
        const idx = parseInt(document.getElementById("editIndex").value);
        if(idx === -1) registros.push(nuevo); else registros[idx] = nuevo;
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(registros) });
        closeAll(); pull();
    };

    function descargarPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const now = new Date(); const t = getTurnoNombre();
        
        doc.setFillColor(0, 100, 101); doc.rect(0,0,210,40,'F');
        doc.setTextColor(255,255,255); doc.setFontSize(22); doc.text("NOVEDADES OPERATIVAS", 20, 25);
        doc.setFontSize(11); doc.text(`Turno: ${t} | Fecha: ${now.toLocaleDateString()}`, 20, 35);
        
        let y = 55; doc.setTextColor(0,0,0);
        registros.forEach(r => {
            doc.setFont(undefined, 'bold'); doc.text(`[${r.priority}] ${r.area}: ${r.title}`, 20, y);
            doc.setFont(undefined, 'normal'); 
            doc.setFontSize(10); const lines = doc.splitTextToSize(r.message, 170);
            doc.text(lines, 20, y + 7); y += (lines.length * 7) + 15;
            if(y > 270) { doc.addPage(); y = 20; }
        });
        doc.save(`Novedades_operativas_${t}_${now.getHours()}hs.pdf`);
    }

    function renderHistory() {
        const div = document.getElementById("historyList");
        div.innerHTML = registros.map((r, i) => `
            <div style="background:#000; padding:15px; margin-bottom:10px; border:1px solid var(--cio-border);">
                <strong style="color:var(--cio-primary)">${r.title}</strong><br>
                <small>${r.area} | ${r.hora} | ${r.priority}</small><br>
                <div style="margin-top:10px;">
                    <button onclick="editar(${i})" style="color:#f1c40f; background:none; border:none; cursor:pointer; font-weight:bold;">Editar</button>
                    <button onclick="borrar(${i})" style="color:var(--danger); background:none; border:none; cursor:pointer; font-weight:bold; margin-left:15px;">Borrar</button>
                </div>
            </div>
        `).join('');
    }

    window.editar = (i) => {
        const r = registros[i];
        document.getElementById("editIndex").value = i;
        document.getElementById("inputArea").value = r.area;
        document.getElementById("inputPriority").value = r.priority;
        document.getElementById("inputTitle").value = r.title;
        document.getElementById("inputMessage").value = r.message;
        document.getElementById("drawerHistory").classList.remove("active");
        document.getElementById("drawerForm").classList.add("active");
    };

    window.borrar = async (i) => {
        if(confirm("¿Eliminar registro?")) {
            registros.splice(i,1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(registros.length ? registros : null) });
            renderHistory(); pull();
        }
    };

    function closeAll() { document.querySelectorAll('.drawer, #overlay').forEach(el => el.classList.remove('active')); }
    function openNew() { document.getElementById("formRegistro").reset(); document.getElementById("editIndex").value="-1"; document.getElementById("drawerForm").classList.add("active"); document.getElementById("overlay").classList.add("active"); }
    function openHistory() { renderHistory(); document.getElementById("drawerHistory").classList.add("active"); document.getElementById("overlay").classList.add("active"); }

    document.getElementById("overlay").onclick = closeAll;

    function animate(ts){
        if(!registros.length) { requestAnimationFrame(animate); return; }
        if(!startTime) startTime = ts;
        const progress = (ts - startTime) / 1000;
        document.getElementById("progressBar").style.width = Math.min((progress / DURATION) * 100, 100) + "%";
        if(progress >= DURATION){ currentIndex = (currentIndex + 1) % registros.length; render(currentIndex); startTime = ts; }
        requestAnimationFrame(animate);
    }

    setInterval(() => {
        document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false});
    }, 1000);
    
    setInterval(pull, 5000);
    requestAnimationFrame(animate);
    pull();
</script>
</body>
</html>
