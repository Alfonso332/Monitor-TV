<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Centro de Inteligencia Operativa</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .history-item {
            background: rgba(0, 100, 101, 0.15);
            padding: 15px; margin-bottom: 12px;
            border: 1px solid #006465; border-radius: 12px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .history-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-edit { background: #ffcc00 !important; color: black !important; padding: 5px 10px; border-radius: 5px; border:none; cursor:pointer; font-size: 0.8rem; font-weight: bold;}
        .btn-delete { background: #ff4d4d !important; color: white !important; padding: 5px 10px; border-radius: 5px; border:none; cursor:pointer; font-size: 0.8rem; }
        .btn-pdf { background: #006465 !important; color: white !important; width: 100%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 15px; font-weight: bold; cursor: pointer; }

        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #444 !important; color: white !important; flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-publish { background: #00ff88 !important; color: #000 !important; flex: 2; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) {
            #ghostClock, #btnFullscreen { display: none !important; }
            .control-header { justify-content: center; padding: 15px; background: rgba(0,0,0,0.8); }
            .left-zone { display: none; } 
            #display { height: 80vh; padding: 20px; display: flex; align-items: center; }
            .fullscreen-title { font-size: 1.8rem !important; }
            .fullscreen-message { font-size: 2rem !important; }

            .mobile-nav {
                display: flex !important;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                height: 75px;
                background: #0a1a1b;
                border-top: 1px solid #006465;
                justify-content: space-around;
                align-items: center;
                z-index: 9999;
                padding-bottom: env(safe-area-inset-bottom);
            }
            .nav-item { color: #00ff88; text-decoration: none; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; background: none; border: none; }
            .drawer {
                width: 100% !important; height: 92vh !important; bottom: -100vh;
                right: 0 !important; top: auto !important; left: 0 !important;
                border-radius: 25px 25px 0 0; transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                overflow-y: auto; padding-bottom: 120px;
            }
            .drawer.active { bottom: 0 !important; }
            .footer-bar { bottom: 75px; height: 4px; }
            input, select, textarea { font-size: 16px !important; background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid #006465 !important; margin-bottom: 15px !important; }
        }
        .mobile-nav { display: none; }
    </style>
</head>
<body>

<div id="criticalPulse"></div>
<div id="drawerOverlay"></div>

<header class="control-header">
    <div class="left-zone">
        <button id="btnNew">＋ NUEVO</button>
        <button id="btnManage">☰ HISTORIAL</button>
        <button id="btnFullscreen">⛶ FULL</button>
    </div>
    <div class="live-clock" id="clock"></div>
</header>

<main id="display">
    <div id="ghostClock"></div>
    <div class="info-block">
        <div class="area" id="areaLabel">SISTEMA</div>
        <h1 id="titleDisplay" class="fullscreen-title">Conectando...</h1>
        <p id="messageDisplay" class="fullscreen-message">Sincronizando...</p>
    </div>
</main>

<nav class="mobile-nav">
    <button class="nav-item" id="mBtnNew"><span>➕</span><b>NUEVO</b></button>
    <button class="nav-item" id="mBtnHistory"><span>📋</span><b>LISTA</b></button>
</nav>

<footer class="footer-bar"><div id="progressBar"></div></footer>

<aside id="drawerForm" class="drawer">
    <div style="width: 50px; height: 6px; background: #333; margin: 0 auto 20px; border-radius: 10px;"></div>
    <h2 id="formTitle">Nuevo Evento</h2>
    <form id="formRegistro">
        <input type="hidden" id="editIndex" value="-1">
        <label>Área</label>
        <select id="inputArea" required>
            <option value="Freschat">Freschat</option>
            <option value="Monitoreo">Monitoreo</option>
            <option value="Atención al Cliente">Atención al Cliente</option>
            <option value="Interno">Interno</option>
        </select>
        <label>Prioridad</label>
        <select id="inputPriority">
            <option value="low">Baja</option>
            <option value="medium">Media</option>
            <option value="high">Alta</option>
            <option value="critical">Crítica</option>
        </select>
        <label>Servicio</label>
        <input type="text" id="inputTitle" maxlength="50" required>
        <label>Novedad</label>
        <textarea id="inputMessage" rows="5" required></textarea>
        
        <div class="form-actions">
            <button type="button" class="btn-cancel" onclick="closeAllDrawers()">CANCELAR</button>
            <button type="submit" class="btn-publish" id="btnSubmit">PUBLICAR</button>
        </div>
    </form>
</aside>

<aside id="drawerHistory" class="drawer">
    <div style="width: 50px; height: 6px; background: #333; margin: 0 auto 20px; border-radius: 10px;"></div>
    <button class="btn-pdf" onclick="generatePDF()">📥 DESCARGAR REPORTE DE TURNO</button>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Eventos Activos</h2>
        <button onclick="closeAllDrawers()" style="background:none; border:none; color:#ff4d4d; font-weight:bold;">CERRAR</button>
    </div>
    <div id="historyList" class="history-container"></div>
</aside>

<script>
    const DATABASE_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let registros = [];
    let currentIndex = 0;
    let startTime = null;
    const DURATION = 15;

    async function pushData() { await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(registros) }); }
    async function pullData() {
        try {
            const res = await fetch(DATABASE_URL);
            const data = await res.json();
            if (data) { if (JSON.stringify(data) !== JSON.stringify(registros)) { registros = data; render(currentIndex); } } 
            else { registros = []; render(0); }
        } catch (e) { console.error("Error nube"); }
    }
    setInterval(pullData, 3000);

    function updateClock(){
        const now = new Date();
        const time = now.toLocaleTimeString("es-UY",{hour12:false});
        document.getElementById("clock").textContent = time;
        if(document.getElementById("ghostClock")) document.getElementById("ghostClock").textContent = time;
    }
    setInterval(updateClock, 1000);

    function render(index){
        if(!registros.length){
            document.getElementById("areaLabel").textContent = "SISTEMA";
            document.getElementById("titleDisplay").textContent = "SIN NOVEDADES";
            document.getElementById("messageDisplay").textContent = "Monitor operativo";
            document.getElementById("progressBar").style.width = "0%";
            return;
        }
        const reg = registros[index % registros.length];
        document.getElementById("areaLabel").textContent = reg.area.toUpperCase();
        document.getElementById("titleDisplay").textContent = reg.title;
        document.getElementById("messageDisplay").textContent = reg.message;
        const colors = {low:"#00ff88", medium:"#00ccff", high:"#ffcc00", critical:"#ff4d4d"};
        document.getElementById("progressBar").style.background = colors[reg.priority];
    }

    function animate(timestamp){
        if(!registros.length) { requestAnimationFrame(animate); return; }
        if(!startTime) startTime = timestamp;
        const progress = (timestamp - startTime) / 1000;
        const percent = Math.min((progress / DURATION) * 100, 100);
        document.getElementById("progressBar").style.width = percent + "%";
        if(progress >= DURATION){ currentIndex = (currentIndex + 1) % registros.length; render(currentIndex); startTime = timestamp; }
        requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    const overlay = document.getElementById("drawerOverlay");
    const dForm = document.getElementById("drawerForm");
    const dHistory = document.getElementById("drawerHistory");

    const closeAllDrawers = () => {
        dForm.classList.remove("active"); dHistory.classList.remove("active"); overlay.classList.remove("active");
        document.getElementById("formRegistro").reset();
        document.getElementById("editIndex").value = "-1";
        document.getElementById("formTitle").textContent = "Nuevo Evento";
    };

    const openForm = () => { dForm.classList.add("active"); overlay.classList.add("active"); };
    const openHistory = () => { renderHistory(); dHistory.classList.add("active"); overlay.classList.add("active"); };

    document.getElementById("btnNew").onclick = openForm;
    document.getElementById("mBtnNew").onclick = openForm;
    document.getElementById("btnManage").onclick = openHistory;
    document.getElementById("mBtnHistory").onclick = openHistory;
    overlay.onclick = closeAllDrawers;

    document.getElementById("formRegistro").onsubmit = async (e) => {
        e.preventDefault();
        const index = parseInt(document.getElementById("editIndex").value);
        const nuevo = {
            area: document.getElementById("inputArea").value,
            priority: document.getElementById("inputPriority").value,
            title: document.getElementById("inputTitle").value,
            message: document.getElementById("inputMessage").value,
            time: new Date().toLocaleTimeString("es-UY", {hour: '2-digit', minute: '2-digit'}),
            fullDate: new Date().toISOString()
        };
        
        if(index === -1) registros.push(nuevo);
        else registros[index] = nuevo;
        
        await pushData();
        closeAllDrawers();
    };

    function renderHistory() {
        const container = document.getElementById("historyList");
        container.innerHTML = "";
        registros.forEach((reg, i) => {
            const div = document.createElement("div");
            div.className = "history-item";
            div.innerHTML = `
                <div><strong>[${reg.time}] ${reg.title}</strong><br><small>${reg.area} - ${reg.priority}</small></div>
                <div class="history-actions">
                    <button class="btn-edit" onclick="editar(${i})">EDITAR</button>
                    <button class="btn-delete" onclick="eliminar(${i})">BORRAR</button>
                </div>`;
            container.appendChild(div);
        });
    }

    window.editar = (i) => {
        const reg = registros[i];
        document.getElementById("editIndex").value = i;
        document.getElementById("inputArea").value = reg.area;
        document.getElementById("inputPriority").value = reg.priority;
        document.getElementById("inputTitle").value = reg.title;
        document.getElementById("inputMessage").value = reg.message;
        document.getElementById("formTitle").textContent = "Editar Evento";
        openForm();
    };

    window.eliminar = async (i) => { registros.splice(i, 1); await pushData(); renderHistory(); };

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const now = new Date();
        const hour = now.getHours();
        let turno = "";
        
        if(hour >= 6 && hour < 14) turno = "MAÑANA (06:00 - 14:00)";
        else if(hour >= 14 && hour < 22) turno = "TARDE (14:00 - 22:00)";
        else turno = "NOCHE (22:00 - 06:00)";

        doc.setFontSize(18);
        doc.text("REPORTE OPERATIVO CIO", 105, 20, {align: 'center'});
        doc.setFontSize(12);
        doc.text(`Turno: ${turno}`, 20, 35);
        doc.text(`Fecha: ${now.toLocaleDateString()}`, 20, 42);
        doc.line(20, 45, 190, 45);

        let y = 55;
        registros.forEach(reg => {
            if(y > 270) { doc.addPage(); y = 20; }
            const color = {low:[0, 255, 136], medium:[0, 204, 255], high:[255, 204, 0], critical:[255, 77, 77]};
            const c = color[reg.priority];
            doc.setDrawColor(c[0], c[1], c[2]);
            doc.setLineWidth(1);
            doc.rect(20, y, 170, 25);
            doc.setFont(undefined, 'bold');
            doc.text(`${reg.time} - ${reg.title} (${reg.area})`, 25, y + 10);
            doc.setFont(undefined, 'normal');
            doc.text(reg.message.substring(0, 80), 25, y + 18);
            y += 32;
        });

        doc.save(`Reporte_CIO_${now.toLocaleDateString().replace(/\//g,'-')}.pdf`);
    }

    document.getElementById("btnFullscreen").onclick = () => { document.documentElement.requestFullscreen(); document.body.classList.add("fullscreen"); };
    pullData();
</script>
</body>
</html>
