<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor | Masterson</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* === CONFIGURACIÓN MAESTRA CIO === */
        #cio-app {
            --primary: #006465;
            --accent: #00d1d1;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --online: #2ecc71;
            --bg-emergencia: #1a0000; 

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #cio-app.pantalla-critica { background: var(--bg-emergencia) !important; }
        #cio-app * { box-sizing: border-box !important; }

        /* HEADER SUPERIOR */
        #cio-app .main-header {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; background: rgba(0,0,0,0.96); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--primary); z-index: 100;
        }
        #cio-app:fullscreen .main-header { display: none !important; }
        
        #cio-app .fs-clock { display: none; }
        #cio-app:fullscreen .fs-clock { 
            display: block; position: absolute; top: 25px; right: 35px; 
            font-family: monospace; font-size: 2.8rem; font-weight: 900; 
            color: var(--primary); z-index: 1000; text-shadow: 0 0 20px rgba(0,100,101,0.5);
        }

        /* DISPLAY CENTRAL - TAMAÑO MAXIMIZADO PARA TV */
        #cio-app #display-board { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; }
        #cio-app #titleDisplay { font-size: 100px; font-weight: 900; margin: 20px 0; text-transform: uppercase; line-height: 0.9; letter-spacing: -3px; }
        #cio-app #messageDisplay { font-size: 2.8rem; opacity: 0.85; font-weight: 400; max-width: 85%; line-height: 1.2; }
        #cio-app #areaLabel { letter-spacing: 12px; font-weight: 900; font-size: 1.3rem; margin-bottom: 20px; text-transform: uppercase; color: var(--primary); }
        
        #cio-app .info-container { transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; display: flex; flex-direction: column; align-items: center; }
        #cio-app .oculto { opacity: 0; transform: scale(0.9) translateY(20px); filter: blur(20px); }

        /* BARRA DE ESTADO (TICKER) */
        #cio-app #ticker-bar { 
            height: 80px; background: #030303; border-top: 1px solid #111; 
            display: flex; align-items: center; overflow: hidden; position: relative; 
        }

        #cio-app #ticker-content { 
            display: flex; align-items: center; gap: 100px; white-space: nowrap; 
            position: absolute; left: 0;
            animation: scroll-ticker 20s linear infinite; 
        }

        @keyframes scroll-ticker {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        #cio-app .status-badge { 
            padding: 14px 35px; border-radius: 10px; font-size: 1.8rem; 
            font-weight: 900; text-transform: uppercase; flex-shrink: 0;
        }
        #cio-app .status-badge.offline { background: rgba(255, 77, 77, 0.15); border: 3px solid var(--critico); color: var(--critico); box-shadow: 0 0 20px rgba(255,77,77,0.2); }
        #cio-app .status-badge.restored { background: rgba(46, 204, 113, 0.15); border: 3px solid var(--online); color: var(--online); box-shadow: 0 0 20px rgba(46,204,113,0.2); }

        /* PANELES DE GESTIÓN */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 450px; height: 100%;
            background: #080808 !important; border-left: 2px solid var(--primary); padding: 40px;
            transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10100;
            overflow-y: auto; box-shadow: -15px 0 40px rgba(0,0,0,0.8);
        }
        #cio-app .side-panel.active { transform: translateX(0); }

        /* ESTADÍSTICAS Y BOTONES DE DESPLIEGUE */
        #cio-app .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 25px; }
        #cio-app .stat-box { background: #111; padding: 18px; border-radius: 15px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        #cio-app .stat-box:hover { border-color: var(--accent); background: #161616; transform: translateY(-3px); }
        #cio-app .stat-box b { display: block; font-size: 1.6rem; line-height: 1; }
        #cio-app .stat-box small { font-size: 0.75rem; opacity: 0.5; text-transform: uppercase; display: block; margin-top: 4px; }

        /* CONTENEDORES DESPLEGABLES DENTRO DEL PANEL */
        #cio-app #historyList, #cio-app #offline-details {
            max-height: 0; overflow: hidden; transition: max-height 0.5s ease;
            background: #050505; border-radius: 15px; margin-bottom: 15px;
        }
        #cio-app #historyList.show, #cio-app #offline-details.show { max-height: 1200px; border: 1px solid #333; padding: 15px; overflow-y: auto; }

        /* TARJETAS DE NOVEDAD EN HISTORIAL */
        #cio-app .history-item { 
            background: #121212 !important; padding: 20px; border-radius: 12px; margin-bottom: 15px; 
            border-left: 6px solid var(--primary); position: relative; transition: 0.3s;
        }
        #cio-app .history-item:hover { background: #181818 !important; }

        /* FORMULARIOS */
        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; padding: 18px; background: #111 !important;
            color: #fff !important; border: 1px solid #222 !important; border-radius: 14px; 
            text-align: center; margin-bottom: 18px; font-size: 1.05rem; transition: 0.3s;
        }
        #cio-app input:focus, #cio-app select:focus { border-color: var(--primary); outline: none; background: #151515 !important; }

        #cio-app .btn-pill {
            background: var(--primary) !important; color: #fff !important; border: none; padding: 16px 28px; border-radius: 50px;
            font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; margin-bottom: 15px; transition: 0.3s;
        }
        #cio-app .btn-pill:hover { filter: brightness(1.2); box-shadow: 0 5px 15px rgba(0,100,101,0.3); }
        #cio-app .btn-sec { background: #1a1a1a !important; border: 1px solid #333; }

        @media (max-width: 768px) {
            #cio-app .header-actions { display: none !important; }
            #cio-app .side-panel { width: 95%; padding: 25px; }
            #cio-app #titleDisplay { font-size: 50px !important; }
            #cio-app #messageDisplay { font-size: 1.6rem !important; }
        }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="fsClockDisplay" class="fs-clock">00:00:00</div>
    <div id="cio-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; z-index:10090; backdrop-filter:blur(10px);" onclick="closePanels()"></div>

    <header class="main-header">
        <div class="header-actions" style="display:flex; gap:15px;">
            <button onclick="openFormPanel()" class="btn-pill" style="padding:10px 25px; width:auto; margin:0;">＋ NUEVA</button>
            <button onclick="openPanel('panelHistory')" class="btn-pill btn-sec" style="padding:10px 25px; width:auto; margin:0;">📋 HISTORIAL</button>
            <button onclick="toggleFS()" style="background:none; border:1px solid #444; color:#666; padding:10px 18px; border-radius:12px; cursor:pointer;">⛶ TV</button>
        </div>
        <div id="clockDisplay" style="font-family:monospace; font-size:1.8rem; font-weight:900; color:var(--primary); text-shadow: 0 0 10px rgba(0,100,101,0.3);">00:00:00</div>
        <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="42">
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">CARGANDO MONITOR...</div>
            <h1 id="titleDisplay">SISTEMA CIO</h1>
            <p id="messageDisplay">Sincronizando con base de datos en la nube...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content"><span>INICIALIZANDO ESCANEO DE SERVICIOS MASTERSON...</span></div>
    </div>
    
    <div id="progressLine" style="position: fixed; bottom: 80px; height: 6px; width: 0%; background: var(--primary); z-index: 5; box-shadow: 0 0 10px var(--primary);"></div>

    <aside id="panelForm" class="side-panel">
        <h2 id="formTitle" style="color:var(--primary); text-align:center; margin-bottom:30px; letter-spacing:2px;">REGISTRAR NOVEDAD</h2>
        <form id="mainForm" onsubmit="saveEntry(event)">
            <input type="hidden" id="f-id" value="">
            <label style="font-size:0.8rem; color:#555; display:block; margin-bottom:5px; margin-left:10px;">SELECCIONAR ÁREA</label>
            <select id="f-area">
                <option>Monitoreo</option>
                <option>Freschat</option>
                <option>Atención al Cliente</option>
                <option>Novedad Interna</option>
            </select>
            <label style="font-size:0.8rem; color:#555; display:block; margin-bottom:5px; margin-left:10px;">PRIORIDAD</label>
            <select id="f-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
            <input type="text" id="f-title" placeholder="Título de la novedad" required maxlength="50">
            <textarea id="f-msg" rows="7" placeholder="Descripción detallada de la novedad..." required></textarea>
            <button type="submit" class="btn-pill">PUBLICAR EN PANTALLA</button>
            <button type="button" onclick="closePanels()" class="btn-pill btn-sec">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:25px; letter-spacing:2px;">CENTRO DE CONTROL</h2>
        
        <div class="stats-grid">
            <div class="stat-box" onclick="toggleHistoryDetails()" title="Click para ver/editar novedades">
                <b id="stat-total">0</b>
                <small>Total ▾</small>
            </div>
            <div class="stat-box">
                <b id="stat-crit" style="color:var(--critico)">0</b>
                <small>Críticas</small>
            </div>
            <div class="stat-box" onclick="toggleOfflineDetails()" title="Click para ver servicios caídos">
                <b id="stat-off" style="color:var(--accent)">0</b>
                <small>Offline ▾</small>
            </div>
        </div>

        <div id="historyList"></div>

        <div id="offline-details"></div>

        <button onclick="downloadPDF()" class="btn-pill" style="background:#151515 !important; border:1px solid #333; margin-top:10px; font-size:0.8rem;">⬇ DESCARGAR REPORTE POR TURNOS</button>
        <button onclick="closePanels()" class="btn-pill btn-sec" style="margin-top:20px;">CERRAR PANEL</button>
    </aside>
</div>

<script>
    const cio_DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const cio_RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let cio_logs = [], cio_currentIdx = 0, cio_startTime = null;
    let prevStatus = {}, recentlyRestored = {};
    const cio_SLIDE_TIME = 15;

    // --- GESTIÓN DE RED Y TICKER ---
    async function updateNetwork() {
        try {
            const resp = await fetch(cio_RED_URL);
            const status = await resp.json();
            const ticker = document.getElementById("ticker-content");
            const offDetails = document.getElementById("offline-details");
            let tickerHTML = "", detailsHTML = "", offCount = 0;

            if(status) {
                Object.keys(status).forEach(id => {
                    const currentItem = status[id];
                    const name = id.replace(/_/g, ' ');

                    if (prevStatus[id] && prevStatus[id].estado === "offline" && currentItem.estado === "online") {
                        recentlyRestored[id] = 2; 
                    }

                    if (currentItem.estado === "offline") {
                        tickerHTML += `<div class="status-badge offline">⚠️ OFF: ${name}</div>`;
                        detailsHTML += `<div style="color:var(--critico); padding:10px; border-bottom:1px solid #1a1a1a; font-weight:bold;">● ${name}</div>`;
                        offCount++;
                        delete recentlyRestored[id];
                    } else if (recentlyRestored[id] > 0) {
                        tickerHTML += `<div class="status-badge restored">✔ ${name}: RESTABLECIDO</div>`;
                        recentlyRestored[id]--;
                    }
                });
                prevStatus = JSON.parse(JSON.stringify(status));
            }

            if(tickerHTML !== "") {
                ticker.innerHTML = tickerHTML;
                const itemsCount = offCount + Object.keys(recentlyRestored).filter(k => recentlyRestored[k] > 0).length;
                ticker.style.animation = `scroll-ticker ${itemsCount * 9 + 5}s linear infinite`;
                offDetails.innerHTML = detailsHTML;
            } else {
                ticker.innerHTML = `<span style="color:var(--primary); font-size:1.5rem; font-weight:900; width:100vw; text-align:center;">✔ TODOS LOS SERVICIOS OPERATIVOS</span>`;
                ticker.style.animation = "none"; ticker.style.left = "0";
                offDetails.innerHTML = "<div style='padding:20px; opacity:0.4; text-align:center;'>No hay servicios caídos</div>";
            }
            document.getElementById("stat-off").textContent = offCount;
        } catch(e) { console.error("Error en Red:", e); }
    }

    // --- GESTIÓN DE EVENTOS Y NOVEDADES ---
    async function syncEvents() {
        try {
            const resp = await fetch(cio_DB_URL);
            const data = await resp.json();
            const now = Date.now();
            
            // Filtro: Solo novedades de las últimas 24 horas para mantener la pantalla limpia
            cio_logs = (data ? (Array.isArray(data) ? data : Object.values(data)) : [])
                        .filter(it => !it.timestamp || (now - it.timestamp < 86400000));
            
            document.getElementById("stat-total").textContent = cio_logs.length;
            document.getElementById("stat-crit").textContent = cio_logs.filter(it => it.priority === "Crítica").length;
            
            if(cio_logs.length > 0 && !cio_startTime) renderSlide();
            renderHistoryList();
        } catch(e) { console.error("Error en Eventos:", e); }
    }

    function renderSlide() {
        if(!cio_logs.length) {
            document.getElementById("titleDisplay").textContent = "SISTEMA CIO";
            document.getElementById("messageDisplay").textContent = "Esperando novedades...";
            return;
        }
        const cont = document.getElementById("infoCont"), app = document.getElementById("cio-app");
        cont.classList.add("oculto");
        
        setTimeout(() => {
            const item = cio_logs[cio_currentIdx % cio_logs.length];
            const color = {"Baja":"var(--accent)", "Media":"#f1c40f", "Alta":"#e67e22", "Crítica":"#ff4d4d"}[item.priority] || "#fff";
            
            app.classList.toggle("pantalla-critica", item.priority === "Crítica");

            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("areaLabel").style.color = color;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            document.getElementById("progressLine").style.background = color;
            cont.classList.remove("oculto");
        }, 700);
    }

    function renderHistoryList() {
        const listCont = document.getElementById("historyList");
        listCont.innerHTML = cio_logs.map((it, i) => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
                    <small style="color:var(--accent); font-weight:900; letter-spacing:1px; text-transform:uppercase;">${it.area}</small>
                    <small style="opacity:0.4; font-family:monospace;">${new Date(it.timestamp).toLocaleTimeString([], {hour:'2-numeric', minute:'2-numeric'})}</small>
                </div>
                <div style="font-weight:900; color:white; margin-bottom:8px; font-size:1.1rem; line-height:1.2;">${it.title}</div>
                <div style="font-size:0.85rem; opacity:0.7; margin-bottom:15px; line-height:1.4;">${it.message}</div>
                <div style="display:flex; gap:20px; border-top:1px solid #222; padding-top:12px;">
                    <button onclick="editEntry(${i})" style="color:var(--accent); background:none; border:none; cursor:pointer; font-weight:900; font-size:0.75rem; text-transform:uppercase;">[ EDITAR ]</button>
                    <button onclick="deleteEntry(${i})" style="color:var(--critico); background:none; border:none; cursor:pointer; font-weight:900; font-size:0.75rem; text-transform:uppercase;">[ ELIMINAR ]</button>
                </div>
            </div>
        `).join('');
    }

    async function saveEntry(e) {
        e.preventDefault();
        const id = document.getElementById("f-id").value;
        const entry = {
            area: document.getElementById("f-area").value, 
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value, 
            message: document.getElementById("f-msg").value,
            timestamp: id !== "" ? cio_logs[id].timestamp : Date.now()
        };
        if(id !== "") cio_logs[id] = entry; else cio_logs.push(entry);
        await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
        closePanels(); syncEvents();
    }

    async function deleteEntry(idx) {
        if(confirm("¿Estás seguro de eliminar esta novedad permanentemente del sistema?")) {
            cio_logs.splice(idx, 1);
            await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
            syncEvents();
        }
    }

    function editEntry(idx) {
        const it = cio_logs[idx];
        document.getElementById("f-id").value = idx;
        document.getElementById("f-area").value = it.area;
        document.getElementById("f-prio").value = it.priority;
        document.getElementById("f-title").value = it.title;
        document.getElementById("f-msg").value = it.message;
        openPanel('panelForm');
    }

    // --- UTILIDADES DE INTERFAZ ---
    function openPanel(id) { closePanels(); document.getElementById(id).classList.add("active"); document.getElementById("cio-overlay").style.display = "block"; }
    
    function closePanels() { 
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); 
        document.getElementById("cio-overlay").style.display = "none";
        document.getElementById("historyList").classList.remove("show");
        document.getElementById("offline-details").classList.remove("show");
    }

    function toggleHistoryDetails() { 
        document.getElementById("historyList").classList.toggle("show"); 
        document.getElementById("offline-details").classList.remove("show");
    }

    function toggleOfflineDetails() { 
        document.getElementById("offline-details").classList.toggle("show"); 
        document.getElementById("historyList").classList.remove("show");
    }

    function toggleFS() { if (!document.fullscreenElement) document.getElementById("cio-app").requestFullscreen(); else document.exitFullscreen(); }
    
    function openFormPanel() { 
        document.getElementById("mainForm").reset(); 
        document.getElementById("f-id").value = ""; 
        openPanel('panelForm'); 
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = jsPDF();
        const now = new Date();
        doc.setFontSize(20); doc.setTextColor(0, 100, 101);
        doc.text("REPORTE OPERATIVO - MASTERSON", 14, 20);
        
        const getTurno = (ts) => {
            const h = new Date(ts).getHours();
            if(h >= 6 && h < 14) return "Turno Mañana (06-14h)";
            if(h >= 14 && h < 22) return "Turno Tarde (14-22h)";
            return "Turno Noche (22-06h)";
        };

        let currentY = 35;
        ["Turno Mañana (06-14h)", "Turno Tarde (14-22h)", "Turno Noche (22-06h)"].forEach(turno => {
            const filtered = cio_logs.filter(it => getTurno(it.timestamp) === turno);
            doc.setFontSize(14); doc.setTextColor(0, 100, 101); doc.text(turno, 14, currentY);
            doc.autoTable({
                startY: currentY + 5,
                head: [['Área', 'Prioridad', 'Título', 'Mensaje']],
                body: filtered.map(it => [it.area, it.priority, it.title, it.message]),
                theme: 'striped', headStyles: { fillColor: [0, 100, 101] }
            });
            currentY = doc.lastAutoTable.finalY + 15;
        });
        doc.save(`Reporte_CIO_${now.toLocaleDateString()}.pdf`);
    }

    function loop(ts) {
        if(cio_logs.length) {
            if(!cio_startTime) cio_startTime = ts;
            const progress = (ts - cio_startTime) / (cio_SLIDE_TIME * 1000);
            document.getElementById("progressLine").style.width = (Math.min(progress, 1) * 100) + "%";
            if(progress >= 1) { cio_currentIdx++; renderSlide(); cio_startTime = ts; }
        }
        requestAnimationFrame(loop);
    }

    setInterval(() => {
        const uruguay = new Date().toLocaleTimeString('es-UY', { hour12: false });
        document.getElementById("clockDisplay").textContent = uruguay;
        document.getElementById("fsClockDisplay").textContent = uruguay;
    }, 1000);

    setInterval(updateNetwork, 5000); 
    setInterval(syncEvents, 10000);
    
    updateNetwork(); 
    syncEvents(); 
    requestAnimationFrame(loop);
</script>
</body>
</html>
