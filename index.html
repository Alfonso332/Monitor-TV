<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Monitor Operativo Centrado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* CSS CAPSULADO PARA EVITAR CONFLICTOS EXTERNOS */
        #cio-app-container {
            all: initial; /* Resetea estilos heredados del exterior */
            display: block;
            background-color: #050808;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        #cio-app-container * {
            box-sizing: border-box;
            font-family: inherit;
        }

        /* DISPLAY PRINCIPAL: CENTRADO TOTAL */
        #cio-app-container #main-display {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centrado vertical */
            align-items: center;     /* Centrado horizontal */
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle, #0a1a1a 0%, #050808 100%);
        }

        #cio-app-container .content-wrapper {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #cio-app-container #label-area {
            font-size: 1.1rem;
            color: #006465;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        #cio-app-container #meta-info {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        #cio-app-container .pill {
            border: 1px solid #006465;
            padding: 5px 15px;
            border-radius: 3px;
            font-size: 0.85rem;
            color: #ffffff;
            background: rgba(0, 100, 101, 0.1);
            text-transform: uppercase;
        }

        #cio-app-container #display-title {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
            margin: 0;
            color: #ffffff;
        }

        #cio-app-container #display-message {
            font-size: 2.2rem;
            margin-top: 25px;
            font-weight: 300;
            color: #a0acac;
            max-width: 80%;
        }

        /* HEADER PC */
        #cio-app-container #top-header {
            position: absolute; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; border-bottom: 1px solid #1a2a2a;
            background: rgba(5, 8, 8, 0.9);
            z-index: 10;
        }

        #cio-app-container #digital-clock {
            font-size: 1.8rem; font-weight: bold; color: #ffffff;
        }

        #cio-app-container .btn-action {
            background: #006465;
            color: white; border: none; padding: 10px 20px;
            border-radius: 4px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; font-size: 0.8rem; margin-left: 10px;
        }

        /* BARRA MÓVIL (TIPO BARRA DE TAREAS) */
        #cio-app-container #mobile-bar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
            background: #0a1414; border-top: 1px solid #006465;
            display: none; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 20;
        }

        #cio-app-container .nav-item {
            background: none; border: none; color: #a0acac;
            display: flex; flex-direction: column; align-items: center;
            font-size: 0.7rem; font-weight: bold; cursor: pointer;
        }

        /* DRAWERS */
        #cio-app-container .side-panel {
            position: absolute; right: 0; top: 0; width: 400px; height: 100%;
            background: #0a1616; border-left: 2px solid #006465;
            padding: 30px; transform: translateX(100%);
            transition: 0.3s ease; z-index: 100;
        }
        #cio-app-container .side-panel.active { transform: translateX(0); }
        
        #cio-app-container #scrim {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: none; z-index: 50;
        }

        #cio-app-container .progress-wrap {
            position: absolute; bottom: 0; width: 100%; height: 4px; z-index: 5;
        }
        #cio-app-container #progress-inner { height: 100%; width: 0%; background: #006465; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            #cio-app-container #mobile-bar { display: flex; }
            #cio-app-container #top-header .left-btns, #cio-app-container #digital-clock { display: none; }
            #cio-app-container #top-header { justify-content: center; }
            #cio-app-container .side-panel { width: 100%; bottom: 0; top: auto; height: 80%; border-radius: 20px 20px 0 0; }
            #cio-app-container #display-title { font-size: 2.8rem; }
            #cio-app-container #display-message { font-size: 1.4rem; }
            #cio-app-container #main-display { padding-bottom: 80px; }
        }
    </style>
</head>
<body>

<div id="cio-app-container">
    <div id="scrim" onclick="closePanels()"></div>

    <header id="top-header">
        <div class="left-btns">
            <button class="btn-action" onclick="openDrawer('form')">Nuevo</button>
            <button class="btn-action" onclick="openDrawer('list')">Historial</button>
        </div>
        <div id="digital-clock">00:00:00</div>
    </header>

    <main id="main-display">
        <div class="content-wrapper">
            <div id="label-area">CARGANDO...</div>
            <div id="meta-info">
                <div id="pill-prio" class="pill">-</div>
                <div id="pill-turno" class="pill">-</div>
                <div id="pill-hora" class="pill">-</div>
            </div>
            <h1 id="display-title">SISTEMA CIO</h1>
            <p id="display-message">Esperando sincronización de datos...</p>
        </div>
    </main>

    <nav id="mobile-bar">
        <button class="nav-item" onclick="openDrawer('form')"><span style="font-size:1.2rem">➕</span>NUEVO</button>
        <button class="nav-item" onclick="openDrawer('list')"><span style="font-size:1.2rem">📋</span>HISTORIAL</button>
    </nav>

    <aside id="drawer-form" class="side-panel">
        <h2 style="color:#006465; margin-bottom:20px">REGISTRO</h2>
        <form id="cio-form" onsubmit="saveData(event)">
            <input type="hidden" id="edit-id" value="-1">
            <select id="in-area" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #006465">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <select id="in-prio" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #006465">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Crítica">Crítica</option>
            </select>
            <input type="text" id="in-title" placeholder="Título" required style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #006465">
            <textarea id="in-msg" rows="5" placeholder="Descripción..." required style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #006465"></textarea>
            <button type="submit" class="btn-action" style="width:100%; margin:0; padding:15px">Actualizar</button>
        </form>
    </aside>

    <aside id="drawer-list" class="side-panel">
        <h2 style="color:#006465; margin-bottom:20px">NOVEDADES</h2>
        <button onclick="exportPDF()" style="width:100%; background:#2ecc71; border:none; padding:10px; font-weight:bold; cursor:pointer; margin-bottom:15px">PDF REPORTE</button>
        <div id="history-container"></div>
    </aside>

    <div class="progress-wrap"><div id="progress-inner"></div></div>
</div>

<script>
    const URL_DB = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let dataStore = [];
    let curIdx = 0;
    let timerStart = null;
    const LOOP_TIME = 15;

    function getTurno() {
        const h = new Date().getHours();
        return (h >= 6 && h < 14) ? "Mañana" : (h >= 14 && h < 22) ? "Tarde" : "Noche";
    }

    async function fetchData() {
        try {
            const r = await fetch(URL_DB);
            const d = await r.json();
            dataStore = d || [];
            updateDisplay(curIdx);
        } catch (e) {}
    }

    function updateDisplay(idx) {
        if(!dataStore.length) {
            document.getElementById('label-area').textContent = "STANDBY";
            return;
        }
        const item = dataStore[idx % dataStore.length];
        document.getElementById('label-area').textContent = item.area;
        document.getElementById('pill-prio').textContent = item.priority;
        document.getElementById('pill-turno').textContent = "Turno: " + item.turno;
        document.getElementById('pill-hora').textContent = item.hora;
        document.getElementById('display-title').textContent = item.title;
        document.getElementById('display-message').textContent = item.message;
    }

    async function saveData(e) {
        e.preventDefault();
        const now = new Date();
        const obj = {
            area: document.getElementById('in-area').value,
            priority: document.getElementById('in-prio').value,
            title: document.getElementById('in-title').value,
            message: document.getElementById('in-msg').value,
            hora: now.toLocaleTimeString("es-UY", {hour:'2-digit', minute:'2-digit'}),
            turno: getTurno()
        };
        const editId = parseInt(document.getElementById('edit-id').value);
        if(editId === -1) dataStore.push(obj); else dataStore[editId] = obj;
        
        await fetch(URL_DB, { method: 'PUT', body: JSON.stringify(dataStore) });
        closePanels(); fetchData();
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFillColor(0, 100, 101); doc.rect(0,0,210,30,'F');
        doc.setTextColor(255,255,255); doc.text("REPORTE DE NOVEDADES CIO", 20, 20);
        let y = 50; doc.setTextColor(0,0,0);
        dataStore.forEach(r => {
            doc.setFont(undefined, 'bold'); doc.text(`[${r.priority}] ${r.area}: ${r.title}`, 20, y);
            doc.setFont(undefined, 'normal'); doc.text(r.message, 20, y + 7, {maxWidth: 170});
            y += 20;
        });
        doc.save(`Reporte_CIO_${getTurno()}.pdf`);
    }

    function openDrawer(type) {
        document.getElementById('scrim').style.display = 'block';
        if(type === 'form') {
            document.getElementById('cio-form').reset();
            document.getElementById('edit-id').value = "-1";
            document.getElementById('drawer-form').classList.add('active');
        } else {
            renderList();
            document.getElementById('drawer-list').classList.add('active');
        }
    }

    function renderList() {
        const cont = document.getElementById('history-container');
        cont.innerHTML = dataStore.map((r, i) => `
            <div style="border:1px solid #1a2a2a; padding:10px; margin-bottom:10px; font-size:0.8rem">
                <strong>${r.title}</strong><br>${r.area} | ${r.hora}
                <button onclick="borrarItem(${i})" style="color:red; background:none; border:none; float:right">Borrar</button>
            </div>
        `).join('');
    }

    window.borrarItem = async (i) => {
        dataStore.splice(i, 1);
        await fetch(URL_DB, { method: 'PUT', body: JSON.stringify(dataStore.length ? dataStore : null) });
        renderList(); fetchData();
    };

    function closePanels() {
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('scrim').style.display = 'none';
    }

    function loop(ts) {
        if(!dataStore.length) { requestAnimationFrame(loop); return; }
        if(!timerStart) timerStart = ts;
        const p = (ts - timerStart) / 1000;
        document.getElementById('progress-inner').style.width = (p/LOOP_TIME)*100 + "%";
        if(p >= LOOP_TIME) { curIdx++; updateDisplay(curIdx); timerStart = ts; }
        requestAnimationFrame(loop);
    }

    setInterval(() => {
        document.getElementById('digital-clock').textContent = new Date().toLocaleTimeString("es-UY",{hour12:false});
    }, 1000);

    fetchData();
    requestAnimationFrame(loop);
</script>
</body>
</html>
