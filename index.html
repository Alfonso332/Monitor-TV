<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* CSS INTEGRADO - SIN CHOQUES */
        :root {
            --primary: #00d4d8;
            --accent: #006465;
            --dark-bg: #050d0e;
            --critico-fondo: #1a0000;
            --critico-pulso: #3d0000;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--dark-bg); color: #ffffff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        #cio-app {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* DISPLAY CENTRAL */
        #display-board {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 5vh 5vw;
            background: radial-gradient(circle at center, #0c1c1d 0%, #050d0e 100%);
            transition: background 1s ease;
            overflow: hidden;
        }

        /* CONTENEDOR DE INFORMACIÓN CON ANIMACIÓN */
        .info-container { 
            width: 100%; 
            max-width: 1200px; 
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Transición suave de opacidad y posición */
            transition: opacity 0.6s ease, transform 0.6s ease, filter 0.6s ease;
            opacity: 1;
            transform: translateY(0);
            filter: blur(0px);
        }

        /* Clases para el efecto de transición */
        .oculto {
            opacity: 0;
            transform: translateY(-30px);
            filter: blur(10px);
        }

        .pre-entrada {
            opacity: 0;
            transform: translateY(30px);
            filter: blur(10px);
        }

        /* EFECTO CRÍTICO */
        @keyframes pulso-critico {
            0% { background-color: var(--dark-bg); }
            50% { background-color: var(--critico-pulso); }
            100% { background-color: var(--dark-bg); }
        }
        #cio-app.es-critico #display-board {
            animation: pulso-critico 3s infinite ease-in-out;
            background: var(--critico-fondo);
        }

        #areaLabel { 
            font-size: clamp(0.8rem, 2vh, 1.2rem); color: var(--primary); 
            letter-spacing: 5px; text-transform: uppercase; margin-bottom: 1vh;
        }

        #prioBadge {
            display: inline-block; padding: 5px 20px; border-radius: 4px;
            font-weight: 800; border: 1px solid rgba(255,255,255,0.2);
            font-size: clamp(0.7rem, 1.5vh, 1rem); margin-bottom: 2vh;
            text-transform: uppercase;
        }

        #titleDisplay { font-weight: 800; text-transform: uppercase; line-height: 1.1; margin-bottom: 2vh; width: 100%; }
        
        #messageDisplay { 
            font-weight: 300; color: #cedddd; line-height: 1.4; 
            width: 100%; max-width: 90%; margin: 0 auto;
            white-space: pre-wrap; word-wrap: break-word;
        }

        /* HEADER Y BOTONES */
        .main-header {
            position: absolute; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; z-index: 100;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        #cio-app:fullscreen .actions { display: none !important; }
        #cio-app:fullscreen #clockDisplay { font-size: clamp(2rem, 5vh, 4rem); margin-top: 40px; }

        .actions { display: flex; gap: 10px; }
        .actions button {
            background: rgba(0, 100, 101, 0.4); border: 1px solid var(--primary);
            color: #fff; padding: 8px 15px; border-radius: 4px;
            font-size: 11px; font-weight: bold; cursor: pointer;
        }

        #clockDisplay { font-family: monospace; font-size: 1.4rem; color: var(--primary); font-weight: bold; }

        /* PANELES LATERALES */
        .side-panel {
            position: fixed; right: 0; top: 0; width: 350px; height: 100%;
            background: #091718; border-left: 3px solid var(--primary);
            padding: 25px; transform: translateX(100%);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1100; overflow-y: auto; box-sizing: border-box;
        }
        .side-panel.active { transform: translateX(0); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; }
        #overlay.active { display: block; }

        input, textarea, select {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #000; color: #fff; border: 1px solid var(--accent);
            border-radius: 4px; font-size: 1rem; box-sizing: border-box;
        }

        /* NAVEGACIÓN MÓVIL (VISTA EN CELULAR) */
        .nav-mobile { display: none; }
        @media (max-width: 768px) {
            .actions { display: none; }
            .nav-mobile {
                display: flex; position: fixed; bottom: 0; width: 100%; height: 75px;
                background: #061112; border-top: 2px solid var(--primary);
                justify-content: space-around; align-items: center; z-index: 500;
            }
            .nav-mobile button { background: none; border: none; color: var(--primary); font-size: 0.8rem; font-weight: bold; cursor: pointer; }
            .side-panel { width: 100%; height: 85%; top: auto; bottom: 0; border-radius: 20px 20px 0 0; border-left: none; border-top: 3px solid var(--primary); }
            #display-board { padding-bottom: 90px; }
        }

        #progressLine { position: fixed; bottom: 0; height: 4px; width: 0%; z-index: 999; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay" onclick="closeAll()"></div>

    <header class="main-header">
        <div class="actions">
            <button onclick="openForm()">＋ NUEVO</button>
            <button onclick="openHistory()">📋 LISTA</button>
            <button onclick="toggleFS()" style="border-color:#ffcc00; color:#ffcc00;">⛶ MODO TV</button>
        </div>
        <div id="clockDisplay">00:00:00</div>
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">SISTEMA CIO</div>
            <div id="prioBadge">Sincronizando</div>
            <h1 id="titleDisplay">Monitor</h1>
            <p id="messageDisplay">Cargando...</p>
        </div>
    </main>

    <nav class="nav-mobile">
        <button onclick="openForm()"><span>➕</span><br>NUEVO</button>
        <button onclick="openHistory()"><span>📋</span><br>LISTA</button>
    </nav>

    <aside id="panelForm" class="side-panel">
        <h2 style="color:var(--primary)">Novedad</h2>
        <form onsubmit="handleSave(event)">
            <input type="hidden" id="editId" value="-1">
            <select id="f-area">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <select id="f-prio">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Crítica">Crítica</option>
            </select>
            <input type="text" id="f-title" placeholder="Título" required>
            <textarea id="f-msg" rows="8" placeholder="Descripción detallada..." required></textarea>
            <button type="submit" style="width:100%; padding:15px; background:var(--primary); color:black; font-weight:bold; border:none; border-radius:4px; cursor:pointer;">ACTUALIZAR</button>
            <button type="button" onclick="closeAll()" style="width:100%; margin-top:10px; background:none; color:#ff4d4d; border:none; cursor:pointer;">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--primary)">Activos</h2>
        <button onclick="generatePDF()" style="width:100%; background:white; color:black; padding:10px; font-weight:bold; cursor:pointer; margin-bottom:15px;">📥 DESCARGAR PDF</button>
        <div id="listItems"></div>
    </aside>

    <div id="progressLine"></div>
</div>

<script>
    const API_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let dataStore = [];
    let currentIndex = 0;
    let timerStart = null;
    const DISPLAY_TIME = 15;

    function adjustText() {
        const t = document.getElementById('titleDisplay');
        const m = document.getElementById('messageDisplay');
        const container = document.getElementById('display-board');
        let sizeT = window.innerWidth <= 768 ? 26 : 75; 
        let sizeM = window.innerWidth <= 768 ? 16 : 42;
        t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
        let limit = 0;
        while ((t.offsetHeight + m.offsetHeight > container.offsetHeight * 0.75) && limit < 50) {
            sizeT -= 1; sizeM -= 0.8;
            t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
            limit++;
        }
    }

    async function syncData() {
        try {
            const r = await fetch(API_URL);
            const d = await r.json();
            dataStore = d || [];
            if(dataStore.length > 0 && !timerStart) refreshView(currentIndex);
        } catch(e) { console.error("Error Sync"); }
    }

    // FUNCIÓN DE REFRESCO CON ANIMACIÓN GARANTIZADA
    function refreshView(idx) {
        if(!dataStore.length) return;
        const cont = document.getElementById("infoCont");
        
        // 1. Iniciar salida
        cont.classList.add("oculto");

        setTimeout(() => {
            // 2. Cambiar datos mientras está invisible
            const item = dataStore[idx % dataStore.length];
            const app = document.getElementById("cio-app");
            const badge = document.getElementById("prioBadge");

            if(item.priority === "Crítica") {
                app.classList.add("es-critico");
                badge.style.background = "#ff0000"; badge.style.color = "#fff";
            } else {
                app.classList.remove("es-critico");
                badge.style.background = "transparent"; badge.style.color = "var(--primary)";
            }

            badge.textContent = "Prioridad " + item.priority;
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            
            const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
            document.getElementById("progressLine").style.background = colors[item.priority] || "#00d4d8";
            
            adjustText();

            // 3. Preparar entrada (posicionar abajo)
            cont.classList.remove("oculto");
            cont.classList.add("pre-entrada");

            // Forzar reflujo del navegador para que reconozca el cambio de clase
            void cont.offsetWidth;

            // 4. Ejecutar entrada
            cont.classList.remove("pre-entrada");
        }, 600); 
    }

    async function handleSave(e) {
        e.preventDefault();
        const id = parseInt(document.getElementById("editId").value);
        const entry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value
        };
        if(id === -1) dataStore.push(entry); else dataStore[id] = entry;
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore) });
        closeAll(); syncData();
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(0, 100, 101);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255);
        doc.text("REPORTE CIO", 20, 25);
        doc.save("Reporte_CIO.pdf");
    }

    function openForm() { document.getElementById("editId").value = "-1"; document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay").classList.add("active"); }
    function openHistory() { 
        const list = document.getElementById("listItems");
        list.innerHTML = dataStore.map((item, i) => `
            <div style="border:1px solid var(--primary); padding:10px; margin-bottom:10px; border-radius:4px;">
                <div style="font-weight:bold;">${item.title}</div>
                <button onclick="onDelete(${i})" style="background:red; color:white; border:none; padding:4px; margin-top:5px; cursor:pointer;">BORRAR</button>
            </div>
        `).join('');
        document.getElementById("panelHistory").classList.add("active"); document.getElementById("overlay").classList.add("active"); 
    }
    
    window.onDelete = async (i) => { dataStore.splice(i, 1); await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore.length ? dataStore : null) }); syncData(); };
    function closeAll() { document.querySelectorAll('.side-panel, #overlay').forEach(el => el.classList.remove('active')); }
    function toggleFS() { if (!document.fullscreenElement) document.getElementById('cio-app').requestFullscreen(); else document.exitFullscreen(); }

    function runLoop(ts) {
        if(!dataStore.length) { requestAnimationFrame(runLoop); return; }
        if(!timerStart) timerStart = ts;
        const elapsed = (ts - timerStart) / 1000;
        document.getElementById("progressLine").style.width = Math.min((elapsed / DISPLAY_TIME) * 100, 100) + "%";
        if(elapsed >= DISPLAY_TIME){ currentIndex++; refreshView(currentIndex); timerStart = ts; }
        requestAnimationFrame(runLoop);
    }

    setInterval(() => { document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}); }, 1000);
    setInterval(syncData, 10000);
    window.addEventListener('resize', adjustText);
    syncData();
    requestAnimationFrame(runLoop);
</script>
</body>
</html>
