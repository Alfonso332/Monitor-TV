<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Centro de Inteligencia Operativa</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* AJUSTES CRÍTICOS PARA QUE EL TEXTO SE ACHIQUE */
        #display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            height: calc(100vh - 100px); /* Espacio real restando header y footer */
            overflow: hidden; /* Prohibido el scroll */
            position: relative;
        }

        .info-block {
            width: 95%;
            max-height: 90%; /* Limite para el calculo de JS */
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin: auto;
        }

        #titleDisplay {
            margin-bottom: 20px;
            font-weight: 800;
            line-height: 1;
            text-transform: uppercase;
        }

        #messageDisplay {
            line-height: 1.1;
            font-weight: 600;
            white-space: pre-wrap;
            word-wrap: break-word;
            display: block;
        }

        /* ESTILOS HISTORIAL */
        .history-item {
            background: rgba(0, 100, 101, 0.2);
            padding: 15px; margin-bottom: 12px;
            border: 1px solid #006465; border-radius: 12px;
        }
        .history-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
        .btn-edit { background: #ffcc00 !important; color: black !important; padding: 8px 15px; border-radius: 6px; border:none; font-weight: bold; cursor: pointer; }
        .btn-delete { background: #ff4d4d !important; color: white !important; padding: 8px 15px; border-radius: 6px; border:none; font-weight: bold; cursor: pointer; }
        .btn-pdf { background: #006465 !important; color: white !important; width: 100%; padding: 15px; border-radius: 8px; border: none; margin-bottom: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="criticalPulse"></div>
<div id="drawerOverlay"></div>

<header class="control-header">
    <div class="left-zone">
        <button id="btnNew">＋ NUEVO</button>
        <button id="btnManage">☰ HISTORIAL</button>
        <button id="btnFullscreen">⛶ FULL</button>
    </div>
    <div class="live-clock" id="clock"></div>
</header>

<main id="display">
    <div id="ghostClock"></div>
    <div class="info-block">
        <div class="area" id="areaLabel">SISTEMA</div>
        <h1 id="titleDisplay">...</h1>
        <p id="messageDisplay">Cargando datos...</p>
    </div>
</main>

<footer class="footer-bar"><div id="progressBar"></div></footer>

<aside id="drawerForm" class="drawer">
    <h2 id="formTitle">Evento</h2>
    <form id="formRegistro">
        <input type="hidden" id="editIndex" value="-1">
        <select id="inputArea" required>
            <option value="Freschat">Freschat</option>
            <option value="Monitoreo">Monitoreo</option>
            <option value="Atención al Cliente">Atención al Cliente</option>
            <option value="Interno">Interno</option>
        </select>
        <select id="inputPriority">
            <option value="low">Baja</option>
            <option value="medium">Media</option>
            <option value="high">Alta</option>
            <option value="critical">Crítica</option>
        </select>
        <input type="text" id="inputTitle" placeholder="Servicio" required>
        <textarea id="inputMessage" rows="6" placeholder="Novedad" required></textarea>
        <div class="form-actions">
            <button type="button" class="btn-cancel" onclick="closeAllDrawers()">CANCELAR</button>
            <button type="submit" class="btn-publish">ACTUALIZAR TV</button>
        </div>
    </form>
</aside>

<aside id="drawerHistory" class="drawer">
    <button class="btn-pdf" onclick="generatePDF()">📥 REPORTE DIARIO</button>
    <div id="historyList"></div>
</aside>

<script>
    const DATABASE_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let registros = [];
    let currentIndex = 0;
    let startTime = null;
    const DURATION = 15;

    // --- CORRECCIÓN: BORRAR Y GUARDAR AHORA FORZAN EL ENVÍO ---
    async function syncCloud() {
        await fetch(DATABASE_URL, { 
            method: 'PUT', 
            body: JSON.stringify(registros.length > 0 ? registros : null) 
        });
        pullData(); // Forzar recarga tras subir
    }

    async function pullData() {
        try {
            const res = await fetch(DATABASE_URL);
            const data = await res.json();
            const nuevosRegistros = data || [];
            if (JSON.stringify(nuevosRegistros) !== JSON.stringify(registros)) {
                registros = nuevosRegistros;
                render(currentIndex);
                if(document.getElementById("drawerHistory").classList.contains("active")) renderHistory();
            }
        } catch (e) { console.error("Error nube"); }
    }

    // --- FUNCIÓN DE AJUSTE AUTOMÁTICO DE LETRA ---
    function fitText() {
        const title = document.getElementById('titleDisplay');
        const message = document.getElementById('messageDisplay');
        const container = document.querySelector('.info-block');
        const main = document.getElementById('display');

        let sizeT = 70; // Tamaño inicial título
        let sizeM = 100; // Tamaño inicial mensaje

        title.style.fontSize = sizeT + "px";
        message.style.fontSize = sizeM + "px";

        // Reducción en bucle hasta que quepa en el alto del monitor
        let safety = 0;
        while ((main.scrollHeight > main.clientHeight) && safety < 50) {
            sizeT -= 1;
            sizeM -= 2;
            title.style.fontSize = sizeT + "px";
            message.style.fontSize = sizeM + "px";
            safety++;
        }
    }

    function render(index){
        if(!registros.length){
            document.getElementById("areaLabel").textContent = "SISTEMA";
            document.getElementById("titleDisplay").textContent = "SIN NOVEDADES";
            document.getElementById("messageDisplay").textContent = "Monitor en espera";
            return;
        }
        const reg = registros[index % registros.length];
        document.getElementById("areaLabel").textContent = reg.area.toUpperCase();
        document.getElementById("titleDisplay").textContent = reg.title;
        document.getElementById("messageDisplay").textContent = reg.message;
        
        const colors = {low:"#00ff88", medium:"#00ccff", high:"#ffcc00", critical:"#ff4d4d"};
        document.getElementById("progressBar").style.background = colors[reg.priority] || "#006465";
        
        // Esperar un instante a que el DOM pinte para medir
        setTimeout(fitText, 100);
    }

    function animate(timestamp){
        if(!registros.length) { requestAnimationFrame(animate); return; }
        if(!startTime) startTime = timestamp;
        const progress = (timestamp - startTime) / 1000;
        const percent = Math.min((progress / DURATION) * 100, 100);
        document.getElementById("progressBar").style.width = percent + "%";
        if(progress >= DURATION){ 
            currentIndex = (currentIndex + 1) % registros.length; 
            render(currentIndex); 
            startTime = timestamp; 
        }
        requestAnimationFrame(animate);
    }

    const closeAllDrawers = () => {
        document.querySelectorAll('.drawer, #drawerOverlay').forEach(el => el.classList.remove('active'));
        document.getElementById("formRegistro").reset();
        document.getElementById("editIndex").value = "-1";
    };

    document.getElementById("btnNew").onclick = () => { 
        document.getElementById("drawerForm").classList.add("active");
        document.getElementById("drawerOverlay").classList.add("active");
    };

    document.getElementById("btnManage").onclick = () => { 
        renderHistory();
        document.getElementById("drawerHistory").classList.add("active");
        document.getElementById("drawerOverlay").classList.add("active");
    };

    document.getElementById("formRegistro").onsubmit = async (e) => {
        e.preventDefault();
        const idx = parseInt(document.getElementById("editIndex").value);
        const nuevo = {
            area: document.getElementById("inputArea").value,
            priority: document.getElementById("inputPriority").value,
            title: document.getElementById("inputTitle").value,
            message: document.getElementById("inputMessage").value
        };
        if(idx === -1) registros.push(nuevo); else registros[idx] = nuevo;
        await syncCloud();
        closeAllDrawers();
    };

    window.editarEvento = (i) => {
        const reg = registros[i];
        document.getElementById("editIndex").value = i;
        document.getElementById("inputArea").value = reg.area;
        document.getElementById("inputPriority").value = reg.priority;
        document.getElementById("inputTitle").value = reg.title;
        document.getElementById("inputMessage").value = reg.message;
        document.getElementById("drawerHistory").classList.remove("active");
        document.getElementById("drawerForm").classList.add("active");
    };

    // --- CORRECCIÓN: BORRAR AHORA ELIMINA Y SINCRONIZA ---
    window.eliminarEvento = async (i) => {
        if(confirm("¿Eliminar novedad?")) {
            registros.splice(i, 1);
            await syncCloud();
            renderHistory();
        }
    };

    function renderHistory() {
        const container = document.getElementById("historyList");
        container.innerHTML = registros.map((reg, i) => `
            <div class="history-item">
                <strong>${reg.title}</strong><br><small>${reg.area}</small>
                <div class="history-actions">
                    <button class="btn-edit" onclick="editarEvento(${i})">EDITAR</button>
                    <button class="btn-delete" onclick="eliminarEvento(${i})">BORRAR</button>
                </div>
            </div>
        `).join('');
    }

    function updateClock(){
        document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false});
    }

    setInterval(updateClock, 1000);
    setInterval(pullData, 3000);
    requestAnimationFrame(animate);
    pullData();
    document.getElementById("btnFullscreen").onclick = () => document.documentElement.requestFullscreen();
    document.getElementById("drawerOverlay").onclick = closeAllDrawers;
</script>
</body>
</html>
