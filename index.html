<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* CSS INTEGRADO - ESTILO ORIGINAL CIO #006465 */
        #cio-app-container {
            all: initial;
            display: block;
            background-color: #050808;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        #cio-app-container * {
            box-sizing: border-box;
            font-family: inherit;
        }

        /* --- PANTALLA PRINCIPAL: CENTRADO TOTAL --- */
        #cio-app-container #main-display {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            background: radial-gradient(circle at center, #0c1c1c 0%, #050808 100%);
        }

        #cio-app-container .content-block {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #cio-app-container #area-label {
            font-size: 1.3rem;
            color: #006465;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* CAPSULAS DE DATOS ORIGINALES */
        #cio-app-container #meta-data {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            justify-content: center;
        }

        #cio-app-container .tag {
            background: rgba(0, 100, 101, 0.1);
            border: 1px solid #006465;
            padding: 6px 18px;
            border-radius: 2px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: #ffffff;
            text-transform: uppercase;
        }

        #cio-app-container #display-title {
            font-size: 5.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin: 0;
            text-transform: uppercase;
            color: #ffffff;
        }

        #cio-app-container #display-msg {
            font-size: 2.5rem;
            margin-top: 25px;
            font-weight: 300;
            color: #b0c4c4;
            max-width: 90%;
            line-height: 1.4;
        }

        /* --- CABECERA SUPERIOR --- */
        #cio-app-container #top-nav {
            position: absolute; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; border-bottom: 1px solid #1a2a2a;
            background: rgba(5, 8, 8, 0.9);
            z-index: 100;
        }

        #cio-app-container #clock {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffffff;
        }

        #cio-app-container .btn-cio {
            background: #006465;
            color: white; border: none; padding: 10px 20px;
            border-radius: 4px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; font-size: 0.8rem; margin-left: 10px;
        }

        /* --- BARRA TAREAS MÓVIL (SIN TV) --- */
        #cio-app-container #mobile-taskbar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
            background: #0a1414; border-top: 1px solid #006465;
            display: none; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 200;
        }

        #cio-app-container .mobile-btn {
            background: none; border: none; color: #b0c4c4;
            display: flex; flex-direction: column; align-items: center;
            font-size: 0.75rem; font-weight: bold; cursor: pointer;
        }

        /* --- PANELES LATERALES --- */
        #cio-app-container .panel {
            position: absolute; right: 0; top: 0; width: 400px; height: 100%;
            background: #0a1616; border-left: 2px solid #006465;
            padding: 30px; transform: translateX(100%);
            transition: 0.3s ease-out; z-index: 500; overflow-y: auto;
        }
        #cio-app-container .panel.active { transform: translateX(0); }
        
        #cio-app-container #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            display: none; z-index: 400;
        }

        /* BARRA DE PROGRESO INFERIOR */
        #cio-app-container .progress-container {
            position: absolute; bottom: 0; width: 100%; height: 4px; z-index: 50;
        }
        #cio-app-container #progress-bar { height: 100%; width: 0%; background: #006465; transition: width 0.1s linear; }

        /* MODO CRÍTICO ORIGINAL (PULSO ROJO) */
        @keyframes alert-pulse { 0% { background: #050808; } 50% { background: #2a0505; } 100% { background: #050808; } }
        .is-critical-mode { animation: alert-pulse 1.2s infinite !important; }

        /* RESPONSIVE CELULAR */
        @media (max-width: 768px) {
            #cio-app-container #mobile-taskbar { display: flex; }
            #cio-app-container #top-nav .pc-only, #cio-app-container #clock { display: none; }
            #cio-app-container #top-nav { justify-content: center; height: 60px; }
            #cio-app-container .panel { width: 100%; top: auto; bottom: 0; height: 85%; border-radius: 20px 20px 0 0; }
            #cio-app-container #display-title { font-size: 2.5rem; }
            #cio-app-container #display-msg { font-size: 1.4rem; }
            #cio-app-container #main-display { padding-bottom: 90px; }
        }
    </style>
</head>
<body>

<div id="cio-app-container">
    <div id="overlay" onclick="closeAll()"></div>

    <header id="top-nav">
        <div class="pc-only">
            <button class="btn-cio" onclick="openNav('form')">NUEVO</button>
            <button class="btn-cio" onclick="openNav('list')">HISTORIAL</button>
            <button class="btn-cio" onclick="document.documentElement.requestFullscreen()" style="background:none; border: 1px solid #006465;">⛶ TV</button>
        </div>
        <div id="clock">00:00:00</div>
    </header>

    <main id="main-display">
        <div class="content-block">
            <div id="area-label">OPERACIONES CIO</div>
            <div id="meta-data">
                <div id="pill-prio" class="tag">--</div>
                <div id="pill-turno" class="tag">TURNO</div>
                <div id="pill-hora" class="tag">--:--</div>
            </div>
            <h1 id="display-title">SISTEMA CIO</h1>
            <p id="display-msg">Cargando base de datos...</p>
        </div>
    </main>

    <nav id="mobile-taskbar">
        <button class="mobile-btn" onclick="openNav('form')">
            <span style="font-size: 1.4rem; margin-bottom: 4px;">➕</span>
            NUEVO
        </button>
        <button class="mobile-btn" onclick="openNav('list')">
            <span style="font-size: 1.4rem; margin-bottom: 4px;">📋</span>
            LISTA
        </button>
    </nav>

    <aside id="panel-form" class="panel">
        <h2 style="color:#006465; margin-bottom:20px; border-bottom: 1px solid #006465;">NUEVO REGISTRO</h2>
        <form onsubmit="saveEntry(event)">
            <input type="hidden" id="edit-idx" value="-1">
            <select id="f-area" style="width:100%; padding:12px; margin-bottom:15px; background:#000; color:#fff; border:1px solid #006465">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <select id="f-prio" style="width:100%; padding:12px; margin-bottom:15px; background:#000; color:#fff; border:1px solid #006465">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Crítica">Crítica</option>
            </select>
            <input type="text" id="f-title" placeholder="TÍTULO" required style="width:100%; padding:12px; margin-bottom:15px; background:#000; color:#fff; border:1px solid #006465">
            <textarea id="f-msg" rows="6" placeholder="MENSAJE..." required style="width:100%; padding:12px; margin-bottom:15px; background:#000; color:#fff; border:1px solid #006465"></textarea>
            <button type="submit" class="btn-cio" style="width:100%; padding:15px; margin:0">ACTUALIZAR MONITOR</button>
            <button type="button" onclick="closeAll()" style="width:100%; background:none; border:none; color:#ff4d4d; margin-top:15px; cursor:pointer;">CANCELAR</button>
        </form>
    </aside>

    <aside id="panel-list" class="panel">
        <h2 style="color:#006465; margin-bottom:20px; border-bottom: 1px solid #006465;">HISTORIAL</h2>
        <button onclick="generatePDF()" style="width:100%; background:#2ecc71; border:none; padding:12px; color:black; font-weight:bold; cursor:pointer; margin-bottom:20px;">DESCARGAR PDF REPORTE</button>
        <div id="list-container"></div>
    </aside>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
</div>

<script>
    const DATABASE_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let store = [];
    let currentIndex = 0;
    let startTime = null;
    const DISPLAY_SECONDS = 15;

    function getTurnoNombre() {
        const h = new Date().getHours();
        if (h >= 6 && h < 14) return "MAÑANA";
        if (h >= 14 && h < 22) return "TARDE";
        return "NOCHE";
    }

    async function pull() {
        try {
            const r = await fetch(DATABASE_URL);
            const d = await r.json();
            store = d || [];
            renderItem(currentIndex);
        } catch(e) {}
    }

    function renderItem(i) {
        if(!store.length) return;
        const item = store[i % store.length];
        const container = document.getElementById('main-display');
        
        container.className = item.priority === "Crítica" ? "is-critical-mode" : "";
        document.getElementById('area-label').textContent = item.area;
        document.getElementById('pill-prio').textContent = item.priority;
        document.getElementById('pill-turno').textContent = "TURNO: " + item.turno;
        document.getElementById('pill-hora').textContent = item.hora;
        document.getElementById('display-title').textContent = item.title;
        document.getElementById('display-msg').textContent = item.message;
    }

    async function saveEntry(e) {
        e.preventDefault();
        const now = new Date();
        const obj = {
            area: document.getElementById('f-area').value,
            priority: document.getElementById('f-prio').value,
            title: document.getElementById('f-title').value,
            message: document.getElementById('f-msg').value,
            hora: now.toLocaleTimeString("es-UY", {hour:'2-digit', minute:'2-digit'}),
            turno: getTurnoNombre()
        };
        const editIdx = parseInt(document.getElementById('edit-idx').value);
        if(editIdx === -1) store.push(obj); else store[editIdx] = obj;
        
        await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(store) });
        closeAll(); pull();
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const t = getTurnoNombre();
        doc.setFillColor(0, 100, 101); doc.rect(0,0,210,30,'F');
        doc.setTextColor(255,255,255); doc.setFontSize(18); doc.text("NOVEDADES OPERATIVAS CIO", 20, 20);
        let y = 50; doc.setTextColor(0,0,0);
        store.forEach(r => {
            doc.setFont(undefined, 'bold'); doc.text(`[${r.priority}] ${r.area}: ${r.title}`, 20, y);
            doc.setFont(undefined, 'normal'); doc.setFontSize(10);
            const lines = doc.splitTextToSize(r.message, 170);
            doc.text(lines, 20, y + 7); y += (lines.length * 7) + 15;
            if(y > 275) { doc.addPage(); y = 20; }
        });
        doc.save(`CIO_Reporte_${t}.pdf`);
    }

    function openNav(type) {
        document.getElementById('overlay').style.display = 'block';
        if(type === 'form') {
            document.getElementById('panel-form').classList.add('active');
        } else {
            const cont = document.getElementById('list-container');
            cont.innerHTML = store.map((r, i) => `
                <div style="background:#000; padding:15px; margin-bottom:10px; border:1px solid #1a2a2a">
                    <strong style="color:#006465">${r.title}</strong><br><small>${r.area} | ${r.hora}</small>
                    <div style="margin-top:10px">
                        <button onclick="borrar(${i})" style="color:#ff4d4d; background:none; border:none; cursor:pointer; font-weight:bold">Borrar</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('panel-list').classList.add('active');
        }
    }

    window.borrar = async (i) => {
        store.splice(i, 1);
        await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(store.length ? store : null) });
        openNav('list'); pull();
    };

    function closeAll() {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('overlay').style.display = 'none';
    }

    function animationLoop(ts) {
        if(!store.length) { requestAnimationFrame(animationLoop); return; }
        if(!startTime) startTime = ts;
        const delta = (ts - startTime) / 1000;
        document.getElementById('progress-bar').style.width = (delta/DISPLAY_SECONDS)*100 + "%";
        if(delta >= DISPLAY_SECONDS) { currentIndex++; renderItem(currentIndex); startTime = ts; }
        requestAnimationFrame(animationLoop);
    }

    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString("es-UY",{hour12:false});
    }, 1000);

    pull();
    requestAnimationFrame(animationLoop);
</script>
</body>
</html>
