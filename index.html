<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CIO - Monitor Operativo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ============================
   TODO ENCAPSULADO EN #cio-app
   ============================ */

#cio-app{
    --primary:#00d4d8;
    --accent:#006465;
    --dark:#050d0e;
    --critico:#1a0000;
    font-family:'Segoe UI',system-ui,sans-serif;
    background:var(--dark);
    color:#fff;
    width:100%;
    height:100vh;
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
}

/* HEADER */
#cio-app .main-header{
    position:absolute;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    z-index:50;
}

#cio-app .actions{
    display:flex;
    gap:8px;
}

#cio-app button{
    cursor:pointer;
    border-radius:4px;
}

#cio-app .actions button{
    background:rgba(0,100,101,0.4);
    border:1px solid var(--primary);
    color:#fff;
    padding:6px 12px;
    font-size:11px;
    font-weight:bold;
}

#clockDisplay{
    font-family:monospace;
    font-weight:bold;
    color:var(--primary);
}

/* DISPLAY */
#display-board{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:80px 40px;
    background:radial-gradient(circle at center,#0c1c1d 0%,#050d0e 100%);
    transition:0.4s ease;
}

#cio-app.es-critico #display-board{
    background:var(--critico);
}

.info-container{
    max-width:1200px;
    width:100%;
}

#areaLabel{
    letter-spacing:4px;
    color:var(--primary);
    font-size:1rem;
}

#prioBadge{
    margin:10px 0;
    padding:5px 15px;
    border:1px solid rgba(255,255,255,0.2);
    display:inline-block;
    font-weight:bold;
    font-size:0.8rem;
}

#titleDisplay{
    font-size:60px;
    font-weight:800;
    margin:20px 0;
}

#messageDisplay{
    font-size:28px;
    color:#cedddd;
    white-space:pre-wrap;
}

/* HISTORIAL */
.side-panel{
    position:fixed;
    right:0;
    top:0;
    width:400px;
    max-width:100%;
    height:100%;
    background:#091718;
    border-left:3px solid var(--primary);
    transform:translateX(100%);
    transition:0.4s;
    padding:20px;
    overflow-y:auto;
    z-index:200;
}

.side-panel.active{
    transform:translateX(0);
}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    z-index:150;
}
#overlay.active{
    display:block;
}

/* BUSCADOR */
#historySearch{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    background:#000;
    border:1px solid var(--accent);
    color:#fff;
}

/* NAV MOBILE */
.nav-mobile{
    display:none;
}

@media(max-width:768px){
    #cio-app .actions{display:none;}
    .nav-mobile{
        display:flex;
        position:fixed;
        bottom:0;
        width:100%;
        height:70px;
        background:#061112;
        border-top:2px solid var(--primary);
        justify-content:space-around;
        align-items:center;
    }
    .nav-mobile button{
        background:none;
        border:none;
        color:var(--primary);
        font-weight:bold;
    }
    #display-board{
        padding-bottom:100px;
    }
}

#progressLine{
    position:fixed;
    bottom:0;
    height:4px;
    width:0%;
    background:var(--primary);
    z-index:300;
}
</style>
</head>
<body>

<div id="cio-app">
<div id="overlay" onclick="closeAll()"></div>

<header class="main-header">
    <div class="actions">
        <button onclick="openForm()">＋ NUEVO</button>
        <button onclick="openHistory()">📋 LISTA</button>
        <button onclick="toggleFS()">⛶ TV</button>
    </div>
    <div id="clockDisplay">00:00:00</div>
</header>

<main id="display-board">
<div class="info-container">
    <div id="areaLabel">SISTEMA CIO</div>
    <div id="prioBadge">Sincronizando</div>
    <div id="titleDisplay">Monitor Operativo</div>
    <div id="messageDisplay">Cargando novedades...</div>
</div>
</main>

<nav class="nav-mobile">
    <button onclick="openForm()">➕ NUEVO</button>
    <button onclick="openHistory()">📋 LISTA</button>
</nav>

<aside id="panelHistory" class="side-panel">
    <h2>Eventos Activos</h2>

    <input type="text" id="historySearch" placeholder="Buscar novedad..." oninput="filterHistory()">

    <div id="listItems"></div>
    <button onclick="closeAll()">CERRAR</button>
</aside>

<div id="progressLine"></div>
</div>

<script>
const API_URL="https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
let dataStore=[];
let displayQueue=[];
let currentIndex=0;
let timerStart=null;
const DISPLAY_TIME=15;

/* ==========================
   ELIMINAR AUTOMATICAMENTE 24HS
   ========================== */
function purgeOld(){
    const now=Date.now();
    const day=24*60*60*1000;
    dataStore=dataStore.filter(e=>now-e.createdAt<day);
}

/* ==========================
   CONSTRUIR COLA INTELIGENTE
   ========================== */
function buildQueue(){
    const crit=dataStore.filter(e=>e.priority==="Crítica");
    const others=dataStore.filter(e=>e.priority!=="Crítica");

    displayQueue=[];
    let o=0;
    crit.forEach(c=>{
        displayQueue.push(c);
        if(others[o]) displayQueue.push(others[o++]);
    });
    while(o<others.length){
        displayQueue.push(others[o++]);
    }
}

/* ========================== */
async function syncData(){
    const r=await fetch(API_URL);
    const d=await r.json();
    dataStore=d||[];
    purgeOld();
    buildQueue();
}

/* ========================== */
function refreshView(idx){
    if(!displayQueue.length)return;
    const item=displayQueue[idx%displayQueue.length];

    document.getElementById("areaLabel").textContent=item.area;
    document.getElementById("titleDisplay").textContent=item.title;
    document.getElementById("messageDisplay").textContent=item.message;
    document.getElementById("prioBadge").textContent="Prioridad "+item.priority;

    const app=document.getElementById("cio-app");
    if(item.priority==="Crítica") app.classList.add("es-critico");
    else app.classList.remove("es-critico");
}

/* ========================== */
function runLoop(ts){
    if(!displayQueue.length){requestAnimationFrame(runLoop);return;}
    if(!timerStart)timerStart=ts;
    const elapsed=(ts-timerStart)/1000;
    document.getElementById("progressLine").style.width=Math.min((elapsed/DISPLAY_TIME)*100,100)+"%";
    if(elapsed>=DISPLAY_TIME){
        currentIndex++;
        refreshView(currentIndex);
        timerStart=ts;
    }
    requestAnimationFrame(runLoop);
}

/* ========================== */
function openHistory(){
    renderHistory();
    document.getElementById("panelHistory").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function renderHistory(){
    const list=document.getElementById("listItems");
    list.innerHTML=dataStore.map(e=>`
        <div style="background:rgba(255,255,255,0.05);padding:10px;margin-bottom:10px;border-left:4px solid ${e.priority==="Crítica"?"red":"var(--primary)"}">
            <small>${e.area} | ${e.priority}</small>
            <div style="font-weight:bold;margin:5px 0;">${e.title}</div>
            <div style="font-size:12px;opacity:0.7">${new Date(e.createdAt).toLocaleString()}</div>
        </div>
    `).join("") || "<p>Sin novedades</p>";
}

function filterHistory(){
    const val=document.getElementById("historySearch").value.toLowerCase();
    const filtered=dataStore.filter(e=>
        e.title.toLowerCase().includes(val)||
        e.message.toLowerCase().includes(val)||
        e.area.toLowerCase().includes(val)
    );
    const list=document.getElementById("listItems");
    list.innerHTML=filtered.map(e=>`
        <div style="background:rgba(255,255,255,0.05);padding:10px;margin-bottom:10px;border-left:4px solid ${e.priority==="Crítica"?"red":"var(--primary)"}">
            <small>${e.area} | ${e.priority}</small>
            <div style="font-weight:bold;margin:5px 0;">${e.title}</div>
        </div>
    `).join("") || "<p>No encontrado</p>";
}

/* ========================== */
function closeAll(){
    document.querySelectorAll('.side-panel,#overlay').forEach(e=>e.classList.remove("active"));
}

function toggleFS(){
    if(!document.fullscreenElement)
        document.getElementById("cio-app").requestFullscreen();
    else document.exitFullscreen();
}

/* ========================== */
setInterval(()=>{document.getElementById("clockDisplay").textContent=new Date().toLocaleTimeString("es-UY",{hour12:false});},1000);
setInterval(syncData,10000);

syncData().then(()=>refreshView(0));
requestAnimationFrame(runLoop);
</script>
</body>
</html>
