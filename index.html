<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CIO - Monitor Operativo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* ========================= */
/* BASE */
/* ========================= */

body{
    margin:0;
    background:#0a1a1b;
    font-family:Segoe UI, sans-serif;
}

#display{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    width:100vw;
    padding:20px;
    box-sizing:border-box;
    overflow:hidden;
    position:fixed;
    top:0;left:0;
    background:#0a1a1b;
}

/* ========================= */
/* TEXTO PRINCIPAL */
/* ========================= */

.info-block{
    width:95%;
    max-width:1800px;
    max-height:85vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    text-align:center;
}

#titleDisplay{
    margin:0 0 10px 0;
    font-weight:800;
    line-height:1;
    text-transform:uppercase;
}

#messageDisplay{
    margin:0;
    line-height:1.1;
    word-wrap:break-word;
}

/* ========================= */
/* HEADER */
/* ========================= */

.control-header{
    position:fixed;
    top:0;
    width:100%;
    height:70px;
    z-index:1000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    box-sizing:border-box;
    background:rgba(0,100,101,0.9);
}

#clock{
    font-weight:bold;
    font-family:'Courier New', monospace;
    color:white;
    font-size:1.8rem;
}

/* ========================= */
/* DRAWERS */
/* ========================= */

#drawerOverlay{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    z-index:4000;
}

#drawerOverlay.active{
    display:block;
}

.drawer{
    position:fixed;
    right:0;
    top:0;
    width:450px;
    height:100vh;
    background:#0f2426;
    border-left:3px solid #006465;
    padding:30px;
    box-sizing:border-box;
    transform:translateX(100%);
    transition:transform 0.3s ease-out;
    z-index:5000;
    overflow-y:auto;
}

.drawer.active{
    transform:translateX(0);
}

/* ========================= */
/* SELECT Y FORM (FIX BLANCO) */
/* ========================= */

select,
select option{
    color:white !important;
}

select{
    background:#1a3a3d !important;
}

select option{
    background:#0f2426 !important;
}

/* ========================= */
/* MOBILE */
/* ========================= */

.mobile-nav{
    display:none;
}

@media (max-width:768px){

    /* ocultar botones superiores */
    .control-header .left-zone{
        display:none !important;
    }

    /* mostrar barra inferior */
    .mobile-nav{
        display:flex !important;
        position:fixed;
        bottom:0;
        left:0;
        width:100%;
        height:75px;
        background:#0a1a1b;
        z-index:2000;
        justify-content:space-around;
        align-items:center;
        border-top:1px solid #006465;
    }

    .mobile-nav button{
        background:none;
        border:none;
        color:#00ff88;
        font-weight:bold;
        font-size:14px;
    }

    .drawer{
        width:100% !important;
        height:85vh !important;
        top:auto !important;
        bottom:-100vh;
        border-radius:25px 25px 0 0;
        transform:none;
    }

    .drawer.active{
        bottom:0 !important;
    }
}

</style>
</head>

<body>

<div id="drawerOverlay"></div>

<header class="control-header">
<div class="left-zone">
<button id="btnNew" style="background:#00ff88;color:black;border:none;padding:12px 20px;border-radius:8px;font-weight:bold;cursor:pointer;">＋ NUEVO</button>
<button id="btnManage" style="background:#006465;color:white;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;margin-left:10px;">☰ HISTORIAL</button>
<button id="btnFullscreen" style="background:transparent;border:1px solid #00ff88;color:#00ff88;padding:12px 20px;border-radius:8px;cursor:pointer;margin-left:10px;">⛶ TV FULL</button>
</div>
<div id="clock">00:00:00</div>
</header>

<main id="display">
<div class="info-block">
<div id="areaLabel" style="font-size:1.8rem;color:#00ff88;margin-bottom:15px;font-weight:bold;letter-spacing:5px;">SISTEMA</div>
<h1 id="titleDisplay">CARGANDO...</h1>
<p id="messageDisplay">Sincronizando con el CIO Central</p>
</div>
</main>

<!-- BARRA MOBILE CORREGIDA -->
<nav class="mobile-nav">
<button onclick="openHistory()">📋<br>HISTORIAL</button>
<button onclick="openNew()">➕<br>NUEVO</button>
</nav>

<aside id="drawerForm" class="drawer">
<h2 style="color:#00ff88;">Configurar Novedad</h2>
<form id="formRegistro" style="display:flex;flex-direction:column;gap:20px;">
<input type="hidden" id="editIndex" value="-1">

<select id="inputArea" style="padding:12px;border:1px solid #006465;border-radius:8px;">
<option value="Freschat">Freschat</option>
<option value="Monitoreo">Monitoreo</option>
<option value="Atención al Cliente">Atención al Cliente</option>
<option value="Interno">Interno</option>
</select>

<select id="inputPriority" style="padding:12px;border:1px solid #006465;border-radius:8px;">
<option value="low">Prioridad Baja</option>
<option value="medium">Prioridad Media</option>
<option value="high">Prioridad Alta</option>
<option value="critical">Prioridad Crítica</option>
</select>

<input type="text" id="inputTitle" placeholder="Título" required style="padding:12px;background:#1a3a3d;color:white;border:1px solid #006465;border-radius:8px;">

<textarea id="inputMessage" rows="6" placeholder="Detalles de la novedad..." required style="padding:12px;background:#1a3a3d;color:white;border:1px solid #006465;border-radius:8px;"></textarea>

<button type="submit" style="background:#00ff88;color:black;padding:18px;border-radius:10px;border:none;font-weight:bold;cursor:pointer;">ACTUALIZAR MONITOR</button>
<button type="button" onclick="closeAllDrawers()" style="background:none;color:#ff4d4d;border:none;cursor:pointer;">CANCELAR</button>
</form>
</aside>

<script>

function openNew(){
document.getElementById("drawerForm").classList.add("active");
document.getElementById("drawerOverlay").classList.add("active");
}

function openHistory(){
alert("Aquí iría historial");
}

function closeAllDrawers(){
document.querySelectorAll('.drawer,#drawerOverlay').forEach(el=>el.classList.remove("active"));
}

document.getElementById("btnNew").onclick=openNew;
document.getElementById("btnManage").onclick=openHistory;
document.getElementById("drawerOverlay").onclick=closeAllDrawers;

setInterval(()=>{
document.getElementById("clock").textContent=
new Date().toLocaleTimeString("es-UY",{hour12:false});
},1000);

</script>

</body>
</html>
