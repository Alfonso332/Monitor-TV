<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor | Masterson Elite</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        #cio-app {
            --primary: #006465;
            --accent: #00d1d1;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --exito: #2ecc71;
            --bg-img: url('https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
        }

        /* MODO EMERGENCIA */
        #cio-app.emergency-active { animation: emergencyPulse 2s infinite; }
        @keyframes emergencyPulse {
            0%, 100% { background-color: #000; }
            50% { background-color: #120202; }
        }

        #cio-app::before {
            content: ""; position: absolute; inset: 0;
            background-image: var(--bg-img); background-size: contain;
            background-position: center; background-repeat: no-repeat;
            opacity: 0.03; filter: grayscale(1); z-index: -1;
        }

        /* HEADER */
        #cio-app .main-header {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--primary); z-index: 10;
        }
        #cio-app:fullscreen .main-header { display: none !important; }

        /* DASHBOARD CENTRAL */
        #cio-app #display-board { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 15px; position: relative; }
        #cio-app .info-container { width: 100%; transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        #cio-app .oculto { opacity: 0; transform: translateY(15px) scale(0.98); filter: blur(5px); }

        /* TIPOGRAFÍA DINÁMICA */
        #titleDisplay { margin: 15px 0; line-height: 1.1; font-size: 70px; font-weight: 900; }
        #messageDisplay { font-size: 1.6rem; opacity: 0.7; max-width: 85%; margin: 0 auto; }

        /* BOTÓN FLOTANTE MÓVIL */
        #cio-app #menu-toggle-float {
            display: none; position: fixed; bottom: 85px; right: 20px;
            width: 55px; height: 55px; border-radius: 50%;
            background: var(--primary); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            font-size: 20px; cursor: pointer; z-index: 10015;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6); align-items: center; justify-content: center;
        }

        /* TICKER BAR */
        #cio-app #ticker-bar { 
            height: 55px; background: #050505; border-top: 1px solid #111; 
            display: flex; align-items: center; overflow: hidden; position: relative; 
        }
        #cio-app #ticker-content { 
            display: flex; align-items: center; gap: 20px;
            white-space: nowrap; position: absolute; left: 0; padding: 0 40px;
        }
        
        .status-badge {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 14px; border-radius: 6px; font-size: 0.75rem; font-weight: 800;
            text-transform: uppercase; transition: all 0.5s ease;
        }
        .status-badge.offline { background: rgba(255, 77, 77, 0.1); border: 1px solid #ff4d4d; color: #ff4d4d; animation: bPulse 1.5s infinite; }
        .status-badge.restored { background: rgba(46, 204, 113, 0.2); border: 1px solid var(--exito); color: var(--exito); transform: scale(1.1); box-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
        .status-badge.hidden-out { opacity: 0; transform: translateY(-10px); }
        @keyframes bPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* PANELES LATERALES */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 400px; height: 100%;
            background: #080808; border-left: 1px solid var(--primary); padding: 25px;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 10020;
            box-sizing: border-box; overflow-y: auto;
        }
        #cio-app .side-panel.active { transform: translateX(0); }
        
        /* FORMULARIOS Y BOTONES CENTRADOS */
        #cio-app .form-wrap { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; max-width: 340px; padding: 12px; background: #111; color: #fff; 
            border: 1px solid #222; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; text-align: center;
        }
        #cio-app button.btn-main { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; max-width: 340px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #cio-app button.btn-cancel { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 10px; width: 100%; max-width: 340px; border-radius: 8px; cursor: pointer; margin-top: 10px; }

        /* RESPONSIVE MÓVIL */
        @media (max-width: 768px) {
            #cio-app #menu-toggle-float { display: flex; }
            #cio-app .side-panel { width: 100%; border-left: none; }
            #cio-app .main-header { height: 60px; padding: 0 15px; }
            #titleDisplay { font-size: 36px !important; margin: 10px 0; }
            #messageDisplay { font-size: 1.2rem !important; }
            #clockDisplay { font-size: 1.4rem !important; }
            .header-actions { display: none; }
        }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div id="cio-app">
    <div id="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; z-index:10002; backdrop-filter:blur(8px);" onclick="closePanels()"></div>

    <header class="main-header">
        <div class="header-actions" style="display:flex; gap:8px;">
            <button onclick="openForm()" style="background:var(--primary); color:white; border:none; padding:8px 12px; border-radius:5px; font-weight:bold; cursor:pointer;">＋ NUEVA</button>
            <button onclick="openHistory()" style="background:#1a1a1a; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;">📋 HISTORIAL</button>
            <button onclick="toggleFS()" style="background:none; border:1px solid #333; color:#666; padding:8px 10px; border-radius:5px; cursor:pointer;">⛶ TV</button>
        </div>
        <div id="clockDisplay" style="font-family:monospace; font-size:1.6rem; font-weight:900; color:var(--primary);">00:00:00</div>
        <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="30" style="filter: brightness(2);">
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel" style="letter-spacing: 4px; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px;">MONITOR</div>
            <div id="prioBadge" style="display: inline-block; padding: 4px 15px; border-radius: 4px; font-weight: 900; border: 1px solid var(--accent); font-size: 0.65rem;">SISTEMA OK</div>
            <h1 id="titleDisplay">MASTERSON</h1>
            <p id="messageDisplay">Cargando información del sistema...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">
            <div class="status-badge" style="color:#444">VERIFICANDO RED...</div>
        </div>
    </div>
    
    <div id="progressLine" style="position: fixed; bottom: 55px; height: 3px; width: 0%; transition: width 0.1s linear; z-index: 5;"></div>

    <button id="menu-toggle-float" onclick="toggleMobileMenu(event)">☰</button>

    <aside id="panelForm" class="side-panel">
        <div class="form-wrap">
            <h2 style="color:var(--primary); margin-bottom:20px; text-align:center;">NUEVA NOVEDAD</h2>
            <form onsubmit="saveNew(event)" style="width:100%; display:contents;">
                <select id="f-area"><option>Monitoreo</option><option>Freschat</option><option>Atención</option><option>Novedad Interna</option></select>
                <select id="f-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
                <input type="text" id="f-title" placeholder="Título corto" required>
                <textarea id="f-msg" rows="4" placeholder="Descripción detallada..." required></textarea>
                <button type="submit" class="btn-main">PUBLICAR</button>
                <button type="button" onclick="closePanels()" class="btn-cancel">CANCELAR / CERRAR</button>
            </form>
        </div>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:20px;">HISTORIAL</h2>
        <div id="historyList"></div>
        <div class="form-wrap">
            <button onclick="closePanels()" class="btn-cancel">VOLVER AL MONITOR</button>
        </div>
    </aside>
</div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let logs = []; 
    let currentIdx = 0; 
    let startTime = null; 
    let lastNetworkStatus = {};
    const SLIDE_TIME = 15;

    async function updateNetwork() {
        try {
            const resp = await fetch(RED_URL);
            const status = await resp.json();
            if(!status) return;

            const ticker = document.getElementById("ticker-content");
            let htmlContent = "";

            Object.keys(status).forEach(id => {
                const name = id.replace(/_/g, ' ');
                const isOffline = status[id].estado === "offline";
                const wasOffline = lastNetworkStatus[id] === "offline";

                if (!isOffline && wasOffline) {
                    htmlContent += `<div class="status-badge restored" id="restored-${id}">✔ ${name} ONLINE</div>`;
                    setTimeout(() => { document.getElementById(`restored-${id}`)?.classList.add('hidden-out'); }, 5000);
                } 
                else if (isOffline) {
                    htmlContent += `<div class="status-badge offline">⚠️ OFF: ${name}</div>`;
                }
                lastNetworkStatus[id] = status[id].estado;
            });

            if(htmlContent === "") htmlContent = `<div class="status-badge" style="color:var(--primary)">✔ SISTEMAS OPERATIVOS</div>`;
            ticker.innerHTML = htmlContent;
        } catch(e) {}
    }

    async function syncEvents() {
        try {
            const resp = await fetch(DB_URL);
            const data = await resp.json();
            logs = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
            if(logs.length > 0 && !startTime) renderSlide();
        } catch(e) {}
    }

    function renderSlide() {
        if(!logs.length) return;
        const cont = document.getElementById("infoCont");
        const app = document.getElementById("cio-app");
        cont.classList.add("oculto");

        setTimeout(() => {
            const item = logs[currentIdx % logs.length];
            const pColors = {"Baja":"var(--accent)", "Media":"#f1c40f", "Alta":"#e67e22", "Crítica":"#ff4d4d"};
            const activeColor = pColors[item.priority] || "#fff";

            if(item.priority === "Crítica") app.classList.add("emergency-active");
            else app.classList.remove("emergency-active");

            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("areaLabel").style.color = activeColor;
            document.getElementById("prioBadge").textContent = `PRIORIDAD ${item.priority.toUpperCase()}`;
            document.getElementById("prioBadge").style.borderColor = activeColor;
            document.getElementById("prioBadge").style.color = activeColor;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            document.getElementById("progressLine").style.background = activeColor;
            cont.classList.remove("oculto");
        }, 700);
    }

    function toggleMobileMenu(e) { e.stopPropagation(); openForm(); }
    function handleGlobalClick(e) { if(e.target.id === "overlay") closePanels(); }
    function openForm() { document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function openHistory() { renderHistory(); document.getElementById("panelHistory").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function closePanels() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); document.getElementById("overlay").style.display = "none"; }

    function renderHistory() {
        const h = document.getElementById("historyList");
        h.innerHTML = logs.map((it, i) => `
            <div style="background:#111; padding:12px; border-radius:10px; margin-bottom:10px; border-left:4px solid var(--primary);">
                <small style="color:var(--primary)">${it.area}</small>
                <div style="font-weight:bold; margin:3px 0; font-size:0.9rem;">${it.title}</div>
                <button onclick="deleteEntry(${i})" style="background:none; border:none; color:#ff4d4d; font-size:10px; cursor:pointer; padding:0;">[ ELIMINAR ]</button>
            </div>
        `).join('');
    }

    async function saveNew(e) {
        e.preventDefault();
        const entry = { area: document.getElementById("f-area").value, priority: document.getElementById("f-prio").value, title: document.getElementById("f-title").value, message: document.getElementById("f-msg").value };
        logs.push(entry);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        closePanels(); syncEvents();
    }

    async function deleteEntry(idx) {
        if(!confirm("¿Borrar novedad?")) return;
        logs.splice(idx, 1);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs.length ? logs : null) });
        renderHistory(); syncEvents();
    }

    function toggleFS() { 
        const app = document.getElementById("cio-app");
        if (!document.fullscreenElement) app.requestFullscreen?.() || app.webkitRequestFullscreen?.();
        else document.exitFullscreen();
    }

    function loop(ts) {
        if(logs.length) {
            if(!startTime) startTime = ts;
            const progress = (ts - startTime) / (SLIDE_TIME * 1000);
            document.getElementById("progressLine").style.width = (Math.min(progress, 1) * 100) + "%";
            if(progress >= 1) { currentIdx++; renderSlide(); startTime = ts; }
        }
        requestAnimationFrame(loop);
    }

    setInterval(() => { document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString('es-UY', { hour12: false }); }, 1000);
    setInterval(updateNetwork, 4000);
    setInterval(syncEvents, 10000);
    updateNetwork(); syncEvents(); requestAnimationFrame(loop);
</script>
</body>
</html>
