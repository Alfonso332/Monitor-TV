<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Centro de Inteligencia Operativa</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* FUERZA BRUTA PARA EL DISPLAY (Ignora el CSS externo) */
        #display {
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            height: 100vh !important;
            width: 100vw !important;
            padding: 50px !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
            position: fixed !important;
            top: 0; left: 0;
            background: #0a1a1b;
            transition: background 0.5s ease;
        }

        .info-block {
            width: 100% !important;
            max-height: 80vh !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            pointer-events: none;
        }

        /* RESET DE FUENTES PARA EL AUTO-AJUSTE */
        #titleDisplay {
            margin: 0 0 20px 0 !important;
            padding: 0 !important;
            line-height: 1 !important;
            display: block !important;
            text-transform: uppercase;
        }

        #messageDisplay {
            margin: 0 !important;
            padding: 0 !important;
            line-height: 1.1 !important;
            display: block !important;
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
        }

        /* EFECTO CRÍTICO (Pulso Rojo) */
        @keyframes pulse-red {
            0% { background-color: #0a1a1b; }
            50% { background-color: #610000; }
            100% { background-color: #0a1a1b; }
        }

        .critico-total {
            animation: pulse-red 1s infinite !important;
        }

        .critico-total #titleDisplay, 
        .critico-total #messageDisplay {
            color: #ff4d4d !important;
            text-shadow: 0 0 30px rgba(255, 0, 0, 1) !important;
        }

        /* AJUSTES DE UI */
        .drawer { z-index: 10000 !important; }
        #drawerOverlay { z-index: 9999 !important; }
        .control-header { z-index: 10001 !important; position: relative; }
    </style>
</head>
<body>

<div id="drawerOverlay"></div>

<header class="control-header">
    <div class="left-zone">
        <button id="btnNew">＋ NUEVO</button>
        <button id="btnManage">☰ HISTORIAL</button>
        <button id="btnFullscreen">⛶ FULL</button>
    </div>
    <div class="live-clock" id="clock">00:00:00</div>
</header>

<main id="display">
    <div class="info-block">
        <div id="areaLabel" class="area" style="font-size: 2rem; margin-bottom: 10px;">SISTEMA</div>
        <h1 id="titleDisplay">CARGANDO</h1>
        <p id="messageDisplay">Sincronizando registros...</p>
    </div>
</main>

<footer class="footer-bar" style="z-index: 10001;"><div id="progressBar"></div></footer>

<aside id="drawerForm" class="drawer">
    <h2 id="formTitle">Evento</h2>
    <form id="formRegistro">
        <input type="hidden" id="editIndex" value="-1">
        <label>Área</label>
        <select id="inputArea" required>
            <option value="Freschat">Freschat</option>
            <option value="Monitoreo">Monitoreo</option>
            <option value="Atención al Cliente">Atención al Cliente</option>
            <option value="Interno">Interno</option>
        </select>
        <label>Prioridad</label>
        <select id="inputPriority">
            <option value="low">Baja</option>
            <option value="medium">Media</option>
            <option value="high">Alta</option>
            <option value="critical">Crítica</option>
        </select>
        <input type="text" id="inputTitle" placeholder="Título" required>
        <textarea id="inputMessage" rows="6" placeholder="Novedad" required></textarea>
        <div class="form-actions">
            <button type="button" onclick="closeAllDrawers()">CANCELAR</button>
            <button type="submit" style="background:#00ff88; color:#000;">ACTUALIZAR TV</button>
        </div>
    </form>
</aside>

<aside id="drawerHistory" class="drawer">
    <button class="btn-pdf" onclick="generatePDF()">📥 DESCARGAR REPORTE</button>
    <div id="historyList"></div>
</aside>

<script>
    const DATABASE_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let registros = [];
    let currentIndex = 0;
    let startTime = null;
    const DURATION = 15;

    // --- LÓGICA DE AUTO-AJUSTE ---
    function fitText() {
        const title = document.getElementById('titleDisplay');
        const message = document.getElementById('messageDisplay');
        const container = document.getElementById('display');

        let sizeT = 100; // Empezamos gigante
        let sizeM = 120;

        title.style.fontSize = sizeT + "px";
        message.style.fontSize = sizeM + "px";

        // Bucle: Mientras el contenido sea más alto que la ventana, achica
        let loop = 0;
        while (title.offsetHeight + message.offsetHeight > container.offsetHeight * 0.7 && loop < 100) {
            sizeT -= 1;
            sizeM -= 2;
            title.style.fontSize = sizeT + "px";
            message.style.fontSize = sizeM + "px";
            loop++;
        }
    }

    async function syncCloud() {
        await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(registros.length > 0 ? registros : null) });
        pullData();
    }

    async function pullData() {
        try {
            const res = await fetch(DATABASE_URL);
            const data = await res.json();
            const nuevos = data || [];
            if (JSON.stringify(nuevos) !== JSON.stringify(registros)) {
                registros = nuevos;
                render(currentIndex);
            }
        } catch (e) {}
    }

    function render(index){
        const display = document.getElementById("display");
        if(!registros.length) {
            display.classList.remove("critico-total");
            document.getElementById("areaLabel").textContent = "SISTEMA";
            document.getElementById("titleDisplay").textContent = "VACÍO";
            document.getElementById("messageDisplay").textContent = "No hay novedades activas";
            return;
        }

        const reg = registros[index % registros.length];
        
        // Aplicar Efecto Crítico
        if(reg.priority === "critical") {
            display.classList.add("critico-total");
            document.getElementById("areaLabel").textContent = "⚠️ " + reg.area.toUpperCase() + " ⚠️";
        } else {
            display.classList.remove("critico-total");
            document.getElementById("areaLabel").textContent = reg.area.toUpperCase();
        }

        document.getElementById("titleDisplay").textContent = reg.title;
        document.getElementById("messageDisplay").textContent = reg.message;
        
        const colors = {low:"#00ff88", medium:"#00ccff", high:"#ffcc00", critical:"#ff4d4d"};
        document.getElementById("progressBar").style.background = colors[reg.priority] || "#006465";

        setTimeout(fitText, 50); // Ajustar letra tras pintar
    }

    // --- ELIMINAR (CORREGIDO) ---
    window.eliminarEvento = async (i) => {
        if(confirm("¿Eliminar?")) {
            registros.splice(i, 1);
            await syncCloud();
            renderHistory();
        }
    };

    window.editarEvento = (i) => {
        const reg = registros[i];
        document.getElementById("editIndex").value = i;
        document.getElementById("inputArea").value = reg.area;
        document.getElementById("inputPriority").value = reg.priority;
        document.getElementById("inputTitle").value = reg.title;
        document.getElementById("inputMessage").value = reg.message;
        document.getElementById("drawerHistory").classList.remove("active");
        document.getElementById("drawerForm").classList.add("active");
    };

    function renderHistory() {
        const container = document.getElementById("historyList");
        container.innerHTML = registros.map((reg, i) => `
            <div style="background:rgba(255,255,255,0.1); padding:10px; margin-bottom:10px; border-radius:8px;">
                <strong>${reg.title}</strong><br>
                <button onclick="editarEvento(${i})">EDITAR</button>
                <button onclick="eliminarEvento(${i})" style="color:red">BORRAR</button>
            </div>
        `).join('');
    }

    document.getElementById("formRegistro").onsubmit = async (e) => {
        e.preventDefault();
        const idx = parseInt(document.getElementById("editIndex").value);
        const nuevo = {
            area: document.getElementById("inputArea").value,
            priority: document.getElementById("inputPriority").value,
            title: document.getElementById("inputTitle").value,
            message: document.getElementById("inputMessage").value
        };
        if(idx === -1) registros.push(nuevo); else registros[idx] = nuevo;
        await syncCloud();
        closeAllDrawers();
    };

    function animate(timestamp){
        if(!registros.length) { requestAnimationFrame(animate); return; }
        if(!startTime) startTime = timestamp;
        const progress = (timestamp - startTime) / 1000;
        const percent = Math.min((progress / DURATION) * 100, 100);
        document.getElementById("progressBar").style.width = percent + "%";
        if(progress >= DURATION){ 
            currentIndex = (currentIndex + 1) % registros.length; 
            render(currentIndex); 
            startTime = timestamp; 
        }
        requestAnimationFrame(animate);
    }

    function closeAllDrawers() {
        document.querySelectorAll('.drawer, #drawerOverlay').forEach(el => el.classList.remove('active'));
    }

    document.getElementById("btnNew").onclick = () => { document.getElementById("drawerForm").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); };
    document.getElementById("btnManage").onclick = () => { renderHistory(); document.getElementById("drawerHistory").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); };
    document.getElementById("drawerOverlay").onclick = closeAllDrawers;

    function updateClock(){ document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}); }
    setInterval(updateClock, 1000);
    setInterval(pullData, 3000);
    requestAnimationFrame(animate);
    pullData();
</script>
</body>
</html>
