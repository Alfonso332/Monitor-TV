<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* RESET & ENCAPSULAMIENTO */
        #cio-app {
            --primary: #00d4d8;
            --accent: #006465;
            --dark-bg: #050d0e;
            --critico-pulso: #4d0000;
            --ticker-bg: #0a1a1b;
            /* URL DE TU IMAGEN PROPORCIONADA */
            --bg-url: url('https://media.licdn.com/dms/image/v2/D4D16AQFlbrVsBSIY8g/profile-displaybackgroundimage-shrink_200_800/B4DZZFypIVG8Ac-/0/1744927626681?e=2147483647&v=beta&t=49icTUy8i5rpfVAVyiYvfDbIeOaLnoMHaOLYm5-vsoI');
            
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            background: var(--dark-bg) !important; color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
            overflow: hidden; margin: 0; padding: 0; z-index: 9999;
        }

        /* CAPA DE IMAGEN DE FONDO PERSONALIZADA */
        #cio-app::before {
            content: "";
            position: absolute; inset: 0;
            background-image: var(--bg-url);
            background-size: cover;
            background-position: center center;
            opacity: 0.18; /* Un poquito más de visibilidad para que se note el logo */
            filter: blur(1px); /* Desenfoque sutil para que no moleste al texto */
            z-index: -1;
        }

        /* HEADER */
        #cio-app .main-header {
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 212, 216, 0.2); z-index: 100;
        }

        #cio-app .header-actions button {
            background: rgba(0, 212, 216, 0.1); border: 1px solid var(--primary);
            color: #fff; padding: 8px 16px; border-radius: 15px; font-size: 12px;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-right: 8px;
        }

        #cio-app #clockDisplay { font-family: 'Courier New', monospace; font-size: 1.5rem; color: var(--primary); font-weight: bold; }

        /* TABLERO CENTRAL */
        #cio-app #display-board {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
            /* El degradado ayuda a que el texto siempre sea legible sin importar el fondo */
            background: radial-gradient(circle at center, transparent 0%, rgba(5, 13, 14, 0.8) 100%);
        }

        @keyframes pulso-cio {
            0% { background-color: transparent; }
            50% { background-color: var(--critico-pulso); }
            100% { background-color: transparent; }
        }
        #cio-app.es-critico #display-board { animation: pulso-cio 2s infinite ease-in-out; }

        #cio-app .info-container { width: 100%; max-width: 1100px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        #cio-app .oculto { opacity: 0; transform: scale(0.95); filter: blur(10px); }

        #cio-app #areaLabel { font-size: clamp(0.9rem, 2.5vw, 1.4rem); color: var(--primary); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }
        #cio-app #prioBadge { display: inline-block; padding: 6px 20px; border-radius: 50px; font-weight: 800; border: 1px solid var(--primary); font-size: clamp(0.7rem, 2vw, 1rem); margin-bottom: 20px; backdrop-filter: blur(5px); }
        #cio-app #titleDisplay { font-weight: 800; text-transform: uppercase; line-height: 1.1; margin: 0 0 20px 0; color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.9); }
        #cio-app #messageDisplay { font-weight: 300; color: #cedddd; line-height: 1.5; max-width: 850px; margin: 0 auto; white-space: pre-wrap; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }

        /* TICKER INFERIOR */
        #cio-app #ticker-bar { height: 40px; background: rgba(10, 26, 27, 0.95); border-top: 1px solid var(--primary); display: flex; align-items: center; overflow: hidden; backdrop-filter: blur(10px); }
        #cio-app #ticker-content { white-space: nowrap; animation: ticker-scroll-cio 30s linear infinite; color: var(--primary); font-size: 0.9rem; font-weight: bold; }
        @keyframes ticker-scroll-cio { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* NAVEGACIÓN MOBILE */
        #cio-app .nav-mobile {
            display: none; height: 95px; background: rgba(7, 18, 19, 0.98); border-top: 1px solid var(--primary);
            justify-content: space-around; align-items: flex-start; padding-top: 15px;
            padding-bottom: env(safe-area-inset-bottom); backdrop-filter: blur(20px);
        }
        #cio-app .nav-mobile button {
            background: none; border: none; color: #fff; display: flex; flex-direction: column;
            align-items: center; gap: 5px; font-size: 11px; font-weight: bold; cursor: pointer;
        }
        #cio-app .nav-mobile .icon { font-size: 24px; color: var(--primary); }

        /* PANELES LATERALES */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 350px; height: 100%;
            background: #091718; border-left: 2px solid var(--primary); padding: 30px;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1100;
            box-sizing: border-box; overflow-y: auto;
        }
        #cio-app .side-panel.active { transform: translateX(0); }
        #cio-app #overlay-cio { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: none; z-index: 1050; }
        #cio-app #overlay-cio.active { display: block; }

        /* FORMULARIOS Y BOTONES ESTÉTICOS */
        #cio-app h2 { color: var(--primary); margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid var(--accent); padding-bottom: 10px; }
        #cio-app label { display: block; font-size: 11px; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid var(--accent);
            border-radius: 15px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box;
        }
        #cio-app .btn-save { width: 100%; padding: 15px; background: var(--primary); color: #000; font-weight: 800; border: none; border-radius: 18px; cursor: pointer; transition: 0.2s; }
        #cio-app .btn-save:active { transform: scale(0.96); }
        #cio-app .btn-cancel { width: 100%; padding: 12px; background: rgba(255, 77, 77, 0.1); color:#ff4d4d; border: 1px solid #ff4d4d; border-radius: 18px; margin-top: 10px; cursor: pointer; font-weight: bold; }

        /* LISTA HISTORIAL */
        #cio-app .history-item { background: rgba(255,255,255,0.05); padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--primary); border-radius: 15px; backdrop-filter: blur(5px); }
        #cio-app .history-item button { border-radius: 12px; cursor: pointer; border: none; padding: 8px 15px; font-weight: bold; }

        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            #cio-app .header-actions { display: none; }
            #cio-app .nav-mobile { display: flex; }
            #cio-app .side-panel { width: 100%; height: 90%; top: auto; bottom: 0; transform: translateY(100%); border-left: none; border-top: 3px solid var(--primary); border-radius: 30px 30px 0 0; }
            #cio-app .side-panel.active { transform: translateY(0); }
            #cio-app #display-board { padding-bottom: 140px; }
            #cio-app #clockDisplay { font-size: 1.2rem; }
        }

        #cio-app #progressLine { position: fixed; bottom: 40px; height: 3px; width: 0%; z-index: 999; }
        @media (max-width: 768px) { #cio-app #progressLine { bottom: 135px; } }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay-cio" onclick="closeAll()"></div>

    <header class="main-header">
        <div class="header-actions">
            <button onclick="openForm()">＋ NUEVA NOVEDAD</button>
            <button onclick="openHistory()">📋 HISTORIAL</button>
            <button onclick="handleCerrarTurno()" style="border-color: #ff4d4d; color: #ff4d4d;">🔒 CERRAR TURNO</button>
            <button onclick="toggleFS()">⛶ TV</button>
        </div>
        <div id="clockDisplay">00:00:00</div>
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">SISTEMA CIO</div>
            <div id="prioBadge">CONECTANDO</div>
            <h1 id="titleDisplay">Monitor Operativo</h1>
            <p id="messageDisplay">Sincronizando flujo de datos...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">CARGANDO ÚLTIMAS NOVEDADES...</div>
    </div>

    <nav class="nav-mobile">
        <button onclick="openForm()"><span class="icon">➕</span>NUEVO</button>
        <button onclick="openHistory()"><span class="icon">📋</span>LISTA</button>
        <button onclick="handleCerrarTurno()"><span class="icon">🔒</span>TURNO</button>
    </nav>

    <aside id="panelForm" class="side-panel">
        <h2>Nueva Entrada</h2>
        <form onsubmit="handleSave(event)">
            <input type="hidden" id="editId" value="-1">
            <label>Tipo de Evento</label>
            <select id="f-type">
                <option value="turno">De Turno (Se borra al cerrar)</option>
                <option value="diaria">Diaria (Dura 24 horas)</option>
            </select>
            <label>Área</label>
            <select id="f-area">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <label>Prioridad</label>
            <select id="f-prio">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Crítica">Crítica</option>
            </select>
            <label>Título</label>
            <input type="text" id="f-title" placeholder="Ej: Falla de enlace" required>
            <label>Descripción</label>
            <textarea id="f-msg" rows="4" placeholder="Detalle la novedad..." required></textarea>
            
            <button type="submit" class="btn-save">ACTUALIZAR MONITOR</button>
            <button type="button" onclick="closeAll()" class="btn-cancel">✕ CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2>Eventos Activos</h2>
        <button onclick="generatePDF()" style="width:100%; background:#fff; color:#000; padding:12px; font-weight:bold; border:none; border-radius:15px; margin-bottom:20px; cursor:pointer;">📥 DESCARGAR PDF</button>
        <div id="listItems"></div>
        <button type="button" onclick="closeAll()" class="btn-cancel" style="margin-top: 20px;">✕ VOLVER AL MONITOR</button>
    </aside>

    <div id="progressLine"></div>
</div>

<script>
    const API_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let dataStore = [];
    let currentIndex = 0;
    let timerStart = null;
    const DISPLAY_TIME = 15;

    async function syncData() {
        try {
            const r = await fetch(API_URL);
            const d = await r.json();
            const now = Date.now();
            const raw = d || [];
            
            dataStore = raw.filter(item => {
                if(item.type === 'diaria' && (now - item.timestamp > 86400000)) return false;
                return true;
            });

            if(dataStore.length > 0) {
                const last = dataStore[dataStore.length - 1];
                document.getElementById("ticker-content").textContent = `[ÚLTIMO] ${last.area}: ${last.title} ——— `;
                if(document.getElementById("prioBadge").textContent === "CONECTANDO") refreshView();
            } else {
                document.getElementById("prioBadge").textContent = "SISTEMA OK";
                document.getElementById("ticker-content").textContent = "SIN NOVEDADES ACTIVAS";
            }
        } catch(e) { console.error("Error Sync"); }
    }

    function refreshView() {
        if(!dataStore.length) return;
        const cont = document.getElementById("infoCont");
        cont.classList.add("oculto");

        setTimeout(() => {
            const item = dataStore[currentIndex % dataStore.length];
            const app = document.getElementById("cio-app");
            const badge = document.getElementById("prioBadge");

            if(item.priority === "Crítica") {
                app.classList.add("es-critico");
                badge.style.background = "#ff0000"; badge.style.color = "#fff";
            } else {
                app.classList.remove("es-critico");
                badge.style.background = "transparent"; badge.style.color = "var(--primary)";
            }

            badge.textContent = `PRIORIDAD ${item.priority}`;
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            
            const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
            document.getElementById("progressLine").style.background = colors[item.priority];
            
            adjustText();
            cont.classList.remove("oculto");
        }, 600); 
    }

    async function handleSave(e) {
        e.preventDefault();
        const id = parseInt(document.getElementById("editId").value);
        const entry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value,
            type: document.getElementById("f-type").value,
            timestamp: Date.now()
        };
        if(id === -1) dataStore.push(entry); else dataStore[id] = entry;
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore) });
        closeAll(); syncData();
    }

    async function handleCerrarTurno() {
        if(!confirm("¿Cerrar turno? Se descargará el PDF y se borrarán las novedades de turno.")) return;
        generatePDF();
        setTimeout(async () => {
            const diarias = dataStore.filter(i => i.type === 'diaria');
            await fetch(API_URL, { method: 'PUT', body: JSON.stringify(diarias.length ? diarias : null) });
            currentIndex = 0; syncData();
        }, 1500);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(0, 100, 101); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(18); doc.text("REPORTE CIO OPERATIVO", 20, 25);
        doc.setFontSize(10); doc.text(`Generado: ${new Date().toLocaleString()}`, 20, 33);

        let y = 55;
        dataStore.forEach((item, i) => {
            if(y > 270) { doc.addPage(); y = 20; }
            doc.setTextColor(0); doc.setFont(undefined, 'bold');
            doc.text(`${i+1}. [${item.priority}] AREA: ${item.area}`, 20, y);
            y += 7; doc.setFont(undefined, 'normal');
            const lines = doc.splitTextToSize(`${item.title}: ${item.message}`, 170);
            doc.text(lines, 25, y); y += (lines.length * 7) + 10;
        });
        doc.save(`Reporte_CIO_${Date.now()}.pdf`);
    }

    function openHistory() {
        const list = document.getElementById("listItems");
        list.innerHTML = dataStore.length ? dataStore.map((item, i) => `
            <div class="history-item">
                <small style="color:var(--primary); font-weight:bold;">${item.type.toUpperCase()}</small>
                <div style="font-weight:bold; margin:5px 0;">${item.title}</div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button onclick="onEdit(${i})" style="background:var(--primary); color:#000;">EDITAR</button>
                    <button onclick="onDelete(${i})" style="background:#ff4d4d; color:white;">BORRAR</button>
                </div>
            </div>
        `).join('') : "<p style='opacity:0.5; text-align:center;'>No hay novedades activas.</p>";
        document.getElementById("panelHistory").classList.add("active");
        document.getElementById("overlay-cio").classList.add("active");
    }

    window.onEdit = (i) => {
        const item = dataStore[i];
        document.getElementById("editId").value = i;
        document.getElementById("f-area").value = item.area;
        document.getElementById("f-prio").value = item.priority;
        document.getElementById("f-title").value = item.title;
        document.getElementById("f-msg").value = item.message;
        document.getElementById("f-type").value = item.type;
        closeAll();
        document.getElementById("panelForm").classList.add("active");
        document.getElementById("overlay-cio").classList.add("active");
    };

    window.onDelete = async (i) => {
        if(!confirm("¿Eliminar entrada?")) return;
        dataStore.splice(i, 1);
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore.length ? dataStore : null) });
        openHistory(); syncData();
    };

    function adjustText() {
        const t = document.getElementById('titleDisplay');
        const m = document.getElementById('messageDisplay');
        const container = document.getElementById('display-board');
        let sizeT = window.innerWidth <= 768 ? 28 : 70; 
        let sizeM = window.innerWidth <= 768 ? 16 : 38;
        t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
        let limit = 0;
        while ((t.offsetHeight + m.offsetHeight > container.offsetHeight * 0.70) && limit < 40) {
            sizeT -= 1; sizeM -= 0.8;
            t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
            limit++;
        }
    }

    function openForm() { document.getElementById("editId").value = "-1"; document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay-cio").classList.add("active"); }
    function closeAll() { document.querySelectorAll('.side-panel, #overlay-cio').forEach(el => el.classList.remove('active')); }
    function toggleFS() { if (!document.fullscreenElement) document.getElementById('cio-app').requestFullscreen(); else document.exitFullscreen(); }

    function runLoop(ts) {
        if(!dataStore.length) { requestAnimationFrame(runLoop); return; }
        if(!timerStart) timerStart = ts;
        const elapsed = (ts - timerStart) / 1000;
        document.getElementById("progressLine").style.width = Math.min((elapsed / DISPLAY_TIME) * 100, 100) + "%";
        if(elapsed >= DISPLAY_TIME){ currentIndex++; refreshView(); timerStart = ts; }
        requestAnimationFrame(runLoop);
    }

    setInterval(() => { document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}); }, 1000);
    setInterval(syncData, 15000);
    window.addEventListener('resize', adjustText);
    syncData();
    requestAnimationFrame(runLoop);
</script>
</body>
</html>
