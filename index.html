<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor | Masterson</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* === RESET Y ENCAPSULAMIENTO === */
        #cio-app {
            --primary: #006465;
            --accent: #00d1d1;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --online: #2ecc71;
            --bg-emergencia: #1a0000; 

            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 999999;
            margin: 0;
            padding: 0;
            transition: background 0.8s ease;
        }

        #cio-app.pantalla-critica {
            background: var(--bg-emergencia) !important;
        }

        #cio-app * {
            box-sizing: border-box !important;
            -webkit-tap-highlight-color: transparent;
        }

        /* === HEADER Y FULLSCREEN === */
        #cio-app .main-header {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--primary);
            z-index: 100;
        }

        /* Ocultar header en Fullscreen (Modo TV) */
        #cio-app:fullscreen .main-header {
            display: none !important;
        }

        #cio-app .fs-clock {
            display: none;
        }

        #cio-app:fullscreen .fs-clock {
            display: block;
            position: absolute;
            top: 30px;
            right: 40px;
            font-family: 'Courier New', monospace;
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            z-index: 1000;
            text-shadow: 0 0 20px rgba(0, 100, 101, 0.6);
        }

        /* === DISPLAY CENTRAL === */
        #cio-app #display-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            position: relative;
        }

        #cio-app #titleDisplay {
            font-size: 85px;
            font-weight: 900;
            margin: 15px 0;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -2px;
        }

        #cio-app .info-container {
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            max-width: 1000px;
        }

        #cio-app .oculto {
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            filter: blur(15px);
        }

        /* === TICKER DE RED === */
        #cio-app #ticker-bar {
            height: 80px;
            background: #050505;
            border-top: 1px solid #151515;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #cio-app #ticker-content {
            display: flex;
            align-items: center;
            gap: 100px;
            white-space: nowrap;
            position: absolute;
            left: 0;
            animation: scroll-ticker 30s linear infinite;
        }

        @keyframes scroll-ticker {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        #cio-app .status-badge {
            padding: 12px 35px;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }

        #cio-app .status-badge small {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        #cio-app .status-badge.offline {
            background: rgba(255, 77, 77, 0.1);
            border: 3px solid var(--critico);
            color: var(--critico);
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.2);
        }

        #cio-app .status-badge.restored {
            background: rgba(46, 204, 113, 0.1);
            border: 3px solid var(--online);
            color: var(--online);
        }

        /* === PANELES Y FORMULARIOS === */
        #cio-app .side-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 480px;
            height: 100%;
            background: #080808;
            border-left: 2px solid var(--primary);
            padding: 35px;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10100;
            overflow-y: auto;
            box-shadow: -15px 0 40px rgba(0,0,0,0.8);
        }

        #cio-app .side-panel.active {
            transform: translateX(0);
        }

        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%;
            padding: 18px;
            background: #121212 !important;
            color: #fff !important;
            border: 1px solid #252525 !important;
            border-radius: 15px;
            text-align: center; /* Campos centrados como solicitado */
            margin-bottom: 15px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        #cio-app input:focus, #cio-app textarea:focus {
            border-color: var(--accent) !important;
            outline: none;
        }

        #cio-app .btn-pill {
            background: var(--primary) !important;
            color: #fff !important;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }

        #cio-app .btn-pill:active { transform: scale(0.98); }
        #cio-app .btn-sec { background: #1a1a1a !important; border: 1px solid #333; }

        /* === HISTORIAL E ITEMS === */
        #cio-app .history-item {
            background: #111;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary);
            position: relative;
        }

        #cio-app .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        #cio-app .stat-box {
            background: #141414;
            padding: 18px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid #222;
            cursor: pointer;
        }

        #cio-app .stat-box b { font-size: 1.8rem; display: block; line-height: 1; }
        #cio-app .stat-box small { font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; }

        /* === MÓVIL (FULL CUSTOM) === */
        #cio-app #mobile-fab {
            display: none;
            position: fixed;
            bottom: 35px;
            right: 30px;
            width: 75px;
            height: 75px;
            background: var(--primary);
            border-radius: 50%;
            z-index: 1000005;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 30px rgba(0,0,0,0.7);
            border: 2px solid var(--accent);
        }

        @media (max-width: 768px) {
            #cio-app .main-header { display: none !important; }
            #cio-app #ticker-bar { display: none !important; }
            #cio-app #titleDisplay { font-size: 38px !important; letter-spacing: 0; }
            #cio-app .side-panel { width: 100%; padding: 25px; border-left: none; }
            #cio-app #mobile-fab { display: flex; }
            #cio-app #display-board { padding: 20px; }
        }

        /* Detalles de Offline Dropdown */
        #cio-app #offline-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background: #0a0000;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        #cio-app #offline-details.show { max-height: 600px; border: 1px solid #400; padding: 15px; }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="fsClockDisplay" class="fs-clock">00:00:00</div>
    
    <div id="cio-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; z-index:10090; backdrop-filter:blur(8px);" onclick="closePanels()"></div>

    <header class="main-header">
        <div style="display:flex; gap:12px;">
            <button onclick="openFormPanel()" class="btn-pill" style="padding:10px 25px; width:auto; margin:0;">＋ NUEVA</button>
            <button onclick="openPanel('panelHistory')" class="btn-pill btn-sec" style="padding:10px 25px; width:auto; margin:0;">📋 HISTORIAL</button>
            <button onclick="toggleFS()" style="background:none; border:1px solid #333; color:#666; padding:10px 15px; border-radius:10px; cursor:pointer;">⛶ MODO TV</button>
        </div>
        <div id="clockDisplay" style="font-family:monospace; font-size:2rem; font-weight:900; color:var(--primary);">00:00:00</div>
        <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="45">
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel" style="letter-spacing: 8px; font-weight: 900; font-size: 0.9rem; margin-bottom: 15px; color: var(--accent);">OPERACIONES MASTERSON</div>
            <h1 id="titleDisplay">SISTEMA INICIADO</h1>
            <p id="messageDisplay" style="font-size:2rem; opacity:0.6; line-height: 1.5; font-weight: 300;">Esperando sincronización de datos...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">
            <span style="font-size: 1.5rem; color: #222; font-weight: 900; letter-spacing: 3px;">MONITOREO DE RED ACTIVO</span>
        </div>
    </div>
    
    <div id="progressLine" style="position: fixed; bottom: 80px; height: 6px; width: 0%; background: var(--primary); z-index: 50; transition: width 0.1s linear;"></div>

    <div id="mobile-fab" onclick="openPanel('panelHistory')">
        <span style="font-size: 40px; color:white;">☰</span>
    </div>

    <aside id="panelForm" class="side-panel">
        <h2 style="color:var(--primary); text-align:center; margin-bottom:30px; font-weight:900;">REGISTRO DE EVENTO</h2>
        <form id="mainForm" onsubmit="saveEntry(event)">
            <input type="hidden" id="f-id" value="">
            <label style="font-size:0.7rem; opacity:0.5; margin-left:10px;">ÁREA AFECTADA</label>
            <select id="f-area">
                <option>Monitoreo</option>
                <option>Freschat</option>
                <option>Atención al cliente</option>
                <option>Novedad Interna</option>
                <option>Servidores / IT</option>
            </select>
            <label style="font-size:0.7rem; opacity:0.5; margin-left:10px;">PRIORIDAD</label>
            <select id="f-prio">
                <option>Baja</option>
                <option>Media</option>
                <option>Alta</option>
                <option>Crítica</option>
            </select>
            <input type="text" id="f-title" placeholder="TÍTULO RESUMIDO" required>
            <textarea id="f-msg" rows="7" placeholder="DESCRIPCIÓN COMPLETA DEL EVENTO O NOVEDAD..." required></textarea>
            <button type="submit" class="btn-pill">PUBLICAR AHORA</button>
            <button type="button" onclick="closePanels()" class="btn-pill btn-sec">DESCARTAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:25px; font-weight:900;">PANEL DE CONTROL</h2>
        
        <div class="stats-grid">
            <div class="stat-box" onclick="openFormPanel()"><b style="color:var(--primary)">＋</b><small>Nueva</small></div>
            <div class="stat-box"><b id="stat-total">0</b><small>Total Hoy</small></div>
            <div class="stat-box" onclick="toggleOfflineDetails()">
                <b id="stat-off" style="color:var(--critico)">0</b>
                <small>Offline ▾</small>
            </div>
        </div>

        <div id="offline-details"></div>

        <button onclick="downloadPDF()" class="btn-pill" style="background:#111 !important; border:1px solid #333; height: 55px; font-size:0.8rem;">⬇ GENERAR REPORTE DE TURNO</button>

        <div id="historyList" style="margin-top: 20px;"></div>
        
        <button onclick="closePanels()" class="btn-pill btn-sec" style="margin-top:20px;">VOLVER AL MONITOR</button>
    </aside>
</div>

<script>
    const cio_DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const cio_RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let cio_logs = [], cio_currentIdx = 0, cio_startTime = null;
    let recentlyRestored = {}; 
    let offlineTracker = {}; // Control de tiempo de caída
    const cio_SLIDE_TIME = 45; // Segundos por slide

    // --- MONITOREO DE RED (Lógica 100 Segundos) ---
    async function updateNetwork() {
        try {
            const resp = await fetch(cio_RED_URL);
            const status = await resp.json();
            const ticker = document.getElementById("ticker-content");
            const offDetails = document.getElementById("offline-details");
            let tickerHTML = "", detailsHTML = "";
            let offCount = 0;
            const NOW = Date.now();

            if(status) {
                Object.keys(status).forEach(id => {
                    const currentItem = status[id];
                    const name = id.replace(/_/g, ' ');
                    
                    if (currentItem.estado === "offline") {
                        // Si no estaba marcado, guardamos cuándo empezó a fallar
                        if (!offlineTracker[id]) offlineTracker[id] = NOW;

                        const diffSecs = (NOW - offlineTracker[id]) / 1000;

                        // Solo se muestra si supera los 100 segundos
                        if (diffSecs >= 100) {
                            const horaFallo = new Date(offlineTracker[id]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            tickerHTML += `<div class="status-badge offline">⚠️ FALLO: ${name}<small>INICIADO: ${horaFallo}</small></div>`;
                            detailsHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #200; color:var(--critico); font-size:0.9rem;"><span>● ${name}</span><span>${horaFallo}</span></div>`;
                            offCount++;
                            delete recentlyRestored[id];
                        }
                    } else {
                        // Si vuelve a estar online y estuvo caído > 100s, mostrar aviso de restablecido
                        if (offlineTracker[id] && (NOW - offlineTracker[id]) / 1000 >= 100) {
                            recentlyRestored[id] = 3; // Mostrar 3 ciclos
                        }
                        delete offlineTracker[id];
                        if (recentlyRestored[id] > 0) {
                            tickerHTML += `<div class="status-badge restored">✔ ${name}: RESTABLECIDO</div>`;
                            recentlyRestored[id]--;
                        }
                    }
                });
            }

            if(tickerHTML !== "") {
                ticker.innerHTML = tickerHTML;
                const itemsCount = offCount + Object.keys(recentlyRestored).filter(k => recentlyRestored[k] > 0).length;
                ticker.style.animationDuration = `${itemsCount * 8 + 6}s`;
                offDetails.innerHTML = detailsHTML;
            } else {
                ticker.innerHTML = `<span style="color:var(--primary); font-size:1.6rem; font-weight:900; width:100vw; text-align:center; letter-spacing:4px;">✔ SISTEMAS OPERATIVOS AL 100%</span>`;
                ticker.style.animation = "none"; ticker.style.left = "0";
                offDetails.innerHTML = "<div style='color:#444; text-align:center; padding:10px;'>Sin incidencias de red</div>";
            }
            document.getElementById("stat-off").textContent = offCount;
        } catch(e) { console.error("Error Red:", e); }
    }

    // --- GESTIÓN DE EVENTOS ---
    async function syncEvents() {
        try {
            const resp = await fetch(cio_DB_URL);
            const data = await resp.json();
            const now = Date.now();
            cio_logs = (data ? (Array.isArray(data) ? data : Object.values(data)) : [])
                        .filter(it => !it.timestamp || (now - it.timestamp < 86400000));
            document.getElementById("stat-total").textContent = cio_logs.length;
            if(cio_logs.length > 0 && !cio_startTime) renderSlide();
            renderHistory();
        } catch(e) {}
    }

    function renderSlide() {
        if(!cio_logs.length) return;
        const cont = document.getElementById("infoCont"), app = document.getElementById("cio-app");
        cont.classList.add("oculto");
        setTimeout(() => {
            const item = cio_logs[cio_currentIdx % cio_logs.length];
            const color = {"Baja":"var(--accent)", "Media":"#f1c40f", "Alta":"#e67e22", "Crítica":"#ff4d4d"}[item.priority] || "#fff";
            
            app.classList.toggle("pantalla-critica", item.priority === "Crítica");
            
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("areaLabel").style.color = color;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            document.getElementById("progressLine").style.background = color;
            
            cont.classList.remove("oculto");
        }, 700);
    }

    function renderHistory() {
        document.getElementById("historyList").innerHTML = cio_logs.map((it, i) => {
            const h = it.timestamp ? new Date(it.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
            return `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span style="color:var(--accent); font-weight:900; font-size:0.75rem;">${it.area.toUpperCase()}</span>
                    <span style="opacity:0.4; font-size:0.75rem;">${h}</span>
                </div>
                <div style="font-weight:900; font-size:1.2rem; margin-bottom:8px;">${it.title}</div>
                <div style="font-size:0.9rem; opacity:0.7; line-height:1.4; margin-bottom:15px;">${it.message}</div>
                <div style="display:flex; gap:20px; border-top:1px solid #222; padding-top:12px;">
                    <button onclick="editEntry(${i})" style="color:var(--accent); background:none; border:none; cursor:pointer; font-weight:bold; font-size:0.8rem;">EDITAR</button>
                    <button onclick="deleteEntry(${i})" style="color:var(--critico); background:none; border:none; cursor:pointer; font-weight:bold; font-size:0.8rem;">BORRAR</button>
                </div>
            </div>`;
        }).reverse().join('');
    }

    // --- ACCIONES ---
    async function saveEntry(e) {
        e.preventDefault();
        const id = document.getElementById("f-id").value;
        const entry = {
            area: document.getElementById("f-area").value, 
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value, 
            message: document.getElementById("f-msg").value,
            timestamp: id !== "" ? cio_logs[id].timestamp : Date.now()
        };
        if(id !== "") cio_logs[id] = entry; else cio_logs.push(entry);
        await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
        closePanels(); syncEvents();
    }

    function editEntry(idx) {
        const it = cio_logs[idx];
        document.getElementById("f-id").value = idx;
        document.getElementById("f-area").value = it.area;
        document.getElementById("f-prio").value = it.priority;
        document.getElementById("f-title").value = it.title;
        document.getElementById("f-msg").value = it.message;
        openPanel('panelForm');
    }

    async function deleteEntry(idx) {
        if(confirm("¿Estás seguro de eliminar este registro del monitor?")) {
            cio_logs.splice(idx, 1);
            await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
            syncEvents();
        }
    }

    // --- REPORTE PDF CON TURNOS ---
    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = jsPDF();
        const now = new Date();
        const h = now.getHours();
        
        let turno = "Noche (22:00 - 06:00)";
        if (h >= 6 && h < 14) turno = "Mañana (06:00 - 14:00)";
        else if (h >= 14 && h < 22) turno = "Tarde (14:00 - 22:00)";

        doc.setFontSize(22); doc.setTextColor(0, 100, 101);
        doc.text("MASTERSON | REPORTE OPERATIVO CIO", 14, 25);
        
        doc.setFontSize(11); doc.setTextColor(100);
        doc.text(`Turno Corriente: ${turno}`, 14, 35);
        doc.text(`Fecha/Hora de Generación: ${now.toLocaleString()}`, 14, 42);

        doc.autoTable({
            startY: 50,
            head: [['HORA', 'ÁREA', 'NIVEL', 'EVENTO', 'DESCRIPCIÓN']],
            body: cio_logs.map(it => [
                new Date(it.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                it.area, it.priority, it.title, it.message
            ]),
            headStyles: { fillColor: [0, 100, 101], fontSize: 10 },
            styles: { fontSize: 9, cellPadding: 4 },
            alternateRowStyles: { fillColor: [245, 245, 245] }
        });

        doc.save(`CIO_Masterson_Reporte_${now.toISOString().split('T')[0]}.pdf`);
    }

    // --- UI HELPERS ---
    function openPanel(id) { 
        closePanels(); 
        document.getElementById(id).classList.add("active"); 
        document.getElementById("cio-overlay").style.display = "block"; 
    }
    
    function closePanels() { 
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); 
        document.getElementById("cio-overlay").style.display = "none"; 
    }

    function toggleFS() { 
        if (!document.fullscreenElement) document.getElementById("cio-app").requestFullscreen(); 
        else document.exitFullscreen(); 
    }

    function openFormPanel() { 
        document.getElementById("mainForm").reset(); 
        document.getElementById("f-id").value = ""; 
        openPanel('panelForm'); 
    }

    function toggleOfflineDetails() { 
        document.getElementById("offline-details").classList.toggle("show"); 
    }
    
    function loop(ts) {
        if(cio_logs.length) {
            if(!cio_startTime) cio_startTime = ts;
            const progress = (ts - cio_startTime) / (cio_SLIDE_TIME * 1000);
            document.getElementById("progressLine").style.width = (Math.min(progress, 1) * 100) + "%";
            if(progress >= 1) { 
                cio_currentIdx++; 
                renderSlide(); 
                cio_startTime = ts; 
            }
        }
        requestAnimationFrame(loop);
    }

    setInterval(() => {
        const t = new Date().toLocaleTimeString('es-UY', { hour12: false });
        document.getElementById("clockDisplay").textContent = t;
        if(document.getElementById("fsClockDisplay")) document.getElementById("fsClockDisplay").textContent = t;
    }, 1000);

    setInterval(updateNetwork, 5000); 
    setInterval(syncEvents, 10000);
    
    updateNetwork(); 
    syncEvents(); 
    requestAnimationFrame(loop);
</script>
</body>
</html>
