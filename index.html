<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* CSS INTERNO - ENCAPSULADO PARA EVITAR CHOQUES */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050d0e; color: #ffffff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        #cio-app {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            background: #050d0e;
        }

        /* DISPLAY CENTRAL */
        #display-board {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 5vh 5vw;
            background: radial-gradient(circle at center, #0c1c1d 0%, #050d0e 100%);
            transition: all 0.5s ease;
        }

        @keyframes pulse-critico {
            0% { background-color: #050d0e; }
            50% { background-color: #2b0000; }
            100% { background-color: #050d0e; }
        }
        #cio-app.es-critico #display-board { animation: pulse-critico 2s infinite; }

        .info-container { width: 100%; max-width: 1200px; z-index: 5; }
        
        #areaLabel { 
            font-size: clamp(0.8rem, 2vh, 1.1rem); color: #00d4d8; 
            letter-spacing: 5px; text-transform: uppercase; margin-bottom: 1vh;
        }

        #prioBadge {
            display: inline-block; padding: 5px 15px; border-radius: 4px;
            font-weight: 800; border: 1px solid rgba(255,255,255,0.2);
            font-size: clamp(0.7rem, 1.5vh, 0.9rem); margin-bottom: 2vh;
        }

        #titleDisplay { font-weight: 800; text-transform: uppercase; line-height: 1.1; margin-bottom: 2vh; }
        #messageDisplay { font-weight: 300; color: #cedddd; line-height: 1.4; max-width: 90%; margin: 0 auto; }

        /* CABECERA Y RELOJ */
        .main-header {
            position: absolute; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; z-index: 100;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        /* FULLSCREEN: DESAPARECE LA BARRA, SOLO QUEDA EL RELOJ */
        #cio-app:fullscreen .main-header { background: transparent; backdrop-filter: none; border: none; }
        #cio-app:fullscreen .actions { display: none !important; }

        .actions { display: flex; gap: 8px; }
        .actions button {
            background: rgba(0, 100, 101, 0.3); border: 1px solid #00d4d8;
            color: #fff; padding: 6px 12px; border-radius: 4px;
            font-size: 11px; font-weight: bold; cursor: pointer;
        }

        #clockDisplay { 
            font-family: monospace; font-size: 1.3rem; color: #00d4d8; font-weight: bold; 
        }

        #cio-app:fullscreen #clockDisplay {
            font-size: clamp(2rem, 6vh, 3.5rem); margin-top: 40px; margin-right: 20px;
            text-shadow: 0 0 20px rgba(0,212,216,0.4);
        }

        /* PANELES LATERALES (PC / TV) */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
        #overlay.active { display: block; }

        .side-panel {
            position: fixed; right: 0; top: 0; 
            width: 25vw; min-width: 350px; height: 100%;
            background: #091718; border-left: 3px solid #00d4d8;
            padding: 25px; transform: translateX(100%);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1100; overflow-y: auto; box-sizing: border-box;
        }
        .side-panel.active { transform: translateX(0); }

        .side-panel h2 { color: #00d4d8; font-size: 1.2rem; margin-top: 0; }
        .side-panel label { font-size: 0.7rem; color: #00d4d8; display: block; margin-bottom: 5px; }
        
        .side-panel input, .side-panel textarea, .side-panel select {
            width: 100%; padding: 10px; margin-bottom: 12px;
            background: #000; color: #fff; border: 1px solid #006465;
            border-radius: 4px; font-size: 0.9rem; box-sizing: border-box;
        }

        .btn-update {
            width: 100%; background: #00d4d8; color: #000;
            padding: 12px; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; font-size: 0.9rem;
        }

        /* ADAPTACIÓN MÓVIL */
        .nav-mobile { display: none; }

        @media (max-width: 768px) {
            .actions { display: none; }
            .main-header { justify-content: center; background: none; }
            .nav-mobile {
                display: flex; position: fixed; bottom: 0; width: 100%; height: 70px;
                background: #061112; border-top: 1px solid #00d4d8;
                justify-content: space-around; align-items: center; z-index: 500;
            }
            .nav-mobile button { background: none; border: none; color: #00d4d8; font-size: 0.7rem; font-weight: bold; }
            
            .side-panel { 
                width: 100%; min-width: 100%; height: 80%;
                top: auto; bottom: 0; transform: translateY(100%);
                border-left: none; border-top: 4px solid #00d4d8;
                border-radius: 20px 20px 0 0;
            }
            .side-panel.active { transform: translateY(0); }
            #display-board { padding-bottom: 90px; }
            #clockDisplay { font-size: 1.1rem; }
        }

        #progressLine { position: fixed; bottom: 0; height: 4px; width: 0%; z-index: 999; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay" onclick="closeAll()"></div>

    <header class="main-header">
        <div class="actions">
            <button onclick="openForm()">＋ NUEVO</button>
            <button onclick="openHistory()">📋 LISTA</button>
            <button onclick="toggleFS()" style="border-color:#ffcc00; color:#ffcc00;">⛶ TV</button>
        </div>
        <div id="clockDisplay">00:00:00</div>
    </header>

    <main id="display-board">
        <div class="info-container">
            <div id="areaLabel">CARGANDO...</div>
            <div id="prioBadge">Sincronizando</div>
            <h1 id="titleDisplay">Monitor CIO</h1>
            <p id="messageDisplay">Obteniendo novedades operativas...</p>
        </div>
    </main>

    <nav class="nav-mobile">
        <button onclick="openForm()">➕<br>NUEVO</button>
        <button onclick="openHistory()">📋<br>LISTA</button>
    </nav>

    <aside id="panelForm" class="side-panel">
        <h2>Nueva Novedad</h2>
        <form onsubmit="handleSave(event)">
            <input type="hidden" id="editId" value="-1">
            <label>ÁREA</label>
            <select id="f-area">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <label>PRIORIDAD</label>
            <select id="f-prio">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Crítica">Crítica</option>
            </select>
            <label>TÍTULO</label>
            <input type="text" id="f-title" placeholder="Resumen corto" required>
            <label>DESCRIPCIÓN</label>
            <textarea id="f-msg" rows="5" placeholder="Detalle la novedad..." required></textarea>
            <button type="submit" class="btn-update">ACTUALIZAR</button>
            <button type="button" onclick="closeAll()" style="width:100%; background:none; color:#ff4d4d; border:none; margin-top:10px; cursor:pointer; font-weight:bold;">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2>Eventos Activos</h2>
        <button onclick="generatePDF()" style="width:100%; background:#fff; color:#000; border:none; padding:12px; font-weight:bold; margin-bottom:15px; cursor:pointer; border-radius:4px;">📥 EXPORTAR PDF</button>
        <div id="listItems"></div>
        <button type="button" onclick="closeAll()" style="width:100%; background:none; color:#ff4d4d; border:none; margin-top:20px; cursor:pointer; font-weight:bold;">CERRAR</button>
    </aside>

    <div id="progressLine"></div>
</div>

<script>
    const API_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let dataStore = [];
    let currentIndex = 0;
    let timerStart = null;
    const DISPLAY_TIME = 15;

    function adjustText() {
        const t = document.getElementById('titleDisplay');
        const m = document.getElementById('messageDisplay');
        const container = document.getElementById('display-board');
        let sizeT = window.innerWidth <= 768 ? 26 : 75; 
        let sizeM = window.innerWidth <= 768 ? 16 : 40;
        t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
        let limit = 0;
        while ((t.offsetHeight + m.offsetHeight > container.offsetHeight * 0.7) && limit < 50) {
            sizeT -= 1; sizeM -= 0.5;
            t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
            limit++;
        }
    }

    async function syncData() {
        try {
            const r = await fetch(API_URL);
            const d = await r.json();
            dataStore = d || [];
            if(dataStore.length > 0) refreshView(currentIndex);
        } catch(e) { console.error("Sync Error"); }
    }

    function refreshView(idx) {
        if(!dataStore.length) return;
        const item = dataStore[idx % dataStore.length];
        const app = document.getElementById("cio-app");
        const badge = document.getElementById("prioBadge");
        
        if(item.priority === "Crítica") {
            app.classList.add("es-critico");
            badge.style.backgroundColor = "#ff4d4d"; badge.style.color = "#fff";
        } else {
            app.classList.remove("es-critico");
            badge.style.backgroundColor = "transparent"; badge.style.color = "#00d4d8";
        }

        badge.textContent = "Prioridad " + item.priority;
        document.getElementById("areaLabel").textContent = item.area;
        document.getElementById("titleDisplay").textContent = item.title;
        document.getElementById("messageDisplay").textContent = item.message;
        
        const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
        document.getElementById("progressLine").style.background = colors[item.priority] || "#00d4d8";
        
        setTimeout(adjustText, 50);
    }

    async function handleSave(e) {
        e.preventDefault();
        const id = parseInt(document.getElementById("editId").value);
        const entry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value
        };
        if(id === -1) dataStore.push(entry); else dataStore[id] = entry;
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore) });
        closeAll(); syncData();
    }

    function getTurno(hora) {
        if (hora >= 6 && hora < 14) return "MAÑANA (06:00 - 14:00)";
        if (hora >= 14 && hora < 22) return "TARDE (14:00 - 22:00)";
        return "NOCHE (22:00 - 06:00)";
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const now = new Date();
        const turno = getTurno(now.getHours());
        
        // Estética corporativa
        doc.setFillColor(0, 100, 101); // Color #006465
        doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("REPORTE OPERATIVO CIO", 20, 25);
        doc.setFontSize(10);
        doc.text(`TURNO: ${turno} | FECHA: ${now.toLocaleDateString()}`, 20, 35);
        
        doc.setTextColor(0, 0, 0);
        let y = 60;
        dataStore.forEach((item, i) => {
            if(y > 270) { doc.addPage(); y = 20; }
            doc.setFont(undefined, 'bold');
            doc.setTextColor(0, 100, 101);
            doc.text(`${i+1}. [${item.priority}] - ${item.area}`, 20, y);
            y += 7;
            doc.setFont(undefined, 'normal');
            doc.setTextColor(50, 50, 50);
            const lines = doc.splitTextToSize(`Título: ${item.title} | Mensaje: ${item.message}`, 170);
            doc.text(lines, 25, y);
            y += (lines.length * 6) + 10;
        });
        doc.save(`CIO_Reporte_${now.toLocaleDateString()}.pdf`);
    }

    window.onDelete = async (i) => {
        if(!confirm("¿Eliminar novedad?")) return;
        dataStore.splice(i, 1);
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore.length ? dataStore : null) });
        openHistory(); syncData();
    };

    window.onEdit = (i) => {
        const item = dataStore[i];
        document.getElementById("editId").value = i;
        document.getElementById("f-area").value = item.area;
        document.getElementById("f-prio").value = item.priority;
        document.getElementById("f-title").value = item.title;
        document.getElementById("f-msg").value = item.message;
        document.getElementById("panelHistory").classList.remove("active");
        document.getElementById("panelForm").classList.add("active");
    };

    function openForm() { 
        document.getElementById("editId").value = "-1";
        document.getElementById("panelForm").classList.add("active"); 
        document.getElementById("overlay").classList.add("active"); 
    }
    
    function openHistory() { 
        const list = document.getElementById("listItems");
        list.innerHTML = dataStore.length ? dataStore.map((item, i) => `
            <div style="background:rgba(255,255,255,0.05); padding:12px; margin-bottom:10px; border:1px solid #00d4d8; border-radius:4px;">
                <small style="color:#00d4d8">${item.area} | ${item.priority}</small>
                <strong style="display:block; margin:5px 0;">${item.title}</strong>
                <button onclick="onEdit(${i})" style="background:#ffcc00; border:none; padding:4px 8px; font-size:10px; font-weight:bold; cursor:pointer;">EDITAR</button>
                <button onclick="onDelete(${i})" style="background:#ff4d4d; color:#fff; border:none; padding:4px 8px; font-size:10px; margin-left:5px; font-weight:bold; cursor:pointer;">BORRAR</button>
            </div>
        `).join('') : "<p style='text-align:center; opacity:0.5;'>Sin novedades.</p>";
        document.getElementById("panelHistory").classList.add("active"); 
        document.getElementById("overlay").classList.add("active"); 
    }

    function closeAll() { document.querySelectorAll('.side-panel, #overlay').forEach(el => el.classList.remove('active')); }

    function toggleFS() { 
        const root = document.getElementById('cio-app');
        if (!document.fullscreenElement) root.requestFullscreen();
        else document.exitFullscreen();
    }

    function runLoop(ts) {
        if(!dataStore.length) { requestAnimationFrame(runLoop); return; }
        if(!timerStart) timerStart = ts;
        const elapsed = (ts - timerStart) / 1000;
        document.getElementById("progressLine").style.width = Math.min((elapsed / DISPLAY_TIME) * 100, 100) + "%";
        if(elapsed >= DISPLAY_TIME){ currentIndex++; refreshView(currentIndex); timerStart = ts; }
        requestAnimationFrame(runLoop);
    }

    setInterval(() => {
        document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false});
    }, 1000);

    setInterval(syncData, 10000);
    window.addEventListener('resize', adjustText);
    syncData();
    requestAnimationFrame(runLoop);
</script>
</body>
</html>
