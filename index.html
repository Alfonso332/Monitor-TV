<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Executive Monitor</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        #cio-app {
            /* Paleta Ejecutiva */
            --primary: #ffffff;
            --accent: #00d1d1;
            --dark-bg: #050505;
            --critico: #ff3b30;
            --border-soft: rgba(255, 255, 255, 0.1);
            
            /* Colores de Área (Versión Muted/Elegante) */
            --color-monitoreo: #ff453a;
            --color-atencion: #32d74b;
            --color-freschat: #0a84ff;
            --color-interna: #ebebf5;
            
            --bg-img: url('https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
            letter-spacing: -0.02em;
        }

        /* MODO EMERGENCIA SOBRIO */
        #cio-app.emergency-active { animation: emergencyPulse 3s infinite; }
        @keyframes emergencyPulse {
            0% { box-shadow: inset 0 0 100px rgba(0,0,0,1); }
            50% { box-shadow: inset 0 0 150px rgba(255, 59, 48, 0.15); }
            100% { box-shadow: inset 0 0 100px rgba(0,0,0,1); }
        }

        #cio-app::before {
            content: ""; position: absolute; inset: 0;
            background-image: var(--bg-img); background-size: 30%;
            background-position: center; background-repeat: no-repeat;
            opacity: 0.02; filter: grayscale(1); z-index: -1;
        }

        /* HEADER REFINADO */
        #cio-app .main-header {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-soft);
        }
        #cio-app:fullscreen .main-header { display: none !important; }

        /* DASHBOARD */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 5px; border-radius: 4px; text-align: center; 
            border: 1px solid var(--border-soft); transition: 0.3s;
        }
        .stat-card b { font-size: 1.6rem; color: #fff; font-weight: 300; }
        .stat-card span { display: block; font-size: 0.65rem; color: #666; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }
        .stat-card.alert { border-color: var(--critico); }
        .stat-card.alert b { color: var(--critico); font-weight: 600; }

        /* BOTÓN FLOTANTE MÓVIL */
        #cio-app #menu-toggle-float {
            display: none; position: fixed; bottom: 30px; right: 25px;
            width: 55px; height: 55px; border-radius: 18px;
            background: #fff; color: #000; border: none;
            font-size: 22px; cursor: pointer; z-index: 10015;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); align-items: center; justify-content: center;
        }

        #cio-app #mobile-menu {
            position: fixed; bottom: 95px; right: 25px; width: 220px;
            background: rgba(20, 20, 20, 0.95); display: none; flex-direction: column;
            padding: 12px; gap: 8px; border: 1px solid var(--border-soft);
            border-radius: 20px; z-index: 10010; backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* PANTALLA CENTRAL */
        #cio-app #display-board { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; }
        #cio-app .info-container { width: 100%; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
        #cio-app .oculto { opacity: 0; transform: translateY(20px); filter: blur(10px); }

        #areaLabel { letter-spacing: 6px; font-weight: 300; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; opacity: 0.6; }
        #prioBadge { display: inline-block; padding: 4px 16px; border-radius: 4px; font-weight: 600; border: 1px solid rgba(255,255,255,0.2); margin: 15px 0; font-size: 0.7rem; background: transparent; }
        #titleDisplay { margin: 10px 0; line-height: 1; font-size: 80px; font-weight: 700; letter-spacing: -3px; }
        #messageDisplay { font-size: 2rem; font-weight: 300; opacity: 0.5; max-width: 850px; margin: 20px auto 0; line-height: 1.4; }

        /* PANELES LATERALES */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 420px; height: 100%;
            background: #0a0a0a; border-left: 1px solid var(--border-soft); padding: 40px;
            transform: translateX(100%); transition: 0.5s cubic-bezier(1, 0, 0, 1); z-index: 10020;
            box-sizing: border-box;
        }
        #cio-app .side-panel.active { transform: translateX(0); }
        
        /* FORMULARIOS CENTRADOS Y REFINADOS */
        #cio-app .edit-box {
            background: #111; border: 1px solid #222; padding: 25px;
            border-radius: 12px; margin-top: 15px; display: none;
        }

        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; padding: 14px; background: #151515; color: #fff; 
            border: 1px solid #222; border-radius: 8px; margin-bottom: 12px; 
            text-align: center; box-sizing: border-box; font-size: 1rem;
        }
        #cio-app input:focus { border-color: #444; outline: none; }

        #cio-app button.btn-main, #cio-app .header-actions button {
            background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        #cio-app button.btn-main:hover { opacity: 0.8; }

        /* TICKER BAR */
        #cio-app #ticker-bar { height: 40px; background: #000; border-top: 1px solid var(--border-soft); display: flex; align-items: center; overflow: hidden; }
        #cio-app #ticker-content { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }

        #progressLine { position: fixed; bottom: 40px; height: 2px; width: 0%; transition: width 0.1s linear; opacity: 0.5; }

        @media (max-width: 768px) {
            #cio-app .main-header { padding: 0 20px; }
            #cio-app .header-actions { display: none; }
            #cio-app #menu-toggle-float { display: flex; }
            #cio-app .side-panel { width: 100%; height: 90%; top: auto; bottom: 0; transform: translateY(100%); border-radius: 30px 30px 0 0; border-left: none; border-top: 1px solid var(--border-soft); }
            #cio-app .side-panel.active { transform: translateY(0); }
            #titleDisplay { font-size: 45px; letter-spacing: -1px; }
        }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div id="cio-app">
    <div id="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; z-index:10002; backdrop-filter:blur(10px);" onclick="closePanels()"></div>

    <header class="main-header">
        <div class="header-actions">
            <button onclick="openForm()">NUEVA ENTRADA</button>
            <button onclick="openHistory()" style="background:transparent; color:#fff; border:1px solid #333; margin-left:12px;">REGISTROS</button>
            <button onclick="toggleFS()" style="background:none; border:none; color:#444; margin-left:12px; font-size:12px;">MODO TV</button>
        </div>
        <div id="clockDisplay" style="font-weight:200; font-size:1.5rem; letter-spacing: 2px;">00:00:00</div>
        <div><img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="28" style="filter: invert(1); opacity:0.8;"></div>
    </header>

    <button id="menu-toggle-float" onclick="toggleMobileMenu(event)">☰</button>
    <div id="mobile-menu">
        <button onclick="openForm(); toggleMobileMenu();" class="btn-main" style="width:100%">＋ NUEVA</button>
        <button onclick="openHistory(); toggleMobileMenu();" style="background:transparent; color:#fff; border:1px solid #333; padding:10px; border-radius:8px;">📋 HISTORIAL</button>
        <button onclick="openOfflinePanel(); toggleMobileMenu();" id="btn-offline-mob" style="background:rgba(255,59,48,0.1); color:var(--critico); border:none; padding:10px; border-radius:8px; font-weight:bold;">OFFLINE (<span id="count-offline-mob">0</span>)</button>
    </div>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">SYSTEM STATUS</div>
            <h1 id="titleDisplay">STANDBY</h1>
            <div id="prioBadge">SECURE</div>
            <p id="messageDisplay">Waiting for system updates...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">CARGANDO REPORTE EJECUTIVO...</div>
    </div>
    
    <div id="progressLine"></div>

    <div id="quickEdit" class="edit-box">
        <input type="hidden" id="e-index">
        <select id="e-area"><option>Monitoreo</option><option>Freschat</option><option>Atención</option><option>Novedad Interna</option></select>
        <select id="e-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
        <input type="text" id="e-title">
        <textarea id="e-msg" rows="4"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="saveQuickEdit()" class="btn-main" style="flex:1;">ACTUALIZAR</button>
            <button onclick="hideEdit()" style="flex:1; background:transparent; border:1px solid #333; color:white; border-radius:8px; cursor:pointer;">CANCELAR</button>
        </div>
    </div>

    <aside id="panelHistory" class="side-panel">
        <h2 style="font-weight:200; margin-bottom:5px;">Dashboard</h2>
        <p style="color:#444; font-size:0.8rem; margin-bottom:30px; letter-spacing:1px; text-transform:uppercase;">Resumen de eventos actuales</p>
        <div class="stats-grid">
            <div class="stat-card" id="card-off"><b>0</b><span>OFFLINE</span></div>
            <div class="stat-card" id="card-crit"><b>0</b><span>CRITICAL</span></div>
            <div class="stat-card"><b>0</b><span id="card-total">TOTAL</span></div>
        </div>
        <div id="historyList"></div>
        <button onclick="closePanels()" style="width:100%; margin-top:20px; background:none; border:1px solid #222; color:#666; padding:12px; border-radius:8px; cursor:pointer; font-size:0.8rem;">CERRAR VENTANA</button>
    </aside>

    <aside id="panelForm" class="side-panel">
        <h2 style="font-weight:200; margin-bottom:30px;">Nueva Novedad</h2>
        <form onsubmit="saveNew(event)">
            <select id="f-area"><option>Monitoreo</option><option>Freschat</option><option>Atención</option><option>Novedad Interna</option></select>
            <select id="f-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
            <input type="text" id="f-title" placeholder="Título" required>
            <textarea id="f-msg" rows="6" placeholder="Mensaje descriptivo..." required></textarea>
            <button type="submit" class="btn-main" style="width:100%; padding:18px;">PUBLICAR AHORA</button>
        </form>
    </aside>

    <aside id="panelOffline" class="side-panel">
        <h2 style="color:var(--critico); font-weight:200;">Alertas de Red</h2>
        <div id="offlineList" style="margin-top:20px;"></div>
        <button onclick="closePanels()" style="width:100%; margin-top:20px; background:none; border:1px solid #222; color:white; padding:10px; border-radius:8px;">VOLVER</button>
    </aside>
</div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    let logs = []; let currentIdx = 0; let startTime = null; const SLIDE_TIME = 15;

    function handleGlobalClick(e) {
        const menu = document.getElementById("mobile-menu");
        const btn = document.getElementById("menu-toggle-float");
        if (menu.style.display === "flex" && !menu.contains(e.target) && !btn.contains(e.target)) toggleMobileMenu();
    }

    function toggleMobileMenu() {
        const menu = document.getElementById("mobile-menu");
        const isVisible = menu.style.display === "flex";
        menu.style.display = isVisible ? "none" : "flex";
        document.getElementById("overlay").style.display = isVisible ? "none" : "block";
    }

    async function updateNetwork() {
        try {
            const resp = await fetch(RED_URL);
            const status = await resp.json();
            const ticker = document.getElementById("ticker-content");
            let caidos = [];
            if(status) {
                Object.keys(status).forEach(id => { 
                    if(status[id].estado === "offline") caidos.push(id.replace(/_/g, ' ')); 
                });
            }
            const cardOff = document.getElementById("card-off");
            cardOff.querySelector('b').textContent = caidos.length;
            if(caidos.length > 0) {
                cardOff.classList.add('alert');
                ticker.innerHTML = `⚠️ RED: ` + caidos.map(n => `<span style="color:var(--critico); font-weight:bold; margin:0 15px;">[${n}]</span>`).join(' • ');
                document.getElementById("offlineList").innerHTML = caidos.map(n => `<div style="background:rgba(255,59,48,0.05); border:1px solid rgba(255,59,48,0.2); padding:15px; border-radius:10px; margin-bottom:10px; text-align:center; font-weight:600; color:var(--critico);">● ${n}</div>`).join('');
            } else {
                cardOff.classList.remove('alert');
                ticker.innerHTML = `✔ SISTEMAS OPERATIVOS — SEGURIDAD MASTERSON — ${new Date().toLocaleDateString()} — `;
                document.getElementById("offlineList").innerHTML = `<p style="text-align:center; color:#333; font-size:0.8rem;">Sistemas en línea.</p>`;
            }
            document.getElementById("count-offline-mob").textContent = caidos.length;
        } catch(e) {}
    }

    async function syncEvents() {
        try {
            const resp = await fetch(DB_URL);
            const data = await resp.json();
            logs = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
            updateDashboardCounters();
            if(logs.length > 0 && !startTime) renderSlide();
        } catch(e) {}
    }

    function updateDashboardCounters() {
        const criticos = logs.filter(l => l.priority === "Crítica").length;
        const cardCrit = document.getElementById("card-crit");
        cardCrit.querySelector('b').textContent = criticos;
        if(criticos > 0) cardCrit.classList.add('alert'); else cardCrit.classList.remove('alert');
        document.getElementById("card-total").previousElementSibling.textContent = logs.length;
    }

    function renderSlide() {
        if(!logs.length) return;
        const cont = document.getElementById("infoCont");
        const app = document.getElementById("cio-app");
        cont.classList.add("oculto");

        setTimeout(() => {
            const item = logs[currentIdx % logs.length];
            const areaColors = { "Monitoreo": "var(--color-monitoreo)", "Atención": "var(--color-atencion)", "Freschat": "var(--color-freschat)", "Novedad Interna": "var(--color-interna)" };
            const currentAreaColor = areaColors[item.area] || "var(--accent)";

            if(item.priority === "Crítica") app.classList.add("emergency-active");
            else app.classList.remove("emergency-active");

            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("areaLabel").style.color = currentAreaColor;
            document.getElementById("areaLabel").style.opacity = "1";
            
            document.getElementById("prioBadge").textContent = item.priority.toUpperCase();
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            
            const prioColors = {"Baja":"#0a84ff", "Media":"#ffd60a", "Alta":"#ff9f0a", "Crítica":"#ff3b30"};
            const pColor = prioColors[item.priority] || "#fff";
            document.getElementById("prioBadge").style.borderColor = pColor;
            document.getElementById("prioBadge").style.color = pColor;
            document.getElementById("progressLine").style.background = pColor;
            document.getElementById("titleDisplay").style.color = (item.priority === "Crítica") ? "#ff3b30" : "white";
            
            autoSizeText();
            cont.classList.remove("oculto");
        }, 700);
    }

    function autoSizeText() {
        const t = document.getElementById('titleDisplay');
        t.style.fontSize = window.innerWidth < 768 ? "45px" : "80px";
    }

    function openHistory() { renderHistoryList(); document.getElementById("panelHistory").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function openForm() { document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function openOfflinePanel() { document.getElementById("panelOffline").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    
    function closePanels() { 
        document.querySelectorAll('.side-panel').forEach(el => el.classList.remove('active')); 
        document.getElementById("overlay").style.display = "none";
        hideEdit();
    }

    function renderHistoryList() {
        const list = document.getElementById("historyList");
        list.innerHTML = logs.map((it, i) => `
            <div style="background:rgba(255,255,255,0.02); padding:18px; margin-bottom:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.05);">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="text-align:left"><strong style="font-size:15px; font-weight:500;">${it.title}</strong><br><small style="color:#444; text-transform:uppercase; letter-spacing:1px; font-size:9px;">${it.area}</small></div>
                    <div style="display:flex; gap:8px;">
                        <button onclick="showQuickEdit(${i})" style="padding:6px 12px; background:transparent; color:#fff; border:1px solid #333; border-radius:4px; font-size:10px;">EDIT</button>
                        <button onclick="deleteEntry(${i})" style="background:none; border:none; color:#333; font-size:10px;">BORRAR</button>
                    </div>
                </div>
                <div id="edit-anchor-${i}"></div>
            </div>
        `).join('');
    }

    function showQuickEdit(idx) {
        const item = logs[idx];
        const editBox = document.getElementById("quickEdit");
        document.getElementById("e-index").value = idx;
        document.getElementById("e-area").value = item.area;
        document.getElementById("e-prio").value = item.priority;
        document.getElementById("e-title").value = item.title;
        document.getElementById("e-msg").value = item.message;
        document.getElementById(`edit-anchor-${idx}`).appendChild(editBox);
        editBox.style.display = "block";
    }

    function hideEdit() { 
        const eb = document.getElementById("quickEdit");
        eb.style.display = "none";
        document.body.appendChild(eb);
    }

    async function saveQuickEdit() {
        const idx = document.getElementById("e-index").value;
        logs[idx] = {
            area: document.getElementById("e-area").value,
            priority: document.getElementById("e-prio").value,
            title: document.getElementById("e-title").value,
            message: document.getElementById("e-msg").value
        };
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        hideEdit(); renderHistoryList(); syncEvents();
    }

    async function saveNew(e) {
        e.preventDefault();
        const entry = {
            area: document.getElementById("f-area").value, priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value, message: document.getElementById("f-msg").value
        };
        logs.push(entry);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        closePanels(); syncEvents();
    }

    async function deleteEntry(idx) {
        if(!confirm("¿Borrar registro?")) return;
        logs.splice(idx, 1);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs.length ? logs : null) });
        renderHistoryList(); syncEvents();
    }

    function toggleFS() { 
        const app = document.getElementById("cio-app");
        if (!document.fullscreenElement) {
            if (app.requestFullscreen) app.requestFullscreen();
            else if (app.webkitRequestFullscreen) app.webkitRequestFullscreen();
        } else { document.exitFullscreen(); }
    }

    function mainLoop(ts) {
        if(!logs.length) { requestAnimationFrame(mainLoop); return; }
        if(!startTime) startTime = ts;
        const progress = (ts - startTime) / (SLIDE_TIME * 1000);
        document.getElementById("progressLine").style.width = (progress * 100) + "%";
        if(progress >= 1) { currentIdx++; renderSlide(); startTime = ts; }
        requestAnimationFrame(mainLoop);
    }

    setInterval(() => { document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString('es-UY', { hour12: false }); }, 1000);
    setInterval(updateNetwork, 5000);
    setInterval(syncEvents, 10000);
    updateNetwork(); syncEvents(); requestAnimationFrame(mainLoop);
    window.onresize = autoSizeText;
</script>
</body>
</html>
