<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor Elite | Masterson</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* === ESTRUCTURA Y RESET === */
        #cio-app {
            --primary: #006465;
            --accent: #00d1d1;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --online: #2ecc71;
            --warning: #f1c40f;
            --orange: #e67e22;
            --bg-emergencia: #1a0000;

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
            transition: background 0.5s ease;
        }

        #cio-app.pantalla-critica { background: var(--bg-emergencia) !important; }
        #cio-app * { box-sizing: border-box !important; margin: 0; padding: 0; }

        /* CABECERA PC */
        #cio-app .main-header {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; background: rgba(5, 5, 5, 0.95);
            border-bottom: 1px solid var(--primary); flex-shrink: 0;
        }
        #cio-app:fullscreen .main-header { display: none !important; }

        /* KPI BAR PC */
        #cio-app .kpi-bar {
            display: flex; justify-content: space-evenly; align-items: center;
            background: #050505; padding: 0 15px; border-bottom: 2px solid #1a1a1a;
            height: 70px; min-height: 70px; flex-shrink: 0; gap: 10px;
        }
        #cio-app .kpi-card { text-align: center; }
        #cio-app .kpi-value { 
            font-size: 1.8rem; font-weight: 900; color: var(--accent); 
            line-height: 1; display: flex; align-items: center; gap: 8px;
        }
        #cio-app .kpi-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-top: 2px; }

        /* PUESTOS PC */
        #cio-app .puestos-container { display: flex; gap: 20px; align-items: center; border-left: 2px solid #222; padding-left: 30px; height: 100%; }
        #cio-app .puesto-item { display: flex; flex-direction: column; align-items: center; }
        #cio-app .puesto-val { font-size: 1.5rem; font-weight: 900; font-family: monospace; }
        #cio-app .puesto-lab { font-size: 0.5rem; opacity: 0.5; font-weight: bold; }

        /* ÁREA CENTRAL */
        #cio-app #display-board { 
            flex: 1; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; padding: 20px;
        }
        #cio-app #titleDisplay { font-size: clamp(32px, 8vw, 100px); font-weight: 900; margin: 10px 0; text-transform: uppercase; line-height: 0.9; }
        #cio-app #messageDisplay { font-size: clamp(18px, 3vw, 45px); opacity: 0.85; max-width: 95%; line-height: 1.2; font-weight: 300; }
        #cio-app .area-tag { letter-spacing: 8px; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; margin-bottom: 15px; color: var(--accent); }
        
        #cio-app .info-container { transition: all 0.6s ease-in-out; width: 100%; }
        #cio-app .oculto { opacity: 0; transform: scale(0.95); filter: blur(10px); }

        /* TICKER PC */
        #cio-app #ticker-bar { 
            height: 60px; background: #050505; border-top: 1px solid #222; 
            display: flex; align-items: center; overflow: hidden; position: relative; flex-shrink: 0;
        }
        #cio-app #ticker-content { 
            display: flex; align-items: center; gap: 50px; white-space: nowrap; 
            position: absolute; left: 0; animation: scroll-ticker 30s linear infinite; 
        }
        @keyframes scroll-ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        #cio-app .capsula-off {
            background: rgba(255, 77, 77, 0.15); border: 2px solid var(--critico);
            color: var(--critico); padding: 4px 15px; border-radius: 50px;
            font-weight: 900; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
        }

        /* PANELES LATERALES */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 450px; height: 100%;
            background: #0d0d0d; border-left: 2px solid var(--primary); padding: 25px;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.7, 0, 0.3, 1); z-index: 10100;
            overflow-y: auto;
        }
        #cio-app .side-panel.active { transform: translateX(0); }
        
        /* FORMULARIOS Y BOTONES */
        #cio-app .p-field { 
            background: #1a1a1a; border: 1px solid #333; padding: 12px; color: white; 
            border-radius: 8px; width: 100%; margin-bottom: 15px; outline: none; font-size: 16px;
            text-align: center;
        }
        #cio-app .btn-pill {
            background: var(--primary); color: #fff; border: none; padding: 14px; border-radius: 50px;
            font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; margin-bottom: 10px; text-align: center;
        }
        #cio-app .btn-sec { background: #222; border: 1px solid #444; }

        #cio-app #progressLine { position: fixed; bottom: 60px; height: 4px; width: 0%; background: var(--accent); z-index: 10; transition: width 0.1s linear; }

        /* TREND ARROW */
        .trend-arrow { display: inline-block; animation: arrowMove 0.8s infinite alternate; font-weight: 900; }
        @keyframes arrowMove { from { transform: translateY(3px); } to { transform: translateY(-3px); } }

        .history-card { background: #151515; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--primary); }

        /* HAMBURGUESA CELULAR */
        #hamb-menu {
            display: none; position: fixed; bottom: 30px; right: 20px;
            width: 60px; height: 60px; background: var(--primary);
            border-radius: 50%; z-index: 10050; border: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            justify-content: center; align-items: center; font-size: 24px; cursor: pointer;
        }

        /* DISEÑO MÓVIL PROFESIONAL */
        .mobile-section-header {
            color: var(--primary); font-size: 0.75rem; font-weight: bold; 
            margin: 25px 0 12px; text-transform: uppercase; letter-spacing: 1.5px;
            display: flex; align-items: center; gap: 10px;
        }
        .mobile-section-header::after { content: ""; flex: 1; height: 1px; background: #222; }

        .mobile-stat-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px;
        }
        .mobile-stat-box { 
            background: linear-gradient(145deg, #151515, #0a0a0a); 
            padding: 15px 10px; border-radius: 12px; 
            border: 1px solid #222; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .mobile-puestos-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            background: #111; padding: 15px; border-radius: 15px; border: 1px solid #222;
        }
        .off-service-item { 
            background: linear-gradient(90deg, rgba(255, 77, 77, 0.12), transparent); 
            border: 1px solid rgba(255, 77, 77, 0.2);
            border-left: 4px solid var(--critico); padding: 15px; margin-bottom: 8px; 
            border-radius: 10px; font-size: 0.8rem; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }
        .off-service-tag { background: var(--critico); color: black; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }

        /* === RESPONSIVE CELULAR === */
        @media (max-width: 768px) {
            #hamb-menu { display: flex; }
            #cio-app .kpi-bar, #cio-app #ticker-bar, #cio-app .main-header .btn-pill { display: none !important; }
            #cio-app #progressLine { bottom: 0; }
            #cio-app .main-header { height: 65px; padding: 0 20px; border-bottom: 1px solid #1a1a1a; justify-content: center; }
            #cio-app .main-header img { height: 35px; }
            #cio-app #clockDisplay { position: absolute; left: 20px; font-size: 0.8rem; opacity: 0.7; }
            
            #cio-app .side-panel { 
                width: 90%; max-width: 400px; padding: 20px; 
                border-left: 3px solid var(--primary);
                box-shadow: -15px 0 35px rgba(0,0,0,0.9);
            }
            #cio-app #titleDisplay { font-size: 2.2rem; line-height: 1.1; margin: 15px 0; }
            #cio-app #messageDisplay { font-size: 1.1rem; }
            #cio-app .area-tag { font-size: 0.8rem; letter-spacing: 3px; }
        }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="cio-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; z-index:10090; backdrop-filter: blur(4px);" onclick="closePanels()"></div>

    <div id="hamb-menu" onclick="openPanel('panelMobileDash')">☰</div>

    <header class="main-header">
        <div style="display:flex; gap:8px;">
            <button onclick="openPanel('panelHistory')" class="btn-pill btn-sec" style="width:auto; padding:8px 12px; margin:0; font-size:0.7rem;">⚙️</button>
            <button onclick="toggleFS()" class="btn-pill btn-sec" style="width:auto; padding:8px 12px; margin:0; font-size:0.7rem;">⛶ TV</button>
        </div>
        <div id="clockDisplay" style="font-family:monospace; font-weight:900; color:var(--primary); font-size: 1.1rem;">00:00:00</div>
        <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="40">
    </header>

    <div class="kpi-bar">
        <div class="kpi-card">
            <span class="kpi-label">SLA</span>
            <span id="v-sla" class="kpi-value">--%</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Llamadas</span>
            <span id="v-calls" class="kpi-value">0</span>
        </div>
        <div class="puestos-container" id="puestos-display"></div>
    </div>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel" class="area-tag">MASTERSON CIO</div>
            <h1 id="titleDisplay">SISTEMA INICIANDO</h1>
            <p id="messageDisplay">Cargando base de datos operativa...</p>
        </div>
    </main>

    <div id="progressLine"></div>

    <div id="ticker-bar">
        <div id="ticker-content">...</div>
    </div>

    <aside id="panelMobileDash" class="side-panel">
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="width: 50px; height: 5px; background: #333; border-radius: 10px; margin: 0 auto 20px;"></div>
            <h2 style="color:var(--accent); font-size: 1.2rem; letter-spacing: 2px; font-weight: 900;">OPERACIONES</h2>
        </div>
        
        <div class="mobile-section-header">Performance del Centro</div>
        <div class="mobile-stat-container">
            <div class="mobile-stat-box">
                <div class="kpi-label" style="color:var(--primary); margin-bottom:5px;">SLA Global</div>
                <div id="m-sla" class="kpi-value" style="justify-content:center; font-size: 1.6rem;">--%</div>
            </div>
            <div class="mobile-stat-box">
                <div class="kpi-label" style="color:var(--primary); margin-bottom:5px;">En Espera</div>
                <div id="m-calls" class="kpi-value" style="justify-content:center; font-size: 1.6rem; color: #fff;">0</div>
            </div>
        </div>

        <div class="mobile-section-header">Puestos Activos</div>
        <div id="m-puestos" class="mobile-puestos-grid"></div>

        <div class="mobile-section-header">Alertas de Infraestructura</div>
        <div id="m-offline-list">
            </div>

        <div class="mobile-section-header">Controles</div>
        <div style="display: grid; grid-template-columns: 1fr; gap: 10px;">
            <button onclick="openPanel('panelHistory')" class="btn-pill" style="font-size: 0.8rem; background:#1a1a1a; border:1px solid var(--primary); border-radius: 12px;">⚙️ CONFIGURACIÓN DE SISTEMA</button>
            <button onclick="closePanels()" class="btn-pill" style="margin-top:10px; background: #222; border: 1px solid #444; border-radius: 12px;">CERRAR PANEL</button>
        </div>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:20px;">CONFIGURACIÓN</h2>
        
        <div style="background:#1a1a1a; padding:15px; border-radius:12px; margin-bottom:20px;">
            <label style="color:var(--primary); font-size:0.7rem; font-weight:bold; display:block; text-align:center;">MÉTRICAS KPI</label>
            <div style="display:flex; gap:10px; margin:10px 0;">
                <input type="number" id="in-sla" class="p-field" placeholder="SLA %">
                <input type="number" id="in-calls" class="p-field" placeholder="Llamadas">
            </div>
            
            <label style="color:var(--primary); font-size:0.7rem; font-weight:bold; display:block; text-align:center; margin-top:10px;">ESTADO DE PUESTOS (P1-P9)</label>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-top:10px;" id="p-inputs-grid"></div>
            
            <button onclick="saveKPIs()" class="btn-pill" style="margin-top:15px; border-radius: 8px;">GUARDAR CAMBIOS</button>
        </div>

        <button onclick="openForm(null)" class="btn-pill" style="background:var(--online); color:#000; border-radius: 8px;">＋ NUEVA NOVEDAD</button>
        <button onclick="downloadPDF()" class="btn-pill btn-sec" style="border-radius: 8px;">⬇ DESCARGAR PDF</button>
        
        <div class="mobile-section-header">Historial de Novedades</div>
        <div id="historyList"></div>
        
        <button onclick="closePanels()" class="btn-pill btn-sec" style="margin-top:20px; border-radius: 8px;">VOLVER</button>
    </aside>

    <aside id="panelForm" class="side-panel">
        <h2 id="formTitle" style="text-align:center; color:var(--accent); margin-bottom:20px;">EDITAR NOVEDAD</h2>
        <form id="mainForm" onsubmit="saveEntry(event)">
            <input type="hidden" id="f-id">
            <label style="color:var(--primary); font-size:0.7rem; font-weight:bold;">ÁREA</label>
            <select id="f-area" class="p-field">
                <option>Monitoreo</option><option>Freschat</option><option>Atención al Cliente</option>
                <option>Infraestructura</option><option>Novedad Interna</option>
            </select>
            <label style="color:var(--primary); font-size:0.7rem; font-weight:bold;">PRIORIDAD</label>
            <select id="f-prio" class="p-field">
                <option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option>
            </select>
            <label style="color:var(--primary); font-size:0.7rem; font-weight:bold;">DETALLES</label>
            <input type="text" id="f-title" placeholder="Título" required class="p-field">
            <textarea id="f-msg" rows="6" placeholder="Mensaje descriptivo..." required class="p-field"></textarea>
            
            <button type="submit" class="btn-pill" style="border-radius: 8px;">PUBLICAR AHORA</button>
            <button type="button" onclick="openPanel('panelHistory')" class="btn-pill btn-sec" style="border-radius: 8px;">CANCELAR</button>
        </form>
    </aside>
</div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    const KPI_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/kpis_v2.json";

    let cio_logs = [], currentIdx = 0, startTime = null;
    let prevSLA = null;
    let currentArrow = "▲";
    let currentColor = "var(--online)";
    const SLIDE_DURATION = 45000;

    // Generar inputs de puestos automáticamente
    const pGrid = document.getElementById('p-inputs-grid');
    for(let i=1; i<=9; i++) pGrid.innerHTML += `<input type="number" id="inp-p${i}" class="p-field" placeholder="P${i}" style="margin-bottom:5px; padding:8px;">`;

    async function syncData() {
        try {
            const rK = await fetch(KPI_URL);
            const dK = await rK.json();
            if(dK) {
                const sla = parseFloat(dK.sla) || 0;
                if (prevSLA !== null && sla !== prevSLA) {
                    if (sla < prevSLA) { currentArrow = "▼"; currentColor = "var(--critico)"; } 
                    else if (sla > prevSLA) { currentArrow = "▲"; currentColor = "var(--online)"; }
                }
                const contentSLA = `${sla}% <span class="trend-arrow" style="color:${currentColor}">${currentArrow}</span>`;
                document.getElementById('v-sla').innerHTML = contentSLA;
                document.getElementById('m-sla').innerHTML = contentSLA;
                document.getElementById('v-calls').textContent = dK.calls;
                document.getElementById('m-calls').textContent = dK.calls;
                renderPuestos(dK.puestos);
                prevSLA = sla;
            }

            const rE = await fetch(DB_URL);
            const dE = await rE.json();
            cio_logs = dE ? (Array.isArray(dE) ? dE : Object.values(dE)) : [];
            renderHistory();
            if(cio_logs.length > 0 && startTime === null) renderSlide();

            const rR = await fetch(RED_URL);
            const dR = await rR.json();
            const ticker = document.getElementById('ticker-content');
            const mOffList = document.getElementById('m-offline-list');
            let tHtml = "", mHtml = "";
            if(dR) {
                Object.entries(dR).forEach(([id, v]) => {
                    if(v.estado === "offline") {
                        const name = id.replace(/_/g,' ').toUpperCase();
                        tHtml += `<div class="capsula-off">⚠️ OFF: ${name}</div>`;
                        mHtml += `
                            <div class="off-service-item">
                                <span><span style="color:var(--critico); margin-right:10px;">●</span> ${name}</span>
                                <span class="off-service-tag">Fuera de Línea</span>
                            </div>`;
                    }
                });
            }
            ticker.innerHTML = tHtml || `<span style="color:var(--online); font-weight:900;">✔ SERVICIOS OPERATIVOS</span>`;
            mOffList.innerHTML = mHtml || `<div style="background: rgba(46, 204, 113, 0.1); border: 1px dashed var(--online); color:var(--online); font-size:0.8rem; text-align:center; padding:15px; border-radius:10px;">✔ Todos los servicios están operando con normalidad</div>`;
        } catch(e) { console.error(e); }
    }

    function renderPuestos(data) {
        const pcCont = document.getElementById('puestos-display');
        const mbCont = document.getElementById('m-puestos');
        const activeEntries = Object.entries(data).filter(([k, v]) => parseInt(v) > 0);
        const vals = activeEntries.map(([k, v]) => parseInt(v));
        const maxVal = Math.max(...vals), minVal = Math.min(...vals);
        let html = "";
        for(let i=1; i<=9; i++) {
            const v = parseInt(data[`p${i}`]) || 0;
            if(v > 0) {
                let color = "var(--warning)";
                if (maxVal === minVal) color = "var(--online)";
                else if (v === maxVal) color = "var(--online)";
                else if (v === minVal) color = "var(--critico)";
                html += `<div class="puesto-item"><span class="puesto-val" style="color:${color}">${v}</span><span class="puesto-lab">P${i}</span></div>`;
            }
        }
        pcCont.innerHTML = html;
        mbCont.innerHTML = html || `<div style="grid-column: span 3; opacity:0.5; font-size:0.8rem; text-align:center; padding: 10px;">Sin puestos activos</div>`;
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const ahora = new Date();
        const horaStr = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const fechaStr = ahora.toLocaleDateString();
        const horaH = ahora.getHours();
        let turno = horaH >= 6 && horaH < 14 ? "Mañana" : (horaH >= 14 && horaH < 22 ? "Tarde" : "Noche");

        doc.setFillColor(0, 100, 101); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text("REPORTE OPERATIVO", 15, 20);
        doc.setFontSize(10); doc.text(`Fecha: ${fechaStr} | Hora: ${horaStr} | Turno: ${turno}`, 15, 30);

        doc.autoTable({
            startY: 45,
            head: [['Área', 'Prioridad', 'Título', 'Mensaje']],
            body: cio_logs.map(it => [it.area, it.priority, it.title, it.message]),
            headStyles: { fillColor: [0, 80, 81] },
            styles: { fontSize: 8 }
        });
        doc.save(`Reporte_CIO_${fechaStr}.pdf`);
    }

    function renderSlide() {
        if(!cio_logs.length) return;
        const cont = document.getElementById('infoCont');
        cont.classList.add('oculto');
        setTimeout(() => {
            const item = cio_logs[currentIdx % cio_logs.length];
            const colors = {"Baja":"var(--online)", "Media":"var(--warning)", "Alta":"var(--orange)", "Crítica":"var(--critico)"};
            const color = colors[item.priority] || "var(--accent)";
            document.getElementById('cio-app').classList.toggle('pantalla-critica', item.priority === "Crítica");
            document.getElementById('areaLabel').textContent = item.area;
            document.getElementById('areaLabel').style.color = color;
            document.getElementById('titleDisplay').textContent = item.title;
            document.getElementById('messageDisplay').textContent = item.message;
            document.getElementById('progressLine').style.background = color;
            cont.classList.remove('oculto');
        }, 600);
    }

    async function saveKPIs() {
        const payload = { sla: document.getElementById('in-sla').value, calls: document.getElementById('in-calls').value, puestos: {} };
        for(let i=1; i<=9; i++) payload.puestos[`p${i}`] = document.getElementById(`inp-p${i}`).value || 0;
        await fetch(KPI_URL, { method: 'PUT', body: JSON.stringify(payload) });
        syncData();
    }

    async function saveEntry(e) {
        e.preventDefault();
        const id = document.getElementById('f-id').value;
        const data = {
            area: document.getElementById('f-area').value,
            priority: document.getElementById('f-prio').value,
            title: document.getElementById('f-title').value,
            message: document.getElementById('f-msg').value
        };
        if(id !== "") cio_logs[id] = data; else cio_logs.push(data);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
        syncData(); openPanel('panelHistory');
    }

    function editEntry(idx) {
        const it = cio_logs[idx];
        document.getElementById('f-id').value = idx;
        document.getElementById('f-area').value = it.area;
        document.getElementById('f-prio').value = it.priority;
        document.getElementById('f-title').value = it.title;
        document.getElementById('f-msg').value = it.message;
        openPanel('panelForm');
    }

    async function deleteEntry(idx) {
        if(confirm("¿Eliminar?")) {
            cio_logs.splice(idx, 1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
            syncData();
        }
    }

    function renderHistory() {
        document.getElementById('historyList').innerHTML = cio_logs.map((it, i) => `
            <div class="history-card">
                <div style="display:flex; justify-content:space-between; font-size:0.7rem;"><b>${it.area}</b><span>${it.priority}</span></div>
                <div style="font-weight:bold; margin:5px 0;">${it.title}</div>
                <button onclick="editEntry(${i})" style="color:var(--orange); background:none; border:none; font-weight:bold; margin-right:15px; cursor:pointer;">EDITAR</button>
                <button onclick="deleteEntry(${i})" style="color:var(--critico); background:none; border:none; font-weight:bold; cursor:pointer;">BORRAR</button>
            </div>`).join('');
    }

    function loop(now) {
        if(cio_logs.length) {
            if(!startTime) startTime = now;
            const elapsed = now - startTime;
            document.getElementById('progressLine').style.width = Math.min((elapsed / SLIDE_DURATION) * 100, 100) + "%";
            if(elapsed >= SLIDE_DURATION) { currentIdx++; renderSlide(); startTime = now; }
        }
        requestAnimationFrame(loop);
    }

    function toggleFS() {
        const app = document.getElementById('cio-app');
        if(!document.fullscreenElement) app.requestFullscreen().catch(e => console.log(e)); 
        else document.exitFullscreen();
    }

    function openPanel(id) { 
        closePanels(); 
        document.getElementById(id).classList.add('active'); 
        document.getElementById('cio-overlay').style.display = 'block'; 
    }
    function closePanels() { 
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); 
        document.getElementById('cio-overlay').style.display = 'none'; 
    }
    function openForm(idx) { 
        document.getElementById('mainForm').reset(); 
        document.getElementById('f-id').value = ""; 
        openPanel('panelForm'); 
    }

    setInterval(() => { document.getElementById('clockDisplay').textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'}); }, 1000);
    setInterval(syncData, 10000);
    syncData();
    requestAnimationFrame(loop);
</script>
</body>
</html>
