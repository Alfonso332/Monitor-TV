<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor | Masterson Elite</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        #cio-app {
            --primary: #006465;
            --accent: #00d1d1;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --exito: #2ecc71;
            --color-monitoreo: #ff4d4d;
            --color-atencion: #2ecc71;
            --color-freschat: #3498db;
            --color-interna: #e0f7fa;
            --bg-img: url('https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
        }

        /* MODO EMERGENCIA */
        #cio-app.emergency-active { animation: emergencyPulse 2s infinite; }
        @keyframes emergencyPulse {
            0%, 100% { background-color: #000; }
            50% { background-color: #120202; }
        }

        #cio-app::before {
            content: ""; position: absolute; inset: 0;
            background-image: var(--bg-img); background-size: contain;
            background-position: center; background-repeat: no-repeat;
            opacity: 0.03; filter: grayscale(1); z-index: -1;
        }

        /* HEADER */
        #cio-app .main-header {
            height: 80px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--primary); z-index: 10;
        }
        #cio-app:fullscreen .main-header { display: none !important; }

        /* DASHBOARD CENTRAL */
        #cio-app #display-board { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; position: relative; }
        #cio-app .info-container { width: 100%; transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        #cio-app .oculto { opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(10px); }

        /* BOTÓN FLOTANTE MÓVIL */
        #cio-app #menu-toggle-float {
            display: none; position: fixed; bottom: 80px; right: 25px;
            width: 65px; height: 65px; border-radius: 50%;
            background: var(--primary); color: #fff; border: 2px solid rgba(255,255,255,0.1);
            font-size: 24px; cursor: pointer; z-index: 10015;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); align-items: center; justify-content: center;
        }

        /* TICKER BAR EVOLUCIONADA */
        #cio-app #ticker-bar { 
            height: 65px; background: #050505; border-top: 1px solid #111; 
            display: flex; align-items: center; overflow: hidden; position: relative; 
        }
        #cio-app #ticker-content { 
            display: flex; align-items: center; gap: 25px;
            white-space: nowrap; position: absolute; left: 0; padding: 0 50px;
            transition: transform 0.1s linear;
        }
        
        /* BADGES DE ESTADO */
        .status-badge {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.5s ease;
        }
        
        .status-badge.offline {
            background: rgba(255, 77, 77, 0.15); border: 1px solid #ff4d4d; color: #ff4d4d;
            animation: badgePulse 1.5s infinite;
        }

        .status-badge.restored {
            background: rgba(46, 204, 113, 0.2); border: 1px solid var(--exito);
            color: var(--exito); transform: scale(1.15);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
        }

        .status-badge.hidden-out {
            opacity: 0; transform: translateY(-20px) scale(0.8);
        }

        @keyframes badgePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* PANELES LATERALES */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 420px; height: 100%;
            background: #080808; border-left: 1px solid var(--primary); padding: 30px;
            transform: translateX(100%); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 10020;
            box-sizing: border-box; overflow-y: auto;
        }
        #cio-app .side-panel.active { transform: translateX(0); }
        
        /* FORMULARIOS Y BOTONES */
        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; padding: 14px; background: #111; color: #fff; 
            border: 1px solid #222; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box;
        }
        #cio-app button.btn-main {
            background: var(--primary); color: white; border: none; padding: 15px; width: 100%;
            border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        #cio-app button.btn-cancel {
            background: none; border: 1px solid #333; color: #777; padding: 10px; width: 100%;
            border-radius: 8px; cursor: pointer; margin-top: 10px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            #cio-app #menu-toggle-float { display: flex; }
            #cio-app .side-panel { width: 100%; }
            #cio-app .main-header { padding: 0 15px; }
            #titleDisplay { font-size: 40px !important; }
        }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div id="cio-app">
    <div id="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; z-index:10002; backdrop-filter:blur(10px);" onclick="closePanels()"></div>

    <header class="main-header">
        <div class="header-actions" style="display:flex; gap:10px;">
            <button onclick="openForm()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">＋ NUEVA</button>
            <button onclick="openHistory()" style="background:#1a1a1a; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">📋 HISTORIAL</button>
            <button onclick="toggleFS()" style="background:none; border:1px solid #333; color:#555; padding:8px 12px; border-radius:5px; cursor:pointer;">⛶ TV</button>
        </div>
        <div id="clockDisplay" style="font-family:monospace; font-size:1.8rem; font-weight:900; letter-spacing:2px; color:var(--primary);">00:00:00</div>
        <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="35" style="filter: brightness(2);">
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel" style="letter-spacing: 5px; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px;">INICIANDO</div>
            <div id="prioBadge" style="display: inline-block; padding: 5px 20px; border-radius: 4px; font-weight: 900; border: 1px solid var(--accent); font-size: 0.7rem;">SISTEMA OK</div>
            <h1 id="titleDisplay" style="margin:20px 0; line-height: 1; font-size: 80px; font-weight: 900;">MASTERSON</h1>
            <p id="messageDisplay" style="font-size: 1.6rem; opacity: 0.6; max-width: 800px; margin: 0 auto; font-weight: 300;">Cargando novedades...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">
            <div class="status-badge" style="color:#444">VERIFICANDO NODOS DE RED...</div>
        </div>
    </div>
    
    <div id="progressLine" style="position: fixed; bottom: 65px; height: 3px; width: 0%; transition: width 0.1s linear; z-index: 5;"></div>

    <button id="menu-toggle-float" onclick="toggleMobileMenu(event)">☰</button>

    <aside id="panelForm" class="side-panel">
        <h2 style="color:var(--primary); margin-bottom:30px;">REGISTRAR NOVEDAD</h2>
        <form onsubmit="saveNew(event)">
            <label style="font-size:10px; color:#555;">ÁREA</label>
            <select id="f-area"><option>Monitoreo</option><option>Freschat</option><option>Atención</option><option>Novedad Interna</option></select>
            <label style="font-size:10px; color:#555;">PRIORIDAD</label>
            <select id="f-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
            <input type="text" id="f-title" placeholder="Título corto" required>
            <textarea id="f-msg" rows="5" placeholder="Descripción detallada..." required></textarea>
            <button type="submit" class="btn-main">PUBLICAR EN MONITOR</button>
            <button type="button" onclick="closePanels()" class="btn-cancel">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--accent);">HISTORIAL RECIENTE</h2>
        <div id="historyList"></div>
        <button onclick="closePanels()" class="btn-cancel">CERRAR PANELES</button>
    </aside>
</div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let logs = []; 
    let currentIdx = 0; 
    let startTime = null; 
    let lastNetworkStatus = {}; // Para detectar cambios de OFF -> ON
    const SLIDE_TIME = 15;

    // --- LÓGICA DE RED CON EFECTO RESTABLECER ---
    async function updateNetwork() {
        try {
            const resp = await fetch(RED_URL);
            const status = await resp.json();
            if(!status) return;

            const ticker = document.getElementById("ticker-content");
            let htmlContent = "";
            let hasAlerts = false;

            Object.keys(status).forEach(id => {
                const name = id.replace(/_/g, ' ');
                const isOffline = status[id].estado === "offline";
                const wasOffline = lastNetworkStatus[id] === "offline";

                // Si estaba caído y ahora está online -> EFECTO VERDE
                if (!isOffline && wasOffline) {
                    htmlContent += `<div class="status-badge restored" id="restored-${id}">✔ ${name} RESTABLECIDO</div>`;
                    // Programar desaparición del mensaje de éxito tras 5 segundos
                    setTimeout(() => {
                        const el = document.getElementById(`restored-${id}`);
                        if(el) el.classList.add('hidden-out');
                    }, 5000);
                } 
                // Si sigue caído -> EFECTO ROJO
                else if (isOffline) {
                    htmlContent += `<div class="status-badge offline">⚠️ OFFLINE: ${name}</div>`;
                    hasAlerts = true;
                }
                
                lastNetworkStatus[id] = status[id].estado;
            });

            if(htmlContent === "") {
                htmlContent = `<div class="status-badge" style="color:var(--primary); border:1px solid #111;">✔ SISTEMAS OPERATIVOS</div>`;
            }

            ticker.innerHTML = htmlContent;
            
            // Animación simple de scroll si hay mucho contenido
            if(ticker.offsetWidth > window.innerWidth) {
                ticker.style.animation = "scrollTicker 20s linear infinite";
            }

        } catch(e) { console.error("Error red:", e); }
    }

    // --- GESTIÓN DE NOVEDADES ---
    async function syncEvents() {
        try {
            const resp = await fetch(DB_URL);
            const data = await resp.json();
            logs = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
            if(logs.length > 0 && !startTime) renderSlide();
        } catch(e) {}
    }

    function renderSlide() {
        if(!logs.length) return;
        const cont = document.getElementById("infoCont");
        const app = document.getElementById("cio-app");
        cont.classList.add("oculto");

        setTimeout(() => {
            const item = logs[currentIdx % logs.length];
            const pColors = {"Baja":"var(--accent)", "Media":"#f1c40f", "Alta":"#e67e22", "Crítica":"#ff4d4d"};
            const activeColor = pColors[item.priority] || "#fff";

            if(item.priority === "Crítica") app.classList.add("emergency-active");
            else app.classList.remove("emergency-active");

            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("areaLabel").style.color = activeColor;
            document.getElementById("prioBadge").textContent = `PRIORIDAD ${item.priority.toUpperCase()}`;
            document.getElementById("prioBadge").style.borderColor = activeColor;
            document.getElementById("prioBadge").style.color = activeColor;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            document.getElementById("progressLine").style.background = activeColor;
            
            cont.classList.remove("oculto");
        }, 800);
    }

    // --- UI HELPERS ---
    function toggleMobileMenu(e) {
        e.stopPropagation();
        openForm(); // Abrir form directo en móvil para rapidez
    }

    function handleGlobalClick(e) {
        const panels = document.querySelectorAll('.side-panel');
        const overlay = document.getElementById("overlay");
        if(overlay.style.display === "block" && e.target === overlay) closePanels();
    }

    function openForm() { document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function openHistory() { renderHistory(); document.getElementById("panelHistory").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function closePanels() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); document.getElementById("overlay").style.display = "none"; }

    function renderHistory() {
        const h = document.getElementById("historyList");
        h.innerHTML = logs.map((it, i) => `
            <div style="background:#111; padding:15px; border-radius:10px; margin-bottom:10px; border-left:4px solid var(--primary);">
                <small style="color:var(--primary)">${it.area}</small>
                <div style="font-weight:bold; margin:5px 0;">${it.title}</div>
                <button onclick="deleteEntry(${i})" style="background:none; border:none; color:#444; font-size:10px; cursor:pointer;">ELIMINAR</button>
            </div>
        `).join('');
    }

    async function saveNew(e) {
        e.preventDefault();
        const entry = {
            area: document.getElementById("f-area").value, 
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value, 
            message: document.getElementById("f-msg").value
        };
        logs.push(entry);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        closePanels(); syncEvents();
    }

    async function deleteEntry(idx) {
        if(!confirm("¿Borrar novedad?")) return;
        logs.splice(idx, 1);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs.length ? logs : null) });
        renderHistory(); syncEvents();
    }

    function toggleFS() { 
        const app = document.getElementById("cio-app");
        if (!document.fullscreenElement) app.requestFullscreen?.() || app.webkitRequestFullscreen?.();
        else document.exitFullscreen();
    }

    function loop(ts) {
        if(logs.length) {
            if(!startTime) startTime = ts;
            const progress = (ts - startTime) / (SLIDE_TIME * 1000);
            document.getElementById("progressLine").style.width = (Math.min(progress, 1) * 100) + "%";
            if(progress >= 1) { currentIdx++; renderSlide(); startTime = ts; }
        }
        requestAnimationFrame(loop);
    }

    // --- INIT ---
    setInterval(() => { 
        document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString('es-UY', { hour12: false }); 
    }, 1000);

    setInterval(updateNetwork, 4000); // Chequeo de red cada 4 seg
    setInterval(syncEvents, 10000);
    
    updateNetwork(); syncEvents(); requestAnimationFrame(loop);
</script>

<style>
    @keyframes scrollTicker {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }
</style>

</body>
</html>
