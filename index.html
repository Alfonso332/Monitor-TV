<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Centro de Inteligencia Operativa</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- AJUSTES DE DISPLAY --- */
        #display {
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            height: 100vh !important;
            width: 100vw !important;
            padding: 40px !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
            position: fixed !important;
            top: 0; left: 0;
            background: #0a1a1b;
            transition: background 0.5s ease;
        }

        /* --- RELOJ EN FULLSCREEN (Más grande y visible) --- */
        :fullscreen #clock {
            font-size: 3.5rem !important;
            color: #00ff88 !important;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            padding-right: 20px;
        }
        
        /* Compatibilidad con Chrome/Safari */
        :-webkit-full-screen #clock { font-size: 3.5rem !important; color: #00ff88 !important; }

        .info-block {
            width: 100% !important;
            max-height: 85vh !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            text-align: center;
        }

        #titleDisplay { margin: 0 0 15px 0 !important; font-weight: 800; line-height: 1 !important; text-transform: uppercase; }
        #messageDisplay { margin: 0 !important; line-height: 1.1 !important; white-space: pre-wrap !important; word-wrap: break-word !important; }

        /* --- EFECTO CRÍTICO --- */
        @keyframes pulse-red {
            0% { background-color: #0a1a1b; }
            50% { background-color: #5a0000; }
            100% { background-color: #0a1a1b; }
        }
        .critico-total { animation: pulse-red 1.2s infinite !important; }
        .critico-total #titleDisplay, .critico-total #messageDisplay {
            color: #ff4d4d !important;
            text-shadow: 0 0 25px rgba(255, 0, 0, 0.8) !important;
        }

        /* --- DISEÑO MÓVIL (Celular) --- */
        @media (max-width: 768px) {
            #ghostClock, #btnFullscreen, .left-zone { display: none !important; }
            .control-header { justify-content: center !important; height: 60px; }
            #display { padding: 20px !important; }
            
            .mobile-nav {
                display: flex !important;
                position: fixed; bottom: 0; left: 0; right: 0;
                height: 75px; background: #0a1a1b;
                border-top: 1px solid #006465;
                justify-content: space-around; align-items: center;
                z-index: 10002;
                padding-bottom: env(safe-area-inset-bottom);
            }
            .nav-item { color: #00ff88; background: none; border: none; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; }
            
            .drawer {
                width: 100% !important; height: 85vh !important;
                bottom: -100vh; top: auto !important; left: 0 !important;
                border-radius: 25px 25px 0 0;
                transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                padding: 20px; z-index: 10005 !important;
                background: #0f2426;
            }
            .drawer.active { bottom: 0 !important; }
            .footer-bar { bottom: 75px; height: 5px; }
        }

        .mobile-nav { display: none; }
        #drawerOverlay { z-index: 10004; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; }
        #drawerOverlay.active { display: block; }
    </style>
</head>
<body>

<div id="drawerOverlay"></div>

<header class="control-header" style="position: fixed; top: 0; width: 100%; z-index: 10003; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">
    <div class="left-zone">
        <button id="btnNew">＋ NUEVO</button>
        <button id="btnManage">☰ HISTORIAL</button>
        <button id="btnFullscreen">⛶ FULL</button>
    </div>
    <div class="live-clock" id="clock" style="font-weight: bold; font-family: monospace;">00:00:00</div>
</header>

<main id="display">
    <div class="info-block">
        <div id="areaLabel" class="area" style="font-size: 1.5rem; margin-bottom: 10px; color: #00ff88;">SISTEMA</div>
        <h1 id="titleDisplay">...</h1>
        <p id="messageDisplay">Cargando...</p>
    </div>
</main>

<nav class="mobile-nav">
    <button class="nav-item" id="mBtnNew"><span>➕</span><b>NUEVO</b></button>
    <button class="nav-item" id="mBtnHistory"><span>📋</span><b>LISTA</b></button>
</nav>

<footer class="footer-bar"><div id="progressBar"></div></footer>

<aside id="drawerForm" class="drawer">
    <div style="width: 40px; height: 5px; background: #333; margin: 0 auto 15px; border-radius: 10px;"></div>
    <h2 id="formTitle">Evento</h2>
    <form id="formRegistro">
        <input type="hidden" id="editIndex" value="-1">
        <label>Área</label>
        <select id="inputArea" required>
            <option value="Freschat">Freschat</option>
            <option value="Monitoreo">Monitoreo</option>
            <option value="Atención al Cliente">Atención al Cliente</option>
            <option value="Interno">Interno</option>
        </select>
        <label>Prioridad</label>
        <select id="inputPriority">
            <option value="low">Baja</option>
            <option value="medium">Media</option>
            <option value="high">Alta</option>
            <option value="critical">Crítica</option>
        </select>
        <input type="text" id="inputTitle" placeholder="Servicio/Título" required>
        <textarea id="inputMessage" rows="5" placeholder="Novedad..." required></textarea>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button type="button" onclick="closeAllDrawers()" style="flex:1; background:#444; color:white; border:none; padding:12px; border-radius:8px;">CANCELAR</button>
            <button type="submit" style="flex:2; background:#00ff88; color:#000; border:none; padding:12px; border-radius:8px; font-weight:bold;">GUARDAR EN TV</button>
        </div>
    </form>
</aside>

<aside id="drawerHistory" class="drawer">
    <div style="width: 40px; height: 5px; background: #333; margin: 0 auto 15px; border-radius: 10px;"></div>
    <button onclick="generatePDF()" style="background:#006465; color:white; width:100%; padding:15px; border-radius:10px; border:none; margin-bottom:15px; font-weight:bold;">📥 DESCARGAR REPORTE</button>
    <div id="historyList"></div>
</aside>

<script>
    const DATABASE_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let registros = [];
    let currentIndex = 0;
    let startTime = null;
    const DURATION = 15;

    // --- AUTO-AJUSTE DINÁMICO ---
    function fitText() {
        const title = document.getElementById('titleDisplay');
        const message = document.getElementById('messageDisplay');
        const display = document.getElementById('display');
        
        // Ajustar valores base según dispositivo
        const esMovil = window.innerWidth <= 768;
        let sizeT = esMovil ? 45 : 85; 
        let sizeM = esMovil ? 55 : 110;

        title.style.fontSize = sizeT + "px";
        message.style.fontSize = sizeM + "px";

        let safety = 0;
        // Bucle de ajuste: si el texto es muy grande, reduce
        while ((title.offsetHeight + message.offsetHeight > display.offsetHeight * 0.7) && safety < 80) {
            sizeT -= 1; sizeM -= 1.5;
            title.style.fontSize = sizeT + "px";
            message.style.fontSize = sizeM + "px";
            safety++;
        }
    }

    async function syncCloud() {
        await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(registros.length > 0 ? registros : null) });
        pullData();
    }

    async function pullData() {
        try {
            const res = await fetch(DATABASE_URL);
            const data = await res.json();
            const nuevos = data || [];
            if (JSON.stringify(nuevos) !== JSON.stringify(registros)) {
                registros = nuevos;
                render(currentIndex);
            }
        } catch (e) {}
    }

    function render(index){
        const display = document.getElementById("display");
        if(!registros.length) {
            display.classList.remove("critico-total");
            document.getElementById("areaLabel").textContent = "SISTEMA";
            document.getElementById("titleDisplay").textContent = "VACÍO";
            document.getElementById("messageDisplay").textContent = "Sin novedades activas";
            return;
        }
        const reg = registros[index % registros.length];
        
        if(reg.priority === "critical") {
            display.classList.add("critico-total");
            document.getElementById("areaLabel").textContent = "⚠️ " + reg.area.toUpperCase() + " ⚠️";
        } else {
            display.classList.remove("critico-total");
            document.getElementById("areaLabel").textContent = reg.area.toUpperCase();
        }
        
        document.getElementById("titleDisplay").textContent = reg.title;
        document.getElementById("messageDisplay").textContent = reg.message;
        
        const colors = {low:"#00ff88", medium:"#00ccff", high:"#ffcc00", critical:"#ff4d4d"};
        document.getElementById("progressBar").style.background = colors[reg.priority] || "#006465";
        
        setTimeout(fitText, 50);
    }

    window.eliminarEvento = async (i) => {
        if(confirm("¿Eliminar definitivamente?")) {
            registros.splice(i, 1);
            await syncCloud();
            renderHistory();
        }
    };

    window.editarEvento = (i) => {
        const reg = registros[i];
        document.getElementById("editIndex").value = i;
        document.getElementById("inputArea").value = reg.area;
        document.getElementById("inputPriority").value = reg.priority;
        document.getElementById("inputTitle").value = reg.title;
        document.getElementById("inputMessage").value = reg.message;
        document.getElementById("drawerHistory").classList.remove("active");
        document.getElementById("drawerForm").classList.add("active");
    };

    function renderHistory() {
        const container = document.getElementById("historyList");
        container.innerHTML = registros.map((reg, i) => `
            <div style="background:rgba(255,255,255,0.05); padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #006465;">
                <strong style="color:#00ff88">${reg.title}</strong><br><small>${reg.area}</small>
                <div style="margin-top:10px; display:flex; gap:10px; justify-content:flex-end;">
                    <button onclick="editarEvento(${i})" style="background:#ffcc00; color:black; border:none; padding:8px 15px; border-radius:6px; font-weight:bold;">EDITAR</button>
                    <button onclick="eliminarEvento(${i})" style="background:#ff4d4d; color:white; border:none; padding:8px 15px; border-radius:6px; font-weight:bold;">BORRAR</button>
                </div>
            </div>
        `).join('');
    }

    document.getElementById("formRegistro").onsubmit = async (e) => {
        e.preventDefault();
        const idx = parseInt(document.getElementById("editIndex").value);
        const nuevo = {
            area: document.getElementById("inputArea").value,
            priority: document.getElementById("inputPriority").value,
            title: document.getElementById("inputTitle").value,
            message: document.getElementById("inputMessage").value
        };
        if(idx === -1) registros.push(nuevo); else registros[idx] = nuevo;
        await syncCloud();
        closeAllDrawers();
    };

    function closeAllDrawers() { document.querySelectorAll('.drawer, #drawerOverlay').forEach(el => el.classList.remove('active')); }
    document.getElementById("btnNew").onclick = () => { document.getElementById("drawerForm").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); };
    document.getElementById("mBtnNew").onclick = () => { document.getElementById("drawerForm").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); };
    document.getElementById("btnManage").onclick = () => { renderHistory(); document.getElementById("drawerHistory").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); };
    document.getElementById("mBtnHistory").onclick = () => { renderHistory(); document.getElementById("drawerHistory").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); };
    document.getElementById("drawerOverlay").onclick = closeAllDrawers;

    function animate(timestamp){
        if(!registros.length) { requestAnimationFrame(animate); return; }
        if(!startTime) startTime = timestamp;
        const progress = (timestamp - startTime) / 1000;
        const percent = Math.min((progress / DURATION) * 100, 100);
        document.getElementById("progressBar").style.width = percent + "%";
        if(progress >= DURATION){ currentIndex = (currentIndex + 1) % registros.length; render(currentIndex); startTime = timestamp; }
        requestAnimationFrame(animate);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFillColor(10, 26, 28); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255,255,255); doc.setFontSize(20); doc.text("NOVEDADES OPERATIVAS DIARIAS", 20, 25);
        let y = 55; doc.setTextColor(0,0,0);
        registros.forEach(reg => {
            doc.setFont(undefined, 'bold'); doc.text(`${reg.area}: ${reg.title}`, 20, y);
            doc.setFont(undefined, 'normal'); const lines = doc.splitTextToSize(reg.message, 170);
            doc.text(lines, 20, y + 7); y += (lines.length * 7) + 15;
        });
        doc.save("Reporte_CIO.pdf");
    }

    setInterval(() => document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}), 1000);
    setInterval(pullData, 3000);
    requestAnimationFrame(animate);
    pullData();
    document.getElementById("btnFullscreen").onclick = () => document.documentElement.requestFullscreen();
</script>
</body>
</html>
