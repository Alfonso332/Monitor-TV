<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIO - Monitor Operativo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* ========================= */
/* BASE GENERAL */
/* ========================= */

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Segoe UI',sans-serif;
    background: radial-gradient(circle at top, #0f2426 0%, #0a1a1b 60%);
    color:white;
    overflow:hidden;
}

/* ========================= */
/* HEADER */
/* ========================= */

.control-header{
    position:fixed;
    top:0;
    width:100%;
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    background:rgba(0,100,101,0.25);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,255,200,0.2);
    z-index:1000;
}

#clock{
    font-size:1.8rem;
    font-weight:bold;
    letter-spacing:2px;
    text-shadow:0 0 10px rgba(0,255,200,0.6);
}

/* BOTONES */

.left-zone button{
    padding:10px 18px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    font-weight:bold;
    transition:all .3s ease;
}

#btnNew{
    background:#00ff88;
    color:#001c1d;
}

#btnManage{
    background:#006465;
    color:white;
    margin-left:10px;
}

#btnFullscreen{
    background:transparent;
    border:1px solid #00ff88;
    color:#00ff88;
    margin-left:10px;
}

.left-zone button:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 20px rgba(0,255,200,0.3);
}

/* ========================= */
/* DISPLAY PRINCIPAL */
/* ========================= */

#display{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

.info-block{
    max-width:1200px;
    padding:40px;
    border-radius:25px;
    background:rgba(0,100,101,0.1);
    backdrop-filter:blur(15px);
    border:1px solid rgba(0,255,200,0.2);
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

#areaLabel{
    font-size:1.3rem;
    letter-spacing:4px;
    color:#00ffcc;
    margin-bottom:20px;
}

#titleDisplay{
    font-size:3rem;
    font-weight:900;
    margin-bottom:15px;
}

#messageDisplay{
    font-size:1.5rem;
    opacity:0.9;
}

/* ========================= */
/* DRAWER */
/* ========================= */

.drawer{
    position:fixed;
    right:0;
    top:0;
    width:400px;
    height:100vh;
    background:#0f2426;
    border-left:2px solid #006465;
    padding:30px;
    transform:translateX(100%);
    transition:all .3s ease;
    z-index:3000;
}

.drawer.active{
    transform:translateX(0);
}

.drawer h2{
    margin-bottom:20px;
    color:#00ffcc;
}

input,textarea,select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #006465;
    background:#1a3a3d;
    color:white;
}

button[type="submit"]{
    background:#00ff88;
    color:black;
    padding:15px;
    border-radius:12px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button[type="submit"]:hover{
    box-shadow:0 5px 25px rgba(0,255,150,0.5);
}

/* ========================= */
/* MOBILE */
/* ========================= */

.mobile-nav{
    display:none;
}

@media (max-width:768px){

    .control-header .left-zone{
        display:none;
    }

    .mobile-nav{
        display:flex;
        position:fixed;
        bottom:0;
        width:100%;
        height:70px;
        background:rgba(0,100,101,0.3);
        backdrop-filter:blur(15px);
        justify-content:space-around;
        align-items:center;
        border-top:1px solid rgba(0,255,200,0.3);
    }

    .mobile-nav button{
        background:none;
        border:none;
        color:#00ffcc;
        font-weight:bold;
    }

    .drawer{
        width:100%;
        height:85vh;
        top:auto;
        bottom:-100vh;
        border-radius:25px 25px 0 0;
        transform:none;
        transition:.3s;
    }

    .drawer.active{
        bottom:0;
    }

    #titleDisplay{
        font-size:2rem;
    }

    #messageDisplay{
        font-size:1.2rem;
    }
}

</style>
</head>

<body>

<header class="control-header">
<div class="left-zone">
<button id="btnNew">＋ NUEVO</button>
<button id="btnManage">☰ HISTORIAL</button>
<button id="btnFullscreen">⛶ TV FULL</button>
</div>
<div id="clock">00:00:00</div>
</header>

<main id="display">
<div class="info-block">
<div id="areaLabel">SISTEMA</div>
<h1 id="titleDisplay">MONITOR OPERATIVO</h1>
<p id="messageDisplay">Sistema listo para recibir novedades</p>
</div>
</main>

<nav class="mobile-nav">
<button onclick="openHistory()">📋<br>HISTORIAL</button>
<button onclick="openNew()">➕<br>NUEVO</button>
</nav>

<aside id="drawerForm" class="drawer">
<h2>Nueva Novedad</h2>
<select>
<option>Freschat</option>
<option>Monitoreo</option>
<option>Atención al Cliente</option>
<option>Interno</option>
</select>
<input type="text" placeholder="Título">
<textarea placeholder="Detalle"></textarea>
<button type="submit">ACTUALIZAR MONITOR</button>
</aside>

<script>

function openNew(){
document.getElementById("drawerForm").classList.add("active");
}

function openHistory(){
alert("Aquí iría el historial");
}

setInterval(()=>{
document.getElementById("clock").textContent=
new Date().toLocaleTimeString("es-UY",{hour12:false});
},1000);

</script>

</body>
</html>
