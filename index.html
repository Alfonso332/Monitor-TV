<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* CSS DENTRO DEL HTML - SIN COLISIONES */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050d0e;
            overflow: hidden;
        }

        #cio-app {
            position: relative;
            width: 100%;
            height: 100%;
            background: #050d0e;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* DISPLAY PRINCIPAL - CENTRADO Y SIN SCROLL */
        #display-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            background: radial-gradient(circle at center, #0c1c1d 0%, #050d0e 100%);
            transition: all 0.5s ease;
            width: 100%;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* EFECTO CRÍTICO */
        @keyframes bg-critical {
            0% { background-color: #050d0e; }
            50% { background-color: #2b0000; }
            100% { background-color: #050d0e; }
        }
        #cio-app.es-critico #display-board { animation: bg-critical 2s infinite ease-in-out; }

        .info-container { 
            z-index: 5; 
            width: 100%; 
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #areaLabel { 
            font-size: clamp(0.9rem, 2vw, 1.2rem); 
            color: #00d4d8; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            margin-bottom: 8px;
            font-weight: bold;
        }

        #prioBadge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
        }

        #titleDisplay { 
            font-weight: 800; 
            text-transform: uppercase; 
            line-height: 1.1; 
            margin-bottom: 20px; 
            width: 100%;
            word-wrap: break-word;
        }

        #messageDisplay { 
            font-weight: 300; 
            color: #cedddd; 
            line-height: 1.3; 
            max-width: 85%; 
            margin: 0 auto;
            word-wrap: break-word;
        }

        /* CABECERA PC */
        .main-header {
            position: absolute; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 100;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .actions button {
            background: rgba(0, 100, 101, 0.2);
            border: 1px solid #00d4d8;
            color: #fff; padding: 6px 12px; border-radius: 4px;
            font-weight: bold; cursor: pointer; margin-right: 5px;
            font-size: 0.65rem;
        }

        #clockDisplay { font-family: monospace; font-size: 1.3rem; color: #00d4d8; font-weight: bold; }

        /* MODO TV (FULLSCREEN) - RELOJ DISCRETO A LA DERECHA */
        #cio-app:fullscreen .actions { display: none !important; }
        #cio-app:fullscreen .main-header { 
            background: transparent; border: none; 
            justify-content: flex-end; 
            padding-top: 20px;
        }
        #cio-app:fullscreen #clockDisplay { 
            font-size: 2.8rem; 
            margin-right: 30px;
            text-shadow: 0 0 15px rgba(0, 212, 216, 0.5);
        }

        /* PANELES LATERALES ADAPTATIVOS */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; z-index: 1000; cursor: pointer;
        }
        #overlay.active { display: block; }

        .side-panel {
            position: fixed; right: 0; top: 0; 
            width: 25%; min-width: 350px; height: 100%;
            background: #091718; border-left: 2px solid #00d4d8;
            padding: 25px; transform: translateX(100%);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1100; overflow-y: auto;
        }
        .side-panel.active { transform: translateX(0); }

        .side-panel h2 { color: #00d4d8; font-size: 1.2rem; margin-bottom: 20px; }
        .side-panel input, .side-panel textarea, .side-panel select {
            width: 100%; padding: 10px; margin-bottom: 12px;
            background: #000; color: #fff; border: 1px solid #004d4e; border-radius: 4px;
            font-size: 0.9rem;
        }

        /* MÓVIL REFINADO */
        .nav-mobile { display: none; }

        @media (max-width: 768px) {
            .actions { display: none !important; }
            .main-header { height: 50px; background: none; }
            .nav-mobile {
                display: flex; position: fixed; bottom: 0; width: 100%; height: 65px;
                background: #061112; border-top: 1px solid #00d4d8;
                justify-content: space-around; align-items: center; z-index: 500;
            }
            .nav-mobile button { background: none; border: none; color: #00d4d8; font-weight: bold; font-size: 0.7rem; }
            
            .side-panel { 
                width: 100%; min-width: 100%; height: 75vh; 
                top: auto; bottom: 0; 
                transform: translateY(100%); 
                border-radius: 15px 15px 0 0; border-left: none; border-top: 3px solid #00d4d8; 
            }
            .side-panel.active { transform: translateY(0); transform: translateX(0); }
            #display-board { padding-bottom: 80px; }
            #clockDisplay { font-size: 1.1rem; }
        }

        #progressLine { position: fixed; bottom: 0; height: 4px; width: 0%; z-index: 999; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay" onclick="closeAll()"></div>

    <header class="main-header">
        <div class="actions">
            <button onclick="openForm()">＋ NUEVO</button>
            <button onclick="openHistory()">📋 LISTA</button>
            <button onclick="toggleFS()" style="border-color:#ffcc00; color:#ffcc00;">⛶ TV</button>
        </div>
        <div id="clockDisplay">00:00:00</div>
    </header>

    <main id="display-board">
        <div class="info-container">
            <div id="areaLabel">CIO MONITOR</div>
            <div id="prioBadge">NORMAL</div>
            <h1 id="titleDisplay">Sincronizando...</h1>
            <p id="messageDisplay">Conectando con la base de datos operativa.</p>
        </div>
    </main>

    <nav class="nav-mobile">
        <button onclick="openForm()">➕<br>NUEVO</button>
        <button onclick="openHistory()">📋<br>LISTA</button>
    </nav>

    <aside id="panelForm" class="side-panel">
        <h2>Nueva Novedad</h2>
        <form onsubmit="handleSave(event)">
            <input type="hidden" id="editId" value="-1">
            <select id="f-area">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <select id="f-prio">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Crítica">Crítica</option>
            </select>
            <input type="text" id="f-title" placeholder="Título" required>
            <textarea id="f-msg" rows="5" placeholder="Descripción..." required></textarea>
            <button type="submit" style="width:100%; background:#00d4d8; color:#000; padding:12px; border:none; font-weight:bold; cursor:pointer; border-radius:4px;">ACTUALIZAR</button>
            <button type="button" onclick="closeAll()" style="width:100%; background:none; color:#ff4d4d; border:none; margin-top:10px; cursor:pointer; font-weight:bold;">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2>Historial Activo</h2>
        <button onclick="generatePDF()" style="width:100%; background:#fff; color:#000; border:none; padding:10px; font-weight:bold; margin-bottom:15px; cursor:pointer; border-radius:4px;">REPORTE PDF</button>
        <div id="listItems"></div>
        <button type="button" onclick="closeAll()" style="width:100%; background:none; color:#ff4d4d; border:none; margin-top:20px; cursor:pointer; font-weight:bold;">CERRAR</button>
    </aside>

    <div id="progressLine"></div>
</div>

<script>
    const API_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let dataStore = [];
    let currentIndex = 0;
    let timerStart = null;
    const DISPLAY_TIME = 15;

    function adjustText() {
        const t = document.getElementById('titleDisplay');
        const m = document.getElementById('messageDisplay');
        const container = document.getElementById('display-board');
        let sizeT = window.innerWidth <= 768 ? 26 : 75; 
        let sizeM = window.innerWidth <= 768 ? 16 : 42;
        t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
        let limit = 0;
        while ((t.offsetHeight + m.offsetHeight > container.offsetHeight * 0.65) && limit < 50) {
            sizeT -= 1; sizeM -= 0.5;
            t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
            limit++;
        }
    }

    async function syncData() {
        try {
            const r = await fetch(API_URL);
            const d = await r.json();
            dataStore = d || [];
            if(dataStore.length > 0) refreshView(currentIndex);
        } catch(e) { console.error("Sync Error"); }
    }

    function refreshView(idx) {
        if(!dataStore.length) return;
        const item = dataStore[idx % dataStore.length];
        const app = document.getElementById("cio-app");
        const badge = document.getElementById("prioBadge");
        
        if(item.priority === "Crítica") {
            app.classList.add("es-critico");
            badge.style.background = "#ff4d4d"; badge.style.color = "#fff";
        } else {
            app.classList.remove("es-critico");
            badge.style.background = "transparent"; badge.style.color = "#00d4d8";
        }

        badge.textContent = "Prioridad " + item.priority;
        document.getElementById("areaLabel").textContent = item.area;
        document.getElementById("titleDisplay").textContent = item.title;
        document.getElementById("messageDisplay").textContent = item.message;
        
        const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
        document.getElementById("progressLine").style.background = colors[item.priority] || "#00d4d8";
        
        setTimeout(adjustText, 50);
    }

    async function handleSave(e) {
        e.preventDefault();
        const id = parseInt(document.getElementById("editId").value);
        const entry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value
        };
        if(id === -1) dataStore.push(entry); else dataStore[id] = entry;
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore) });
        closeAll(); syncData();
    }

    window.onDelete = async (i) => {
        if(!confirm("¿Borrar?")) return;
        dataStore.splice(i, 1);
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore.length ? dataStore : null) });
        openHistory(); syncData();
    };

    window.onEdit = (i) => {
        const item = dataStore[i];
        document.getElementById("editId").value = i;
        document.getElementById("f-area").value = item.area;
        document.getElementById("f-prio").value = item.priority;
        document.getElementById("f-title").value = item.title;
        document.getElementById("f-msg").value = item.message;
        document.getElementById("panelHistory").classList.remove("active");
        document.getElementById("panelForm").classList.add("active");
    };

    function openForm() { 
        document.getElementById("editId").value = "-1";
        document.getElementById("panelForm").classList.add("active"); 
        document.getElementById("overlay").classList.add("active"); 
    }
    
    function openHistory() { 
        const list = document.getElementById("listItems");
        list.innerHTML = dataStore.length ? dataStore.map((item, i) => `
            <div style="background:rgba(255,255,255,0.05); padding:12px; margin-bottom:8px; border:1px solid #00d4d8; border-radius:4px;">
                <small style="color:#00d4d8; font-size:0.65rem;">${item.priority}</small><br>
                <strong style="display:block; margin:4px 0; font-size:0.85rem;">${item.title}</strong>
                <button onclick="onEdit(${i})" style="background:#ffcc00; border:none; font-size:10px; padding:4px 8px; cursor:pointer; font-weight:bold;">EDITAR</button>
                <button onclick="onDelete(${i})" style="background:#ff4d4d; color:#fff; border:none; font-size:10px; padding:4px 8px; margin-left:5px; cursor:pointer; font-weight:bold;">BORRAR</button>
            </div>
        `).join('') : "<p style='font-size:0.8rem; color:#666;'>No hay datos.</p>";
        document.getElementById("panelHistory").classList.add("active"); 
        document.getElementById("overlay").classList.add("active"); 
    }

    function closeAll() { 
        document.querySelectorAll('.side-panel, #overlay').forEach(el => el.classList.remove('active'));
    }

    function toggleFS() { 
        const root = document.getElementById('cio-app');
        if (!document.fullscreenElement) root.requestFullscreen();
        else document.exitFullscreen();
    }

    function runLoop(ts) {
        if(!dataStore.length) { requestAnimationFrame(runLoop); return; }
        if(!timerStart) timerStart = ts;
        const elapsed = (ts - timerStart) / 1000;
        document.getElementById("progressLine").style.width = Math.min((elapsed / DISPLAY_TIME) * 100, 100) + "%";
        if(elapsed >= DISPLAY_TIME){ currentIndex++; refreshView(currentIndex); timerStart = ts; }
        requestAnimationFrame(runLoop);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("REPORTE CIO OPERATIVO", 20, 20);
        dataStore.forEach((r, i) => doc.text(`${i+1}. [${r.priority}] ${r.area}: ${r.title}`, 20, 35 + (i*10)));
        doc.save("Reporte_CIO.pdf");
    }

    setInterval(() => {
        document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false});
    }, 1000);

    setInterval(syncData, 10000);
    window.addEventListener('resize', adjustText);
    syncData();
    requestAnimationFrame(runLoop);
</script>
</body>
</html>
