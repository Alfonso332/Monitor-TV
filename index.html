<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor - Pro</title>
    
    <style>
        #cio-app {
            --primary: #00d4d8;
            --accent: #006465;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --bg-img: url('https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 99999; margin: 0; padding: 0;
        }

        #cio-app::before {
            content: ""; position: absolute; inset: 0;
            background-image: var(--bg-img); background-size: contain;
            background-position: center; background-repeat: no-repeat;
            opacity: 0.03; filter: grayscale(1); z-index: -1;
        }

        /* HEADER */
        #cio-app .main-header {
            height: 80px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 212, 216, 0.3);
        }

        :fullscreen #cio-app .header-actions { display: none !important; }

        #cio-app #clockDisplay { font-family: monospace; font-size: 1.8rem; color: var(--primary); font-weight: bold; }

        /* EFECTO CRÍTICO MEJORADO (PULSO RADIAL) */
        @keyframes critical-glow {
            0% { box-shadow: inset 0 0 50px rgba(255, 77, 77, 0); }
            50% { box-shadow: inset 0 0 150px rgba(255, 77, 77, 0.25); }
            100% { box-shadow: inset 0 0 50px rgba(255, 77, 77, 0); }
        }
        .critical-active {
            animation: critical-glow 2s infinite ease-in-out !important;
            background: radial-gradient(circle, rgba(255, 77, 77, 0.08) 0%, rgba(0,0,0,0) 70%) !important;
        }

        /* DISPLAY PRINCIPAL */
        #cio-app #display-board {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
            transition: all 0.5s ease;
        }

        #cio-app .info-container { width: 100%; transition: all 0.6s ease-in-out; }
        #cio-app .oculto { opacity: 0; transform: translateY(20px); filter: blur(10px); }

        #cio-app #areaLabel { font-size: 1.1rem; color: var(--primary); letter-spacing: 4px; text-transform: uppercase; font-weight: bold; }
        #cio-app #prioBadge { 
            display: inline-block; padding: 6px 20px; border-radius: 50px; 
            font-weight: 900; border: 1px solid var(--primary); margin: 15px 0;
            background: rgba(0, 212, 216, 0.1); font-size: 0.8rem;
        }
        #cio-app #titleDisplay { font-weight: 800; line-height: 1.1; text-transform: uppercase; }

        /* BOTONES */
        #cio-app .header-actions button {
            background: rgba(0, 212, 216, 0.1); border: 1px solid var(--primary);
            color: #fff; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px;
        }

        /* PANELES LATERALES */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 380px; height: 100%;
            background: #0a1a1b; border-left: 2px solid var(--primary); padding: 25px;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10005;
            box-sizing: border-box; overflow-y: auto;
        }
        #cio-app .side-panel.active { transform: translateX(0); }
        #cio-app #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 10002; backdrop-filter: blur(5px); }
        #cio-app #overlay.active { display: block; }

        /* FORMULARIO DE EDICIÓN RÁPIDA (DENTRO DEL PANEL) */
        #cio-app .edit-box {
            background: #000; border: 1px solid var(--primary); padding: 15px;
            border-radius: 10px; margin-top: 10px; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; padding: 10px; background: #111; color: #fff; border: 1px solid #333;
            border-radius: 8px; margin-bottom: 10px; font-size: 14px;
        }

        @media (max-width: 768px) {
            #cio-app .side-panel { width: 100%; height: 90%; top: auto; bottom: 0; transform: translateY(100%); border-radius: 20px 20px 0 0; }
            #cio-app .side-panel.active { transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay" onclick="closePanels()"></div>

    <header class="main-header">
        <div class="header-actions">
            <button onclick="openForm()">＋ NUEVA</button>
            <button onclick="openHistory()">📋 HISTORIAL</button>
            <button id="btn-fs-tv" onclick="toggleFS()">⛶ FS</button>
        </div>
        <div id="clockDisplay">00:00:00</div>
        <div><img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="30" style="filter: brightness(2);"></div>
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">CENTRO DE OPERACIONES</div>
            <div id="prioBadge">SISTEMA ACTIVO</div>
            <h1 id="titleDisplay">Cargando...</h1>
            <p id="messageDisplay">Por favor espere.</p>
        </div>
    </main>

    <div id="ticker-bar"><div id="ticker-content">SISTEMA DE MONITOREO CIO - NOVEDADES EN TIEMPO REAL</div></div>
    <div id="progressLine" style="position: fixed; bottom: 40px; height: 3px; width: 0%; transition: width 0.1s linear;"></div>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--primary)">Historial de Novedades</h2>
        
        <div id="historyList"></div>

        <div id="quickEdit" class="edit-box">
            <h3 style="color:var(--primary); margin-top:0">Editar Entrada</h3>
            <input type="hidden" id="e-index">
            <label style="font-size:10px; color:gray">ÁREA</label>
            <select id="e-area">
                <option>Monitoreo</option><option>Freschat</option><option>Atención</option><option>Tecnología</option>
            </select>
            <label style="font-size:10px; color:gray">PRIORIDAD</label>
            <select id="e-prio">
                <option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option>
            </select>
            <label style="font-size:10px; color:gray">TÍTULO</label>
            <input type="text" id="e-title">
            <label style="font-size:10px; color:gray">MENSAJE</label>
            <textarea id="e-msg" rows="3"></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="saveQuickEdit()" style="flex:1; background:var(--primary); border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer">GUARDAR</button>
                <button onclick="hideEdit()" style="flex:1; background:#222; border:none; color:white; padding:10px; border-radius:5px; cursor:pointer">CANCELAR</button>
            </div>
        </div>
        
        <button onclick="closePanels()" style="width:100%; margin-top:20px; background:none; border:1px solid #333; color:gray; padding:10px; border-radius:10px;">CERRAR</button>
    </aside>

    <aside id="panelForm" class="side-panel">
        <h2 style="color:var(--primary)">Nueva Novedad</h2>
        <form onsubmit="saveNew(event)">
            <label>Área</label>
            <select id="f-area"><option>Monitoreo</option><option>Freschat</option><option>Atención</option><option>Tecnología</option></select>
            <label>Prioridad</label>
            <select id="f-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
            <label>Título</label>
            <input type="text" id="f-title" required>
            <label>Mensaje</label>
            <textarea id="f-msg" rows="4" required></textarea>
            <button type="submit" style="width:100%; padding:15px; background:var(--primary); border:none; border-radius:10px; font-weight:bold;">PUBLICAR</button>
        </form>
    </aside>
</div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let logs = [];
    let currentIdx = 0;
    let startTime = null;
    const SLIDE_TIME = 15;

    async function syncEvents() {
        try {
            const resp = await fetch(DB_URL);
            logs = await resp.json() || [];
            if(logs.length > 0) renderSlide();
        } catch(e) {}
    }

    function renderSlide() {
        if(!logs.length) return;
        const cont = document.getElementById("infoCont");
        const board = document.getElementById("display-board");
        cont.classList.add("oculto");
        
        setTimeout(() => {
            const item = logs[currentIdx % logs.length];
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("prioBadge").textContent = `PRIORIDAD ${item.priority}`;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            
            const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
            const color = colors[item.priority] || "#fff";
            document.getElementById("prioBadge").style.borderColor = color;
            document.getElementById("prioBadge").style.color = color;
            document.getElementById("progressLine").style.background = color;

            // Efecto crítico pulido
            if(item.priority === "Crítica") {
                board.classList.add("critical-active");
                document.getElementById("titleDisplay").style.color = "#ff4d4d";
            } else {
                board.classList.remove("critical-active");
                document.getElementById("titleDisplay").style.color = "white";
            }

            autoSizeText();
            cont.classList.remove("oculto");
        }, 600);
    }

    function autoSizeText() {
        const t = document.getElementById('titleDisplay');
        t.style.fontSize = window.innerWidth < 768 ? "32px" : "75px";
    }

    // --- FUNCIONES DE HISTORIAL Y EDICIÓN ---
    function openHistory() {
        renderHistoryList();
        document.getElementById("panelHistory").classList.add("active");
        document.getElementById("overlay").classList.add("active");
    }

    function renderHistoryList() {
        const list = document.getElementById("historyList");
        list.innerHTML = logs.map((it, i) => `
            <div id="item-${i}" style="background:rgba(255,255,255,0.05); padding:15px; margin-bottom:10px; border-radius:10px; border-left:4px solid ${it.priority==='Crítica'?'red':'var(--primary)'}">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <strong>${it.title}</strong><br>
                        <small style="color:gray">${it.area} - ${it.priority}</small>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="showQuickEdit(${i})" style="background:var(--primary); border:none; padding:5px 8px; border-radius:4px; font-size:10px; font-weight:bold; cursor:pointer">EDITAR</button>
                        <button onclick="deleteEntry(${i})" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; padding:5px 8px; border-radius:4px; font-size:10px; cursor:pointer">X</button>
                    </div>
                </div>
                <div id="edit-anchor-${i}"></div> </div>
        `).join('');
    }

    function showQuickEdit(idx) {
        const item = logs[idx];
        const editBox = document.getElementById("quickEdit");
        const anchor = document.getElementById(`edit-anchor-${idx}`);
        
        document.getElementById("e-index").value = idx;
        document.getElementById("e-area").value = item.area;
        document.getElementById("e-prio").value = item.priority;
        document.getElementById("e-title").value = item.title;
        document.getElementById("e-msg").value = item.message;

        anchor.appendChild(editBox); // Mueve el formulario justo debajo del ítem
        editBox.style.display = "block";
    }

    function hideEdit() {
        document.getElementById("quickEdit").style.display = "none";
        document.body.appendChild(document.getElementById("quickEdit")); // Lo devuelve a su lugar neutro
    }

    async function saveQuickEdit() {
        const idx = document.getElementById("e-index").value;
        logs[idx] = {
            area: document.getElementById("e-area").value,
            priority: document.getElementById("e-prio").value,
            title: document.getElementById("e-title").value,
            message: document.getElementById("e-msg").value
        };
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        hideEdit();
        renderHistoryList();
        syncEvents();
    }

    // --- NUEVA NOVEDAD ---
    function openForm() { 
        document.getElementById("panelForm").classList.add("active");
        document.getElementById("overlay").classList.add("active");
    }

    async function saveNew(e) {
        e.preventDefault();
        const entry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value
        };
        logs.push(entry);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        closePanels();
        syncEvents();
    }

    async function deleteEntry(idx) {
        if(!confirm("¿Borrar novedad?")) return;
        logs.splice(idx, 1);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs.length ? logs : null) });
        renderHistoryList();
        syncEvents();
    }

    function closePanels() { 
        document.querySelectorAll('.side-panel, #overlay').forEach(el => el.classList.remove('active')); 
        hideEdit();
    }
    
    function toggleFS() { 
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function mainLoop(ts) {
        if(!logs.length) { requestAnimationFrame(mainLoop); return; }
        if(!startTime) startTime = ts;
        const progress = (ts - startTime) / (SLIDE_TIME * 1000);
        document.getElementById("progressLine").style.width = (progress * 100) + "%";
        if(progress >= 1) { currentIdx++; renderSlide(); startTime = ts; }
        requestAnimationFrame(mainLoop);
    }

    setInterval(() => {
        document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString('es-UY', { hour12: false });
    }, 1000);

    setInterval(syncEvents, 10000);
    syncEvents();
    requestAnimationFrame(mainLoop);
    window.onresize = autoSizeText;
</script>
</body>
</html>
