<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor | Masterson Elite</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* === AISLAMIENTO Y VARIABLES === */
        #cio-app {
            --primary: #006465;
            --accent: #00d1d1;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --critico-bg: #1a0000; /* Fondo rojo oscuro para emergencias */
            --exito: #2ecc71;

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
            text-align: left;
            transition: background 0.8s ease; /* Transición suave de color de fondo */
        }

        /* Clase para activar el fondo rojo */
        #cio-app.bg-critico { background: var(--critico-bg) !important; }

        #cio-app * { box-sizing: border-box !important; }

        /* HEADER */
        #cio-app .main-header {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--primary); z-index: 10;
        }
        #cio-app .fs-clock { display: none; }
        #cio-app:fullscreen .main-header { display: none !important; }
        #cio-app:fullscreen .fs-clock { 
            display: block; position: absolute; top: 20px; right: 30px; 
            font-family: monospace; font-size: 2.5rem; font-weight: 900; 
            color: var(--primary); text-shadow: 0 0 20px rgba(0,100,101,0.5); z-index: 100;
        }

        /* TABLERO CENTRAL */
        #cio-app #display-board { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        #cio-app .info-container { width: 100%; transition: all 0.6s ease; }
        #cio-app #titleDisplay { font-size: 75px; font-weight: 900; margin: 10px 0; line-height: 1; text-transform: uppercase; }
        #cio-app .oculto { opacity: 0; transform: scale(0.95); filter: blur(10px); }

        /* TICKER INFERIOR AGRANDADO Y CORREDIZO */
        #cio-app #ticker-bar { 
            height: 65px; /* Más alto */
            background: #050505; border-top: 1px solid #222; 
            display: flex; align-items: center; overflow: hidden; position: relative; 
        }

        #cio-app #ticker-content { 
            display: flex; align-items: center; gap: 80px; 
            white-space: nowrap; padding-left: 100%;
            animation: marquee 25s linear infinite; 
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* Badges Offline mucho más grandes para TV */
        #cio-app .status-badge { 
            padding: 10px 25px; border-radius: 8px; 
            font-size: 1.4rem; /* Texto agrandado */
            font-weight: 900; 
            text-transform: uppercase; 
            flex-shrink: 0; 
        }
        #cio-app .status-badge.offline { 
            background: rgba(255, 77, 77, 0.15); 
            border: 3px solid #ff4d4d; 
            color: #ff4d4d; 
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
        }

        /* PANELES */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 400px; height: 100%;
            background: #0a0a0a; border-left: 1px solid var(--primary); padding: 30px;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 10100;
            overflow-y: auto;
        }
        #cio-app .side-panel.active { transform: translateX(0); }
        
        #cio-app .btn-pill {
            background: var(--primary) !important; color: #fff !important;
            border: none; padding: 12px 24px; border-radius: 50px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;
            text-align: center; width: 100%; display: block;
        }
        #cio-app .btn-pill:hover { background: var(--accent) !important; transform: translateY(-2px); }
        #cio-app .btn-sec { background: #1a1a1a !important; border: 1px solid #333; }
        #cio-app .btn-danger { background: rgba(255, 77, 77, 0.1) !important; border: 1px solid #ff4d4d; color: #ff4d4d !important; }

        /* STATS GRID */
        #cio-app .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; margin-bottom: 10px; }
        #cio-app .stat-box { background: #111; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
        #cio-app .stat-box b { display: block; font-size: 1.2rem; }
        #cio-app .stat-box small { font-size: 0.6rem; opacity: 0.5; text-transform: uppercase; }

        #cio-app #offline-details {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out;
            background: #111; border-radius: 12px; margin-bottom: 20px;
        }
        #cio-app #offline-details.show { max-height: 300px; border: 1px solid #444; padding: 10px; margin-top: -5px; }
        #cio-app .off-item { font-size: 0.85rem; color: #ff4d4d; padding: 8px 10px; border-bottom: 1px solid #222; }

        #cio-app #menu-toggle-float {
            display: none; position: fixed; bottom: 85px; right: 20px;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--primary); color: #fff; border: none;
            font-size: 24px; cursor: pointer; z-index: 10050; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            #cio-app #menu-toggle-float { display: flex; align-items: center; justify-content: center; }
            #cio-app .header-actions { display: none !important; }
            #cio-app .side-panel { width: 95%; padding: 20px; }
            #cio-app #titleDisplay { font-size: 38px !important; }
            #cio-app .status-badge { font-size: 1rem; padding: 8px 15px; }
        }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="fsClockDisplay" class="fs-clock">00:00:00</div>
    <div id="cio-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; z-index:10090; backdrop-filter:blur(5px);" onclick="closePanels()"></div>

    <header class="main-header">
        <div class="header-actions" style="display:flex; gap:10px;">
            <button onclick="openFormPanel()" class="btn-pill" style="padding:8px 20px; width:auto;">＋ NUEVA</button>
            <button onclick="openPanel('panelHistory')" class="btn-pill btn-sec" style="padding:8px 20px; width:auto;">📋 HISTORIAL</button>
            <button onclick="toggleFS()" style="background:none; border:1px solid #333; color:#555; padding:8px 12px; border-radius:8px; cursor:pointer;">⛶ TV</button>
        </div>
        <div id="clockDisplay" style="font-family:monospace; font-size:1.6rem; font-weight:900; color:var(--primary);">00:00:00</div>
        <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="35" style="filter: brightness(2);">
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel" style="letter-spacing: 5px; font-weight: 900; font-size: 0.7rem; text-transform: uppercase;">MASTERSON MONITOR</div>
            <h1 id="titleDisplay">SISTEMA CIO</h1>
            <p id="messageDisplay" style="font-size:1.5rem; opacity:0.6;">Sincronizando...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">
            <span style="font-size: 1.2rem; color: #444; font-weight: bold;">VERIFICANDO NODOS...</span>
        </div>
    </div>
    
    <div id="progressLine" style="position: fixed; bottom: 65px; height: 3px; width: 0%; background: var(--primary); z-index: 5;"></div>

    <button id="menu-toggle-float" onclick="openPanel('panelMobileMenu')">☰</button>

    <aside id="panelForm" class="side-panel">
        <div class="form-content">
            <h2 id="formTitle" style="color:var(--primary); margin-bottom:10px;">NUEVA NOVEDAD</h2>
            <form id="mainForm" onsubmit="saveEntry(event)" style="display:contents;">
                <input type="hidden" id="f-id" value="">
                <select id="f-area"><option>Monitoreo</option><option>Freschat</option><option>Atención</option><option>Novedad Interna</option></select>
                <select id="f-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
                <input type="text" id="f-title" placeholder="Título novedad" required>
                <textarea id="f-msg" rows="5" placeholder="Descripción..." required></textarea>
                <button type="submit" id="btnSubmit" class="btn-pill">PUBLICAR</button>
                <button type="button" onclick="closePanels()" class="btn-pill btn-sec">CANCELAR</button>
            </form>
        </div>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:15px;">ESTADO OPERATIVO</h2>
        <div class="stats-grid">
            <div class="stat-box"><b id="stat-total">0</b><small>Novedades</small></div>
            <div class="stat-box"><b id="stat-crit" style="color:var(--critico)">0</b><small>Críticos</small></div>
            <div class="stat-box" id="btn-show-off" onclick="toggleOfflineDetails()">
                <b id="stat-off" style="color:var(--accent)">0</b>
                <small>Offline ▾</small>
            </div>
        </div>
        <div id="offline-details"></div>
        <button onclick="downloadPDF()" class="btn-pill" style="background:#222 !important; margin-bottom:20px; font-size:0.7rem;">⬇ DESCARGAR REPORTE PDF</button>
        <div id="historyList" style="width:100%;"></div>
        <div class="form-content" style="margin-top:20px;"><button onclick="closePanels()" class="btn-pill btn-sec">CERRAR</button></div>
    </aside>
</div>

<script>
    const cio_DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const cio_RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let cio_logs = []; 
    let cio_currentIdx = 0; 
    let cio_startTime = null; 
    let cio_offNodes = [];
    const cio_SLIDE_TIME = 15;

    async function updateNetwork() {
        try {
            const resp = await fetch(cio_RED_URL);
            const status = await resp.json();
            if(!status) return;
            const ticker = document.getElementById("ticker-content");
            const offDetails = document.getElementById("offline-details");
            let tickerHTML = "";
            let detailsHTML = "";
            cio_offNodes = [];

            Object.keys(status).forEach(id => {
                if (status[id].estado === "offline") {
                    const name = id.replace(/_/g, ' ');
                    tickerHTML += `<div class="status-badge offline">⚠️ OFF: ${name}</div>`;
                    detailsHTML += `<div class="off-item">● ${name}</div>`;
                    cio_offNodes.push(name);
                }
            });

            if(cio_offNodes.length > 0) {
                ticker.innerHTML = tickerHTML + tickerHTML; // Doble para loop infinito
                ticker.style.animation = `marquee ${cio_offNodes.length * 7}s linear infinite`;
            } else {
                ticker.innerHTML = `<span style="color:var(--primary); font-size:1.3rem; font-weight:bold; width: 100vw; text-align: center;">✔ TODOS LOS SERVICIOS OPERATIVOS</span>`;
                ticker.style.animation = "none";
                ticker.style.paddingLeft = "0";
            }
            
            offDetails.innerHTML = detailsHTML || `<div class="off-item" style="color:#aaa">No hay servicios offline</div>`;
            document.getElementById("stat-off").textContent = cio_offNodes.length;
        } catch(e) {}
    }

    async function syncEvents() {
        try {
            const resp = await fetch(cio_DB_URL);
            const data = await resp.json();
            const now = Date.now();
            let raw = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
            cio_logs = raw.filter(it => !it.timestamp || (now - it.timestamp < 86400000));
            
            document.getElementById("stat-total").textContent = cio_logs.length;
            document.getElementById("stat-crit").textContent = cio_logs.filter(it => it.priority === "Crítica").length;
            
            if(cio_logs.length > 0 && !cio_startTime) renderSlide();
            if(document.getElementById("panelHistory").classList.contains("active")) renderHistory();
        } catch(e) {}
    }

    function renderSlide() {
        if(!cio_logs.length) return;
        const cont = document.getElementById("infoCont");
        const app = document.getElementById("cio-app");
        cont.classList.add("oculto");

        setTimeout(() => {
            const item = cio_logs[cio_currentIdx % cio_logs.length];
            const pColors = {"Baja":"var(--accent)", "Media":"#f1c40f", "Alta":"#e67e22", "Crítica":"#ff4d4d"};
            const color = pColors[item.priority] || "#fff";

            // Lógica de FONDO ROJO OSCURO para Prioridad Crítica
            if(item.priority === "Crítica") app.classList.add("bg-critico");
            else app.classList.remove("bg-critico");

            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("areaLabel").style.color = color;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            document.getElementById("progressLine").style.background = color;
            cont.classList.remove("oculto");
        }, 600);
    }

    // El resto de tus funciones CRUD se mantienen iguales...
    function openPanel(id) { closePanels(); document.getElementById(id).classList.add("active"); document.getElementById("cio-overlay").style.display = "block"; }
    function closePanels() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); document.getElementById("cio-overlay").style.display = "none"; }
    function toggleFS() { if (!document.fullscreenElement) document.getElementById("cio-app").requestFullscreen(); else document.exitFullscreen(); }
    function toggleOfflineDetails() { document.getElementById("offline-details").classList.toggle("show"); }

    function loop(ts) {
        if(cio_logs.length) {
            if(!cio_startTime) cio_startTime = ts;
            const progress = (ts - cio_startTime) / (cio_SLIDE_TIME * 1000);
            document.getElementById("progressLine").style.width = (Math.min(progress, 1) * 100) + "%";
            if(progress >= 1) { cio_currentIdx++; renderSlide(); cio_startTime = ts; }
        }
        requestAnimationFrame(loop);
    }

    setInterval(() => { 
        const time = new Date().toLocaleTimeString('es-UY', { hour12: false });
        document.getElementById("clockDisplay").textContent = time; 
        document.getElementById("fsClockDisplay").textContent = time; 
    }, 1000);

    setInterval(updateNetwork, 5000);
    setInterval(syncEvents, 10000);
    updateNetwork(); syncEvents(); requestAnimationFrame(loop);

    // Funciones faltantes de tu CRUD original para que no de error
    function openFormPanel() { document.getElementById("mainForm").reset(); document.getElementById("f-id").value = ""; document.getElementById("formTitle").textContent = "NUEVA NOVEDAD"; document.getElementById("btnSubmit").textContent = "PUBLICAR"; openPanel('panelForm'); }
    async function saveEntry(e) { e.preventDefault(); const id = document.getElementById("f-id").value; const entry = { area: document.getElementById("f-area").value, priority: document.getElementById("f-prio").value, title: document.getElementById("f-title").value, message: document.getElementById("f-msg").value, timestamp: (id !== "" && cio_logs[id]) ? cio_logs[id].timestamp : Date.now() }; if (id !== "") cio_logs[id] = entry; else cio_logs.push(entry); await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) }); closePanels(); syncEvents(); }
    function downloadPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text("Reporte CIO", 10, 10); doc.save("reporte.pdf"); }
</script>
</body>
</html>
