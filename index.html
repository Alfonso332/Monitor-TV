<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor - Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* ENCAPSULAMIENTO TOTAL #cio-app */
        #cio-app {
            --primary: #00d4d8;
            --accent: #006465;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --bg-img: url('https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 99999; margin: 0; padding: 0;
        }

        /* FONDO MUCHO MÁS OPACO (0.03) */
        #cio-app::before {
            content: ""; position: absolute; inset: 0;
            background-image: var(--bg-img); background-size: contain;
            background-position: center; background-repeat: no-repeat;
            opacity: 0.03; filter: grayscale(1); z-index: -1;
        }

        /* HEADER */
        #cio-app .main-header {
            height: 80px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 212, 216, 0.3);
        }

        /* OCULTAR BOTONES EN PANTALLA COMPLETA */
        :fullscreen #cio-app .header-actions {
            display: none !important;
        }

        #cio-app #clockDisplay { font-family: monospace; font-size: 1.8rem; color: var(--primary); font-weight: bold; }

        /* SECCIÓN DE ALERTAS GIGANTES */
        #cio-app #critical-alert-zone {
            background: rgba(255, 0, 0, 0.05);
            padding: 10px; display: flex; flex-direction: column; align-items: center;
            border-bottom: 1px solid rgba(255, 77, 77, 0.2);
        }

        #cio-app .alert-title {
            color: var(--critico); font-size: 11px; font-weight: 900;
            letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase;
        }

        #cio-app #network-status { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

        #cio-app .status-item-big {
            display: flex; align-items: center; gap: 8px;
            font-size: 20px; font-weight: 800; color: #fff;
            background: rgba(255, 77, 77, 0.2); padding: 8px 16px; border-radius: 10px;
            border: 2px solid var(--critico); animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 77, 77, 0.2); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 77, 77, 0.4); }
        }

        #cio-app .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--critico); animation: blink 0.8s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* PANTALLA CENTRAL */
        #cio-app #display-board {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 30px;
        }

        #cio-app .info-container { width: 100%; transition: all 0.6s ease-in-out; }
        #cio-app .oculto { opacity: 0; transform: scale(0.95); filter: blur(10px); }

        #cio-app #areaLabel { font-size: 1.2rem; color: var(--primary); letter-spacing: 6px; text-transform: uppercase; font-weight: bold; }
        #cio-app #prioBadge { 
            display: inline-block; padding: 6px 25px; border-radius: 50px; 
            font-weight: 900; border: 1px solid var(--primary); margin: 20px 0;
            background: rgba(0, 212, 216, 0.1);
        }
        #cio-app #titleDisplay { font-weight: 800; line-height: 1.1; text-transform: uppercase; margin-bottom: 20px; }
        #cio-app #messageDisplay { line-height: 1.5; opacity: 0.9; max-width: 900px; margin: 0 auto; white-space: pre-wrap; }

        /* BARRA INFERIOR */
        #cio-app #ticker-bar { height: 40px; background: #050c0c; border-top: 1px solid var(--primary); display: flex; align-items: center; overflow: hidden; }
        #cio-app #ticker-content { white-space: nowrap; animation: scrollText 35s linear infinite; color: var(--primary); font-weight: bold; font-size: 0.9rem; }
        @keyframes scrollText { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        #cio-app #progressLine { position: fixed; bottom: 40px; height: 4px; width: 0%; transition: width 0.1s linear; }

        /* BOTONES */
        #cio-app .header-actions button {
            background: rgba(0, 212, 216, 0.1); border: 1px solid var(--primary);
            color: #fff; padding: 10px 15px; border-radius: 8px; font-weight: bold;
            cursor: pointer; margin-right: 8px; font-size: 12px; transition: 0.3s;
        }
        #cio-app .header-actions button:hover { background: var(--primary); color: #000; }

        /* FORMULARIOS ORIGINALES */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 380px; height: 100%;
            background: #0a1a1b; border-left: 2px solid var(--primary); padding: 30px;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10000;
            box-sizing: border-box; overflow-y: auto;
        }
        #cio-app .side-panel.active { transform: translateX(0); }
        #cio-app #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 9999; backdrop-filter: blur(4px); }
        #cio-app #overlay.active { display: block; }

        #cio-app label { display: block; color: var(--primary); margin-bottom: 5px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid var(--accent);
            border-radius: 10px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box;
        }

        @media (max-width: 768px) {
            #cio-app .header-actions { display: none; }
            #cio-app .side-panel { width: 100%; height: 85%; top: auto; bottom: 0; transform: translateY(100%); border-radius: 25px 25px 0 0; }
            #cio-app .side-panel.active { transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay" onclick="closePanels()"></div>

    <header class="main-header">
        <div class="header-actions">
            <button onclick="openForm()">＋ NUEVA NOVEDAD</button>
            <button onclick="openHistory()">📋 HISTORIAL</button>
            <button onclick="toggleFS()">⛶ PANTALLA COMPLETA</button>
        </div>

        <div style="text-align: center;">
            <div id="clockDisplay">00:00:00</div>
        </div>

        <div style="width: 200px; text-align: right;">
            <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="40" style="filter: brightness(2);">
        </div>
    </header>

    <div id="critical-alert-zone">
        <div class="alert-title" id="alert-msg">Sincronizando Red...</div>
        <div id="network-status"></div>
    </div>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">CENTRO DE OPERACIONES</div>
            <div id="prioBadge">SISTEMA ACTIVO</div>
            <h1 id="titleDisplay">Monitor de Servicios</h1>
            <p id="messageDisplay">Cargando base de datos...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">SINCRO FIREBASE OK... MONITOREO ACTIVO... REVISAR EQUIPOS EN ROJO...</div>
    </div>

    <div id="progressLine"></div>

    <aside id="panelForm" class="side-panel">
        <h2 style="color:var(--primary)">Registrar Novedad</h2>
        <form onsubmit="saveEntry(event)">
            <label>Área Responsable</label>
            <select id="f-area">
                <option>Monitoreo</option><option>Freschat</option>
                <option>Atención al Cliente</option><option>Tecnología</option>
            </select>
            <label>Prioridad</label>
            <select id="f-prio">
                <option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option>
            </select>
            <label>Título del Evento</label>
            <input type="text" id="f-title" placeholder="Ej: Caída de Servidor" required>
            <label>Mensaje / Detalles</label>
            <textarea id="f-msg" rows="5" placeholder="Escriba aquí los detalles..." required></textarea>
            
            <button type="submit" style="width:100%; padding:15px; background:var(--primary); border:none; border-radius:10px; font-weight:bold; cursor:pointer; color:#000;">PUBLICAR EN TV</button>
            <button type="button" onclick="closePanels()" style="width:100%; margin-top:10px; background:transparent; border:1px solid #ff4d4d; color:#ff4d4d; padding:10px; border-radius:10px; cursor:pointer;">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--primary)">Historial de Novedades</h2>
        <div id="historyList"></div>
        <button onclick="closePanels()" style="width:100%; margin-top:20px; background:var(--primary); border:none; padding:10px; border-radius:10px; font-weight:bold; color:#000; width:100%;">CERRAR</button>
    </aside>
</div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let logs = [];
    let currentIdx = 0;
    let startTime = null;
    const SLIDE_TIME = 15;

    async function updateNetwork() {
        try {
            const resp = await fetch(RED_URL);
            const status = await resp.json();
            const container = document.getElementById("network-status");
            const alertTitle = document.getElementById("alert-msg");
            let html = ""; let caidos = 0;

            if(status) {
                Object.keys(status).forEach(id => {
                    if(status[id].estado === "offline") {
                        caidos++;
                        html += `<div class="status-item-big"><div class="dot"></div>${id.replace(/_/g, ' ')}</div>`;
                    }
                });
            }

            if(caidos > 0) {
                container.innerHTML = html;
                alertTitle.textContent = "⚠️ ATENCIÓN: EQUIPOS FUERA DE LÍNEA";
                alertTitle.style.color = "var(--critico)";
                document.getElementById("critical-alert-zone").style.display = "flex";
            } else {
                container.innerHTML = "";
                alertTitle.textContent = "✔ TODOS LOS SERVICIOS ONLINE";
                alertTitle.style.color = "#00ff00";
                document.getElementById("critical-alert-zone").style.display = "flex";
            }
        } catch(e) { console.warn("Error Red"); }
    }

    async function syncEvents() {
        try {
            const resp = await fetch(DB_URL);
            logs = await resp.json() || [];
            if(logs.length > 0) renderSlide();
        } catch(e) { }
    }

    function renderSlide() {
        if(!logs.length) return;
        const cont = document.getElementById("infoCont");
        cont.classList.add("oculto");
        setTimeout(() => {
            const item = logs[currentIdx % logs.length];
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("prioBadge").textContent = `PRIORIDAD ${item.priority}`;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
            const color = colors[item.priority] || "#fff";
            document.getElementById("prioBadge").style.borderColor = color;
            document.getElementById("prioBadge").style.color = color;
            document.getElementById("progressLine").style.background = color;
            autoSizeText();
            cont.classList.remove("oculto");
        }, 600);
    }

    function autoSizeText() {
        const t = document.getElementById('titleDisplay');
        const m = document.getElementById('messageDisplay');
        let sizeT = window.innerWidth < 768 ? 30 : 75;
        let sizeM = window.innerWidth < 768 ? 18 : 35;
        t.style.fontSize = sizeT + "px";
        m.style.fontSize = sizeM + "px";
    }

    function openForm() { document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay").classList.add("active"); }
    function openHistory() {
        const list = document.getElementById("historyList");
        list.innerHTML = logs.map((it, i) => `
            <div style="background:rgba(255,255,255,0.05); padding:15px; margin-bottom:10px; border-radius:10px; border-left:4px solid var(--primary)">
                <strong>${it.title}</strong><br><small>${it.area} - ${it.priority}</small>
                <button onclick="deleteEntry(${i})" style="float:right; background:none; border:none; color:red; cursor:pointer; font-weight:bold;">BORRAR</button>
            </div>
        `).join('');
        document.getElementById("panelHistory").classList.add("active"); document.getElementById("overlay").classList.add("active");
    }
    function closePanels() { document.querySelectorAll('.side-panel, #overlay').forEach(el => el.classList.remove('active')); }
    
    function toggleFS() { 
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    async function saveEntry(e) {
        e.preventDefault();
        const newEntry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value,
            timestamp: Date.now()
        };
        logs.push(newEntry);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        closePanels();
        syncEvents();
    }

    async function deleteEntry(idx) {
        logs.splice(idx, 1);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs.length ? logs : null) });
        openHistory();
        syncEvents();
    }

    function mainLoop(ts) {
        if(!logs.length) { requestAnimationFrame(mainLoop); return; }
        if(!startTime) startTime = ts;
        const progress = (ts - startTime) / (SLIDE_TIME * 1000);
        document.getElementById("progressLine").style.width = Math.min(progress * 100, 100) + "%";
        if(progress >= 1) { currentIdx++; renderSlide(); startTime = ts; }
        requestAnimationFrame(mainLoop);
    }

    setInterval(() => {
        document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString('es-UY', { hour12: false });
    }, 1000);

    setInterval(syncEvents, 10000);
    setInterval(updateNetwork, 5000);
    
    syncEvents();
    updateNetwork();
    requestAnimationFrame(mainLoop);
    window.onresize = autoSizeText;
</script>
</body>
</html>
