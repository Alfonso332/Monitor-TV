<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Monitor Corporativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- VARIABLES DE DISEÑO --- */
        :root {
            --bg-deep: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-orange: #d29922;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- PANTALLA PRINCIPAL --- */
        #display {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 5%;
            background: radial-gradient(circle at center, #1c2128 0%, #0d1117 100%);
            transition: background 0.5s ease;
        }

        #areaLabel {
            font-size: 1.2rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* CONTENEDOR DE DATOS (ETIQUETAS) */
        #metaContainer {
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
        }

        .data-tag {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 4px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.9rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        #titleDisplay {
            font-weight: 800;
            line-height: 1.2;
            margin: 0;
            color: var(--text-main);
        }

        #messageDisplay {
            margin-top: 25px;
            font-weight: 300;
            color: var(--text-dim);
            max-width: 1200px;
            line-height: 1.4;
        }

        /* --- CABECERA PC --- */
        .control-header {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(10px);
        }

        #clock {
            font-family: monospace;
            font-size: 1.8rem;
            color: var(--text-main);
            font-weight: 500;
        }

        /* --- BOTONES ESTILO TECH --- */
        .btn-tech {
            background: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn-tech:hover { background: var(--border-color); border-color: var(--text-dim); }

        /* --- PANTALLA COMPLETA TV --- */
        :fullscreen .left-zone, :fullscreen .mobile-nav { display: none !important; }
        :fullscreen .control-header { border: none; background: transparent; justify-content: center !important; }
        :fullscreen #clock { font-size: 10rem !important; opacity: 0.2; position: absolute; top: 5%; }
        :fullscreen .info-block { margin-top: 10vh; }

        /* --- ALERTA CRÍTICA (DISCRETA) --- */
        @keyframes pulse-crit { 0% { background: #0d1117; } 50% { background: #2d1313; } 100% { background: #0d1117; } }
        .critico-total { animation: pulse-crit 1.5s infinite !important; }
        .critico-total #areaLabel { color: var(--accent-red); }

        /* --- BARRA DE NAVEGACIÓN MÓVIL (TIPO BARRA DE TAREAS) --- */
        .mobile-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px; 
            background: var(--panel-bg); 
            border-top: 1px solid var(--border-color);
            display: none; justify-content: space-around; align-items: center; 
            z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            background: none; border: none; color: var(--text-dim);
            font-size: 0.75rem; font-weight: 600; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-item.active { color: var(--accent-blue); }
        .nav-icon { font-size: 1.4rem; }

        /* --- DRAWERS --- */
        .drawer {
            position: fixed; right: 0; top: 0; width: 400px; height: 100vh;
            background: var(--panel-bg); border-left: 1px solid var(--border-color);
            padding: 30px; transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 5000;
            overflow-y: auto;
        }
        .drawer.active { transform: translateX(0); }
        #drawerOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 4500; }
        #drawerOverlay.active { display: block; }

        input, select, textarea {
            width: 100%; padding: 12px; background: var(--bg-deep); border: 1px solid var(--border-color);
            color: white; border-radius: 6px; margin-top: 5px;
        }

        /* --- BARRA PROGRESO --- */
        .progress-wrap { position: fixed; bottom: 0; width: 100%; height: 4px; z-index: 3000; }
        #progressBar { height: 100%; width: 0%; background: var(--accent-blue); transition: width 0.1s linear; }

        @media (max-width: 768px) {
            .mobile-nav { display: flex !important; }
            .left-zone { display: none; }
            .drawer { width: 100%; bottom: 0; height: 80vh; top: auto; border-radius: 20px 20px 0 0; }
            #display { padding: 30px; padding-bottom: 100px; }
        }
    </style>
</head>
<body>

<div id="drawerOverlay"></div>

<header class="control-header">
    <div class="left-zone">
        <button class="btn-tech" onclick="openNew()">＋ NUEVO REGISTRO</button>
        <button class="btn-tech" onclick="openHistory()" style="margin-left:8px;">☰ HISTORIAL</button>
        <button class="btn-tech" onclick="document.documentElement.requestFullscreen()" style="margin-left:8px; color: var(--accent-blue);">⛶ TV MODE</button>
    </div>
    <div id="clock">00:00:00</div>
</header>

<main id="display">
    <div class="info-block" style="text-align: center;">
        <div id="areaLabel">SISTEMA CIO</div>
        <div id="metaContainer">
            <div id="tagPriority" class="data-tag">---</div>
            <div id="tagTurno" class="data-tag">TURNO</div>
            <div id="tagHora" class="data-tag">--:--</div>
        </div>
        <h1 id="titleDisplay">MONITOR INACTIVO</h1>
        <p id="messageDisplay">No hay novedades registradas en el ciclo actual.</p>
    </div>
</main>

<nav class="mobile-nav">
    <button class="nav-item" onclick="openNew()">
        <span class="nav-icon">＋</span>
        <span>NUEVO</span>
    </button>
    <button class="nav-item" onclick="openHistory()">
        <span class="nav-icon">📋</span>
        <span>LISTA</span>
    </button>
    <button class="nav-item" onclick="document.documentElement.requestFullscreen()">
        <span class="nav-icon">⛶</span>
        <span>TV</span>
    </button>
</nav>

<aside id="drawerForm" class="drawer">
    <h3 style="margin-bottom:20px;">Nueva Novedad</h3>
    <form id="formRegistro" style="display:flex; flex-direction:column; gap:15px;">
        <input type="hidden" id="editIndex" value="-1">
        <div>
            <label style="font-size:0.8rem; color:var(--text-dim)">Área</label>
            <select id="inputArea">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
        </div>
        <div>
            <label style="font-size:0.8rem; color:var(--text-dim)">Prioridad</label>
            <select id="inputPriority">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Crítica">Crítica</option>
            </select>
        </div>
        <input type="text" id="inputTitle" placeholder="Título corto" required>
        <textarea id="inputMessage" rows="5" placeholder="Descripción de la novedad..." required></textarea>
        <button type="submit" class="btn-tech" style="background:var(--accent-blue); color:black; font-weight:600; padding:15px;">PUBLICAR EN MONITOR</button>
        <button type="button" onclick="closeAllDrawers()" style="background:none; border:none; color:var(--accent-red); cursor:pointer; margin-top:10px;">Cancelar</button>
    </form>
</aside>

<aside id="drawerHistory" class="drawer">
    <h3 style="margin-bottom:15px;">Historial del Día</h3>
    <button onclick="generatePDF()" style="background:var(--accent-green); color:black; width:100%; padding:12px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; margin-bottom:20px;">📥 GENERAR PDF (Novedades Operativas)</button>
    <div id="historyList"></div>
</aside>

<div class="progress-wrap"><div id="progressBar"></div></div>

<script>
    const DATABASE_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let registros = [];
    let currentIndex = 0;
    let startTime = null;
    const DURATION = 15;

    function getTurno(h) {
        if (h >= 6 && h < 14) return "Mañana";
        if (h >= 14 && h < 22) return "Tarde";
        return "Noche";
    }

    function fitText() {
        const title = document.getElementById('titleDisplay');
        const message = document.getElementById('messageDisplay');
        const display = document.getElementById('display');
        const esMovil = window.innerWidth <= 768;
        
        let sizeT = esMovil ? 45 : 110; 
        let sizeM = esMovil ? 20 : 45;

        title.style.fontSize = sizeT + "px";
        message.style.fontSize = sizeM + "px";

        let safety = 0;
        while ((title.offsetHeight + message.offsetHeight > display.offsetHeight * 0.6) && safety < 100) {
            sizeT -= 1; sizeM -= 0.5;
            title.style.fontSize = sizeT + "px";
            message.style.fontSize = sizeM + "px";
            safety++;
        }
    }

    async function pullData() {
        try {
            const res = await fetch(DATABASE_URL);
            const data = await res.json();
            registros = data || [];
            render(currentIndex);
        } catch (e) {}
    }

    function render(index){
        const display = document.getElementById("display");
        if(!registros.length) {
            display.classList.remove("critico-total");
            document.getElementById("tagPriority").textContent = "INFO";
            document.getElementById("tagTurno").textContent = "---";
            document.getElementById("tagHora").textContent = "--:--";
            return;
        }
        
        const reg = registros[index % registros.length];
        display.className = (reg.priority === "Crítica") ? "critico-total" : "";
        
        document.getElementById("areaLabel").textContent = reg.area;
        document.getElementById("tagPriority").textContent = reg.priority;
        document.getElementById("tagTurno").textContent = "TURNO: " + reg.turno;
        document.getElementById("tagHora").textContent = reg.hora;
        
        document.getElementById("titleDisplay").textContent = reg.title;
        document.getElementById("messageDisplay").textContent = reg.message;
        
        const colors = {Baja:"#58a6ff", Media:"#3fb950", Alta:"#d29922", Crítica:"#f85149"};
        document.getElementById("progressBar").style.background = colors[reg.priority];
        
        setTimeout(fitText, 50);
    }

    document.getElementById("formRegistro").onsubmit = async (e) => {
        e.preventDefault();
        const now = new Date();
        const nuevo = {
            area: document.getElementById("inputArea").value,
            priority: document.getElementById("inputPriority").value,
            title: document.getElementById("inputTitle").value,
            message: document.getElementById("inputMessage").value,
            hora: now.toLocaleTimeString("es-UY", {hour:'2-digit', minute:'2-digit'}),
            turno: getTurno(now.getHours())
        };
        const idx = parseInt(document.getElementById("editIndex").value);
        if(idx === -1) registros.push(nuevo); else registros[idx] = nuevo;
        await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(registros) });
        closeAllDrawers(); pullData();
    };

    function generatePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const now = new Date(); const turno = getTurno(now.getHours());
        
        doc.setFillColor(13, 17, 23); doc.rect(0,0,210,40,'F');
        doc.setTextColor(255,255,255); doc.setFontSize(22); doc.text("NOVEDADES OPERATIVAS", 20, 25);
        doc.setFontSize(11); doc.text(`Turno: ${turno} | Generado: ${now.toLocaleString()}`, 20, 35);
        
        let y = 55; doc.setTextColor(0,0,0);
        registros.forEach(r => {
            doc.setFont(undefined, 'bold'); doc.text(`[${r.priority}] ${r.area}: ${r.title}`, 20, y);
            doc.setFont(undefined, 'normal'); 
            doc.setFontSize(9); doc.text(`Hora: ${r.hora} | Turno: ${r.turno}`, 20, y + 5);
            doc.setFontSize(10); const lines = doc.splitTextToSize(r.message, 170);
            doc.text(lines, 20, y + 12); y += (lines.length * 7) + 20;
            if(y > 270) { doc.addPage(); y = 20; }
        });
        doc.save(`Novedades_operativas_${turno}_${now.getHours()}hs.pdf`);
    }

    function renderHistory() {
        const container = document.getElementById("historyList");
        container.innerHTML = registros.map((reg, i) => `
            <div style="background:var(--bg-deep); padding:15px; margin-bottom:10px; border:1px solid var(--border-color); border-radius:8px;">
                <strong style="color:var(--accent-blue)">${reg.title}</strong><br>
                <small style="color:var(--text-dim)">${reg.area} | ${reg.hora} | Turno ${reg.turno}</small><br>
                <div style="margin-top:10px;">
                    <button onclick="editarEvento(${i})" style="color:var(--accent-orange); background:none; border:none; cursor:pointer; font-weight:bold;">Editar</button>
                    <button onclick="eliminarEvento(${i})" style="color:var(--accent-red); background:none; border:none; cursor:pointer; font-weight:bold; margin-left:15px;">Borrar</button>
                </div>
            </div>
        `).join('');
    }

    window.editarEvento = (i) => {
        const reg = registros[i];
        document.getElementById("editIndex").value = i;
        document.getElementById("inputArea").value = reg.area;
        document.getElementById("inputPriority").value = reg.priority;
        document.getElementById("inputTitle").value = reg.title;
        document.getElementById("inputMessage").value = reg.message;
        document.getElementById("drawerHistory").classList.remove("active");
        document.getElementById("drawerForm").classList.add("active");
    };

    window.eliminarEvento = async (i) => {
        if(confirm("¿Eliminar registro operativo?")) {
            registros.splice(i,1);
            await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(registros.length ? registros : null) });
            renderHistory(); pullData();
        }
    };

    function closeAllDrawers() { document.querySelectorAll('.drawer, #drawerOverlay').forEach(el => el.classList.remove('active')); }
    function openNew() { document.getElementById("formRegistro").reset(); document.getElementById("editIndex").value="-1"; document.getElementById("drawerForm").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); }
    function openHistory() { renderHistory(); document.getElementById("drawerHistory").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); }

    document.getElementById("drawerOverlay").onclick = closeAllDrawers;

    function animate(timestamp){
        if(!registros.length) { requestAnimationFrame(animate); return; }
        if(!startTime) startTime = timestamp;
        const progress = (timestamp - startTime) / 1000;
        document.getElementById("progressBar").style.width = Math.min((progress / DURATION) * 100, 100) + "%";
        if(progress >= DURATION){ currentIndex = (currentIndex + 1) % registros.length; render(currentIndex); startTime = timestamp; }
        requestAnimationFrame(animate);
    }

    setInterval(() => document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}), 1000);
    setInterval(pullData, 5000);
    requestAnimationFrame(animate);
    pullData();
</script>
</body>
</html>
