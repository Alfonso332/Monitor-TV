<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* CSS ENCAPSULADO BAJO #CIO-APP PARA EVITAR CONFLICTOS EXTERNOS */
        #cio-app {
            --primary: #00d4d8;
            --accent: #006465;
            --dark-bg: #050d0e;
            --critico-fondo: #1a0000;
            --critico-pulso: #4d0000;
            --ticker-bg: #0a1a1b;
            
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            background: var(--dark-bg); color: #ffffff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; margin: 0; padding: 0;
        }

        #cio-app #display-board {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            padding: 5vh 5vw;
            background: radial-gradient(circle at center, #0c1c1d 0%, #050d0e 100%);
            transition: all 0.5s ease;
        }

        @keyframes pulso-critico-cio {
            0% { background-color: #050d0e; }
            50% { background-color: var(--critico-pulso); }
            100% { background-color: #050d0e; }
        }
        #cio-app.es-critico #display-board {
            animation: pulso-critico-cio 2s infinite ease-in-out;
        }

        #cio-app .info-container { 
            width: 100%; max-width: 1200px;
            transition: opacity 0.6s ease, transform 0.6s ease, filter 0.6s ease;
        }

        #cio-app .oculto { opacity: 0; transform: translateY(-30px); filter: blur(10px); }
        #cio-app .pre-entrada { opacity: 0; transform: translateY(30px); filter: blur(10px); }
        
        #cio-app #areaLabel { font-size: clamp(0.8rem, 2vh, 1.2rem); color: var(--primary); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 1vh; }
        #cio-app #prioBadge { display: inline-block; padding: 5px 20px; border-radius: 4px; font-weight: 800; border: 1px solid rgba(255,255,255,0.2); font-size: clamp(0.7rem, 1.5vh, 1rem); margin-bottom: 2vh; text-transform: uppercase; }
        #cio-app #titleDisplay { font-weight: 800; text-transform: uppercase; line-height: 1.1; margin-bottom: 2vh; width: 100%; margin-top: 0;}
        #cio-app #messageDisplay { font-weight: 300; color: #cedddd; line-height: 1.4; width: 100%; max-width: 90%; margin: 0 auto; white-space: pre-wrap; word-wrap: break-word; }
        #cio-app #timeWarning { color: #ff4d4d; font-weight: bold; font-size: 0.9rem; margin-top: 15px; display: none; }

        #cio-app .main-header {
            position: absolute; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; z-index: 100; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); box-sizing: border-box;
        }

        #cio-app:fullscreen .main-header { display: none !important; }

        #cio-app .actions button {
            background: rgba(0, 100, 101, 0.4); border: 1px solid var(--primary);
            color: #fff; padding: 8px 15px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; margin-right: 5px;
        }

        #cio-app #clockDisplay { font-family: monospace; font-size: 1.4rem; color: var(--primary); font-weight: bold; }

        #cio-app #ticker-bar {
            height: 35px; background: var(--ticker-bg); border-top: 1px solid var(--primary);
            display: flex; align-items: center; overflow: hidden; white-space: nowrap;
        }
        #cio-app #ticker-content { display: inline-block; padding-left: 100%; animation: ticker-scroll-cio 25s linear infinite; color: var(--primary); font-weight: bold; font-size: 0.85rem; }
        @keyframes ticker-scroll-cio { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 30vw; min-width: 350px; height: 100%;
            background: #091718; border-left: 3px solid var(--primary); padding: 25px; 
            transform: translateX(100%); transition: 0.4s ease; z-index: 1100; overflow-y: auto; box-sizing: border-box;
        }
        #cio-app .side-panel.active { transform: translateX(0); }
        #cio-app #overlay-cio { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; }
        #cio-app #overlay-cio.active { display: block; }

        #cio-app input, #cio-app textarea, #cio-app select { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid var(--accent); border-radius: 4px; margin-bottom: 10px; }

        @media (max-width: 768px) {
            #cio-app .actions { display: none; }
            #cio-app .nav-mobile {
                display: flex; position: fixed; bottom: 35px; width: 100%; height: 70px;
                background: #061112; border-top: 2px solid var(--primary); justify-content: space-around; align-items: center; z-index: 500;
            }
            #cio-app .nav-mobile button { background: none; border: none; color: var(--primary); font-size: 0.7rem; font-weight: bold; display: flex; flex-direction: column; align-items: center; }
            #cio-app .side-panel { width: 100%; height: 85%; top: auto; bottom: 0; transform: translateY(100%); border-left: none; border-top: 4px solid var(--primary); }
            #cio-app .side-panel.active { transform: translateY(0); }
            #cio-app #display-board { padding-bottom: 110px; }
        }

        #cio-app #progressLine { position: fixed; bottom: 35px; height: 4px; width: 0%; z-index: 999; }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay-cio" onclick="closeAll()"></div>

    <header class="main-header">
        <div class="actions">
            <button onclick="openForm()">＋ NUEVO</button>
            <button onclick="openHistory()">📋 LISTA</button>
            <button onclick="handleCerrarTurno()" style="background: #4d0000; border-color: #ff4d4d;">🔒 CERRAR TURNO</button>
            <button onclick="toggleFS()" style="border-color:#ffcc00; color:#ffcc00;">⛶ MODO TV</button>
        </div>
        <div id="clockDisplay">00:00:00</div>
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">SISTEMA CIO</div>
            <div id="prioBadge">Sincronizando</div>
            <h1 id="titleDisplay">Monitor Operativo</h1>
            <p id="messageDisplay">Cargando...</p>
            <div id="timeWarning">⚠️ +4 HORAS DE ANTIGÜEDAD</div>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">ESPERANDO NOVEDADES...</div>
    </div>

    <nav class="nav-mobile" style="display: none;">
        <button onclick="openForm()"><span>➕</span>NUEVO</button>
        <button onclick="openHistory()"><span>📋</span>LISTA</button>
        <button onclick="handleCerrarTurno()"><span>🔒</span>TURNO</button>
    </nav>

    <aside id="panelForm" class="side-panel">
        <h2>Nueva Novedad</h2>
        <form onsubmit="handleSave(event)">
            <input type="hidden" id="editId" value="-1">
            <label style="font-size:12px; color:var(--primary)">TIPO</label>
            <select id="f-type">
                <option value="turno">De Turno (Se borra al cerrar)</option>
                <option value="diaria">Diaria (Dura 24 horas)</option>
            </select>
            <label style="font-size:12px; color:var(--primary)">ÁREA</label>
            <select id="f-area">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <label style="font-size:12px; color:var(--primary)">PRIORIDAD</label>
            <select id="f-prio">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Crítica">Crítica</option>
            </select>
            <input type="text" id="f-title" placeholder="Título" required>
            <textarea id="f-msg" rows="5" placeholder="Descripción..." required></textarea>
            <button type="submit" style="width:100%; padding:15px; background:var(--primary); color:black; font-weight:bold; border:none; border-radius:4px; cursor:pointer;">PUBLICAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2>Lista de Eventos</h2>
        <button onclick="generatePDF()" style="width:100%; background:white; color:black; padding:10px; font-weight:bold; cursor:pointer; margin-bottom:15px;">📥 DESCARGAR PDF</button>
        <div id="listItems"></div>
    </aside>

    <div id="progressLine"></div>
</div>

<script>
    const API_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let dataStore = [];
    let currentIndex = 0;
    let timerStart = null;
    const DISPLAY_TIME = 15;

    async function syncData() {
        try {
            const r = await fetch(API_URL);
            const d = await r.json();
            const now = Date.now();
            const raw = d || [];
            
            dataStore = raw.filter(item => {
                if(item.type === 'diaria' && (now - item.timestamp > 86400000)) return false;
                return true;
            });

            if(dataStore.length > 0) {
                const last = dataStore[dataStore.length - 1];
                document.getElementById("ticker-content").textContent = `[ÚLTIMO] ${last.area}: ${last.title} ——— `;
                if(!timerStart) refreshView(); 
            }
        } catch(e) { console.error("Error de sincronización"); }
    }

    function refreshView() {
        if(!dataStore.length) return;
        const cont = document.getElementById("infoCont");
        cont.classList.add("oculto");

        setTimeout(() => {
            const item = dataStore[currentIndex % dataStore.length];
            const app = document.getElementById("cio-app");
            const badge = document.getElementById("prioBadge");
            const warning = document.getElementById("timeWarning");

            // Alerta 4hs
            const hrs = (Date.now() - item.timestamp) / 3600000;
            warning.style.display = hrs > 4 ? "block" : "none";

            // Prioridad Crítica
            if(item.priority === "Crítica") {
                app.classList.add("es-critico");
                badge.style.backgroundColor = "#ff0000"; badge.style.color = "#fff";
            } else {
                app.classList.remove("es-critico");
                badge.style.backgroundColor = "transparent"; badge.style.color = "var(--primary)";
            }

            badge.textContent = `Prioridad ${item.priority} | ${item.type.toUpperCase()}`;
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            
            const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
            document.getElementById("progressLine").style.background = colors[item.priority] || "#00d4d8";
            
            adjustText();
            cont.classList.remove("oculto");
            cont.classList.add("pre-entrada");
            void cont.offsetWidth;
            cont.classList.remove("pre-entrada");
        }, 600); 
    }

    async function handleSave(e) {
        e.preventDefault();
        const id = parseInt(document.getElementById("editId").value);
        const entry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value,
            type: document.getElementById("f-type").value,
            timestamp: Date.now()
        };
        if(id === -1) dataStore.push(entry); else dataStore[id] = entry;
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore) });
        closeAll(); syncData();
    }

    async function handleCerrarTurno() {
        if(!confirm("Se descargará el reporte y se borrarán las novedades de TURNO.")) return;
        generatePDF();
        setTimeout(async () => {
            const diarias = dataStore.filter(i => i.type === 'diaria');
            await fetch(API_URL, { method: 'PUT', body: JSON.stringify(diarias.length ? diarias : null) });
            syncData();
        }, 1000);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const h = new Date().getHours();
        let conf = { t: "NOCTURNO", r: "Caroline Riaño" };
        if(h >= 6 && h < 14) conf = { t: "MATUTINO", r: "Alfonso Carballo" };
        else if(h >= 14 && h < 22) conf = { t: "VESPERTINO", r: "Manuel Méndez" };

        doc.setFillColor(0, 100, 101); doc.rect(0, 0, 210, 45, 'F');
        doc.setTextColor(255); doc.setFontSize(16); doc.text(`REPORTE CIO - TURNO ${conf.t}`, 20, 20);
        doc.setFontSize(10); doc.text(`Responsable: ${conf.r} | ${new Date().toLocaleString()}`, 20, 35);

        let y = 60;
        dataStore.forEach((item, i) => {
            if(y > 270) { doc.addPage(); y = 20; }
            doc.setTextColor(0); doc.setFont(undefined, 'bold');
            doc.text(`${i+1}. [${item.priority}] AREA: ${item.area}`, 20, y);
            y += 7; doc.setFont(undefined, 'normal');
            const lines = doc.splitTextToSize(item.title + ": " + item.message, 170);
            doc.text(lines, 25, y); y += (lines.length * 7) + 10;
        });
        doc.save(`Reporte_Turno_${conf.t}.pdf`);
    }

    function openHistory() {
        const list = document.getElementById("listItems");
        list.innerHTML = dataStore.length ? dataStore.map((item, i) => `
            <div style="background:rgba(255,255,255,0.05); padding:10px; margin-bottom:10px; border-left:4px solid var(--primary);">
                <small>${item.type.toUpperCase()} | ${item.priority}</small>
                <div style="font-weight:bold">${item.title}</div>
                <button onclick="onEdit(${i})" style="background:#ffcc00; border:none; padding:3px 7px; font-size:10px; cursor:pointer; margin-top:5px;">EDITAR</button>
                <button onclick="onDelete(${i})" style="background:#ff4d4d; color:white; border:none; padding:3px 7px; font-size:10px; cursor:pointer;">BORRAR</button>
            </div>
        `).join('') : "No hay novedades.";
        document.getElementById("panelHistory").classList.add("active");
        document.getElementById("overlay-cio").classList.add("active");
    }

    window.onEdit = (i) => {
        const item = dataStore[i];
        document.getElementById("editId").value = i;
        document.getElementById("f-area").value = item.area;
        document.getElementById("f-prio").value = item.priority;
        document.getElementById("f-title").value = item.title;
        document.getElementById("f-msg").value = item.message;
        document.getElementById("f-type").value = item.type;
        closeAll();
        document.getElementById("panelForm").classList.add("active");
        document.getElementById("overlay-cio").classList.add("active");
    };

    window.onDelete = async (i) => {
        if(!confirm("¿Eliminar?")) return;
        dataStore.splice(i, 1);
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore.length ? dataStore : null) });
        openHistory(); syncData();
    };

    function adjustText() {
        const t = document.getElementById('titleDisplay');
        const m = document.getElementById('messageDisplay');
        const container = document.getElementById('display-board');
        let sizeT = window.innerWidth <= 768 ? 26 : 75; 
        let sizeM = window.innerWidth <= 768 ? 16 : 42;
        t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
        let limit = 0;
        while ((t.offsetHeight + m.offsetHeight > container.offsetHeight * 0.7) && limit < 50) {
            sizeT -= 1; sizeM -= 0.8;
            t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
            limit++;
        }
    }

    function openForm() { document.getElementById("editId").value = "-1"; document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay-cio").classList.add("active"); }
    function closeAll() { document.querySelectorAll('.side-panel, #overlay-cio').forEach(el => el.classList.remove('active')); }
    function toggleFS() { if (!document.fullscreenElement) document.getElementById('cio-app').requestFullscreen(); else document.exitFullscreen(); }

    function runLoop(ts) {
        if(!dataStore.length) { requestAnimationFrame(runLoop); return; }
        if(!timerStart) timerStart = ts;
        const elapsed = (ts - timerStart) / 1000;
        document.getElementById("progressLine").style.width = Math.min((elapsed / DISPLAY_TIME) * 100, 100) + "%";
        
        if(elapsed >= DISPLAY_TIME){ 
            currentIndex++; 
            refreshView(); 
            timerStart = ts; 
        }
        requestAnimationFrame(runLoop);
    }

    setInterval(() => { document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}); }, 1000);
    setInterval(syncData, 10000);
    window.addEventListener('resize', adjustText);
    syncData();
    requestAnimationFrame(runLoop);
</script>
</body>
</html>
