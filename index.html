<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- RESET Y BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050d0e;
            color: #ffffff;
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- DISPLAY PRINCIPAL --- */
        #display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            padding: 40px;
            text-align: center;
            background: radial-gradient(circle at center, #0a1f21 0%, #050d0e 100%);
            transition: background 0.5s ease;
        }

        .info-block {
            z-index: 5;
            width: 95%;
            max-width: 1600px;
        }

        #areaLabel {
            font-size: 1.5rem;
            color: #00d4d8;
            letter-spacing: 6px;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
            opacity: 0.8;
        }

        #titleDisplay {
            font-weight: 800;
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        #messageDisplay {
            font-weight: 300;
            color: #b0c4c4;
            line-height: 1.2;
            white-space: normal;
            word-wrap: break-word;
        }

        /* --- CABECERA --- */
        .control-header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 100, 101, 0.3);
            z-index: 1000;
            transition: all 0.4s ease;
        }

        .header-btns button {
            background: rgba(0, 100, 101, 0.3);
            border: 1px solid #006465;
            color: #00d4d8;
            padding: 10px 18px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 8px;
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .header-btns button:hover {
            background: #006465;
            color: white;
        }

        #clock {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4d8;
        }

        /* --- MODO FULLSCREEN (TV) --- */
        :fullscreen .control-header {
            height: 120px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            border: none;
        }

        :fullscreen #clock {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 20px;
            font-size: 4rem; /* Tamaño elegante para TV */
            text-shadow: 0 0 20px rgba(0, 212, 216, 0.4);
        }

        /* --- CELULAR --- */
        .mobile-nav { display: none; }

        @media (max-width: 768px) {
            .header-btns { display: none; }
            .control-header { justify-content: center; height: 60px; }
            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                width: 100%;
                height: 70px;
                background: #081617;
                border-top: 1px solid #006465;
                justify-content: space-around;
                align-items: center;
                z-index: 2000;
            }
            .mobile-nav button {
                background: none; border: none; color: #00d4d8;
                font-weight: bold; font-size: 0.7rem;
            }
            #display { padding-bottom: 100px; }
        }

        /* --- EFECTO CRÍTICO --- */
        @keyframes pulse-red {
            0% { background-color: #050d0e; }
            50% { background-color: #3d0000; }
            100% { background-color: #050d0e; }
        }
        .critico-total { animation: pulse-red 2s infinite !important; }

        /* --- DRAWERS --- */
        #drawerOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; z-index: 4000;
        }
        #drawerOverlay.active { display: block; }

        .drawer {
            position: fixed; right: 0; top: 0; width: 400px; height: 100vh;
            background: #0a1a1c; border-left: 2px solid #006465;
            padding: 30px; transform: translateX(100%);
            transition: 0.3s ease; z-index: 5000; overflow-y: auto;
        }
        .drawer.active { transform: translateX(0); }
        
        @media (max-width: 768px) {
            .drawer { width: 100%; top: auto; bottom: 0; height: 80vh; border-left: none; border-top: 2px solid #006465; border-radius: 20px 20px 0 0; }
        }

        .footer-bar { position: fixed; bottom: 0; width: 100%; height: 6px; z-index: 1001; background: rgba(0,0,0,0.5); }
        #progressBar { height: 100%; width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div id="drawerOverlay"></div>

<header class="control-header">
    <div class="header-btns">
        <button onclick="openNew()">＋ NUEVO</button>
        <button onclick="openHistory()">☰ HISTORIAL</button>
        <button onclick="document.documentElement.requestFullscreen()" style="border-color: #00d4d8;">⛶ TV FULL</button>
    </div>
    <div id="clock">00:00:00</div>
</header>

<main id="display">
    <div class="info-block">
        <div id="areaLabel">SISTEMA CIO</div>
        <h1 id="titleDisplay">CONECTANDO...</h1>
        <p id="messageDisplay">Sincronizando flujo de datos operativo</p>
    </div>
</main>

<nav class="mobile-nav">
    <button onclick="openNew()">➕<br>NUEVO</button>
    <button onclick="openHistory()">📋<br>LISTA</button>
</nav>

<aside id="drawerForm" class="drawer">
    <h2 style="color:#00d4d8; margin-bottom:20px;">Configurar Novedad</h2>
    <form id="formRegistro" style="display:flex; flex-direction:column; gap:15px;">
        <input type="hidden" id="editIndex" value="-1">
        <select id="inputArea" style="padding:12px; background:#000; color:white; border:1px solid #006465;">
            <option value="Freschat">Freschat</option>
            <option value="Monitoreo">Monitoreo</option>
            <option value="Atención al Cliente">Atención al Cliente</option>
            <option value="Interno">Interno</option>
        </select>
        <select id="inputPriority" style="padding:12px; background:#000; color:white; border:1px solid #006465;">
            <option value="low">Prioridad Baja</option>
            <option value="medium">Prioridad Media</option>
            <option value="high">Prioridad Alta</option>
            <option value="critical">Prioridad Crítica</option>
        </select>
        <input type="text" id="inputTitle" placeholder="Título" required style="padding:12px; background:#000; color:white; border:1px solid #006465;">
        <textarea id="inputMessage" rows="5" placeholder="Mensaje..." required style="padding:12px; background:#000; color:white; border:1px solid #006465;"></textarea>
        <button type="submit" style="background:#006465; color:white; padding:15px; border:none; font-weight:bold; cursor:pointer;">ACTUALIZAR MONITOR</button>
        <button type="button" onclick="closeAllDrawers()" style="background:none; color:#ff4d4d; border:none; cursor:pointer;">CANCELAR</button>
    </form>
</aside>

<aside id="drawerHistory" class="drawer">
    <h2 style="color:#00d4d8; margin-bottom:20px;">Historial</h2>
    <button onclick="generatePDF()" style="background:#00d4d8; color:black; width:100%; padding:12px; border:none; font-weight:bold; margin-bottom:20px;">DESCARGAR REPORTE</button>
    <div id="historyList"></div>
</aside>

<footer class="footer-bar"><div id="progressBar"></div></footer>

<script>
    const DATABASE_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let registros = [];
    let currentIndex = 0;
    let startTime = null;
    const DURATION = 15;

    function fitText() {
        const title = document.getElementById('titleDisplay');
        const message = document.getElementById('messageDisplay');
        const display = document.getElementById('display');
        const esMovil = window.innerWidth <= 768;
        
        let sizeT = esMovil ? 30 : 80; 
        let sizeM = esMovil ? 24 : 60;

        title.style.fontSize = sizeT + "px";
        message.style.fontSize = sizeM + "px";

        let safety = 0;
        while ((title.offsetHeight + message.offsetHeight > display.offsetHeight * 0.6) && safety < 50) {
            sizeT -= 1; sizeM -= 1;
            title.style.fontSize = sizeT + "px";
            message.style.fontSize = sizeM + "px";
            safety++;
        }
    }

    async function pullData() {
        try {
            const res = await fetch(DATABASE_URL);
            const data = await res.json();
            registros = data || [];
            render(currentIndex);
        } catch (e) {}
    }

    function render(index){
        if(!registros.length) {
            document.getElementById("display").classList.remove("critico-total");
            document.getElementById("areaLabel").textContent = "SISTEMA CIO";
            document.getElementById("titleDisplay").textContent = "EN ESPERA";
            document.getElementById("messageDisplay").textContent = "Sin novedades activas en el panel";
            return;
        }
        const reg = registros[index % registros.length];
        const display = document.getElementById("display");
        
        display.className = (reg.priority === "critical") ? "critico-total" : "";
        document.getElementById("areaLabel").textContent = reg.area.toUpperCase();
        document.getElementById("titleDisplay").textContent = reg.title;
        document.getElementById("messageDisplay").textContent = reg.message;
        
        const colors = {low:"#00d4d8", medium:"#00ccff", high:"#ffcc00", critical:"#ff4d4d"};
        document.getElementById("progressBar").style.background = colors[reg.priority] || "#006465";
        
        setTimeout(fitText, 50);
    }

    window.eliminarEvento = async (idx) => {
        if(!confirm("¿Eliminar registro?")) return;
        registros.splice(idx, 1);
        await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(registros.length > 0 ? registros : null) });
        openHistory(); pullData();
    };

    window.editarEvento = (idx) => {
        const reg = registros[idx];
        document.getElementById("editIndex").value = idx;
        document.getElementById("inputArea").value = reg.area;
        document.getElementById("inputPriority").value = reg.priority;
        document.getElementById("inputTitle").value = reg.title;
        document.getElementById("inputMessage").value = reg.message;
        document.getElementById("drawerHistory").classList.remove("active");
        document.getElementById("drawerForm").classList.add("active");
    };

    function renderHistory() {
        const container = document.getElementById("historyList");
        container.innerHTML = registros.map((reg, i) => `
            <div style="background:rgba(255,255,255,0.05); padding:15px; margin-bottom:10px; border:1px solid #1a3a3d; border-radius:5px;">
                <strong style="color:#00d4d8">${reg.title}</strong><br>
                <div style="margin-top:8px">
                    <button onclick="editarEvento(${i})" style="background:#ffcc00; border:none; padding:4px 8px; font-size:10px; cursor:pointer;">EDITAR</button>
                    <button onclick="eliminarEvento(${i})" style="background:#ff4d4d; color:white; border:none; padding:4px 8px; font-size:10px; margin-left:5px; cursor:pointer;">BORRAR</button>
                </div>
            </div>
        `).join('');
    }

    function closeAllDrawers() { document.querySelectorAll('.drawer, #drawerOverlay').forEach(el => el.classList.remove('active')); }
    function openNew() { document.getElementById("drawerForm").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); }
    function openHistory() { renderHistory(); document.getElementById("drawerHistory").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); }

    document.getElementById("formRegistro").onsubmit = async (e) => {
        e.preventDefault();
        const idx = parseInt(document.getElementById("editIndex").value);
        const nuevo = {
            area: document.getElementById("inputArea").value, priority: document.getElementById("inputPriority").value,
            title: document.getElementById("inputTitle").value, message: document.getElementById("inputMessage").value
        };
        if(idx === -1) registros.push(nuevo); else registros[idx] = nuevo;
        await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(registros) });
        closeAllDrawers(); pullData();
    };

    function animate(timestamp){
        if(!registros.length) { requestAnimationFrame(animate); return; }
        if(!startTime) startTime = timestamp;
        const progress = (timestamp - startTime) / 1000;
        const percent = Math.min((progress / DURATION) * 100, 100);
        document.getElementById("progressBar").style.width = percent + "%";
        if(progress >= DURATION){ currentIndex = (currentIndex + 1) % registros.length; render(currentIndex); startTime = timestamp; }
        requestAnimationFrame(animate);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("REPORTE OPERATIVO CIO", 20, 20);
        let y = 40;
        registros.forEach(r => {
            doc.text(`${r.area}: ${r.title}`, 20, y);
            y += 10;
        });
        doc.save("Reporte_CIO.pdf");
    }

    setInterval(() => document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}), 1000);
    setInterval(pullData, 5000);
    requestAnimationFrame(animate);
    window.addEventListener('resize', fitText);
    pullData();
</script>
</body>
</html>
