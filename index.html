<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* CSS INTERNO - ESTRUCTURA FLUIDA */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050d0e;
            overflow: hidden; /* Evita barras de desplazamiento */
        }

        #cio-app {
            position: relative;
            width: 100%;
            height: 100%;
            background: #050d0e;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* DISPLAY PRINCIPAL */
        #display-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, #0c1c1d 0%, #050d0e 100%);
            transition: all 0.5s ease;
            width: 100%;
            box-sizing: border-box;
            overflow: hidden; /* Garantiza que el texto no genere scroll */
        }

        /* EFECTO CRÍTICO ROJO OSCURO */
        @keyframes bg-critical {
            0% { background-color: #050d0e; }
            50% { background-color: #2b0000; }
            100% { background-color: #050d0e; }
        }
        
        #cio-app.es-critico #display-board {
            animation: bg-critical 2s infinite ease-in-out;
        }

        /* CONTENIDO ADAPTATIVO */
        .info-container { 
            z-index: 5; 
            width: 95%; 
            max-width: 1600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #areaLabel { 
            font-size: clamp(1rem, 3vw, 1.4rem); 
            color: #00d4d8; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            margin-bottom: 5px;
            font-weight: bold;
        }

        #prioBadge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 4px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
            border: 2px solid rgba(255,255,255,0.15);
            font-size: clamp(0.7rem, 2.5vw, 1.1rem);
        }

        #titleDisplay { 
            font-weight: 800; 
            text-transform: uppercase; 
            line-height: 1; 
            margin-bottom: 15px; 
            width: 100%;
            word-wrap: break-word;
        }

        #messageDisplay { 
            font-weight: 300; 
            color: #cedddd; 
            line-height: 1.2; 
            max-width: 95%; 
            margin: 0 auto;
            word-wrap: break-word;
        }

        /* CABECERA PC */
        .main-header {
            position: absolute; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 100;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0, 212, 216, 0.15);
        }

        .actions button {
            background: rgba(0, 100, 101, 0.3);
            border: 1px solid #00d4d8;
            color: #fff; padding: 8px 15px; border-radius: 4px;
            font-weight: bold; cursor: pointer; margin-right: 8px;
            font-size: 0.7rem;
        }

        #clockDisplay { font-family: monospace; font-size: 1.5rem; color: #00d4d8; font-weight: bold; transition: all 0.4s ease; }

        /* MODO TV (FULLSCREEN) - RELOJ A LA DERECHA DISCRETO */
        #cio-app:fullscreen .actions { display: none !important; }
        #cio-app:fullscreen .main-header { 
            background: transparent; border: none; 
            justify-content: flex-end; /* Mueve el reloj a la derecha */
            padding-top: 20px;
            height: 100px;
        }
        #cio-app:fullscreen #clockDisplay { 
            font-size: 3.5rem; /* Tamaño optimizado para no tapar */
            text-shadow: 0 0 20px rgba(0, 212, 216, 0.4);
            margin-right: 40px;
        }

        /* FORMULARIOS Y PANELES */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; z-index: 1000; cursor: pointer;
        }
        #overlay.active { display: block; }

        .side-panel {
            position: fixed; right: 0; top: 0; width: 400px; height: 100%;
            background: #081415; border-left: 3px solid #00d4d8;
            padding: 30px; transform: translateX(100%);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1100; overflow-y: auto;
        }
        .side-panel.active { transform: translateX(0); }

        /* NAVEGACIÓN MÓVIL */
        .nav-mobile { display: none; }

        @media (max-width: 768px) {
            .actions { display: none !important; }
            .main-header { height: 60px; justify-content: center; background: none; border: none; }
            .nav-mobile {
                display: flex; position: fixed; bottom: 0; width: 100%; height: 70px;
                background: #061112; border-top: 1px solid #00d4d8;
                justify-content: space-around; align-items: center; z-index: 500;
            }
            .nav-mobile button { background: none; border: none; color: #00d4d8; font-weight: bold; font-size: 0.75rem; }
            .side-panel { width: 100%; transform: translateY(100%); border-radius: 20px 20px 0 0; border-top: 3px solid #00d4d8; border-left: none; }
            .side-panel.active { transform: translateY(0); }
            #display-board { padding-bottom: 80px; }
            #clockDisplay { font-size: 1.2rem; }
        }

        #progressLine { position: fixed; bottom: 0; height: 5px; width: 0%; z-index: 999; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay" onclick="closeAll()"></div>

    <header class="main-header">
        <div class="actions">
            <button onclick="openForm()">＋ NUEVO</button>
            <button onclick="openHistory()">📋 HISTORIAL</button>
            <button onclick="toggleFS()" style="border-color:#ffcc00; color:#ffcc00;">⛶ MODO TV</button>
        </div>
        <div id="clockDisplay">00:00:00</div>
    </header>

    <main id="display-board">
        <div class="info-container">
            <div id="areaLabel">CIO MONITOR</div>
            <div id="prioBadge">NORMAL</div>
            <h1 id="titleDisplay">Sincronizando...</h1>
            <p id="messageDisplay">Conectando con la base de datos operativa.</p>
        </div>
    </main>

    <nav class="nav-mobile">
        <button onclick="openForm()">➕<br>NUEVO</button>
        <button onclick="openHistory()">📋<br>HISTORIAL</button>
    </nav>

    <aside id="panelForm" class="side-panel">
        <h2 style="color:#00d4d8;">Nueva Novedad</h2>
        <form onsubmit="handleSave(event)">
            <input type="hidden" id="editId" value="-1">
            <select id="f-area" style="width:100%; padding:10px; margin-bottom:12px; background:#000; color:#fff; border:1px solid #00d4d8;">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <select id="f-prio" style="width:100%; padding:10px; margin-bottom:12px; background:#000; color:#fff; border:1px solid #00d4d8;">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Crítica">Crítica</option>
            </select>
            <input type="text" id="f-title" placeholder="Título" required style="width:100%; padding:12px; margin-bottom:12px; background:#000; color:#fff; border:1px solid #00d4d8;">
            <textarea id="f-msg" rows="6" placeholder="Descripción..." required style="width:100%; padding:12px; margin-bottom:12px; background:#000; color:#fff; border:1px solid #00d4d8;"></textarea>
            <button type="submit" style="width:100%; background:#00d4d8; color:#000; padding:15px; border:none; font-weight:bold; cursor:pointer; border-radius:4px;">ACTUALIZAR MONITOR</button>
            <button type="button" onclick="closeAll()" style="width:100%; background:none; color:#ff4d4d; border:none; margin-top:15px; cursor:pointer; font-weight:bold;">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:#00d4d8;">Historial Activo</h2>
        <button onclick="generatePDF()" style="width:100%; background:#fff; color:#000; border:none; padding:12px; font-weight:bold; margin-bottom:15px; cursor:pointer; border-radius:4px;">EXPORTAR PDF</button>
        <div id="listItems"></div>
        <button type="button" onclick="closeAll()" style="width:100%; background:none; color:#ff4d4d; border:none; margin-top:20px; cursor:pointer; font-weight:bold;">CERRAR LISTA</button>
    </aside>

    <div id="progressLine"></div>
</div>

<script>
    /* LÓGICA DE FUNCIONAMIENTO */
    const API_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let dataStore = [];
    let currentIndex = 0;
    let timerStart = null;
    const DISPLAY_TIME = 15;

    function adjustText() {
        const t = document.getElementById('titleDisplay');
        const m = document.getElementById('messageDisplay');
        const container = document.getElementById('display-board');
        
        // Tamaños base
        let sizeT = window.innerWidth <= 768 ? 28 : 85; 
        let sizeM = window.innerWidth <= 768 ? 16 : 50;
        
        t.style.fontSize = sizeT + "px"; 
        m.style.fontSize = sizeM + "px";
        
        let limit = 0;
        // Ajuste dinámico para evitar scrolls
        while ((t.offsetHeight + m.offsetHeight > container.offsetHeight * 0.65) && limit < 50) {
            sizeT -= 1; sizeM -= 1;
            t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
            limit++;
        }
    }

    async function syncData() {
        try {
            const r = await fetch(API_URL);
            const d = await r.json();
            dataStore = d || [];
            if(dataStore.length > 0) refreshView(currentIndex);
        } catch(e) { console.error("Error sincronización"); }
    }

    function refreshView(idx) {
        if(!dataStore.length) return;
        const item = dataStore[idx % dataStore.length];
        const app = document.getElementById("cio-app");
        const badge = document.getElementById("prioBadge");
        
        if(item.priority === "Crítica") {
            app.classList.add("es-critico");
            badge.style.background = "#ff4d4d";
            badge.style.color = "#fff";
        } else {
            app.classList.remove("es-critico");
            badge.style.background = "transparent";
            badge.style.color = "#00d4d8";
        }

        badge.textContent = "Prioridad " + item.priority;
        document.getElementById("areaLabel").textContent = item.area;
        document.getElementById("titleDisplay").textContent = item.title;
        document.getElementById("messageDisplay").textContent = item.message;
        
        const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
        document.getElementById("progressLine").style.background = colors[item.priority] || "#00d4d8";
        
        setTimeout(adjustText, 50);
    }

    async function handleSave(e) {
        e.preventDefault();
        const id = parseInt(document.getElementById("editId").value);
        const entry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value
        };
        if(id === -1) dataStore.push(entry); else dataStore[id] = entry;
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore) });
        closeAll(); syncData();
    }

    window.onDelete = async (i) => {
        if(!confirm("¿Borrar novedad?")) return;
        dataStore.splice(i, 1);
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore.length ? dataStore : null) });
        openHistory(); syncData();
    };

    window.onEdit = (i) => {
        const item = dataStore[i];
        document.getElementById("editId").value = i;
        document.getElementById("f-area").value = item.area;
        document.getElementById("f-prio").value = item.priority;
        document.getElementById("f-title").value = item.title;
        document.getElementById("f-msg").value = item.message;
        document.getElementById("panelHistory").classList.remove("active");
        document.getElementById("panelForm").classList.add("active");
    };

    function openForm() { 
        document.getElementById("editId").value = "-1";
        document.getElementById("panelForm").classList.add("active"); 
        document.getElementById("overlay").classList.add("active"); 
    }
    
    function openHistory() { 
        const list = document.getElementById("listItems");
        list.innerHTML = dataStore.length ? dataStore.map((item, i) => `
            <div style="background:rgba(255,255,255,0.05); padding:15px; margin-bottom:10px; border:1px solid #00d4d8; border-radius:4px;">
                <small style="color:#00d4d8">${item.priority}</small><br>
                <strong style="display:block; margin:5px 0;">${item.title}</strong>
                <button onclick="onEdit(${i})" style="background:#ffcc00; border:none; font-size:10px; padding:5px 10px; cursor:pointer; font-weight:bold; border-radius:3px;">EDITAR</button>
                <button onclick="onDelete(${i})" style="background:#ff4d4d; color:#fff; border:none; font-size:10px; padding:5px 10px; margin-left:5px; cursor:pointer; font-weight:bold; border-radius:3px;">BORRAR</button>
            </div>
        `).join('') : "<p style='text-align:center; color:#666;'>No hay novedades registradas.</p>";
        document.getElementById("panelHistory").classList.add("active"); 
        document.getElementById("overlay").classList.add("active"); 
    }

    function closeAll() { 
        document.querySelectorAll('.side-panel, #overlay').forEach(el => el.classList.remove('active'));
    }

    function toggleFS() { 
        const root = document.getElementById('cio-app');
        if (!document.fullscreenElement) root.requestFullscreen();
        else document.exitFullscreen();
    }

    function runLoop(ts) {
        if(!dataStore.length) { requestAnimationFrame(runLoop); return; }
        if(!timerStart) timerStart = ts;
        const elapsed = (ts - timerStart) / 1000;
        document.getElementById("progressLine").style.width = Math.min((elapsed / DISPLAY_TIME) * 100, 100) + "%";
        if(elapsed >= DISPLAY_TIME){ currentIndex++; refreshView(currentIndex); timerStart = ts; }
        requestAnimationFrame(runLoop);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFontSize(16); doc.text("REPORTE CIO OPERATIVO", 20, 20);
        dataStore.forEach((r, i) => {
            doc.setFontSize(11);
            doc.text(`${i+1}. [${r.priority}] ${r.area}: ${r.title}`, 20, 35 + (i*10));
        });
        doc.save("Reporte_CIO.pdf");
    }

    setInterval(() => {
        document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false});
    }, 1000);

    setInterval(syncData, 10000);
    window.addEventListener('resize', adjustText);
    syncData();
    requestAnimationFrame(runLoop);
</script>
</body>
</html>
