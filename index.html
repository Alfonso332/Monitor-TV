<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Centro de Inteligencia Operativa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- TU ESTÉTICA ORIGINAL --- */
        #display {
            display: flex !important; flex-direction: column !important; justify-content: center !important;
            align-items: center !important; height: 100vh !important; width: 100vw !important;
            padding: 40px !important; box-sizing: border-box !important; overflow: hidden !important;
            position: fixed !important; top: 0; left: 0; background: #0a1a1b; z-index: 1;
        }

        .info-block { width: 95% !important; text-align: center; }

        #titleDisplay { margin: 0; font-weight: bold; color: white; }
        #messageDisplay { margin-top: 20px; color: white; white-space: normal; word-wrap: break-word; }

        /* HEADER */
        .control-header {
            position: fixed; top: 0; width: 100%; height: 60px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; box-sizing: border-box; transition: all 0.5s ease;
        }
        #clock { font-weight: bold; font-family: 'Courier New', monospace; color: white; font-size: 1.4rem; transition: all 0.5s ease; }

        /* MODO FULLSCREEN (LO QUE PEDISTE) */
        :fullscreen .left-zone, :fullscreen .mobile-nav { display: none !important; }
        :fullscreen .control-header { justify-content: center !important; height: 150px !important; }
        :fullscreen #clock {
            font-size: 8rem !important;
            color: #00ff88 !important;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.7);
            margin: 0 !important;
        }

        /* EFECTO CRÍTICO */
        @keyframes pulse-red { 0% { background-color: #0a1a1b; } 50% { background-color: #5a0000; } 100% { background-color: #0a1a1b; } }
        .critico-total { animation: pulse-red 1.2s infinite !important; }

        /* DRAWERS Y OVERLAY (FIX DE EDICIÓN) */
        #drawerOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 5000; }
        #drawerOverlay.active { display: block; }

        .drawer {
            position: fixed; right: 0; top: 0; width: 400px; height: 100vh;
            background: #0f2426; border-left: 2px solid #006465;
            padding: 25px; box-sizing: border-box; transform: translateX(100%);
            transition: transform 0.4s ease; z-index: 6000; overflow-y: auto;
        }
        .drawer.active { transform: translateX(0); }

        /* AJUSTES MÓVIL MANTENIDOS */
        @media (max-width: 768px) {
            .drawer { width: 100% !important; height: 85vh !important; top: auto !important; bottom: -100vh; border-radius: 25px 25px 0 0; transform: none; }
            .drawer.active { bottom: 0 !important; }
            .left-zone { display: none !important; }
            .mobile-nav { display: flex !important; position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #0a1a1b; border-top: 1px solid #006465; justify-content: space-around; align-items: center; z-index: 2000; }
        }
    </style>
</head>
<body>

<div id="drawerOverlay"></div>

<header class="control-header">
    <div class="left-zone">
        <button id="btnNew" style="background:#006465; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer;">＋ NUEVO</button>
        <button id="btnManage" style="background:#006465; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; margin-left:10px;">☰ HISTORIAL</button>
        <button id="btnFullscreen" style="background:none; border:1px solid #006465; color:#00ff88; padding:10px; border-radius:8px; cursor:pointer; margin-left:10px;">⛶ FULL</button>
    </div>
    <div id="clock">00:00:00</div>
</header>

<main id="display">
    <div class="info-block">
        <div id="areaLabel" style="font-size: 1.4rem; color: #00ff88; margin-bottom: 5px; font-weight: bold; letter-spacing: 3px;">SISTEMA</div>
        <div id="metaDisplay" style="color: #00ccff; font-size: 1rem; margin-bottom: 15px; font-family: monospace; opacity: 0.8;"></div>
        <h1 id="titleDisplay">CARGANDO...</h1>
        <p id="messageDisplay">Sincronizando registros...</p>
    </div>
</main>

<nav class="mobile-nav" style="display:none;">
    <button onclick="openNew()" style="background:none; border:none; color:#00ff88;">➕<br><b>NUEVO</b></button>
    <button onclick="openHistory()" style="background:none; border:none; color:#00ff88;">📋<br><b>LISTA</b></button>
</nav>

<footer class="footer-bar" style="position:fixed; bottom:0; width:100%; height:8px; z-index:1500;"><div id="progressBar" style="height:100%; width:0%;"></div></footer>

<aside id="drawerForm" class="drawer">
    <h2 style="color:#00ff88; margin-top:0;">Evento</h2>
    <form id="formRegistro" style="display:flex; flex-direction:column; gap:15px;">
        <input type="hidden" id="editIndex" value="-1">
        <select id="inputArea" style="padding:10px; border-radius:5px; background:#1a3a3d; color:white; border:1px solid #006465;">
            <option value="Freschat">Freschat</option>
            <option value="Monitoreo">Monitoreo</option>
            <option value="Atención al Cliente">Atención al Cliente</option>
            <option value="Interno">Interno</option>
        </select>
        <select id="inputPriority" style="padding:10px; border-radius:5px; background:#1a3a3d; color:white; border:1px solid #006465;">
            <option value="Baja">Baja</option>
            <option value="Media">Media</option>
            <option value="Alta">Alta</option>
            <option value="Crítica">Crítica</option>
        </select>
        <input type="text" id="inputTitle" placeholder="Título" required style="padding:10px; border-radius:5px; background:#1a3a3d; color:white; border:1px solid #006465;">
        <textarea id="inputMessage" rows="5" placeholder="Descripción..." required style="padding:10px; border-radius:5px; background:#1a3a3d; color:white; border:1px solid #006465;"></textarea>
        <button type="submit" style="background:#00ff88; color:black; padding:15px; border-radius:8px; border:none; font-weight:bold; cursor:pointer;">ACTUALIZAR TV</button>
        <button type="button" onclick="closeAllDrawers()" style="background:none; color:#ff4d4d; border:none; cursor:pointer;">CANCELAR</button>
    </form>
</aside>

<aside id="drawerHistory" class="drawer">
    <h2 style="color:#00ff88; margin-top:0;">Historial</h2>
    <button onclick="generatePDF()" style="background:#006465; color:white; width:100%; padding:12px; border:none; border-radius:8px; margin-bottom:20px; cursor:pointer;">📥 NOVEDADES OPERATIVAS (PDF)</button>
    <div id="historyList"></div>
</aside>

<script>
    const DATABASE_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let registros = [];
    let currentIndex = 0;
    let startTime = null;
    const DURATION = 15;

    function getTurno(h) {
        if (h >= 6 && h < 14) return "Mañana";
        if (h >= 14 && h < 22) return "Tarde";
        return "Noche";
    }

    function fitText() {
        const title = document.getElementById('titleDisplay');
        const message = document.getElementById('messageDisplay');
        const display = document.getElementById('display');
        const esMovil = window.innerWidth <= 768;
        let sizeT = esMovil ? 35 : 100; 
        let sizeM = esMovil ? 40 : 130;
        title.style.fontSize = sizeT + "px";
        message.style.fontSize = sizeM + "px";
        let safety = 0;
        while ((title.offsetHeight + message.offsetHeight > display.offsetHeight * 0.7) && safety < 100) {
            sizeT -= 1; sizeM -= 1.5;
            title.style.fontSize = sizeT + "px";
            message.style.fontSize = sizeM + "px";
            safety++;
        }
    }

    async function pullData() {
        try {
            const res = await fetch(DATABASE_URL);
            const data = await res.json();
            registros = data || [];
            render(currentIndex);
        } catch (e) {}
    }

    function render(index){
        const display = document.getElementById("display");
        if(!registros.length) {
            display.classList.remove("critico-total");
            document.getElementById("areaLabel").textContent = "SISTEMA";
            document.getElementById("metaDisplay").textContent = "";
            document.getElementById("titleDisplay").textContent = "SIN NOVEDADES";
            document.getElementById("messageDisplay").textContent = "En espera...";
            return;
        }
        const reg = registros[index % registros.length];
        display.className = (reg.priority === "Crítica") ? "critico-total" : "";
        
        document.getElementById("areaLabel").textContent = reg.area.toUpperCase();
        document.getElementById("metaDisplay").textContent = `PRIORIDAD: ${reg.priority} | TURNO: ${reg.turno} | HORA: ${reg.hora}`;
        document.getElementById("titleDisplay").textContent = reg.title;
        document.getElementById("messageDisplay").textContent = reg.message;
        
        const colors = {Baja:"#00ff88", Media:"#00ccff", Alta:"#ffcc00", Crítica:"#ff4d4d"};
        document.getElementById("progressBar").style.background = colors[reg.priority] || "#006465";
        setTimeout(fitText, 50);
    }

    document.getElementById("formRegistro").onsubmit = async (e) => {
        e.preventDefault();
        const now = new Date();
        const nuevo = {
            area: document.getElementById("inputArea").value,
            priority: document.getElementById("inputPriority").value,
            title: document.getElementById("inputTitle").value,
            message: document.getElementById("inputMessage").value,
            hora: now.toLocaleTimeString("es-UY", {hour:'2-digit', minute:'2-digit'}),
            turno: getTurno(now.getHours())
        };
        const idx = parseInt(document.getElementById("editIndex").value);
        if(idx === -1) registros.push(nuevo); else registros[idx] = nuevo;
        await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(registros) });
        closeAllDrawers(); pullData();
    };

    function generatePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const now = new Date(); const turno = getTurno(now.getHours());
        doc.setFillColor(10, 26, 28); doc.rect(0,0,210,40,'F');
        doc.setTextColor(255,255,255); doc.setFontSize(22); doc.text("NOVEDADES OPERATIVAS", 20, 25);
        doc.setFontSize(11); doc.text(`Turno: ${turno} | Fecha: ${now.toLocaleDateString()}`, 20, 35);
        let y = 55; doc.setTextColor(0,0,0);
        registros.forEach(r => {
            doc.setFont(undefined, 'bold'); doc.text(`[${r.priority}] ${r.area}: ${r.title}`, 20, y);
            doc.setFont(undefined, 'normal'); const lines = doc.splitTextToSize(r.message, 170);
            doc.text(lines, 20, y + 7); y += (lines.length * 7) + 15;
        });
        doc.save(`Novedades_operativas_${turno}_${now.getHours()}hs.pdf`);
    }

    function renderHistory() {
        const container = document.getElementById("historyList");
        container.innerHTML = registros.map((reg, i) => `
            <div style="background:rgba(255,255,255,0.05); padding:15px; margin-bottom:10px; border-radius:10px; border:1px solid #006465;">
                <strong style="color:#00ff88">${reg.title}</strong><br>
                <small style="color:#aaa">${reg.hora} - Turno ${reg.turno}</small><br>
                <button onclick="editarEvento(${i})" style="background:#ffcc00; border:none; padding:5px 10px; border-radius:4px; margin-top:8px; cursor:pointer;">EDITAR</button>
                <button onclick="eliminarEvento(${i})" style="background:#ff4d4d; color:white; border:none; padding:5px 10px; border-radius:4px; margin-left:5px; cursor:pointer;">BORRAR</button>
            </div>
        `).join('');
    }

    window.editarEvento = (i) => {
        const reg = registros[i];
        document.getElementById("editIndex").value = i;
        document.getElementById("inputArea").value = reg.area;
        document.getElementById("inputPriority").value = reg.priority;
        document.getElementById("inputTitle").value = reg.title;
        document.getElementById("inputMessage").value = reg.message;
        document.getElementById("drawerHistory").classList.remove("active");
        document.getElementById("drawerForm").classList.add("active");
    };

    window.eliminarEvento = async (i) => {
        if(confirm("¿Eliminar?")) {
            registros.splice(i,1);
            await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(registros.length ? registros : null) });
            renderHistory(); pullData();
        }
    };

    function closeAllDrawers() { document.querySelectorAll('.drawer, #drawerOverlay').forEach(el => el.classList.remove('active')); }
    function openNew() { document.getElementById("formRegistro").reset(); document.getElementById("editIndex").value="-1"; document.getElementById("drawerForm").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); }
    function openHistory() { renderHistory(); document.getElementById("drawerHistory").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); }

    document.getElementById("btnNew").onclick = openNew;
    document.getElementById("btnManage").onclick = openHistory;
    document.getElementById("drawerOverlay").onclick = closeAllDrawers;
    document.getElementById("btnFullscreen").onclick = () => document.documentElement.requestFullscreen();

    function animate(timestamp){
        if(!registros.length) { requestAnimationFrame(animate); return; }
        if(!startTime) startTime = timestamp;
        const progress = (timestamp - startTime) / 1000;
        document.getElementById("progressBar").style.width = Math.min((progress / DURATION) * 100, 100) + "%";
        if(progress >= DURATION){ currentIndex = (currentIndex + 1) % registros.length; render(currentIndex); startTime = timestamp; }
        requestAnimationFrame(animate);
    }

    setInterval(() => document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}), 1000);
    setInterval(pullData, 5000);
    requestAnimationFrame(animate);
    pullData();
</script>
</body>
</html>
