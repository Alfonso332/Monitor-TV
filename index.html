<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - COMMAND CENTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- RESET Y BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #030808;
            color: #e0fcfc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- EFECTO DE LÍNEAS DE TV --- */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2000;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* --- DISPLAY PRINCIPAL --- */
        #display {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            text-align: center;
            position: relative;
            background: radial-gradient(circle, #0a1f1f 0%, #030808 100%);
        }

        #areaLabel {
            font-size: 1.5rem;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 15px;
            margin-bottom: 20px;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        /* CAPSULAS DE DATOS */
        #metaContainer {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        .data-pill {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.3);
            padding: 8px 20px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #00ffcc;
            text-transform: uppercase;
        }

        #titleDisplay {
            font-weight: 900;
            line-height: 1;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px rgba(0, 255, 204, 0.2);
        }

        #messageDisplay {
            margin-top: 30px;
            font-weight: 400;
            opacity: 0.8;
            max-width: 1400px;
        }

        /* --- HEADER --- */
        .control-header {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 3000;
            background: linear-gradient(to bottom, #030808 40%, transparent);
        }

        #clock {
            font-family: 'Courier New', monospace;
            font-size: 2.2rem;
            color: #00ffcc;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }

        /* --- FULLSCREEN TV --- */
        :fullscreen .left-zone, :fullscreen .mobile-nav { display: none !important; }
        :fullscreen #clock {
            font-size: 15rem !important;
            position: absolute; top: 10%;
        }
        :fullscreen .info-block { margin-top: 15vh; }

        /* --- ESTADO CRÍTICO --- */
        @keyframes pulse-critical {
            0% { background-color: #030808; }
            50% { background-color: #2a0404; }
            100% { background-color: #030808; }
        }
        .critico-total { animation: pulse-critical 1s infinite !important; }
        .critico-total .data-pill { background: #ff3333; color: white; border-color: white; }

        /* --- BOTONES Y INTERFAZ --- */
        .btn-cio {
            background: #0a1f1f;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 12px 24px;
            border-radius: 0; /* Estilo cuadrado militar */
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-cio:hover { background: #00ffcc; color: #030808; }

        .drawer {
            position: fixed; right: 0; top: 0; width: 450px; height: 100vh;
            background: #051010; border-left: 2px solid #00ffcc;
            padding: 40px; transform: translateX(100%);
            transition: 0.4s cubic-bezier(0.7, 0, 0.3, 1); z-index: 5000;
        }
        .drawer.active { transform: translateX(0); }
        
        #drawerOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 4500; }
        #drawerOverlay.active { display: block; }

        /* --- BARRA PROGRESO --- */
        .progress-container { position: fixed; bottom: 0; width: 100%; height: 6px; background: rgba(0,0,0,0.5); z-index: 3000; }
        #progressBar { height: 100%; width: 0%; background: #00ffcc; box-shadow: 0 0 20px #00ffcc; }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            #display { padding: 20px; }
            .drawer { width: 100%; border-radius: 20px 20px 0 0; top: auto; bottom: -100vh; transform: none; height: 85vh; }
            .drawer.active { bottom: 0; }
            .mobile-nav { 
                position: fixed; bottom: 0; width: 100%; height: 80px; background: #051010;
                display: flex !important; justify-content: space-around; align-items: center; z-index: 4000;
                border-top: 1px solid #00ffcc;
            }
        }
    </style>
</head>
<body id="bodyRoot">

<div id="drawerOverlay"></div>

<header class="control-header">
    <div class="left-zone">
        <button class="btn-cio" onclick="openNew()">Nuevo Evento</button>
        <button class="btn-cio" onclick="openHistory()" style="margin-left:10px;">Historial</button>
        <button class="btn-cio" onclick="document.documentElement.requestFullscreen()" style="margin-left:10px;">Modo TV</button>
    </div>
    <div id="clock">00:00:00</div>
</header>

<main id="display">
    <div class="info-block">
        <div id="areaLabel">CENTRO OPERATIVO</div>
        <div id="metaContainer">
            <div id="tagPriority" class="data-pill">PRIORIDAD</div>
            <div id="tagTurno" class="data-pill">TURNO</div>
            <div id="tagHora" class="data-pill">HORA</div>
        </div>
        <h1 id="titleDisplay">MONITOR ACTIVO</h1>
        <p id="messageDisplay">Sincronizando con el canal de datos del CIO...</p>
    </div>
</main>

<nav class="mobile-nav" style="display:none;">
    <button onclick="openNew()" style="background:none; border:none; color:#00ffcc; font-weight:bold;">NUEVO</button>
    <button onclick="openHistory()" style="background:none; border:none; color:#00ffcc; font-weight:bold;">LISTA</button>
</nav>

<aside id="drawerForm" class="drawer">
    <h2 style="color:#00ffcc; letter-spacing: 5px; margin-bottom: 30px;">REGISTRO</h2>
    <form id="formRegistro" style="display:flex; flex-direction:column; gap:20px;">
        <input type="hidden" id="editIndex" value="-1">
        <select id="inputArea" style="padding:15px; background:#000; color:white; border:1px solid #00ffcc;">
            <option value="Freschat">Freschat</option>
            <option value="Monitoreo">Monitoreo</option>
            <option value="Atención al Cliente">Atención al Cliente</option>
            <option value="Interno">Interno</option>
        </select>
        <select id="inputPriority" style="padding:15px; background:#000; color:white; border:1px solid #00ffcc;">
            <option value="Baja">Prioridad Baja</option>
            <option value="Media">Prioridad Media</option>
            <option value="Alta">Prioridad Alta</option>
            <option value="Crítica">Prioridad Crítica</option>
        </select>
        <input type="text" id="inputTitle" placeholder="TITULO" required style="padding:15px; background:#000; color:white; border:1px solid #00ffcc;">
        <textarea id="inputMessage" rows="5" placeholder="DETALLES..." required style="padding:15px; background:#000; color:white; border:1px solid #00ffcc;"></textarea>
        <button type="submit" class="btn-cio" style="width:100%; padding:20px;">Actualizar Monitor</button>
        <button type="button" onclick="closeAllDrawers()" style="color:#ff3333; background:none; border:none; margin-top:10px; cursor:pointer;">Cerrar Pantalla</button>
    </form>
</aside>

<aside id="drawerHistory" class="drawer">
    <h2 style="color:#00ffcc; letter-spacing: 5px; margin-bottom: 20px;">HISTORIAL</h2>
    <button onclick="generatePDF()" style="background:#00ffcc; color:#000; width:100%; padding:15px; border:none; font-weight:bold; cursor:pointer; margin-bottom:20px;">EXPORTAR PDF OPERATIVO</button>
    <div id="historyList"></div>
</aside>

<div class="progress-container"><div id="progressBar"></div></div>

<script>
    const DATABASE_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let registros = [];
    let currentIndex = 0;
    let startTime = null;
    const DURATION = 15;

    function getTurno(h) {
        if (h >= 6 && h < 14) return "Mañana";
        if (h >= 14 && h < 22) return "Tarde";
        return "Noche";
    }

    function fitText() {
        const title = document.getElementById('titleDisplay');
        const message = document.getElementById('messageDisplay');
        const display = document.getElementById('display');
        const esMovil = window.innerWidth <= 768;
        
        let sizeT = esMovil ? 45 : 120; 
        let sizeM = esMovil ? 22 : 55;

        title.style.fontSize = sizeT + "px";
        message.style.fontSize = sizeM + "px";

        let safety = 0;
        while ((title.offsetHeight + message.offsetHeight > display.offsetHeight * 0.6) && safety < 100) {
            sizeT -= 1; sizeM -= 0.5;
            title.style.fontSize = sizeT + "px";
            message.style.fontSize = sizeM + "px";
            safety++;
        }
    }

    async function pullData() {
        try {
            const res = await fetch(DATABASE_URL);
            const data = await res.json();
            registros = data || [];
            render(currentIndex);
        } catch (e) {}
    }

    function render(index){
        const display = document.getElementById("display");
        if(!registros.length) {
            display.classList.remove("critico-total");
            document.getElementById("tagPriority").textContent = "WAIT";
            document.getElementById("tagTurno").textContent = "SISTEMA";
            document.getElementById("tagHora").textContent = "--:--";
            return;
        }
        
        const reg = registros[index % registros.length];
        display.className = (reg.priority === "Crítica") ? "critico-total" : "";
        
        document.getElementById("areaLabel").textContent = reg.area;
        document.getElementById("tagPriority").textContent = reg.priority;
        document.getElementById("tagTurno").textContent = "TURNO: " + reg.turno;
        document.getElementById("tagHora").textContent = reg.hora;
        
        document.getElementById("titleDisplay").textContent = reg.title;
        document.getElementById("messageDisplay").textContent = reg.message;
        
        const colors = {Baja:"#00ffcc", Media:"#00ccff", Alta:"#ffcc00", Crítica:"#ffffff"};
        document.getElementById("progressBar").style.background = colors[reg.priority];
        
        setTimeout(fitText, 50);
    }

    document.getElementById("formRegistro").onsubmit = async (e) => {
        e.preventDefault();
        const now = new Date();
        const nuevo = {
            area: document.getElementById("inputArea").value,
            priority: document.getElementById("inputPriority").value,
            title: document.getElementById("inputTitle").value,
            message: document.getElementById("inputMessage").value,
            hora: now.toLocaleTimeString("es-UY", {hour:'2-digit', minute:'2-digit'}),
            turno: getTurno(now.getHours())
        };
        const idx = parseInt(document.getElementById("editIndex").value);
        if(idx === -1) registros.push(nuevo); else registros[idx] = nuevo;
        await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(registros) });
        closeAllDrawers(); pullData();
    };

    function generatePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const now = new Date(); const turno = getTurno(now.getHours());
        doc.setFillColor(3, 8, 8); doc.rect(0,0,210,40,'F');
        doc.setTextColor(0, 255, 204); doc.setFontSize(22); doc.text("NOVEDADES OPERATIVAS", 20, 25);
        doc.setTextColor(255,255,255); doc.setFontSize(11); doc.text(`Turno: ${turno} | Fecha: ${now.toLocaleDateString()}`, 20, 35);
        let y = 55; doc.setTextColor(0,0,0);
        registros.forEach(r => {
            doc.setFont(undefined, 'bold'); doc.text(`[${r.priority}] ${r.area}: ${r.title} (${r.hora})`, 20, y);
            doc.setFont(undefined, 'normal'); const lines = doc.splitTextToSize(r.message, 170);
            doc.text(lines, 20, y + 7); y += (lines.length * 7) + 15;
            if(y > 270) { doc.addPage(); y = 20; }
        });
        doc.save(`Novedades_operativas_${turno}_${now.getHours()}hs.pdf`);
    }

    function renderHistory() {
        const container = document.getElementById("historyList");
        container.innerHTML = registros.map((reg, i) => `
            <div style="background:rgba(0,255,204,0.05); padding:15px; margin-bottom:10px; border:1px solid rgba(0,255,204,0.2);">
                <strong style="color:#00ffcc">${reg.title}</strong><br>
                <small>${reg.area} | ${reg.hora}</small><br>
                <button onclick="editarEvento(${i})" style="color:#00ffcc; background:none; border:1px solid #00ffcc; padding:4px 8px; margin-top:10px; cursor:pointer;">Editar</button>
                <button onclick="eliminarEvento(${i})" style="color:#ff3333; background:none; border:1px solid #ff3333; padding:4px 8px; margin-left:5px; cursor:pointer;">Borrar</button>
            </div>
        `).join('');
    }

    window.editarEvento = (i) => {
        const reg = registros[i];
        document.getElementById("editIndex").value = i;
        document.getElementById("inputArea").value = reg.area;
        document.getElementById("inputPriority").value = reg.priority;
        document.getElementById("inputTitle").value = reg.title;
        document.getElementById("inputMessage").value = reg.message;
        document.getElementById("drawerHistory").classList.remove("active");
        document.getElementById("drawerForm").classList.add("active");
    };

    window.eliminarEvento = async (i) => {
        if(confirm("¿Eliminar?")) {
            registros.splice(i,1);
            await fetch(DATABASE_URL, { method: 'PUT', body: JSON.stringify(registros.length ? registros : null) });
            renderHistory(); pullData();
        }
    };

    function closeAllDrawers() { document.querySelectorAll('.drawer, #drawerOverlay').forEach(el => el.classList.remove('active')); }
    function openNew() { document.getElementById("formRegistro").reset(); document.getElementById("editIndex").value="-1"; document.getElementById("drawerForm").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); }
    function openHistory() { renderHistory(); document.getElementById("drawerHistory").classList.add("active"); document.getElementById("drawerOverlay").classList.add("active"); }

    document.getElementById("drawerOverlay").onclick = closeAllDrawers;

    function animate(timestamp){
        if(!registros.length) { requestAnimationFrame(animate); return; }
        if(!startTime) startTime = timestamp;
        const progress = (timestamp - startTime) / 1000;
        document.getElementById("progressBar").style.width = Math.min((progress / DURATION) * 100, 100) + "%";
        if(progress >= DURATION){ currentIndex = (currentIndex + 1) % registros.length; render(currentIndex); startTime = timestamp; }
        requestAnimationFrame(animate);
    }

    setInterval(() => document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}), 1000);
    setInterval(pullData, 5000);
    requestAnimationFrame(animate);
    pullData();
</script>
</body>
</html>
