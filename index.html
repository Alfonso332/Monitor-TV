<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Modern Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* ENCAPSULAMIENTO TOTAL */
        #cio-master-wrapper {
            all: initial;
            display: flex;
            flex-direction: column;
            background-color: #030a0a;
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        #cio-master-wrapper * {
            box-sizing: border-box;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* FONDO DINÁMICO */
        #cio-master-wrapper .bg-gradient {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #00646522 0%, #030a0a 100%);
            z-index: 1;
        }

        /* HEADER SUPERIOR MODERNO */
        #cio-master-wrapper .header-glass {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 1200px;
            height: 65px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(0, 100, 101, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            z-index: 100;
        }

        #cio-master-wrapper #live-clock {
            font-weight: 700;
            font-size: 1.4rem;
            color: #ffffff;
            letter-spacing: 1px;
        }

        /* BOTONES REDONDEADOS */
        #cio-master-wrapper .btn-modern {
            background: #006465;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(0, 100, 101, 0.3);
        }

        #cio-master-wrapper .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 100, 101, 0.5);
            background: #007e7f;
        }

        /* CONTENIDO PRINCIPAL CENTRADO */
        #cio-master-wrapper #main-viewport {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #cio-master-wrapper .hero-card {
            text-align: center;
            max-width: 1000px;
            width: 100%;
        }

        #cio-master-wrapper .area-tag {
            display: inline-block;
            background: rgba(0, 100, 101, 0.1);
            color: #006465;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 100, 101, 0.2);
            text-transform: uppercase;
        }

        #cio-master-wrapper .status-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }

        #cio-master-wrapper .status-pill {
            background: #111;
            padding: 6px 18px;
            border-radius: 15px;
            font-size: 0.8rem;
            border: 1px solid #222;
            color: #888;
        }

        #cio-master-wrapper h1.title {
            font-size: 5.5rem;
            font-weight: 900;
            line-height: 0.9;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #cio-master-wrapper p.description {
            font-size: 2rem;
            color: #a0a0a0;
            margin-top: 25px;
            font-weight: 300;
            line-height: 1.3;
        }

        /* BARRA DE TAREAS MÓVIL (REDONDEADA Y SIN TV) */
        #cio-master-wrapper #mobile-dock {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 75px;
            background: rgba(10, 15, 15, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #cio-master-wrapper .dock-item {
            background: none;
            border: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 600;
            opacity: 0.7;
        }

        /* PANEL LATERAL (DRAWERS) */
        #cio-master-wrapper .side-panel {
            position: absolute;
            right: 15px;
            top: 15px;
            bottom: 15px;
            width: 420px;
            background: #0c1212;
            border-radius: 30px;
            border: 1px solid #1a2525;
            padding: 35px;
            transform: translateX(110%);
            z-index: 1000;
            box-shadow: -10px 0 40px rgba(0,0,0,0.8);
        }

        #cio-master-wrapper .side-panel.active { transform: translateX(0); }

        /* ANIMACIÓN CRÍTICA */
        @keyframes pulse-modern {
            0% { background: #030a0a; }
            50% { background: #1a0505; }
            100% { background: #030a0a; }
        }
        #cio-master-wrapper.is-critical { animation: pulse-modern 2s infinite; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            #cio-master-wrapper #mobile-dock { display: flex; }
            #cio-master-wrapper .header-glass .btn-group { display: none; }
            #cio-master-wrapper .header-glass { width: auto; padding: 0 30px; }
            #cio-master-wrapper .side-panel { width: calc(100% - 30px); left: 15px; top: auto; height: 85%; }
            #cio-master-wrapper h1.title { font-size: 3rem; }
            #cio-master-wrapper p.description { font-size: 1.4rem; }
            #cio-master-wrapper .hero-card { padding-bottom: 80px; }
        }
    </style>
</head>
<body>

<div id="cio-master-wrapper">
    <div class="bg-gradient"></div>
    <div id="scrim" style="position:absolute; inset:0; background:rgba(0,0,0,0.5); display:none; z-index:500;" onclick="closeAll()"></div>

    <header class="header-glass">
        <div id="live-clock">00:00:00</div>
        <div class="btn-group">
            <button class="btn-modern" onclick="openPanel('form')">Nueva Entrada</button>
            <button class="btn-modern" onclick="openPanel('list')" style="background:transparent; border:1px solid #006465; margin-left:10px;">Ver Historial</button>
        </div>
    </header>

    <main id="main-viewport">
        <div class="hero-card">
            <div id="ui-area" class="area-tag">OPERACIONES</div>
            <div class="status-row">
                <div id="ui-prio" class="status-pill">--</div>
                <div id="ui-turno" class="status-pill">--</div>
                <div id="ui-hora" class="status-pill">--</div>
            </div>
            <h1 id="ui-title" class="title">SISTEMA CIO</h1>
            <p id="ui-msg" class="description">Conectando con el servidor de novedades...</p>
        </div>
    </main>

    <nav id="mobile-dock">
        <button class="dock-item" onclick="openPanel('form')">
            <span style="font-size:1.5rem; margin-bottom:5px;">⊕</span>
            NUEVO
        </button>
        <button class="dock-item" onclick="openPanel('list')">
            <span style="font-size:1.5rem; margin-bottom:5px;">☰</span>
            LISTA
        </button>
    </nav>

    <aside id="panel-form" class="side-panel">
        <h2 style="color:#006465; margin-bottom:25px; font-weight:800;">REGISTRO</h2>
        <form onsubmit="handleSave(event)">
            <input type="hidden" id="edit-idx" value="-1">
            <select id="f-area" style="width:100%; padding:15px; margin-bottom:15px; background:#000; color:#fff; border-radius:15px; border:1px solid #333;">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <select id="f-prio" style="width:100%; padding:15px; margin-bottom:15px; background:#000; color:#fff; border-radius:15px; border:1px solid #333;">
                <option value="Baja">Prioridad Baja</option>
                <option value="Media">Prioridad Media</option>
                <option value="Alta">Prioridad Alta</option>
                <option value="Crítica">Prioridad Crítica</option>
            </select>
            <input type="text" id="f-title" placeholder="Título de la novedad" required style="width:100%; padding:15px; margin-bottom:15px; background:#000; color:#fff; border-radius:15px; border:1px solid #333;">
            <textarea id="f-msg" rows="6" placeholder="Detalles operativos..." required style="width:100%; padding:15px; margin-bottom:15px; background:#000; color:#fff; border-radius:15px; border:1px solid #333; resize:none;"></textarea>
            <button type="submit" class="btn-modern" style="width:100%; padding:20px;">Publicar Ahora</button>
            <button type="button" onclick="closeAll()" style="width:100%; background:none; color:#ff4444; border:none; margin-top:15px; cursor:pointer; font-weight:bold;">Cancelar</button>
        </form>
    </aside>

    <aside id="panel-list" class="side-panel">
        <h2 style="color:#006465; margin-bottom:20px; font-weight:800;">HISTORIAL</h2>
        <button onclick="doPDF()" style="width:100%; background:#006465; border:none; padding:15px; color:white; border-radius:15px; font-weight:bold; cursor:pointer; margin-bottom:20px;">Generar Reporte PDF</button>
        <div id="list-render"></div>
    </aside>

    <div style="position:absolute; bottom:0; width:100%; height:4px; background:rgba(255,255,255,0.05);">
        <div id="bar-progress" style="height:100%; width:0%; background:#006465; transition: width 0.1s linear;"></div>
    </div>
</div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let store = [];
    let index = 0;
    let tick = null;
    const TIME_LIMIT = 15;

    function getTurno() {
        const h = new Date().getHours();
        return (h >= 6 && h < 14) ? "MAÑANA" : (h >= 14 && h < 22) ? "TARDE" : "NOCHE";
    }

    async function load() {
        try {
            const r = await fetch(DB_URL);
            const d = await r.json();
            store = d || [];
            renderUI(index);
        } catch(e) {}
    }

    function renderUI(i) {
        if(!store.length) return;
        const item = store[i % store.length];
        const root = document.getElementById('cio-master-wrapper');
        
        root.className = item.priority === "Crítica" ? "is-critical" : "";
        document.getElementById('ui-area').textContent = item.area;
        document.getElementById('ui-prio').textContent = item.priority;
        document.getElementById('ui-turno').textContent = item.turno;
        document.getElementById('ui-hora').textContent = item.hora;
        document.getElementById('ui-title').textContent = item.title;
        document.getElementById('ui-msg').textContent = item.message;
    }

    async function handleSave(e) {
        e.preventDefault();
        const now = new Date();
        const obj = {
            area: document.getElementById('f-area').value,
            priority: document.getElementById('f-prio').value,
            title: document.getElementById('f-title').value,
            message: document.getElementById('f-msg').value,
            hora: now.toLocaleTimeString("es-UY", {hour:'2-digit', minute:'2-digit'}),
            turno: getTurno()
        };
        const editId = parseInt(document.getElementById('edit-idx').value);
        if(editId === -1) store.push(obj); else store[editId] = obj;
        
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(store) });
        closeAll(); load();
    }

    function doPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFillColor(0, 100, 101); doc.rect(0,0,210,40,'F');
        doc.setTextColor(255,255,255); doc.setFontSize(20); doc.text("NOVEDADES OPERATIVAS CIO", 20, 25);
        let y = 55; doc.setTextColor(40,40,40); doc.setFontSize(10);
        store.forEach(r => {
            doc.setFont(undefined, 'bold'); doc.text(`[${r.priority}] ${r.area}: ${r.title} (${r.hora})`, 20, y);
            doc.setFont(undefined, 'normal'); doc.text(r.message, 20, y + 6, {maxWidth: 170});
            y += 20; if(y > 280) { doc.addPage(); y = 20; }
        });
        doc.save(`CIO_Reporte_${getTurno()}.pdf`);
    }

    function openPanel(mode) {
        document.getElementById('scrim').style.display = 'block';
        if(mode === 'form') {
            document.getElementById('panel-form').classList.add('active');
        } else {
            const cont = document.getElementById('list-render');
            cont.innerHTML = store.map((r, i) => `
                <div style="background:#000; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid #1a2525">
                    <strong style="color:#006465">${r.title}</strong><br>
                    <small style="color:#666">${r.area} | ${r.hora}</small>
                    <div style="margin-top:10px">
                        <button onclick="borrarItem(${i})" style="color:#ff4444; background:none; border:none; cursor:pointer">Eliminar</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('panel-list').classList.add('active');
        }
    }

    window.borrarItem = async (i) => {
        if(!confirm("¿Borrar novedad?")) return;
        store.splice(i, 1);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(store.length ? store : null) });
        openPanel('list'); load();
    };

    function closeAll() {
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('scrim').style.display = 'none';
    }

    function progressLoop(ts) {
        if(!store.length) { requestAnimationFrame(progressLoop); return; }
        if(!tick) tick = ts;
        const delta = (ts - tick) / 1000;
        document.getElementById('bar-progress').style.width = (delta/TIME_LIMIT)*100 + "%";
        if(delta >= TIME_LIMIT) { index++; renderUI(index); tick = ts; }
        requestAnimationFrame(progressLoop);
    }

    setInterval(() => {
        document.getElementById('live-clock').textContent = new Date().toLocaleTimeString("es-UY",{hour12:false});
    }, 1000);

    load();
    requestAnimationFrame(progressLoop);
</script>
</body>
</html>
