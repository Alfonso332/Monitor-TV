<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- ESTILOS INTEGRADOS (NO CLASH) --- */
        #cio-master {
            all: initial;
            display: block;
            background: #050d0e;
            color: #ffffff;
            font-family: "Segoe UI", sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        #cio-master * { box-sizing: border-box; font-family: inherit; }

        /* DISPLAY PRINCIPAL */
        #display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            text-align: center;
            padding: 40px;
            background: radial-gradient(circle at center, #0c1c1d 0%, #050d0e 100%);
            transition: background 0.5s ease;
        }

        .info-block { width: 95%; max-width: 1600px; z-index: 10; }

        #areaLabel {
            font-size: 1.5rem;
            color: #00d4d8;
            letter-spacing: 6px;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        #prioBadge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #titleDisplay { font-weight: 800; text-transform: uppercase; margin-bottom: 15px; line-height: 1; color: #fff; }
        #messageDisplay { font-weight: 300; color: #b0c4c4; line-height: 1.2; }

        /* CABECERA */
        .control-header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 1000; border-bottom: 1px solid rgba(0, 100, 101, 0.3);
        }

        .header-btns button {
            background: rgba(0, 100, 101, 0.3); border: 1px solid #006465;
            color: #00d4d8; padding: 10px 18px; border-radius: 6px;
            font-weight: bold; cursor: pointer; margin-right: 8px; font-size: 0.75rem;
        }

        #clock { font-family: 'Courier New', monospace; font-size: 1.5rem; font-weight: bold; color: #00d4d8; transition: 0.5s; }

        /* --- MODO TV FULLSCREEN (OCULTA BOTONES) --- */
        #cio-master:fullscreen .header-btns { display: none !important; }
        #cio-master:fullscreen .control-header { background: transparent; border: none; justify-content: center; height: 160px; }
        #cio-master:fullscreen #clock { font-size: 7rem; text-shadow: 0 0 30px rgba(0, 212, 216, 0.5); margin-top: 40px; }

        /* --- ALERTA CRÍTICA (ROJO OSCURO) --- */
        @keyframes alert-critical {
            0% { background-color: #050d0e; }
            50% { background-color: #2a0000; }
            100% { background-color: #050d0e; }
        }
        .is-critical #display { animation: alert-critical 1.5s infinite !important; }

        /* OVERLAY Y DRAWERS */
        #drawerOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 4000; }
        #drawerOverlay.active { display: block; }

        .drawer {
            position: fixed; right: 0; top: 0; width: 400px; height: 100vh;
            background: #0a1a1c; border-left: 2px solid #006465;
            padding: 30px; transform: translateX(100%);
            transition: 0.3s ease; z-index: 5000; overflow-y: auto;
        }
        .drawer.active { transform: translateX(0); }

        /* MÓVIL */
        .mobile-nav { display: none; }
        @media (max-width: 768px) {
            .header-btns { display: none !important; }
            .control-header { justify-content: center; }
            .mobile-nav {
                display: flex; position: fixed; bottom: 0; width: 100%; height: 75px;
                background: #081617; border-top: 1px solid #006465;
                justify-content: space-around; align-items: center; z-index: 2000;
            }
            .mobile-nav button { background: none; border: none; color: #00d4d8; font-size: 0.7rem; font-weight: bold; }
            .drawer { width: 100%; top: auto; bottom: 0; height: 80vh; border-radius: 20px 20px 0 0; transform: translateY(100%); }
            .drawer.active { transform: translateY(0); }
            #display { padding-bottom: 100px; }
        }

        #progressBar { height: 6px; position: fixed; bottom: 0; width: 0%; z-index: 2001; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div id="cio-master">
    <div id="drawerOverlay" onclick="closeAll()"></div>

    <header class="control-header">
        <div class="header-btns">
            <button onclick="openForm()">＋ NUEVO</button>
            <button onclick="openHistory()">📋 HISTORIAL</button>
            <button onclick="toggleFS()">⛶ TV FULL</button>
        </div>
        <div id="clock">00:00:00</div>
    </header>

    <main id="display">
        <div class="info-block">
            <div id="areaLabel">SISTEMA CIO</div>
            <div id="prioBadge">NORMAL</div>
            <h1 id="titleDisplay">CONECTANDO...</h1>
            <p id="messageDisplay">Sincronizando registros operativos</p>
        </div>
    </main>

    <nav class="mobile-nav">
        <button onclick="openForm()">➕<br>NUEVO</button>
        <button onclick="openHistory()">📋<br>LISTA</button>
    </nav>

    <aside id="drawerForm" class="drawer">
        <h2 style="color:#00d4d8; margin-bottom:20px;">Configurar Novedad</h2>
        <form onsubmit="saveData(event)" style="display:flex; flex-direction:column; gap:15px;">
            <input type="hidden" id="editIdx" value="-1">
            <select id="inArea" style="padding:12px; background:#000; color:white; border:1px solid #006465;">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <select id="inPrio" style="padding:12px; background:#000; color:white; border:1px solid #006465;">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Crítica">Crítica</option>
            </select>
            <input type="text" id="inTitle" placeholder="Título" required style="padding:12px; background:#000; color:white; border:1px solid #006465;">
            <textarea id="inMsg" rows="5" placeholder="Descripción..." required style="padding:12px; background:#000; color:white; border:1px solid #006465;"></textarea>
            <button type="submit" style="background:#006465; color:white; padding:15px; border:none; font-weight:bold; cursor:pointer;">ACTUALIZAR MONITOR</button>
            <button type="button" onclick="closeAll()" style="color:#ff4d4d; background:none; border:none; margin-top:10px; cursor:pointer;">CANCELAR</button>
        </form>
    </aside>

    <aside id="drawerHistory" class="drawer">
        <h2 style="color:#00d4d8; margin-bottom:20px;">Historial</h2>
        <button onclick="makePDF()" style="width:100%; background:#00d4d8; color:black; border:none; padding:12px; font-weight:bold; margin-bottom:20px; cursor:pointer;">DESCARGAR PDF</button>
        <div id="historyItems"></div>
    </aside>

    <div id="progressBar"></div>
</div>

<script>
    const API = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let store = [];
    let cur = 0;
    let start = null;
    const TIME = 15;

    function fitText() {
        const t = document.getElementById('titleDisplay');
        const m = document.getElementById('messageDisplay');
        const d = document.getElementById('display');
        let sT = window.innerWidth <= 768 ? 32 : 90; 
        let sM = window.innerWidth <= 768 ? 22 : 60;
        t.style.fontSize = sT + "px"; m.style.fontSize = sM + "px";
        let safety = 0;
        while ((t.offsetHeight + m.offsetHeight > d.offsetHeight * 0.6) && safety < 60) {
            sT -= 1; sM -= 1;
            t.style.fontSize = sT + "px"; m.style.fontSize = sM + "px";
            safety++;
        }
    }

    async function sync() {
        try {
            const r = await fetch(API);
            const d = await r.json();
            store = d || [];
            render(cur);
        } catch(e) {}
    }

    function render(i) {
        if(!store.length) return;
        const item = store[i % store.length];
        const master = document.getElementById("cio-master");
        const badge = document.getElementById("prioBadge");
        
        if(item.priority === "Crítica") {
            master.classList.add("is-critical");
            badge.style.backgroundColor = "#ff4d4d";
            badge.style.color = "white";
        } else {
            master.classList.remove("is-critical");
            badge.style.backgroundColor = "transparent";
            badge.style.color = "#00d4d8";
        }

        badge.textContent = "Prioridad: " + item.priority;
        document.getElementById("areaLabel").textContent = item.area;
        document.getElementById("titleDisplay").textContent = item.title;
        document.getElementById("messageDisplay").textContent = item.message;
        
        const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
        document.getElementById("progressBar").style.background = colors[item.priority] || "#006465";
        
        setTimeout(fitText, 50);
    }

    async function saveData(e) {
        e.preventDefault();
        const idx = parseInt(document.getElementById("editIdx").value);
        const obj = {
            area: document.getElementById("inArea").value, priority: document.getElementById("inPrio").value,
            title: document.getElementById("inTitle").value, message: document.getElementById("inMsg").value
        };
        if(idx === -1) store.push(obj); else store[idx] = obj;
        await fetch(API, { method: 'PUT', body: JSON.stringify(store) });
        closeAll(); sync();
    }

    window.del = async (i) => {
        if(!confirm("¿Borrar?")) return;
        store.splice(i, 1);
        await fetch(API, { method: 'PUT', body: JSON.stringify(store.length ? store : null) });
        openHistory(); sync();
    };

    window.edit = (i) => {
        const item = store[i];
        document.getElementById("editIdx").value = i;
        document.getElementById("inArea").value = item.area;
        document.getElementById("inPrio").value = item.priority;
        document.getElementById("inTitle").value = item.title;
        document.getElementById("inMsg").value = item.message;
        document.getElementById("drawerHistory").classList.remove("active");
        document.getElementById("drawerForm").classList.add("active");
    };

    function openForm() { 
        document.getElementById("editIdx").value = "-1";
        document.getElementById("drawerForm").classList.add("active"); 
        document.getElementById("drawerOverlay").classList.add("active"); 
    }
    
    function openHistory() { 
        const cont = document.getElementById("historyItems");
        cont.innerHTML = store.map((item, i) => `
            <div style="background:rgba(255,255,255,0.05); padding:12px; margin-bottom:8px; border:1px solid #1a3a3d; border-radius:5px;">
                <strong style="color:#00d4d8">${item.title}</strong><br>
                <button onclick="edit(${i})" style="background:#ffcc00; border:none; padding:4px 8px; font-size:10px; cursor:pointer; margin-top:5px;">EDITAR</button>
                <button onclick="del(${i})" style="background:#ff4d4d; color:white; border:none; padding:4px 8px; font-size:10px; margin-left:5px; cursor:pointer;">BORRAR</button>
            </div>
        `).join('');
        document.getElementById("drawerHistory").classList.add("active"); 
        document.getElementById("drawerOverlay").classList.add("active"); 
    }

    function closeAll() { document.querySelectorAll('.drawer, #drawerOverlay').forEach(el => el.classList.remove('active')); }
    
    function toggleFS() { 
        if (!document.fullscreenElement) document.getElementById('cio-master').requestFullscreen();
        else document.exitFullscreen();
    }

    function loop(ts) {
        if(!store.length) { requestAnimationFrame(loop); return; }
        if(!start) start = ts;
        const prog = (ts - start) / 1000;
        document.getElementById("progressBar").style.width = Math.min((prog / TIME) * 100, 100) + "%";
        if(prog >= TIME){ cur++; render(cur); start = ts; }
        requestAnimationFrame(loop);
    }

    function makePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("REPORTE CIO", 20, 20);
        store.forEach((r, i) => doc.text(`${r.area}: ${r.title}`, 20, 40 + (i*10)));
        doc.save("Reporte.pdf");
    }

    setInterval(() => document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}), 1000);
    setInterval(sync, 5000);
    window.addEventListener('resize', fitText);
    sync();
    requestAnimationFrame(loop);
</script>
</body>
</html>
