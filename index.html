<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIO - Monitor Operativo de Novedades</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* CSS INTEGRADO - ESTILO INDUSTRIAL TECH 
        */
        :root {
            --bg-principal: #0b0e14;
            --bg-panel: #1a1f26;
            --borde-tech: #2d333b;
            --texto-vibrante: #ffffff;
            --texto-secundario: #9aa4b1;
            --azul-cio: #3498db;
            --rojo-alerta: #e74c3c;
            --verde-ok: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-vibrante);
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- CONTENEDOR DE PANTALLA PRINCIPAL --- */
        #display {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
            background: radial-gradient(circle at center, #161b22 0%, #0b0e14 100%);
            text-align: center;
        }

        #areaLabel {
            font-size: 1.4rem;
            color: var(--azul-cio);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        /* CAPSULAS DE DATOS (PRIORIDAD, TURNO, HORA) */
        #metaContainer {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tag-info {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--borde-tech);
            padding: 6px 15px;
            border-radius: 2px;
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
            color: var(--texto-secundario);
            text-transform: uppercase;
        }

        #titleDisplay {
            font-weight: 800;
            line-height: 1.1;
            margin: 0;
            color: var(--texto-vibrante);
        }

        #messageDisplay {
            margin-top: 25px;
            font-weight: 300;
            color: var(--texto-secundario);
            max-width: 85%;
            line-height: 1.5;
        }

        /* --- HEADER PC --- */
        .control-header {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 1000;
            background: rgba(11, 14, 20, 0.95);
            border-bottom: 1px solid var(--borde-tech);
        }

        #clock {
            font-family: 'Consolas', monospace;
            font-size: 2rem;
            color: var(--texto-vibrante);
            font-weight: bold;
        }

        .btn-tech {
            background: var(--bg-panel);
            color: var(--texto-vibrante);
            border: 1px solid var(--borde-tech);
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-tech:hover { background: var(--azul-cio); border-color: white; }

        /* --- FULLSCREEN TV --- */
        :fullscreen .control-header, :fullscreen .mobile-nav { display: none !important; }
        :fullscreen #display { padding: 80px; }
        :fullscreen #clock-tv { display: block !important; position: absolute; top: 5%; font-size: 8rem; opacity: 0.1; font-weight: 900; width: 100%; text-align: center; }

        /* --- ANIMACIÓN CRÍTICA --- */
        @keyframes pulse-critical { 0% { background: #0b0e14; } 50% { background: #401010; } 100% { background: #0b0e14; } }
        .critico-total { animation: pulse-critical 1s infinite !important; }
        .critico-total .tag-info { border-color: var(--rojo-alerta); color: var(--rojo-alerta); }

        /* --- BARRA DE TAREAS MÓVIL --- */
        .mobile-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: var(--bg-panel);
            border-top: 2px solid var(--borde-tech);
            display: none; justify-content: space-around; align-items: center;
            z-index: 2000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn {
            background: none; border: none; color: var(--texto-secundario);
            display: flex; flex-direction: column; align-items: center;
            font-size: 0.7rem; font-weight: bold; gap: 5px;
        }
        .nav-btn:active { color: var(--azul-cio); }

        /* --- DRAWERS (LATERALES) --- */
        .drawer {
            position: fixed; right: 0; top: 0; width: 400px; height: 100vh;
            background: var(--bg-panel); border-left: 2px solid var(--azul-cio);
            padding: 30px; transform: translateX(100%);
            transition: transform 0.4s ease; z-index: 5000; overflow-y: auto;
        }
        .drawer.active { transform: translateX(0); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 4000; }
        #overlay.active { display: block; }

        input, select, textarea {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px;
            background: #000; color: white; border: 1px solid var(--borde-tech);
        }

        /* BARRA DE PROGRESO */
        .progress-container { position: fixed; bottom: 0; width: 100%; height: 5px; background: rgba(0,0,0,0.3); z-index: 1500; }
        #progressBar { height: 100%; width: 0%; background: var(--azul-cio); }

        /* --- RESPONSIVE CELULAR --- */
        @media (max-width: 768px) {
            .mobile-nav { display: flex; }
            .left-zone, .control-header #clock { display: none; }
            .control-header { justify-content: center; height: 60px; }
            .drawer { width: 100%; top: auto; bottom: 0; height: 85vh; border-radius: 20px 20px 0 0; }
            #display { padding: 25px; padding-bottom: 100px; }
            #areaLabel { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div id="overlay"></div>

<header class="control-header">
    <div class="left-zone">
        <button class="btn-tech" onclick="openNew()">＋ NUEVO</button>
        <button class="btn-tech" onclick="openHistory()" style="margin-left:10px;">☰ HISTORIAL</button>
        <button class="btn-tech" onclick="document.documentElement.requestFullscreen()" style="margin-left:10px; color: var(--azul-cio);">⛶ MODO TV</button>
    </div>
    <div id="clock">00:00:00</div>
</header>

<main id="display">
    <div id="clock-tv" style="display:none;">00:00:00</div>
    <div class="info-block">
        <div id="areaLabel">CENTRO DE INTELIGENCIA</div>
        <div id="metaContainer">
            <div id="tagPrio" class="tag-info">PRIORIDAD</div>
            <div id="tagTurno" class="tag-info">TURNO</div>
            <div id="tagHora" class="tag-info">--:--</div>
        </div>
        <h1 id="titleDisplay">MONITOR CIO</h1>
        <p id="messageDisplay">Cargando base de datos operativa...</p>
    </div>
</main>

<nav class="mobile-nav">
    <button class="nav-btn" onclick="openNew()"><span>➕</span><span>NUEVO</span></button>
    <button class="nav-btn" onclick="openHistory()"><span>📋</span><span>LISTA</span></button>
    <button class="nav-btn" onclick="document.documentElement.requestFullscreen()"><span>⛶</span><span>TV</span></button>
</nav>

<aside id="drawerForm" class="drawer">
    <h2 style="margin-bottom:20px; color: var(--azul-cio);">REGISTRO</h2>
    <form id="formNovedad">
        <input type="hidden" id="editIndex" value="-1">
        <label>ÁREA</label>
        <select id="inputArea">
            <option value="Freschat">Freschat</option>
            <option value="Monitoreo">Monitoreo</option>
            <option value="Atención al Cliente">Atención al Cliente</option>
            <option value="Interno">Interno</option>
        </select>
        <label>PRIORIDAD</label>
        <select id="inputPriority">
            <option value="Baja">Baja</option>
            <option value="Media">Media</option>
            <option value="Alta">Alta</option>
            <option value="Crítica">Crítica</option>
        </select>
        <label>TÍTULO</label>
        <input type="text" id="inputTitle" placeholder="Ej: Falla de Servidor" required>
        <label>MENSAJE</label>
        <textarea id="inputMessage" rows="6" placeholder="Descripción detallada..." required></textarea>
        <button type="submit" class="btn-tech" style="width:100%; padding:15px; background: var(--azul-cio);">ACTUALIZAR MONITOR</button>
        <button type="button" onclick="closeAll()" style="width:100%; background:none; border:none; color:var(--rojo-alerta); margin-top:15px; cursor:pointer;">Cerrar</button>
    </form>
</aside>

<aside id="drawerHistory" class="drawer">
    <h2 style="margin-bottom:20px; color: var(--azul-cio);">HISTORIAL</h2>
    <button onclick="descargarPDF()" style="background:var(--verde-ok); color:black; width:100%; padding:12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer; margin-bottom:20px;">📥 GENERAR REPORTE (PDF)</button>
    <div id="historyList"></div>
</aside>

<div class="progress-container"><div id="progressBar"></div></div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let registros = [];
    let currentIndex = 0;
    let startTime = null;
    const DURATION = 15;

    function getTurnoNombre() {
        const h = new Date().getHours();
        if (h >= 6 && h < 14) return "Mañana";
        if (h >= 14 && h < 22) return "Tarde";
        return "Noche";
    }

    function fitText() {
        const title = document.getElementById('titleDisplay');
        const message = document.getElementById('messageDisplay');
        const display = document.getElementById('display');
        const esM = window.innerWidth <= 768;
        
        let sT = esM ? 40 : 100; 
        let sM = esM ? 22 : 45;

        title.style.fontSize = sT + "px";
        message.style.fontSize = sM + "px";

        let limit = 0;
        while ((title.offsetHeight + message.offsetHeight > display.offsetHeight * 0.65) && limit < 100) {
            sT -= 1; sM -= 0.5;
            title.style.fontSize = sT + "px";
            message.style.fontSize = sM + "px";
            limit++;
        }
    }

    async function pull() {
        try {
            const r = await fetch(DB_URL);
            const d = await r.json();
            registros = d || [];
            render(currentIndex);
        } catch (e) {}
    }

    function render(idx){
        const container = document.getElementById("display");
        if(!registros.length) {
            container.classList.remove("critico-total");
            document.getElementById("tagPrio").textContent = "IDLE";
            document.getElementById("titleDisplay").textContent = "SIN NOVEDADES";
            document.getElementById("messageDisplay").textContent = "Esperando reportes del turno.";
            return;
        }
        
        const r = registros[idx % registros.length];
        container.className = (r.priority === "Crítica") ? "critico-total" : "";
        
        document.getElementById("areaLabel").textContent = r.area;
        document.getElementById("tagPrio").textContent = r.priority;
        document.getElementById("tagTurno").textContent = "TURNO: " + r.turno;
        document.getElementById("tagHora").textContent = r.hora;
        document.getElementById("titleDisplay").textContent = r.title;
        document.getElementById("messageDisplay").textContent = r.message;
        
        const colorBar = {Baja:"#3498db", Media:"#2ecc71", Alta:"#f1c40f", Crítica:"#ffffff"};
        document.getElementById("progressBar").style.background = colorBar[r.priority];
        
        setTimeout(fitText, 50);
    }

    document.getElementById("formNovedad").onsubmit = async (e) => {
        e.preventDefault();
        const now = new Date();
        const nuevo = {
            area: document.getElementById("inputArea").value,
            priority: document.getElementById("inputPriority").value,
            title: document.getElementById("inputTitle").value,
            message: document.getElementById("inputMessage").value,
            hora: now.toLocaleTimeString("es-UY", {hour:'2-digit', minute:'2-digit'}),
            turno: getTurnoNombre()
        };
        const idx = parseInt(document.getElementById("editIndex").value);
        if(idx === -1) registros.push(nuevo); else registros[idx] = nuevo;
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(registros) });
        closeAll(); pull();
    };

    function descargarPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        const now = new Date(); const t = getTurnoNombre();
        
        doc.setFillColor(11, 14, 20); doc.rect(0,0,210,40,'F');
        doc.setTextColor(255,255,255); doc.setFontSize(22); doc.text("NOVEDADES OPERATIVAS", 20, 25);
        doc.setFontSize(11); doc.text(`Turno: ${t} | Fecha: ${now.toLocaleDateString()}`, 20, 35);
        
        let y = 55; doc.setTextColor(0,0,0);
        registros.forEach(r => {
            doc.setFont(undefined, 'bold'); doc.text(`[${r.priority}] ${r.area}: ${r.title}`, 20, y);
            doc.setFont(undefined, 'normal'); 
            doc.setFontSize(10); const lines = doc.splitTextToSize(r.message, 170);
            doc.text(lines, 20, y + 7); y += (lines.length * 7) + 15;
            if(y > 270) { doc.addPage(); y = 20; }
        });
        doc.save(`Novedades_operativas_${t}_${now.getHours()}hs.pdf`);
    }

    function renderHistory() {
        const div = document.getElementById("historyList");
        div.innerHTML = registros.map((r, i) => `
            <div style="background:#000; padding:15px; margin-bottom:10px; border:1px solid var(--borde-tech);">
                <strong style="color:var(--azul-cio)">${r.title}</strong><br>
                <small>${r.area} | ${r.hora} | ${r.priority}</small><br>
                <div style="margin-top:10px;">
                    <button onclick="editar(${i})" style="color:var(--verde-ok); background:none; border:none; cursor:pointer; font-weight:bold;">EDITAR</button>
                    <button onclick="borrar(${i})" style="color:var(--rojo-alerta); background:none; border:none; cursor:pointer; font-weight:bold; margin-left:15px;">BORRAR</button>
                </div>
            </div>
        `).join('');
    }

    window.editar = (i) => {
        const r = registros[i];
        document.getElementById("editIndex").value = i;
        document.getElementById("inputArea").value = r.area;
        document.getElementById("inputPriority").value = r.priority;
        document.getElementById("inputTitle").value = r.title;
        document.getElementById("inputMessage").value = r.message;
        document.getElementById("drawerHistory").classList.remove("active");
        document.getElementById("drawerForm").classList.add("active");
    };

    window.borrar = async (i) => {
        if(confirm("¿Eliminar registro?")) {
            registros.splice(i,1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(registros.length ? registros : null) });
            renderHistory(); pull();
        }
    };

    function closeAll() { document.querySelectorAll('.drawer, #overlay').forEach(el => el.classList.remove('active')); }
    function openNew() { document.getElementById("formNovedad").reset(); document.getElementById("editIndex").value="-1"; document.getElementById("drawerForm").classList.add("active"); document.getElementById("overlay").classList.add("active"); }
    function openHistory() { renderHistory(); document.getElementById("drawerHistory").classList.add("active"); document.getElementById("overlay").classList.add("active"); }

    document.getElementById("overlay").onclick = closeAll;

    function animate(ts){
        if(!registros.length) { requestAnimationFrame(animate); return; }
        if(!startTime) startTime = ts;
        const progress = (ts - startTime) / 1000;
        document.getElementById("progressBar").style.width = Math.min((progress / DURATION) * 100, 100) + "%";
        if(progress >= DURATION){ currentIndex = (currentIndex + 1) % registros.length; render(currentIndex); startTime = ts; }
        requestAnimationFrame(animate);
    }

    setInterval(() => {
        const time = new Date().toLocaleTimeString("es-UY",{hour12:false});
        document.getElementById("clock").textContent = time;
        document.getElementById("clock-tv").textContent = time;
    }, 1000);
    
    setInterval(pull, 5000);
    requestAnimationFrame(animate);
    pull();
</script>
</body>
</html>
