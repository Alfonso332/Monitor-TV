<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SISTEMA DE NOVEDADES | MASTERSON</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* ARQUITECTURA MASTERSON v7.0 - "DARK OCEAN"
           Color Primario: #006465
           Foco: Reloj Central y Servicios Críticos
        */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;400;700;900&family=JetBrains+Mono:wght@300&display=swap');

        #cio-app {
            --p-brand: #006465;
            --p-brand-glow: rgba(0, 100, 101, 0.4);
            --fondo-negro: #050505;
            --fondo-superficie: #0c0c0c;
            --texto-puro: #ffffff;
            --texto-gris: #777777;
            --critico-fondo: #1a0202;
            --critico-color: #ff3b30;
            --baja: #00c853;
            --media: #ffd600;
            --alta: #ff9100;
            
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--fondo-negro) !important;
            color: var(--texto-puro) !important;
            font-family: 'Inter', sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
            transition: background 0.8s ease;
        }

        /* --- BACKGROUND LAYER --- */
        #cio-app #canvas-dots {
            position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0.2;
        }

        /* --- CABECERA SUPERIOR --- */
        #cio-app .top-nav {
            height: 90px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        #cio-app:fullscreen .top-nav { display: none !important; }

        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-box img { height: 42px; filter: grayscale(1) brightness(2); }
        .logo-text { border-left: 1px solid #222; padding-left: 15px; }
        .logo-text h1 { margin: 0; font-size: 14px; letter-spacing: 3px; font-weight: 900; text-transform: uppercase; }
        .logo-text span { font-size: 10px; color: var(--p-brand); font-family: 'JetBrains Mono'; letter-spacing: 1px; }

        .nav-actions { display: flex; gap: 15px; }
        .btn-nav {
            background: none; border: 1px solid #222; color: var(--texto-gris);
            padding: 8px 18px; border-radius: 5px; font-size: 10px; font-weight: 700;
            cursor: pointer; transition: 0.3s; letter-spacing: 1px;
        }
        .btn-nav:hover { border-color: var(--p-brand); color: #fff; }
        .btn-nav.active { background: var(--p-brand); color: #000; border-color: var(--p-brand); }

        /* --- DASHBOARD CENTRAL --- */
        #display-board {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 0 10%; z-index: 10;
        }

        /* RELOJ GIGANTE CENTRAL */
        #clock-hero {
            margin-bottom: 40px; transition: all 0.5s ease;
        }
        #main-time {
            font-size: 8rem; font-weight: 100; letter-spacing: -5px; line-height: 1;
            margin: 0; color: var(--texto-puro);
        }
        #main-date {
            font-size: 12px; letter-spacing: 8px; text-transform: uppercase;
            color: var(--p-brand); margin-top: 10px; font-weight: 400;
        }

        /* NOVEDADES */
        #info-wrap { width: 100%; max-width: 1200px; }
        #area-tag { 
            font-size: 11px; font-weight: 900; letter-spacing: 5px; 
            color: var(--p-brand); text-transform: uppercase; margin-bottom: 15px;
        }
        #title-main {
            font-size: 90px; font-weight: 900; line-height: 0.9; letter-spacing: -5px;
            margin: 0 0 25px 0; text-transform: uppercase;
        }
        #msg-main {
            font-size: 1.5rem; color: var(--texto-gris); font-weight: 300;
            max-width: 850px; margin: 0 auto; line-height: 1.5;
        }

        /* --- OFFLINE BOX (MÁS GRANDE Y ESTÉTICO) --- */
        #offline-alert-container {
            position: absolute; bottom: 80px; width: 100%; display: none;
            justify-content: center; z-index: 20;
        }
        .offline-banner {
            background: rgba(255, 59, 48, 0.1); border: 1px solid var(--critico-color);
            padding: 20px 40px; border-radius: 12px; backdrop-filter: blur(10px);
            display: flex; align-items: center; gap: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .offline-banner h3 { color: var(--critico-color); margin: 0; font-size: 12px; letter-spacing: 2px; }
        .offline-list-mini { display: flex; gap: 15px; font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 700; }
        .offline-item { color: #fff; background: var(--critico-color); padding: 2px 10px; border-radius: 4px; }

        /* --- SISTEMA DE PANELES --- */
        .side-panel {
            position: fixed; right: 0; top: 0; width: 480px; height: 100%;
            background: var(--fondo-superficie); border-left: 1px solid #1a1a1a;
            padding: 60px; transform: translateX(100%); transition: 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10005; box-sizing: border-box; overflow-y: auto;
        }
        .side-panel.active { transform: translateX(0); }
        .side-panel h2 { font-size: 2.5rem; font-weight: 900; margin-bottom: 40px; letter-spacing: -1px; }

        /* --- FORMULARIOS --- */
        .f-group { margin-bottom: 30px; }
        .f-group label { display: block; font-size: 10px; text-transform: uppercase; color: #555; margin-bottom: 10px; letter-spacing: 2px; }
        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; background: #000; color: #fff; border: 1px solid #222; padding: 18px;
            border-radius: 6px; font-family: inherit; font-size: 1rem; box-sizing: border-box;
        }
        #cio-app input:focus { border-color: var(--p-brand); outline: none; }

        .btn-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-prime { background: var(--p-brand); color: #fff; border: none; padding: 20px; font-weight: 900; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; }
        .btn-cancel { background: none; border: 1px solid #333; color: #777; padding: 15px; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 11px; }

        /* --- BOTÓN FLOTANTE --- */
        #float-trigger {
            position: fixed; bottom: 40px; right: 40px; width: 70px; height: 70px;
            background: var(--p-brand); border-radius: 50%; border: none; color: #fff;
            font-size: 28px; cursor: pointer; z-index: 10020; display: none;
            align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #mobile-nav {
            position: fixed; bottom: 120px; right: 40px; width: 250px;
            background: #0f0f0f; padding: 20px; border-radius: 15px; border: 1px solid #222;
            display: none; flex-direction: column; gap: 12px; z-index: 10015;
        }

        /* --- ESTADOS --- */
        #progress-bar { position: fixed; top: 0; left: 0; height: 4px; background: var(--p-brand); z-index: 100000; transition: width 0.1s linear; }
        
        #cio-app.is-critico { background: var(--critico-fondo) !important; }
        #cio-app.is-critico #title-main { color: var(--critico-color); }
        #cio-app.is-critico #progress-bar { background: var(--critico-color); }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            #main-time { font-size: 4.5rem; }
            #title-main { font-size: 42px; letter-spacing: -2px; }
            #msg-main { font-size: 1.1rem; }
            #float-trigger { display: flex; }
            .side-panel { width: 100%; padding: 40px 25px; }
            .top-nav { padding: 0 20px; }
            .nav-actions { display: none; }
        }
    </style>
</head>
<body onclick="handleAppClick(event)">

<div id="cio-app">
    <canvas id="canvas-dots"></canvas>
    <div id="progress-bar"></div>
    <div id="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; z-index:10002; backdrop-filter:blur(8px);" onclick="closePanels()"></div>

    <header class="top-nav">
        <div class="logo-box">
            <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" alt="Masterson">
            <div class="logo-text">
                <h1>Novedades Masterson</h1>
                <span>SISTEMA DE CONTROL CENTRALIZADO</span>
            </div>
        </div>
        <div class="nav-actions">
            <button onclick="openForm()" class="btn-nav active">NUEVO REPORTE</button>
            <button onclick="openHistory()" class="btn-nav">HISTORIAL</button>
            <button onclick="toggleFS()" class="btn-nav">PANTALLA COMPLETA</button>
        </div>
    </header>

    <button id="float-trigger" onclick="toggleMobNav(event)">☰</button>
    <div id="mobile-nav">
        <button onclick="openForm(); toggleMobNav();" class="btn-prime" style="padding:15px; font-size:10px;">＋ NUEVA ENTRADA</button>
        <button onclick="openHistory(); toggleMobNav();" class="btn-cancel" style="color:#fff; border-color:#444;">VER REGISTROS</button>
        <button onclick="openOfflinePanel(); toggleMobNav();" id="mob-off-btn" style="background:rgba(255,0,0,0.2); color:#ff3b30; border:none; padding:12px; border-radius:8px; font-weight:900; font-size:10px;">CAÍDOS: <span id="mob-off-count">0</span></button>
    </div>

    <main id="display-board">
        <div id="clock-hero">
            <h2 id="main-time">00:00:00</h2>
            <div id="main-date">DOMINGO 22 FEBRERO</div>
        </div>

        <div id="info-wrap" style="opacity:0; transition: 0.7s ease;">
            <div id="area-tag">Iniciando Servidores</div>
            <h3 id="title-main">SINCRONIZANDO</h3>
            <p id="msg-main">Cargando la última base de datos de eventos y estado de red...</p>
        </div>

        <div id="offline-alert-container">
            <div class="offline-banner">
                <h3>⚠️ SERVICIOS FUERA DE LÍNEA:</h3>
                <div id="offline-render-list" class="offline-list-mini"></div>
            </div>
        </div>
    </main>

    <footer style="height:40px; background:#000; z-index:100; display:flex; align-items:center; border-top:1px solid #111; padding:0 40px;">
        <div style="font-family:'JetBrains Mono'; font-size:9px; color:#444; letter-spacing:2px; text-transform:uppercase;">
            Status: Conectado al Nodo Masterson-UY // <span id="footer-status">En espera</span>
        </div>
    </footer>

    <aside id="panelForm" class="side-panel">
        <h2>REPORTE</h2>
        <form onsubmit="saveNew(event)">
            <div class="f-group">
                <label>Ubicación / Área</label>
                <select id="f-area">
                    <option>Monitoreo</option>
                    <option>Freschat</option>
                    <option>Atención</option>
                    <option>Novedad Interna</option>
                </select>
            </div>
            <div class="f-group">
                <label>Severidad</label>
                <select id="f-prio">
                    <option>Baja</option>
                    <option>Media</option>
                    <option>Alta</option>
                    <option>Crítica</option>
                </select>
            </div>
            <div class="f-group">
                <label>Título del Evento</label>
                <input type="text" id="f-title" placeholder="¿Qué sucedió?" required>
            </div>
            <div class="f-group">
                <label>Detalles Técnicos</label>
                <textarea id="f-msg" rows="5" placeholder="Escriba aquí el reporte detallado..." required></textarea>
            </div>
            <div class="btn-stack">
                <button type="submit" class="btn-prime">PUBLICAR AHORA</button>
                <button type="button" onclick="closePanels()" class="btn-cancel">CANCELAR</button>
            </div>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h2 style="margin:0;">LOGS</h2>
            <button onclick="closePanels()" class="btn-nav">VOLVER</button>
        </div>
        <div id="historyRender"></div>
    </aside>

    <aside id="panelOffline" class="side-panel">
        <h2 style="color:var(--critico-color)">ALERTAS DE RED</h2>
        <div id="offlineFullList"></div>
        <button onclick="closePanels()" class="btn-prime" style="margin-top:30px; background:none; border:1px solid #333;">CERRAR</button>
    </aside>

    <div id="quickEdit" style="background:#0a0a0a; border:1px solid var(--p-brand); padding:25px; border-radius:12px; margin-top:15px; display:none; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
        <input type="hidden" id="e-index">
        <div class="f-group">
            <input type="text" id="e-title" style="margin-bottom:10px;">
            <textarea id="e-msg" rows="4"></textarea>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="saveQuickEdit()" class="btn-prime" style="flex:1; padding:12px; font-size:10px;">GUARDAR</button>
            <button onclick="hideEdit()" class="btn-cancel" style="flex:1; padding:12px;">CANCELAR</button>
        </div>
    </div>
</div>

<script>
    /* CORE ENGINE MASTERSON 
       Gestión de Datos y Renderización Dinámica
    */
    
    const API_EVENTOS = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const API_RED = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let logs = []; 
    let currentIdx = 0; 
    let startTime = null; 
    const TIEMPO_SLIDE = 15;

    // --- Partículas de Fondo ---
    const canvas = document.getElementById('canvas-dots');
    const ctx = canvas.getContext('2d');
    let dots = [];
    function initDots() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        dots = Array.from({length: 30}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2,
            v: Math.random() * 0.2 + 0.1
        }));
    }
    function drawDots() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "#006465";
        dots.forEach(d => {
            ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
            d.y -= d.v; if(d.y < -10) d.y = canvas.height + 10;
        });
        requestAnimationFrame(drawDots);
    }

    // --- Manejo de UI ---
    function handleAppClick(e) {
        const menu = document.getElementById("mobile-nav");
        const trigger = document.getElementById("float-trigger");
        if (menu.style.display === "flex" && !menu.contains(e.target) && !trigger.contains(e.target)) toggleMobNav();
    }

    function toggleMobNav(e) {
        if(e) e.stopPropagation();
        const menu = document.getElementById("mobile-nav");
        const visible = menu.style.display === "flex";
        menu.style.display = visible ? "none" : "flex";
        document.getElementById("overlay").style.display = visible ? "none" : "block";
    }

    async function fetchData() {
        try {
            const [rEv, rRed] = await Promise.all([fetch(API_EVENTOS), fetch(API_RED)]);
            const dataEv = await rEv.json();
            const dataRed = await rRed.json();
            
            logs = dataEv ? (Array.isArray(dataEv) ? dataEv : Object.values(dataEv)) : [];
            updateRedUI(dataRed);
            if(logs.length > 0 && !startTime) renderSlide();
        } catch(err) { console.error("Error de red"); }
    }

    function updateRedUI(data) {
        let caidos = [];
        if(data) {
            Object.keys(data).forEach(k => {
                if(data[k].estado === "offline") caidos.push(k.replace(/_/g, ' '));
            });
        }
        
        const banner = document.getElementById("offline-alert-container");
        const list = document.getElementById("offline-render-list");
        const fullList = document.getElementById("offlineFullList");
        
        document.getElementById("mob-off-count").textContent = caidos.length;
        
        if(caidos.length > 0) {
            banner.style.display = "flex";
            list.innerHTML = caidos.map(n => `<span class="offline-item">${n}</span>`).join('');
            fullList.innerHTML = caidos.map(n => `
                <div style="padding:20px; border-bottom:1px solid #222; color:var(--critico-color); font-weight:900;">
                    ● ${n.toUpperCase()} <span style="float:right; font-size:10px; opacity:0.5;">SIN RESPUESTA</span>
                </div>
            `).join('');
        } else {
            banner.style.display = "none";
            fullList.innerHTML = `<p style="text-align:center; color:#333; margin-top:40px;">TODOS LOS SERVICIOS OPERATIVOS</p>`;
        }
    }

    function renderSlide() {
        if(!logs.length) return;
        const info = document.getElementById("info-wrap");
        const app = document.getElementById("cio-app");
        
        info.style.opacity = "0";
        info.style.transform = "translateY(10px)";

        setTimeout(() => {
            const item = logs[currentIdx % logs.length];
            const pColors = {"Baja":"var(--baja)", "Media":"var(--media)", "Alta":"var(--alta)", "Crítica":"var(--critico-color)"};
            const activeColor = pColors[item.priority] || var(--p-brand);

            document.getElementById("area-tag").textContent = item.area;
            document.getElementById("area-tag").style.color = activeColor;
            document.getElementById("title-main").textContent = item.title;
            document.getElementById("msg-main").textContent = item.message;
            document.getElementById("progress-bar").style.backgroundColor = activeColor;
            document.getElementById("footer-status").textContent = `Viendo novedad ${currentIdx % logs.length + 1} de ${logs.length}`;

            if(item.priority === "Crítica") app.classList.add("is-critico");
            else app.classList.remove("is-critico");

            autoSizeTitle();
            info.style.opacity = "1";
            info.style.transform = "translateY(0)";
        }, 700);
    }

    function autoSizeTitle() {
        const t = document.getElementById('title-main');
        if(window.innerWidth < 768) t.style.fontSize = "40px";
        else t.style.fontSize = logs[currentIdx % logs.length]?.title.length > 25 ? "65px" : "90px";
    }

    // --- Control de Paneles ---
    function openHistory() { renderHistory(); document.getElementById("panelHistory").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function openForm() { document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function openOfflinePanel() { document.getElementById("panelOffline").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    
    function closePanels() {
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
        document.getElementById("overlay").style.display = "none";
        hideEdit();
    }

    function renderHistory() {
        const h = document.getElementById("historyRender");
        h.innerHTML = logs.map((it, i) => `
            <div style="background:#000; border:1px solid #1a1a1a; padding:20px; border-radius:10px; margin-bottom:15px;">
                <div style="display:flex; justify-content:space-between; font-size:9px; color:var(--p-brand); font-weight:900; letter-spacing:1px; margin-bottom:8px;">
                    <span>${it.area}</span>
                    <span style="color:${it.priority==='Crítica'?'red':'#555'}">${it.priority}</span>
                </div>
                <h4 style="margin:0; font-size:1.1rem; line-height:1.2;">${it.title}</h4>
                <div style="margin-top:15px; display:flex; gap:15px;">
                    <button onclick="showEdit(${i})" style="background:none; border:none; color:#fff; font-size:10px; cursor:pointer; font-weight:700;">EDITAR</button>
                    <button onclick="deleteEntry(${i})" style="background:none; border:none; color:#333; font-size:10px; cursor:pointer;">ELIMINAR</button>
                </div>
                <div id="edit-pos-${i}"></div>
            </div>
        `).join('');
    }

    function showEdit(i) {
        const item = logs[i];
        const box = document.getElementById("quickEdit");
        document.getElementById("e-index").value = i;
        document.getElementById("e-title").value = item.title;
        document.getElementById("e-msg").value = item.message;
        document.getElementById(`edit-pos-${i}`).appendChild(box);
        box.style.display = "block";
    }

    function hideEdit() { document.getElementById("quickEdit").style.display = "none"; document.body.appendChild(document.getElementById("quickEdit")); }

    async function saveQuickEdit() {
        const i = document.getElementById("e-index").value;
        logs[i].title = document.getElementById("e-title").value;
        logs[i].message = document.getElementById("e-msg").value;
        await fetch(API_EVENTOS, { method: 'PUT', body: JSON.stringify(logs) });
        hideEdit(); renderHistory(); fetchData();
    }

    async function saveNew(e) {
        e.preventDefault();
        const n = { area: document.getElementById("f-area").value, priority: document.getElementById("f-prio").value, title: document.getElementById("f-title").value, message: document.getElementById("f-msg").value };
        logs.push(n);
        await fetch(API_EVENTOS, { method: 'PUT', body: JSON.stringify(logs) });
        closePanels(); fetchData();
    }

    async function deleteEntry(i) {
        if(!confirm("¿CONFIRMAR ELIMINACIÓN?")) return;
        logs.splice(i, 1);
        await fetch(API_EVENTOS, { method: 'PUT', body: JSON.stringify(logs.length ? logs : null) });
        renderHistory(); fetchData();
    }

    function toggleFS() {
        const el = document.getElementById("cio-app");
        if (!document.fullscreenElement) el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
        else document.exitFullscreen();
    }

    // --- Loop ---
    function loop(ts) {
        if(logs.length) {
            if(!startTime) startTime = ts;
            const p = (ts - startTime) / (TIEMPO_SLIDE * 1000);
            document.getElementById("progress-bar").style.width = Math.min(p * 100, 100) + "%";
            if(p >= 1) { currentIdx++; renderSlide(); startTime = ts; }
        }
        requestAnimationFrame(loop);
    }

    // --- Init ---
    setInterval(() => {
        const d = new Date();
        document.getElementById("main-time").textContent = d.toLocaleTimeString('es-UY', {hour12:false});
        document.getElementById("main-date").textContent = d.toLocaleDateString('es-UY', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
    }, 1000);

    initDots(); drawDots();
    fetchData(); requestAnimationFrame(loop);
    window.onresize = () => { initDots(); autoSizeTitle(); };
    setInterval(fetchData, 10000);
</script>
</body>
</html>
