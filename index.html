<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CIO Monitor">

    <style>
        #cio-app {
            --primary: #00d4d8;
            --accent: #006465; /* Color corporativo unificado */
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --bg-img: url('https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
        }

        #cio-app::before {
            content: ""; position: absolute; inset: 0;
            background-image: var(--bg-img); background-size: contain;
            background-position: center; background-repeat: no-repeat;
            opacity: 0.03; filter: grayscale(1); z-index: -1;
        }

        /* HEADER */
        #cio-app .main-header {
            height: 80px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--accent);
        }

        /* Ocultar en Fullscreen */
        #cio-app:fullscreen .main-header,
        #cio-app:-webkit-full-screen .main-header {
            display: none !important;
        }

        #cio-app #clockDisplay { font-family: monospace; font-size: 1.8rem; color: var(--primary); font-weight: bold; }

        /* BOTÓN FLOTANTE MÓVIL (ABAJO A LA DERECHA) */
        #cio-app #menu-toggle-float {
            display: none; position: fixed; bottom: 70px; right: 20px;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--accent); color: #fff; border: none;
            font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); z-index: 10015;
            align-items: center; justify-content: center;
        }

        #cio-app #mobile-menu {
            position: fixed; bottom: 140px; right: 20px; width: 220px;
            background: rgba(10, 26, 27, 0.98); display: none; flex-direction: column;
            padding: 15px; gap: 10px; border: 1px solid var(--accent);
            border-radius: 15px; z-index: 10010; backdrop-filter: blur(10px);
        }

        /* PANTALLA CENTRAL */
        #cio-app #display-board {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
        }

        #cio-app .info-container { width: 100%; transition: all 0.6s ease-in-out; }
        #cio-app .oculto { opacity: 0; transform: translateY(20px); filter: blur(10px); }

        /* PANELES */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 400px; height: 100%;
            background: #0a1a1b; border-left: 2px solid var(--accent); padding: 25px;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10020;
            box-sizing: border-box; overflow-y: auto;
        }
        #cio-app .side-panel.active { transform: translateX(0); }
        
        #cio-app .edit-box {
            background: #000; border: 1px solid var(--accent); padding: 20px;
            border-radius: 15px; margin-top: 15px; display: none;
        }

        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; padding: 12px; background: #111; color: #fff; 
            border: 1px solid #333; border-radius: 10px; margin-bottom: 12px; 
            text-align: center; box-sizing: border-box; font-size: 16px;
        }

        /* BOTONES UNIFICADOS AL COLOR #006465 */
        #cio-app .header-actions button, 
        #cio-app #mobile-menu button,
        #cio-app .btn-main,
        #cio-app #panelOffline button {
            background: var(--accent) !important;
            border: none !important;
            color: #fff !important; padding: 10px 15px; border-radius: 8px; 
            font-weight: bold; cursor: pointer;
        }

        #cio-app button:hover { filter: brightness(1.2); }

        /* TICKER BAR */
        #cio-app #ticker-bar {
            height: 50px; background: #050c0c; border-top: 1px solid var(--accent);
            display: flex; align-items: center; overflow: hidden; position: relative;
        }

        #cio-app #ticker-content {
            white-space: nowrap; position: absolute;
            animation: scrollText 20s linear infinite;
            font-weight: bold; font-size: 1.1rem;
        }

        @keyframes scrollText {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        @media (max-width: 768px) {
            #cio-app .header-actions { display: none; }
            #cio-app #menu-toggle-float { display: flex; }
            #cio-app .side-panel { width: 100%; height: 95%; top: auto; bottom: 0; transform: translateY(100%); border-radius: 25px 25px 0 0; }
            #cio-app .side-panel.active { transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; z-index:10002; backdrop-filter:blur(5px);" onclick="closePanels()"></div>

    <header class="main-header">
        <div class="header-actions">
            <button onclick="openForm()">＋ NUEVA</button>
            <button onclick="openHistory()">📋 HISTORIAL</button>
            <button onclick="toggleFS()">⛶ PANTALLA COMPLETA</button>
        </div>
        <div id="clockDisplay">00:00:00</div>
        <div><img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="30" style="filter: brightness(2);"></div>
    </header>

    <button id="menu-toggle-float" onclick="toggleMobileMenu()">☰</button>
    <div id="mobile-menu">
        <button onclick="openForm(); toggleMobileMenu();">＋ NUEVA NOVEDAD</button>
        <button onclick="openHistory(); toggleMobileMenu();">📋 HISTORIAL</button>
        <button onclick="openOfflinePanel(); toggleMobileMenu();" id="btn-offline-mob">OFFLINE (<span id="count-offline-mob">0</span>)</button>
        <button onclick="toggleMobileMenu()" style="background:transparent !important; border:1px solid #444 !important; font-size:12px; margin-top:10px;">CERRAR</button>
    </div>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel" style="letter-spacing: 2px; color: var(--primary); font-weight: bold;">CIO MONITOR</div>
            <div id="prioBadge" style="display: inline-block; padding: 6px 20px; border-radius: 50px; font-weight: 900; border: 1px solid var(--accent); margin: 15px 0; background: rgba(0, 100, 101, 0.1); font-size: 0.8rem;">SISTEMA ACTIVO</div>
            <h1 id="titleDisplay" style="margin:10px 0; line-height: 1.1;">...</h1>
            <p id="messageDisplay" style="font-size: 1.6rem; opacity: 0.8; max-width: 850px; margin: 0 auto;">Cargando...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">
            Sincronizando con Masterson Seguridad...
        </div>
    </div>
    
    <div id="progressLine" style="position: fixed; bottom: 50px; height: 3px; width: 0%; transition: width 0.1s linear;"></div>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--primary); text-align:center;">Historial</h2>
        <div id="historyList"></div>
        <div id="quickEdit" class="edit-box">
            <h3 style="color:var(--primary); margin-top:0">Editar Registro</h3>
            <input type="hidden" id="e-index">
            <input type="text" id="e-title" placeholder="Título">
            <textarea id="e-msg" rows="3" placeholder="Mensaje"></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="saveQuickEdit()" class="btn-main" style="flex:1;">GUARDAR</button>
                <button onclick="hideEdit()" style="flex:1; background:#222 !important;">CANCELAR</button>
            </div>
        </div>
        <button onclick="closePanels()" style="width:100%; margin-top:20px; background:none !important; border:1px solid #333 !important; color:gray !important;">CERRAR</button>
    </aside>

    <aside id="panelForm" class="side-panel">
        <h2 style="color:var(--primary); text-align:center;">Nueva Novedad</h2>
        <form onsubmit="saveNew(event)">
            <select id="f-area"><option>Monitoreo</option><option>Freschat</option><option>Atención</option><option>Tecnología</option></select>
            <select id="f-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
            <input type="text" id="f-title" placeholder="Título" required>
            <textarea id="f-msg" rows="4" placeholder="Mensaje" required></textarea>
            <button type="submit" class="btn-main" style="width:100%; padding:15px;">PUBLICAR</button>
            <button type="button" onclick="closePanels()" style="width:100%; margin-top:10px; background:none !important; border:1px solid #444 !important;">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelOffline" class="side-panel">
        <h2 style="color:var(--critico); text-align:center;">Offline</h2>
        <div id="offlineList"></div>
        <button onclick="closePanels()" style="width:100%; margin-top:20px;">CERRAR</button>
    </aside>
</div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let logs = [];
    let currentIdx = 0;
    let startTime = null;
    const SLIDE_TIME = 15;

    function toggleMobileMenu() {
        const menu = document.getElementById("mobile-menu");
        const overlay = document.getElementById("overlay");
        const isVisible = menu.style.display === "flex";
        menu.style.display = isVisible ? "none" : "flex";
        overlay.style.display = isVisible ? "none" : "block";
    }

    async function updateNetwork() {
        try {
            const resp = await fetch(RED_URL);
            const status = await resp.json();
            const ticker = document.getElementById("ticker-content");
            const countMob = document.getElementById("count-offline-mob");
            const offList = document.getElementById("offlineList");
            
            let caidos = [];
            if(status) {
                Object.keys(status).forEach(id => {
                    if(status[id].estado === "offline") caidos.push(id.replace(/_/g, ' '));
                });
            }

            if(caidos.length > 0) {
                ticker.innerHTML = `⚠️ OFFLINE: ${caidos.join(' • ')} — REVISAR ESTADO — `;
                ticker.style.color = "#ff4d4d";
                offList.innerHTML = caidos.map(n => `<div style="padding:15px; background:rgba(255,77,77,0.1); border:1px solid red; border-radius:10px; margin-bottom:10px; text-align:center;">⚠️ ${n}</div>`).join('');
            } else {
                ticker.innerHTML = `✔ Red estable en todos los servicios - Masterson Seguridad — `;
                ticker.style.color = "#00d4d8";
                offList.innerHTML = "<p style='text-align:center;color:gray'>Todos los servicios operativos.</p>";
            }
            if(countMob) countMob.textContent = caidos.length;
        } catch(e) {}
    }

    async function syncEvents() {
        try {
            const resp = await fetch(DB_URL);
            const data = await resp.json();
            logs = data || [];
            if(logs.length > 0 && !startTime) renderSlide();
        } catch(e) {}
    }

    function renderSlide() {
        if(!logs.length) return;
        const cont = document.getElementById("infoCont");
        cont.classList.add("oculto");
        
        setTimeout(() => {
            const item = logs[currentIdx % logs.length];
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("prioBadge").textContent = `PRIORIDAD ${item.priority}`;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            
            const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
            const color = colors[item.priority] || "#fff";
            document.getElementById("prioBadge").style.borderColor = color;
            document.getElementById("prioBadge").style.color = color;
            document.getElementById("progressLine").style.background = color;
            document.getElementById("titleDisplay").style.color = (item.priority === "Crítica") ? "#ff4d4d" : "white";

            autoSizeText();
            cont.classList.remove("oculto");
        }, 600);
    }

    function autoSizeText() {
        const t = document.getElementById('titleDisplay');
        t.style.fontSize = window.innerWidth < 768 ? "34px" : "70px";
    }

    function openHistory() { renderHistoryList(); document.getElementById("panelHistory").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function openForm() { document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function openOfflinePanel() { document.getElementById("panelOffline").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    
    function closePanels() { 
        document.querySelectorAll('.side-panel').forEach(el => el.classList.remove('active')); 
        document.getElementById("overlay").style.display = "none";
        document.getElementById("mobile-menu").style.display = "none";
        hideEdit();
    }

    function renderHistoryList() {
        const list = document.getElementById("historyList");
        list.innerHTML = logs.map((it, i) => `
            <div style="background:rgba(255,255,255,0.03); padding:15px; margin-bottom:10px; border-radius:12px; border-left:4px solid ${it.priority==='Crítica'?'red':'var(--accent)'}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="text-align:left"><strong style="font-size:14px">${it.title}</strong><br><small style="color:gray">${it.area}</small></div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="showQuickEdit(${i})" style="padding:6px 10px; border-radius:6px; font-size:10px; background:var(--accent); color:white; border:none;">EDITAR</button>
                        <button onclick="deleteEntry(${i})" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; padding:6px 10px; border-radius:6px; font-size:10px;">BORRAR</button>
                    </div>
                </div>
                <div id="edit-anchor-${i}"></div>
            </div>
        `).join('');
    }

    function showQuickEdit(idx) {
        const item = logs[idx];
        const editBox = document.getElementById("quickEdit");
        document.getElementById("e-index").value = idx;
        document.getElementById("e-title").value = item.title;
        document.getElementById("e-msg").value = item.message;
        document.getElementById(`edit-anchor-${idx}`).appendChild(editBox);
        editBox.style.display = "block";
    }

    function hideEdit() { document.getElementById("quickEdit").style.display = "none"; document.body.appendChild(document.getElementById("quickEdit")); }

    async function saveQuickEdit() {
        const idx = document.getElementById("e-index").value;
        logs[idx].title = document.getElementById("e-title").value;
        logs[idx].message = document.getElementById("e-msg").value;
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        hideEdit(); renderHistoryList(); renderSlide();
    }

    async function saveNew(e) {
        e.preventDefault();
        const entry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value
        };
        logs.push(entry);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        closePanels(); syncEvents();
    }

    async function deleteEntry(idx) {
        if(!confirm("¿Eliminar?")) return;
        logs.splice(idx, 1);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs.length ? logs : null) });
        renderHistoryList(); syncEvents();
    }

    function toggleFS() { 
        const app = document.getElementById("cio-app");
        if (!document.fullscreenElement) {
            if (app.requestFullscreen) app.requestFullscreen();
            else if (app.webkitRequestFullscreen) app.webkitRequestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function mainLoop(ts) {
        if(!logs.length) { requestAnimationFrame(mainLoop); return; }
        if(!startTime) startTime = ts;
        const progress = (ts - startTime) / (SLIDE_TIME * 1000);
        document.getElementById("progressLine").style.width = (progress * 100) + "%";
        if(progress >= 1) { currentIdx++; renderSlide(); startTime = ts; }
        requestAnimationFrame(mainLoop);
    }

    setInterval(() => { document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString('es-UY', { hour12: false }); }, 1000);
    setInterval(updateNetwork, 5000);
    setInterval(syncEvents, 10000);
    
    updateNetwork(); syncEvents(); requestAnimationFrame(mainLoop);
    window.onresize = autoSizeText;
</script>
</body>
</html>
