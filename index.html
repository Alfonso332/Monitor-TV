<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor | Masterson</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* === CONFIGURACIÓN BASE === */
        #cio-app {
            --primary: #006465;
            --accent: #00d1d1;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --online: #2ecc71;
            --bg-emergencia: #1a0000; 

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
            transition: background 0.8s ease;
        }

        #cio-app.pantalla-critica { background: var(--bg-emergencia) !important; }
        #cio-app * { box-sizing: border-box !important; }

        /* HEADER */
        #cio-app .main-header {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--primary); z-index: 10;
        }
        #cio-app:fullscreen .main-header { display: none !important; }
        
        #cio-app .fs-clock { display: none; }
        #cio-app:fullscreen .fs-clock { 
            display: block; position: absolute; top: 20px; right: 30px; 
            font-family: monospace; font-size: 2.5rem; font-weight: 900; 
            color: var(--primary); z-index: 100;
        }

        /* DISPLAY CENTRAL - TAMAÑO MAXIMIZADO */
        #cio-app #display-board { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        #cio-app #titleDisplay { font-size: 95px; font-weight: 900; margin: 15px 0; text-transform: uppercase; line-height: 1; letter-spacing: -2px; }
        #cio-app #messageDisplay { font-size: 2.5rem; opacity: 0.8; font-weight: 400; max-width: 85%; line-height: 1.2; }
        #cio-app #areaLabel { letter-spacing: 10px; font-weight: 900; font-size: 1.2rem; margin-bottom: 15px; text-transform: uppercase; }
        
        #cio-app .info-container { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; display: flex; flex-direction: column; align-items: center; }
        #cio-app .oculto { opacity: 0; transform: scale(0.92); filter: blur(15px); }

        /* TICKER / BARRA INFERIOR */
        #cio-app #ticker-bar { 
            height: 75px; background: #050505; border-top: 1px solid #111; 
            display: flex; align-items: center; overflow: hidden; position: relative; 
        }

        #cio-app #ticker-content { 
            display: flex; align-items: center; gap: 80px; white-space: nowrap; 
            position: absolute; left: 0;
            animation: scroll-ticker 15s linear infinite; 
        }

        @keyframes scroll-ticker {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        #cio-app .status-badge { 
            padding: 12px 30px; border-radius: 8px; font-size: 1.6rem; 
            font-weight: 900; text-transform: uppercase; flex-shrink: 0;
        }
        #cio-app .status-badge.offline { background: rgba(255, 77, 77, 0.15); border: 3px solid var(--critico); color: var(--critico); box-shadow: 0 0 15px rgba(255, 77, 77, 0.2); }
        #cio-app .status-badge.restored { background: rgba(46, 204, 113, 0.15); border: 3px solid var(--online); color: var(--online); box-shadow: 0 0 15px rgba(46, 204, 113, 0.2); }

        /* PANELES LATERALES */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 420px; height: 100%;
            background: #0a0a0a; border-left: 1px solid var(--primary); padding: 35px;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10100;
            overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        #cio-app .side-panel.active { transform: translateX(0); }

        /* COMPONENTES DE INTERFAZ */
        #cio-app .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 20px; }
        #cio-app .stat-box { background: #111; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        #cio-app .stat-box:hover { border-color: var(--primary); background: #151515; }
        #cio-app .stat-box b { display: block; font-size: 1.5rem; line-height: 1; }
        #cio-app .stat-box small { font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; margin-top: 5px; display: block; }

        #cio-app #offline-details {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out;
            background: #080808; border-radius: 12px; margin-bottom: 20px;
        }
        #cio-app #offline-details.show { max-height: 500px; border: 1px solid #333; padding: 15px; }
        #cio-app .off-item { font-size: 0.9rem; color: var(--critico); padding: 8px 0; border-bottom: 1px solid #1a1a1a; }

        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; padding: 16px; background: #121212 !important;
            color: #fff !important; border: 1px solid #222 !important; border-radius: 12px; 
            text-align: center; margin-bottom: 15px; font-size: 1rem; transition: 0.3s;
        }
        #cio-app input:focus, #cio-app select:focus { border-color: var(--primary); outline: none; background: #181818 !important; }

        #cio-app .btn-pill {
            background: var(--primary) !important; color: #fff !important; border: none; padding: 15px 25px; border-radius: 50px;
            font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; margin-bottom: 12px; transition: 0.3s;
        }
        #cio-app .btn-pill:hover { filter: brightness(1.2); transform: translateY(-2px); }
        #cio-app .btn-sec { background: #1a1a1a !important; border: 1px solid #333; }

        #cio-app .history-item { 
            background: #0d0d0d; padding: 18px; border-radius: 14px; margin-bottom: 15px; 
            border-left: 5px solid var(--primary); transition: 0.3s;
        }
        #cio-app .history-item:hover { background: #121212; }

        #cio-app #menu-toggle-float {
            display: none; position: fixed; bottom: 95px; right: 25px;
            width: 70px; height: 70px; border-radius: 50%;
            background: var(--primary); color: #fff; border: none; font-size: 28px; 
            z-index: 10050; box-shadow: 0 5px 20px rgba(0,0,0,0.5); cursor: pointer;
        }

        @media (max-width: 768px) {
            #cio-app #menu-toggle-float { display: flex; align-items: center; justify-content: center; }
            #cio-app .header-actions { display: none !important; }
            #cio-app .side-panel { width: 92%; padding: 25px; }
            #cio-app #titleDisplay { font-size: 48px !important; }
            #cio-app #messageDisplay { font-size: 1.6rem !important; }
        }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="fsClockDisplay" class="fs-clock">00:00:00</div>
    <div id="cio-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; z-index:10090; backdrop-filter:blur(8px);" onclick="closePanels()"></div>

    <header class="main-header">
        <div class="header-actions" style="display:flex; gap:12px;">
            <button onclick="openFormPanel()" class="btn-pill" style="padding:10px 22px; width:auto; margin:0;">＋ NUEVA</button>
            <button onclick="openPanel('panelHistory')" class="btn-pill btn-sec" style="padding:10px 22px; width:auto; margin:0;">📋 HISTORIAL</button>
            <button onclick="toggleFS()" style="background:none; border:1px solid #444; color:#777; padding:10px 15px; border-radius:10px; cursor:pointer;">⛶ TV</button>
        </div>
        <div id="clockDisplay" style="font-family:monospace; font-size:1.8rem; font-weight:900; color:var(--primary);">00:00:00</div>
        <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="40">
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">MASTERSON MONITOR</div>
            <h1 id="titleDisplay">SISTEMA CIO</h1>
            <p id="messageDisplay">Sincronizando con base de datos...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content"><span>SISTEMA INICIADO - ESCANEANDO SERVICIOS...</span></div>
    </div>
    
    <div id="progressLine" style="position: fixed; bottom: 75px; height: 6px; width: 0%; background: var(--primary); z-index: 5;"></div>

    <button id="menu-toggle-float" onclick="openPanel('panelMobileMenu')">☰</button>

    <aside id="panelMobileMenu" class="side-panel">
        <h2 style="color:var(--primary); text-align:center; margin-bottom:30px;">MENÚ RÁPIDO</h2>
        <button onclick="openFormPanel()" class="btn-pill">＋ NUEVA NOVEDAD</button>
        <button onclick="openPanel('panelHistory')" class="btn-pill btn-sec">📋 VER HISTORIAL</button>
        <button onclick="closePanels()" class="btn-pill btn-sec" style="margin-top:40px;">CERRAR</button>
    </aside>

    <aside id="panelForm" class="side-panel">
        <h2 id="formTitle" style="color:var(--primary); text-align:center; margin-bottom:25px;">REGISTRAR NOVEDAD</h2>
        <form id="mainForm" onsubmit="saveEntry(event)">
            <input type="hidden" id="f-id" value="">
            <label style="font-size:0.8rem; color:#666; display:block; margin-bottom:5px;">ÁREA RESPONSABLE</label>
            <select id="f-area">
                <option>Monitoreo</option>
                <option>Freschat</option>
                <option>Atención al Cliente</option>
                <option>Novedad Interna</option>
            </select>
            <label style="font-size:0.8rem; color:#666; display:block; margin-bottom:5px;">PRIORIDAD</label>
            <select id="f-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
            <input type="text" id="f-title" placeholder="Título de la novedad" required>
            <textarea id="f-msg" rows="6" placeholder="Descripción detallada de lo sucedido..." required></textarea>
            <button type="submit" class="btn-pill">PUBLICAR EN PANTALLA</button>
            <button type="button" onclick="closePanels()" class="btn-pill btn-sec">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:20px;">ESTADO OPERATIVO</h2>
        
        <div class="stats-grid">
            <div class="stat-box"><b id="stat-total">0</b><small>Total</small></div>
            <div class="stat-box"><b id="stat-crit" style="color:var(--critico)">0</b><small>Críticas</small></div>
            <div class="stat-box" onclick="toggleOfflineDetails()">
                <b id="stat-off" style="color:var(--accent)">0</b>
                <small>Offline ▾</small>
            </div>
        </div>
        <div id="offline-details"></div>

        <button onclick="downloadPDF()" class="btn-pill" style="background:#1a1a1a !important; border:1px solid #444; margin-bottom:25px; font-size:0.8rem;">⬇ GENERAR REPORTE POR TURNOS</button>

        <div id="historyList"></div>
        <button onclick="closePanels()" class="btn-pill btn-sec" style="margin-top:20px;">VOLVER</button>
    </aside>
</div>

<script>
    const cio_DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const cio_RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let cio_logs = [], cio_currentIdx = 0, cio_startTime = null;
    let prevStatus = {}, recentlyRestored = {};
    const cio_SLIDE_TIME = 15;

    // --- LOGICA DE RED Y TICKER ---
    async function updateNetwork() {
        try {
            const resp = await fetch(cio_RED_URL);
            const status = await resp.json();
            const ticker = document.getElementById("ticker-content");
            const offDetails = document.getElementById("offline-details");
            let tickerHTML = "", detailsHTML = "", offCount = 0;

            if(status) {
                Object.keys(status).forEach(id => {
                    const currentItem = status[id];
                    const name = id.replace(/_/g, ' ');

                    if (prevStatus[id] && prevStatus[id].estado === "offline" && currentItem.estado === "online") {
                        recentlyRestored[id] = 2; // Mostrar en verde por 2 ciclos
                    }

                    if (currentItem.estado === "offline") {
                        tickerHTML += `<div class="status-badge offline">⚠️ OFF: ${name}</div>`;
                        detailsHTML += `<div class="off-item">● ${name}</div>`;
                        offCount++;
                        delete recentlyRestored[id];
                    } else if (recentlyRestored[id] > 0) {
                        tickerHTML += `<div class="status-badge restored">✔ ${name}: RESTABLECIDO</div>`;
                        recentlyRestored[id]--;
                    }
                });
                prevStatus = JSON.parse(JSON.stringify(status));
            }

            if(tickerHTML !== "") {
                ticker.innerHTML = tickerHTML;
                const itemsCount = offCount + Object.keys(recentlyRestored).filter(k => recentlyRestored[k] > 0).length;
                ticker.style.animation = `scroll-ticker ${itemsCount * 8 + 5}s linear infinite`;
                offDetails.innerHTML = detailsHTML;
            } else {
                ticker.innerHTML = `<span style="color:var(--primary); font-size:1.4rem; font-weight:bold; width:100vw; text-align:center;">✔ TODOS LOS SERVICIOS OPERATIVOS EN RED</span>`;
                ticker.style.animation = "none"; ticker.style.left = "0";
                offDetails.innerHTML = "<div class='off-item' style='color:#555; text-align:center;'>No hay servicios caídos</div>";
            }
            document.getElementById("stat-off").textContent = offCount;
        } catch(e) { console.error("Error Red:", e); }
    }

    // --- LOGICA DE EVENTOS ---
    async function syncEvents() {
        try {
            const resp = await fetch(cio_DB_URL);
            const data = await resp.json();
            const now = Date.now();
            
            // Filtro: Solo mostrar novedades de las últimas 24hs
            cio_logs = (data ? (Array.isArray(data) ? data : Object.values(data)) : [])
                        .filter(it => !it.timestamp || (now - it.timestamp < 86400000));
            
            document.getElementById("stat-total").textContent = cio_logs.length;
            document.getElementById("stat-crit").textContent = cio_logs.filter(it => it.priority === "Crítica").length;
            
            if(cio_logs.length > 0 && !cio_startTime) renderSlide();
            renderHistory();
        } catch(e) { console.error("Error Eventos:", e); }
    }

    function renderSlide() {
        if(!cio_logs.length) {
            document.getElementById("titleDisplay").textContent = "SIN NOVEDADES";
            document.getElementById("messageDisplay").textContent = "Monitor en espera...";
            return;
        }
        const cont = document.getElementById("infoCont"), app = document.getElementById("cio-app");
        cont.classList.add("oculto");
        
        setTimeout(() => {
            const item = cio_logs[cio_currentIdx % cio_logs.length];
            const color = {"Baja":"var(--accent)", "Media":"#f1c40f", "Alta":"#e67e22", "Crítica":"#ff4d4d"}[item.priority] || "#fff";
            
            app.classList.toggle("pantalla-critica", item.priority === "Crítica");

            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("areaLabel").style.color = color;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            document.getElementById("progressLine").style.background = color;
            cont.classList.remove("oculto");
        }, 600);
    }

    function renderHistory() {
        document.getElementById("historyList").innerHTML = cio_logs.map((it, i) => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <small style="color:var(--accent); font-weight:bold; letter-spacing:1px;">${it.area}</small>
                    <small style="opacity:0.4;">${new Date(it.timestamp).toLocaleTimeString([], {hour:'2-numeric', minute:'2-numeric'})}</small>
                </div>
                <div style="font-weight:bold; margin:8px 0; font-size:1.1rem;">${it.title}</div>
                <div style="font-size:0.85rem; opacity:0.7; margin-bottom:12px; line-height:1.4;">${it.message}</div>
                <div style="display:flex; gap:15px; border-top:1px solid #1a1a1a; pt:10px; margin-top:10px; padding-top:10px;">
                    <button onclick="editEntry(${i})" style="color:var(--accent); background:none; border:none; cursor:pointer; font-size:0.75rem; font-weight:bold; text-transform:uppercase;">EDITAR</button>
                    <button onclick="deleteEntry(${i})" style="color:var(--critico); background:none; border:none; cursor:pointer; font-size:0.75rem; font-weight:bold; text-transform:uppercase;">ELIMINAR</button>
                </div>
            </div>
        `).join('');
    }

    async function saveEntry(e) {
        e.preventDefault();
        const id = document.getElementById("f-id").value;
        const entry = {
            area: document.getElementById("f-area").value, 
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value, 
            message: document.getElementById("f-msg").value,
            timestamp: id !== "" ? cio_logs[id].timestamp : Date.now()
        };
        if(id !== "") cio_logs[id] = entry; else cio_logs.push(entry);
        await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
        closePanels(); syncEvents();
    }

    async function deleteEntry(idx) {
        if(confirm("¿Seguro que desea eliminar esta novedad permanentemente?")) {
            cio_logs.splice(idx, 1);
            await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
            syncEvents();
        }
    }

    function editEntry(idx) {
        const it = cio_logs[idx];
        document.getElementById("f-id").value = idx;
        document.getElementById("f-area").value = it.area;
        document.getElementById("f-prio").value = it.priority;
        document.getElementById("f-title").value = it.title;
        document.getElementById("f-msg").value = it.message;
        openPanel('panelForm');
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = jsPDF();
        const now = new Date();
        doc.setFontSize(18);
        doc.setTextColor(0, 100, 101);
        doc.text("REPORTE DIARIO DE NOVEDADES - MASTERSON", 14, 20);
        
        const getTurno = (ts) => {
            const h = new Date(ts).getHours();
            if(h >= 6 && h < 14) return "Turno Mañana (06:00 - 14:00)";
            if(h >= 14 && h < 22) return "Turno Tarde (14:00 - 22:00)";
            return "Turno Noche (22:00 - 06:00)";
        };

        let currentY = 35;
        ["Turno Mañana (06:00 - 14:00)", "Turno Tarde (14:00 - 22:00)", "Turno Noche (22:00 - 06:00)"].forEach(turno => {
            const filtered = cio_logs.filter(it => getTurno(it.timestamp) === turno);
            doc.setFontSize(13); doc.setTextColor(0, 100, 101); doc.text(turno, 14, currentY);
            doc.autoTable({
                startY: currentY + 4,
                head: [['Área', 'Prioridad', 'Título', 'Mensaje']],
                body: filtered.map(it => [it.area, it.priority, it.title, it.message]),
                theme: 'striped', headStyles: { fillColor: [0, 100, 101] }, margin: {left: 14}
            });
            currentY = doc.lastAutoTable.finalY + 15;
        });
        doc.save(`Reporte_Masterson_${now.toLocaleDateString()}.pdf`);
    }

    // --- UTILIDADES ---
    function openPanel(id) { closePanels(); document.getElementById(id).classList.add("active"); document.getElementById("cio-overlay").style.display = "block"; }
    function closePanels() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); document.getElementById("cio-overlay").style.display = "none"; }
    function toggleFS() { if (!document.fullscreenElement) document.getElementById("cio-app").requestFullscreen(); else document.exitFullscreen(); }
    function openFormPanel() { document.getElementById("mainForm").reset(); document.getElementById("f-id").value = ""; openPanel('panelForm'); }
    function toggleOfflineDetails() { document.getElementById("offline-details").classList.toggle("show"); }
    
    function loop(ts) {
        if(cio_logs.length) {
            if(!cio_startTime) cio_startTime = ts;
            const progress = (ts - cio_startTime) / (cio_SLIDE_TIME * 1000);
            document.getElementById("progressLine").style.width = (Math.min(progress, 1) * 100) + "%";
            if(progress >= 1) { cio_currentIdx++; renderSlide(); cio_startTime = ts; }
        }
        requestAnimationFrame(loop);
    }

    setInterval(() => {
        const UruguayTime = new Date().toLocaleTimeString('es-UY', { hour12: false });
        document.getElementById("clockDisplay").textContent = UruguayTime;
        document.getElementById("fsClockDisplay").textContent = UruguayTime;
    }, 1000);

    setInterval(updateNetwork, 5000); 
    setInterval(syncEvents, 10000);
    
    updateNetwork(); 
    syncEvents(); 
    requestAnimationFrame(loop);
</script>
</body>
</html>
