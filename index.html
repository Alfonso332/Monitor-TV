<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor Elite | Masterson</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* === RESET Y VARIABLES CIO === */
        #cio-app {
            --primary: #006465;
            --accent: #00d1d1;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --online: #2ecc71;
            --warning: #f1c40f;
            --orange: #e67e22;
            --bg-emergencia: #1a0000; 

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
            transition: background 0.8s ease;
        }

        #cio-app.pantalla-critica { background: var(--bg-emergencia) !important; }
        #cio-app * { box-sizing: border-box !important; }

        /* CABECERA */
        #cio-app .main-header {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--primary); z-index: 1000;
        }
        #cio-app:fullscreen .main-header { display: none !important; }

        /* RELOJ FULLSCREEN */
        #cio-app .fs-clock { display: none; }
        #cio-app:fullscreen .fs-clock { 
            display: block; position: absolute; top: 20px; right: 30px; 
            font-family: monospace; font-size: 3rem; font-weight: 900; 
            color: var(--primary); z-index: 1001; text-shadow: 0 0 20px rgba(0,209,209,0.3);
        }

        /* KPI BAR */
        .kpi-bar {
            display: flex; justify-content: space-evenly; align-items: center;
            background: #050505; padding: 12px 0; border-bottom: 2px solid #1a1a1a;
            min-height: 90px;
        }
        .kpi-card { text-align: center; }
        .kpi-value { 
            font-size: 2.3rem; font-weight: 900; font-family: 'Arial Black', sans-serif; 
            color: var(--accent); line-height: 1; display: flex; align-items: center; gap: 8px;
        }
        .kpi-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-top: 5px; display: block;}
        
        /* FLECHA ANIMADA */
        .trend-arrow { display: inline-block; animation: arrowMove 1.5s infinite alternate ease-in-out; font-size: 1.8rem; }
        @keyframes arrowMove { from { transform: translateY(3px); } to { transform: translateY(-3px); } }

        /* PUESTOS DINÁMICOS */
        .puestos-container { display: flex; gap: 20px; align-items: center; border-left: 2px solid #222; padding-left: 30px; }
        .puesto-item { display: flex; flex-direction: column; align-items: center; transition: all 0.5s ease; }
        .puesto-val { font-size: 1.6rem; font-weight: 900; font-family: monospace; }
        .puesto-lab { font-size: 0.6rem; opacity: 0.5; font-weight: bold; }

        /* ÁREA CENTRAL */
        #cio-app #display-board { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; }
        #cio-app #titleDisplay { font-size: 85px; font-weight: 900; margin: 15px 0; text-transform: uppercase; line-height: 0.9; }
        #cio-app #messageDisplay { font-size: 2.4rem; opacity: 0.8; max-width: 85%; line-height: 1.2; margin: 0 auto; font-weight: 300; }
        #cio-app .area-tag { letter-spacing: 12px; font-weight: 900; font-size: 1.3rem; text-transform: uppercase; margin-bottom: 15px; }
        #cio-app .info-container { transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; }
        #cio-app .oculto { opacity: 0; transform: translateY(40px); filter: blur(15px); }

        /* TICKER CAPSULAS */
        #cio-app #ticker-bar { 
            height: 80px; background: #050505; border-top: 1px solid #111; 
            display: flex; align-items: center; overflow: hidden; position: relative; 
        }
        #cio-app #ticker-content { 
            display: flex; align-items: center; gap: 40px; white-space: nowrap; 
            position: absolute; left: 0; animation: scroll-ticker 25s linear infinite; 
        }
        @keyframes scroll-ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .capsula-off {
            background: rgba(255, 77, 77, 0.1); border: 2px solid var(--critico);
            color: var(--critico); padding: 8px 20px; border-radius: 50px;
            font-weight: 900; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.2);
        }

        /* PANELES CONTROL */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 450px; height: 100%;
            background: #0d0d0d; border-left: 2px solid var(--primary); padding: 35px;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.7, 0, 0.3, 1); z-index: 10100;
            overflow-y: auto;
        }
        #cio-app .side-panel.active { transform: translateX(0); }

        .puestos-input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .p-field { background: #1a1a1a !important; border: 1px solid #333 !important; padding: 10px !important; text-align: center; border-radius: 8px; color: white; width: 100%; }
        
        #cio-app .btn-pill {
            background: var(--primary) !important; color: #fff !important; border: none; padding: 14px; border-radius: 50px;
            font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; margin-bottom: 10px; text-align: center;
        }
        #cio-app .btn-sec { background: #1a1a1a !important; border: 1px solid #333 !important; }
        #cio-app .btn-pdf { background: transparent !important; border: 1px solid var(--accent) !important; color: var(--accent) !important; }

        .history-card { background: #151515; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid var(--primary); }
        #progressLine { position: fixed; bottom: 80px; height: 5px; width: 0%; background: var(--primary); z-index: 10; }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="fsClockDisplay" class="fs-clock">00:00:00</div>
    <div id="cio-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; z-index:10090; backdrop-filter:blur(8px);" onclick="closePanels()"></div>

    <header class="main-header">
        <div style="display:flex; gap:12px;">
            <button onclick="openPanel('panelHistory')" class="btn-pill btn-sec" style="padding:10px 20px; width:auto;">⚙️ PANEL CONTROL</button>
            <button onclick="toggleFS()" style="background:none; border:1px solid #444; color:#666; padding:8px 15px; border-radius:10px; cursor:pointer; font-weight:bold;">⛶ MODO TV</button>
        </div>
        <div id="clockDisplay" style="font-family:monospace; font-size:1.8rem; font-weight:900; color:var(--primary);">00:00:00</div>
        <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="40">
    </header>

    <div class="kpi-bar">
        <div class="kpi-card">
            <span id="v-sla" class="kpi-value">--%</span>
            <span class="kpi-label">Nivel de Servicio</span>
        </div>
        <div class="kpi-card">
            <span id="v-calls" class="kpi-value">0</span>
            <span class="kpi-label">Llamadas Hoy</span>
        </div>
        <div class="puestos-container" id="puestos-display"></div>
    </div>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel" class="area-tag">SISTEMA CIO</div>
            <h1 id="titleDisplay">MONITOR INACTIVO</h1>
            <p id="messageDisplay">No hay novedades registradas para mostrar actualmente.</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">
            <span style="color:#222; font-weight:900;">INICIALIZANDO SISTEMAS...</span>
        </div>
    </div>
    
    <div id="progressLine"></div>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:20px;">GESTOR OPERATIVO</h2>
        
        <div style="background:#1a1a1a; padding:20px; border-radius:15px; border:1px solid #222; margin-bottom:20px;">
            <label style="color:var(--primary); font-size:0.7rem; font-weight:bold;">MÉTRICAS CORE</label>
            <div style="display:flex; gap:10px; margin-bottom:15px; margin-top:5px;">
                <input type="number" id="kpi-sla-input" placeholder="NS %" class="p-field">
                <input type="number" id="kpi-calls-input" placeholder="Llamadas" class="p-field">
            </div>

            <label style="color:var(--primary); font-size:0.7rem; font-weight:bold;">CARGA PUESTOS (P1-P9)</label>
            <div class="puestos-input-grid" id="puestos-inputs"></div>
            <button onclick="saveKPIs()" class="btn-pill">ACTUALIZAR MONITOR</button>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <button onclick="openFormPanel()" class="btn-pill" style="margin:0;">＋ NOVEDAD</button>
            <button onclick="downloadPDF()" class="btn-pill btn-pdf" style="margin:0;">⬇ PDF TURNO</button>
        </div>

        <div id="historyList"></div>
        <button onclick="closePanels()" class="btn-pill btn-sec" style="margin-top:20px;">CERRAR</button>
    </aside>

    <aside id="panelForm" class="side-panel">
        <h2 id="formTitle" style="color:var(--primary); text-align:center;">NUEVA ENTRADA</h2>
        <form id="mainForm" onsubmit="saveEntry(event)">
            <input type="hidden" id="f-id" value="">
            <select id="f-area" class="p-field" style="text-align:left;"><option>Monitoreo</option><option>Freschat</option><option>Atención al cliente</option><option>Infraestructura</option><option>Novedad Interna</option></select>
            <select id="f-prio" class="p-field" style="text-align:left;"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
            <input type="text" id="f-title" placeholder="Título corto" required class="p-field" style="text-align:left;">
            <textarea id="f-msg" rows="8" placeholder="Descripción detallada de la incidencia..." required class="p-field" style="text-align:left;"></textarea>
            <button type="submit" class="btn-pill">PUBLICAR AHORA</button>
            <button type="button" onclick="openPanel('panelHistory')" class="btn-pill btn-sec">REGRESAR</button>
        </form>
    </aside>
</div>

<script>
    const cio_DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const cio_RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    const cio_KPI_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/kpis_v2.json";
    
    let cio_logs = [], cio_currentIdx = 0, cio_startTime = null;
    let prevSLA = -1; // Inicializamos para detectar el primer cambio
    const cio_SLIDE_TIME = 40;

    function initPuestos() {
        const inputCont = document.getElementById('puestos-inputs');
        for(let i=1; i<=9; i++) {
            inputCont.innerHTML += `<input type="number" id="inp-p${i}" class="p-field" placeholder="P${i}" value="0">`;
        }
    }

    function getLevelColor(val, max) {
        if(val <= 0) return '#333';
        const ratio = val / (max || 1);
        if(ratio < 0.3) return 'var(--critico)';
        if(ratio < 0.6) return 'var(--orange)';
        if(ratio < 0.8) return 'var(--warning)';
        return 'var(--online)';
    }

    async function saveKPIs() {
        const payload = {
            sla: document.getElementById("kpi-sla-input").value || 0,
            calls: document.getElementById("kpi-calls-input").value || 0,
            puestos: {}
        };
        for(let i=1; i<=9; i++) { payload.puestos[`p${i}`] = document.getElementById(`inp-p${i}`).value || 0; }
        await fetch(cio_KPI_URL, { method: 'PUT', body: JSON.stringify(payload) });
        syncKPIs();
    }

    async function syncKPIs() {
        try {
            const resp = await fetch(cio_KPI_URL);
            const data = await resp.json();
            if(!data) return;

            const currentSLA = parseFloat(data.sla) || 0;
            
            // LÓGICA DE COMPARACIÓN DE FLECHA
            let arrowIcon = "▲";
            let arrowColor = "var(--online)";

            if (prevSLA !== -1 && currentSLA < prevSLA) {
                arrowIcon = "▼";
                arrowColor = "var(--critico)";
            }

            document.getElementById("v-sla").innerHTML = `${data.sla}% <span class="trend-arrow" style="color:${arrowColor}">${arrowIcon}</span>`;
            document.getElementById("v-calls").textContent = parseInt(data.calls).toLocaleString('es-UY');
            
            const pDisplay = document.getElementById("puestos-display");
            const pValues = Object.values(data.puestos || {}).map(Number);
            const maxVal = Math.max(...pValues, 1);
            
            let pHTML = "";
            for(let i=1; i<=9; i++) {
                const val = parseInt(data.puestos[`p${i}`] || 0);
                document.getElementById(`inp-p${i}`).value = val;
                if(val > 0) {
                    const color = getLevelColor(val, maxVal);
                    pHTML += `<div class="puesto-item">
                                <span class="puesto-val" style="color:${color}">${val}</span>
                                <span class="puesto-lab">P${i}</span>
                              </div>`;
                }
            }
            pDisplay.innerHTML = pHTML;
            prevSLA = currentSLA; // Guardamos el valor actual para la próxima comparación
        } catch(e) {}
    }

    async function updateNetwork() {
        try {
            const resp = await fetch(cio_RED_URL);
            const status = await resp.json();
            const ticker = document.getElementById("ticker-content");
            let tickerHTML = "";

            if(status) {
                Object.keys(status).forEach(id => {
                    if (status[id].estado === "offline") {
                        const name = id.toUpperCase().replace(/_/g, ' ');
                        tickerHTML += `<div class="capsula-off">⚠️ OFF: ${name}</div>`;
                    }
                });
            }
            ticker.innerHTML = tickerHTML || `<span style="color:var(--online); font-size:1.5rem; font-weight:900;">✔ TODOS LOS SERVICIOS OPERATIVOS</span>`;
        } catch(e) {}
    }

    async function syncEvents() {
        try {
            const resp = await fetch(cio_DB_URL);
            const data = await resp.json();
            cio_logs = (data ? (Array.isArray(data) ? data : Object.values(data)) : []);
            if(cio_logs.length > 0 && !cio_startTime) renderSlide();
            renderHistory();
        } catch(e) {}
    }

    function renderSlide() {
        if(!cio_logs.length) return;
        const cont = document.getElementById("infoCont");
        cont.classList.add("oculto");
        setTimeout(() => {
            const item = cio_logs[cio_currentIdx % cio_logs.length];
            const colors = {"Baja":"var(--accent)", "Media":"#f1c40f", "Alta":"#e67e22", "Crítica":"#ff4d4d"};
            const color = colors[item.priority] || "#fff";

            document.getElementById("cio-app").classList.toggle("pantalla-critica", item.priority === "Crítica");
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("areaLabel").style.color = color;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            document.getElementById("progressLine").style.background = color;
            cont.classList.remove("oculto");
        }, 700);
    }

    function renderHistory() {
        document.getElementById("historyList").innerHTML = cio_logs.map((it, i) => `
            <div class="history-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <b style="color:var(--accent)">${it.area}</b>
                    <small style="opacity:0.5">${it.priority}</small>
                </div>
                <div style="font-weight:bold; font-size:0.9rem;">${it.title}</div>
                <div style="display:flex; gap:15px; margin-top:10px;">
                    <button onclick="editEntry(${i})" style="color:var(--accent); background:none; border:none; cursor:pointer; font-size:0.75rem; font-weight:bold;">EDITAR</button>
                    <button onclick="deleteEntry(${i})" style="color:red; background:none; border:none; cursor:pointer; font-size:0.75rem; font-weight:bold;">BORRAR</button>
                </div>
            </div>`).join('');
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = jsPDF();
        const now = new Date(), h = now.getHours();
        let turno = (h >= 6 && h < 14) ? "MAÑANA" : (h >= 14 && h < 22) ? "TARDE" : "NOCHE";

        doc.setFillColor(0, 100, 101); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.text(`REPORTE CIO - TURNO ${turno}`, 15, 25);
        doc.setFontSize(10); doc.text(`Fecha: ${now.toLocaleString()}`, 15, 33);

        doc.autoTable({
            startY: 45,
            head: [['Área', 'Prioridad', 'Título', 'Descripción']],
            body: cio_logs.map(it => [it.area, it.priority, it.title, it.message]),
            theme: 'grid',
            headStyles: { fillColor: [0, 80, 81] },
            styles: { fontSize: 8, overflow: 'linebreak' },
            columnStyles: { 3: { cellWidth: 90 } }
        });
        doc.save(`CIO_Reporte_${turno}.pdf`);
    }

    async function saveEntry(e) {
        e.preventDefault();
        const id = document.getElementById("f-id").value;
        const entry = {
            area: document.getElementById("f-area").value, priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value, message: document.getElementById("f-msg").value,
            timestamp: id !== "" ? cio_logs[id].timestamp : Date.now()
        };
        if(id !== "") cio_logs[id] = entry; else cio_logs.push(entry);
        await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
        openPanel('panelHistory'); syncEvents();
    }

    function editEntry(idx) {
        const it = cio_logs[idx];
        document.getElementById("f-id").value = idx;
        document.getElementById("f-area").value = it.area;
        document.getElementById("f-prio").value = it.priority;
        document.getElementById("f-title").value = it.title;
        document.getElementById("f-msg").value = it.message;
        openPanel('panelForm');
    }

    async function deleteEntry(idx) { if(confirm("¿Eliminar?")) { cio_logs.splice(idx, 1); await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) }); syncEvents(); } }
    function openPanel(id) { closePanels(); document.getElementById(id).classList.add("active"); document.getElementById("cio-overlay").style.display = "block"; }
    function closePanels() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); document.getElementById("cio-overlay").style.display = "none"; }
    function toggleFS() { if (!document.fullscreenElement) document.getElementById("cio-app").requestFullscreen(); else document.exitFullscreen(); }
    function openFormPanel() { document.getElementById("mainForm").reset(); document.getElementById("f-id").value = ""; openPanel('panelForm'); }

    function loop(ts) {
        if(cio_logs.length) {
            if(!cio_startTime) cio_startTime = ts;
            const progress = (ts - cio_startTime) / (cio_SLIDE_TIME * 1000);
            document.getElementById("progressLine").style.width = (Math.min(progress, 1) * 100) + "%";
            if(progress >= 1) { cio_currentIdx++; renderSlide(); cio_startTime = ts; }
        }
        requestAnimationFrame(loop);
    }

    setInterval(() => {
        const t = new Date().toLocaleTimeString('es-UY', { hour12: false });
        document.getElementById("clockDisplay").textContent = t;
        document.getElementById("fsClockDisplay").textContent = t;
    }, 1000);

    initPuestos();
    setInterval(updateNetwork, 6000); setInterval(syncEvents, 10000); setInterval(syncKPIs, 5000);
    updateNetwork(); syncEvents(); syncKPIs(); requestAnimationFrame(loop);
</script>
</body>
</html>
