<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor - Alerta Crítica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* ENCAPSULAMIENTO PARA NO CHOCAR CON CSS EXTERNO */
        #cio-app {
            --primary: #00d4d8;
            --accent: #006465;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --bg-img: url('https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 99999; margin: 0; padding: 0;
        }

        #cio-app::before {
            content: ""; position: absolute; inset: 0;
            background-image: var(--bg-img); background-size: contain;
            background-position: center; background-repeat: no-repeat;
            opacity: 0.1; filter: grayscale(1); z-index: -1;
        }

        /* HEADER */
        #cio-app .main-header {
            height: 90px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(0, 212, 216, 0.2);
        }

        #cio-app #clockDisplay { font-family: 'Courier New', monospace; font-size: 2.2rem; color: var(--primary); font-weight: bold; }

        /* SECCIÓN DE ALERTAS GIGANTES (EQUIPOS CAÍDOS) */
        #cio-app #critical-alert-zone {
            background: rgba(255, 0, 0, 0.05);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid rgba(255, 77, 77, 0.2);
        }

        #cio-app .alert-title {
            color: var(--critico);
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #cio-app #network-status {
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
        }

        /* DISEÑO DE CADA EQUIPO CAÍDO (GRANDE) */
        #cio-app .status-item-big {
            display: flex; align-items: center; gap: 10px;
            font-size: 22px; font-weight: 800; color: #fff;
            background: rgba(255, 77, 77, 0.2); 
            padding: 10px 20px; border-radius: 12px;
            border: 2px solid var(--critico);
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 77, 77, 0.3); }
            50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(255, 77, 77, 0.5); }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 77, 77, 0.3); }
        }

        #cio-app .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--critico); animation: blink 0.8s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.1; } 100% { opacity: 1; } }

        /* ÁREA CENTRAL DE NOVEDADES */
        #cio-app #display-board {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
        }

        #cio-app .info-container { width: 100%; transition: all 0.6s ease; }
        #cio-app .oculto { opacity: 0; transform: translateY(20px); filter: blur(5px); }

        #cio-app #areaLabel { font-size: 1rem; color: var(--primary); letter-spacing: 5px; font-weight: bold; }
        #cio-app #prioBadge { 
            display: inline-block; padding: 5px 20px; border-radius: 50px; 
            font-weight: 900; border: 1px solid var(--primary); margin: 15px 0;
        }
        #cio-app #titleDisplay { font-weight: 800; line-height: 1.1; text-transform: uppercase; }
        #cio-app #messageDisplay { line-height: 1.4; opacity: 0.9; max-width: 90% !important; margin: 0 auto; }

        /* TICKER INFERIOR */
        #cio-app #ticker-bar { height: 45px; background: #050c0c; border-top: 1px solid var(--primary); display: flex; align-items: center; overflow: hidden; }
        #cio-app #ticker-content { white-space: nowrap; animation: scrollText 40s linear infinite; color: var(--primary); font-weight: bold; font-size: 1rem; }
        @keyframes scrollText { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        #cio-app #progressLine { position: fixed; bottom: 45px; height: 4px; width: 0%; transition: width 0.1s linear; }

        /* CONTROLES Y PANELES */
        #cio-app .header-actions button {
            background: rgba(0, 212, 216, 0.1); border: 1px solid var(--primary);
            color: #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px;
        }
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 400px; height: 100%;
            background: #0a1a1b; border-left: 2px solid var(--primary); padding: 30px;
            transform: translateX(100%); transition: 0.4s; z-index: 10000; box-sizing: border-box; overflow-y: auto;
        }
        #cio-app .side-panel.active { transform: translateX(0); }
        #cio-app #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 9999; backdrop-filter: blur(5px); }
        #cio-app #overlay.active { display: block; }

        /* RESPONSIVE SMARTPHONE */
        @media (max-width: 768px) {
            #cio-app .header-actions { display: none; }
            #cio-app #clockDisplay { font-size: 1.5rem; }
            #cio-app .status-item-big { font-size: 16px; padding: 8px 12px; }
            #cio-app .side-panel { width: 100%; height: 90%; top: auto; bottom: 0; transform: translateY(100%); border-radius: 30px 30px 0 0; }
            #cio-app .side-panel.active { transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay" onclick="closePanels()"></div>

    <header class="main-header">
        <div class="header-actions">
            <button onclick="openForm()">＋ NOVEDAD</button>
            <button onclick="openHistory()">📋 HISTORIAL</button>
        </div>

        <div style="text-align: center;">
            <div id="clockDisplay">00:00:00</div>
        </div>

        <div style="width: 150px; text-align: right;">
            <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="35" style="filter: brightness(2);">
        </div>
    </header>

    <div id="critical-alert-zone">
        <div class="alert-title" id="alert-msg">Estado de Red: Verificando...</div>
        <div id="network-status">
            </div>
    </div>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">CENTRO DE OPERACIONES</div>
            <div id="prioBadge">SISTEMA OK</div>
            <h1 id="titleDisplay">Monitor CIO</h1>
            <p id="messageDisplay">Sincronizando con base de datos...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">SISTEMA DE MONITOREO EN TIEMPO REAL - TODAS LAS UNIDADES OPERATIVAS - REVISAR NOVEDADES FRECUENTEMENTE</div>
    </div>

    <div id="progressLine"></div>

    <aside id="panelForm" class="side-panel">
        <h2 style="color:var(--primary)">Nueva Novedad</h2>
        <form onsubmit="saveEntry(event)">
            <input type="text" id="f-title" placeholder="Título de la alerta" required style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--accent);">
            <textarea id="f-msg" rows="5" placeholder="Detalles..." required style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--accent);"></textarea>
            <select id="f-area" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff;">
                <option>Monitoreo</option><option>Tecnología</option><option>Atención</option>
            </select>
            <select id="f-prio" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff;">
                <option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option>
            </select>
            <button type="submit" style="width:100%; padding:15px; background:var(--primary); border:none; font-weight:bold;">PUBLICAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--primary)">Historial</h2>
        <div id="historyList"></div>
    </aside>
</div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let logs = [];
    let currentIdx = 0;
    let startTime = null;
    const SLIDE_TIME = 15;

    // ACTUALIZACIÓN DE RED (MODO GIGANTE)
    async function updateNetwork() {
        try {
            const resp = await fetch(RED_URL);
            const status = await resp.json();
            const container = document.getElementById("network-status");
            const alertTitle = document.getElementById("alert-msg");
            
            let html = "";
            let caidos = 0;

            if(status) {
                Object.keys(status).forEach(name => {
                    if(status[name].estado === "offline") {
                        caidos++;
                        html += `
                            <div class="status-item-big">
                                <div class="dot"></div>
                                ${name.replace(/_/g, ' ')}
                            </div>`;
                    }
                });
            }

            if(caidos > 0) {
                container.innerHTML = html;
                alertTitle.textContent = "⚠️ ATENCIÓN: EQUIPOS FUERA DE LÍNEA";
                alertTitle.style.color = "#ff4d4d";
                document.getElementById("critical-alert-zone").style.background = "rgba(255, 0, 0, 0.15)";
            } else {
                container.innerHTML = "";
                alertTitle.textContent = "✔ SERVICIOS EN LÍNEA";
                alertTitle.style.color = "#00ff00";
                document.getElementById("critical-alert-zone").style.background = "transparent";
            }
        } catch(e) { console.warn("Error Red"); }
    }

    // SINCRONIZACIÓN DE EVENTOS
    async function syncEvents() {
        try {
            const resp = await fetch(DB_URL);
            logs = await resp.json() || [];
            if(logs.length > 0) renderSlide();
        } catch(e) { }
    }

    function renderSlide() {
        if(!logs.length) return;
        const cont = document.getElementById("infoCont");
        cont.classList.add("oculto");

        setTimeout(() => {
            const item = logs[currentIdx % logs.length];
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("prioBadge").textContent = `PRIORIDAD ${item.priority}`;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;

            const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
            const color = colors[item.priority] || "#fff";
            document.getElementById("prioBadge").style.borderColor = color;
            document.getElementById("prioBadge").style.color = color;
            document.getElementById("progressLine").style.background = color;

            autoSizeText();
            cont.classList.remove("oculto");
        }, 600);
    }

    function autoSizeText() {
        const t = document.getElementById('titleDisplay');
        const m = document.getElementById('messageDisplay');
        let sizeT = window.innerWidth < 768 ? 30 : 70;
        let sizeM = window.innerWidth < 768 ? 18 : 35;
        t.style.fontSize = sizeT + "px";
        m.style.fontSize = sizeM + "px";
    }

    // FUNCIONES DE UI
    function openForm() { document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay").classList.add("active"); }
    function openHistory() {
        const list = document.getElementById("historyList");
        list.innerHTML = logs.map((it, i) => `<div style="padding:10px; border-bottom:1px solid #222;">${it.title} <button onclick="deleteEntry(${i})" style="color:red; background:none; border:none; float:right;">X</button></div>`).join('');
        document.getElementById("panelHistory").classList.add("active"); document.getElementById("overlay").classList.add("active");
    }
    function closePanels() { document.querySelectorAll('.side-panel, #overlay').forEach(el => el.classList.remove('active')); }

    async function saveEntry(e) {
        e.preventDefault();
        const newEntry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value,
            timestamp: Date.now()
        };
        logs.push(newEntry);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        closePanels();
        syncEvents();
    }

    async function deleteEntry(idx) {
        logs.splice(idx, 1);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs.length ? logs : null) });
        openHistory();
        syncEvents();
    }

    // LOOPS
    function mainLoop(ts) {
        if(!logs.length) { requestAnimationFrame(mainLoop); return; }
        if(!startTime) startTime = ts;
        const progress = (ts - startTime) / (SLIDE_TIME * 1000);
        document.getElementById("progressLine").style.width = Math.min(progress * 100, 100) + "%";
        if(progress >= 1) { currentIdx++; renderSlide(); startTime = ts; }
        requestAnimationFrame(mainLoop);
    }

    setInterval(() => {
        document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString('es-UY', { hour12: false });
    }, 1000);

    setInterval(syncEvents, 10000);
    setInterval(updateNetwork, 5000);
    
    syncEvents();
    updateNetwork();
    requestAnimationFrame(mainLoop);
    window.onresize = autoSizeText;
</script>
</body>
</html>
