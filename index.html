<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- CORE & PC (Se mantiene igual) --- */
        #cio-app {
            --primary: #00d4d8;
            --accent: #006465;
            --dark-bg: #000000;
            --critico-pulso: #4d0000;
            --bg-url: url('https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; background: var(--dark-bg);
            color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; margin: 0; padding: 0; z-index: 9999;
        }

        #cio-app:fullscreen .main-header { display: none; }

        #cio-app::before {
            content: ""; position: absolute; inset: 0;
            background-image: var(--bg-url); background-size: contain;
            background-position: center; background-repeat: no-repeat;
            opacity: 0.25; z-index: -1;
        }

        .main-header {
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 212, 216, 0.2); z-index: 100;
        }

        .header-actions button {
            background: rgba(0, 212, 216, 0.1); border: 1px solid var(--primary);
            color: #fff; padding: 8px 16px; border-radius: 15px; font-size: 12px;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-right: 8px;
        }

        #clockDisplay { font-family: 'Courier New', monospace; font-size: 1.5rem; color: var(--primary); font-weight: bold; }

        #display-board {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
            background: radial-gradient(circle at center, transparent 0%, rgba(5, 13, 14, 0.7) 100%);
        }

        .info-container { width: 100%; max-width: 1100px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .oculto { opacity: 0; transform: scale(0.95); filter: blur(10px); }

        /* --- TICKER --- */
        #ticker-bar { height: 40px; background: rgba(10, 26, 27, 0.95); border-top: 1px solid var(--primary); display: flex; align-items: center; overflow: hidden; }
        #ticker-content { white-space: nowrap; animation: ticker-scroll 30s linear infinite; color: var(--primary); font-size: 0.9rem; font-weight: bold; }
        @keyframes ticker-scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- PANELES (PC) --- */
        .side-panel {
            position: fixed; right: 0; top: 0; width: 380px; height: 100%;
            background: #091718; border-left: 2px solid var(--primary); padding: 30px;
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1100;
            box-sizing: border-box; overflow-y: auto;
        }
        .side-panel.active { transform: translateX(0); }
        #overlay-cio { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: none; z-index: 1050; }
        #overlay-cio.active { display: block; }

        /* --- BOTONES Y FORMS --- */
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: #000; font-weight: 800; border: none; border-radius: 20px; cursor: pointer; margin-top: 10px; }
        .btn-cancel { width: 100%; padding: 12px; background: rgba(255, 77, 77, 0.1); color:#ff4d4d; border: 1px solid #ff4d4d; border-radius: 20px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--accent); border-radius: 12px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; }

        /* =============================================
           DISEÑO EXCLUSIVO PARA MÓVIL (MOBILE ONLY)
           ============================================= */
        @media (max-width: 768px) {
            .header-actions { display: none; }
            
            /* Botón Hamburguesa Flotante */
            #menu-toggle {
                display: flex !important; position: fixed; bottom: 30px; right: 25px;
                width: 60px; height: 60px; background: var(--primary); color: #000;
                border-radius: 50%; justify-content: center; align-items: center;
                font-size: 24px; box-shadow: 0 4px 20px rgba(0,212,216,0.4); z-index: 1200; cursor: pointer;
            }

            /* Menú de opciones móvil */
            .mobile-menu-box {
                position: fixed; bottom: 100px; right: 25px; display: none;
                flex-direction: column; gap: 12px; z-index: 1200;
            }
            .mobile-menu-box.active { display: flex; }
            .mobile-menu-box button {
                width: 50px; height: 50px; border-radius: 50%; border: none;
                background: #1a1a1a; color: var(--primary); font-size: 20px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid var(--accent);
            }

            /* Ajuste de los Paneles en Móvil (Tipo Modal Inferior) */
            .side-panel {
                width: 100% !important; height: 85% !important; top: auto !important; bottom: 0;
                transform: translateY(100%); border-left: none;
                border-top: 3px solid var(--primary); border-radius: 25px 25px 0 0;
                padding: 25px 20px; background: #0b1213;
            }
            .side-panel.active { transform: translateY(0); }

            /* Estética de los items del historial */
            .history-item {
                background: rgba(255,255,255,0.03) !important;
                border: 1px solid rgba(0, 212, 216, 0.1) !important;
                border-left: 5px solid var(--primary) !important;
                border-radius: 15px !important; padding: 18px !important;
            }

            /* Título y Mensaje en Móvil */
            #titleDisplay { font-size: 28px !important; }
            #messageDisplay { font-size: 18px !important; padding: 0 10px; }
            #clockDisplay { font-size: 1.1rem; }
            
            #display-board { padding-bottom: 100px; }
        }

        #menu-toggle { display: none; } /* Oculto en PC */
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay-cio" onclick="closeAll()"></div>

    <header class="main-header">
        <div class="header-actions">
            <button onclick="openForm()">＋ NUEVA NOVEDAD</button>
            <button onclick="openHistory()">📋 HISTORIAL</button>
            <button onclick="handleCerrarTurno()" style="border-color: #ff4d4d; color: #ff4d4d;">🔒 CERRAR TURNO</button>
            <button onclick="toggleFS()">⛶ TV</button>
        </div>
        <div id="clockDisplay">00:00:00</div>
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">SISTEMA CIO</div>
            <div id="prioBadge">CONECTANDO</div>
            <h1 id="titleDisplay">Monitor Operativo</h1>
            <p id="messageDisplay">Sincronizando flujo de datos...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">CARGANDO...</div>
    </div>

    <div id="menu-toggle" onclick="toggleMobileMenu()">☰</div>
    <div class="mobile-menu-box" id="mobileMenu">
        <button onclick="openForm(); toggleMobileMenu();">➕</button>
        <button onclick="openHistory(); toggleMobileMenu();">📋</button>
        <button onclick="handleCerrarTurno(); toggleMobileMenu();" style="color:#ff4d4d;">🔒</button>
    </div>

    <aside id="panelForm" class="side-panel">
        <h2 style="color:var(--primary); margin-bottom:20px;">Nueva Entrada</h2>
        <form id="mainForm" onsubmit="handleSave(event)">
            <input type="hidden" id="editId" value="-1">
            <label>Tipo</label>
            <select id="f-type">
                <option value="turno">De Turno (No PDF)</option>
                <option value="diaria">Diaria (Mantiene 24h)</option>
            </select>
            <label>Área</label>
            <select id="f-area">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <label>Prioridad</label>
            <select id="f-prio">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
                <option value="Crítica">Crítica</option>
            </select>
            <input type="text" id="f-title" placeholder="Título corto..." required>
            <textarea id="f-msg" rows="4" placeholder="Detalle de la novedad..." required></textarea>
            
            <button type="submit" class="btn-save">PUBLICAR AHORA</button>
            <button type="button" onclick="closeAll()" class="btn-cancel">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--primary); margin-bottom:20px;">Historial Activo</h2>
        <button onclick="generatePDF()" style="width:100%; background:var(--primary); color:#000; padding:15px; font-weight:bold; border:none; border-radius:15px; margin-bottom:20px;">📥 DESCARGAR REPORTE</button>
        <div id="listItems"></div>
        <button type="button" onclick="closeAll()" class="btn-cancel">VOLVER</button>
    </aside>

    <div id="progressLine" style="position: fixed; bottom: 40px; height: 3px; width: 0%; z-index: 999; transition: width 0.1s linear;"></div>
</div>

<script>
    const API_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    let dataStore = [];
    let currentIndex = 0;
    let timerStart = null;
    const DISPLAY_TIME = 15;

    // --- LÓGICA MÓVIL ---
    function toggleMobileMenu() {
        document.getElementById('mobileMenu').classList.toggle('active');
        const btn = document.getElementById('menu-toggle');
        btn.textContent = btn.textContent === '☰' ? '✕' : '☰';
    }

    async function syncData() {
        try {
            const r = await fetch(API_URL);
            const d = await r.json();
            const now = Date.now();
            dataStore = (d || []).filter(item => (item.type === 'diaria' && (now - item.timestamp > 86400000)) ? false : true);
            if(dataStore.length > 0) {
                const last = dataStore[dataStore.length - 1];
                document.getElementById("ticker-content").textContent = `[ÚLTIMO] ${last.area}: ${last.title} ——— `;
                if(document.getElementById("prioBadge").textContent === "CONECTANDO") refreshView();
            } else {
                document.getElementById("prioBadge").textContent = "SISTEMA OK";
                document.getElementById("ticker-content").textContent = "SIN NOVEDADES ACTIVAS";
            }
        } catch(e) { console.error("Error Sync"); }
    }

    function refreshView() {
        if(!dataStore.length) return;
        const cont = document.getElementById("infoCont");
        cont.classList.add("oculto");
        setTimeout(() => {
            const item = dataStore[currentIndex % dataStore.length];
            const badge = document.getElementById("prioBadge");
            if(item.priority === "Crítica") { 
                document.getElementById("cio-app").classList.add("es-critico"); 
                badge.style.background = "#ff0000"; 
            } else { 
                document.getElementById("cio-app").classList.remove("es-critico"); 
                badge.style.background = "rgba(0,0,0,0.4)"; 
            }
            badge.textContent = `PRIORIDAD ${item.priority}`;
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
            document.getElementById("progressLine").style.background = colors[item.priority];
            cont.classList.remove("oculto");
        }, 600); 
    }

    async function handleSave(e) {
        e.preventDefault();
        const id = parseInt(document.getElementById("editId").value);
        const entry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value,
            type: document.getElementById("f-type").value,
            timestamp: Date.now()
        };
        if(id === -1) dataStore.push(entry); else dataStore[id] = entry;
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore) });
        document.getElementById("mainForm").reset();
        closeAll(); syncData();
    }

    async function handleCerrarTurno() {
        if(!confirm("¿Cerrar turno? Se descargará el PDF y se limpiará el sistema.")) return;
        generatePDF();
        setTimeout(async () => {
            const soloDiarias = dataStore.filter(i => i.type === 'diaria');
            await fetch(API_URL, { method: 'PUT', body: JSON.stringify(soloDiarias.length ? soloDiarias : null) });
            currentIndex = 0; syncData();
        }, 2000);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const diariasParaReporte = dataStore.filter(i => i.type === 'diaria');
        const responsable = prompt("Nombre del Responsable:");
        const hora = new Date().getHours();
        let turno = (hora >= 6 && hora < 14) ? "Mañana" : (hora >= 14 && hora < 22) ? "Tarde" : "Noche";

        doc.setFillColor(0, 100, 101); doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255); doc.setFontSize(18); doc.text("REPORTE CIO OPERATIVO", 20, 20);
        doc.setFontSize(10);
        doc.text(`Responsable: ${responsable || '---'}`, 20, 28);
        doc.text(`Turno: ${turno} | Fecha: ${new Date().toLocaleString()}`, 20, 33);

        let y = 55;
        diariasParaReporte.forEach((item, i) => {
            if(y > 270) { doc.addPage(); y = 20; }
            doc.setTextColor(0); doc.setFont(undefined, 'bold');
            doc.text(`${i+1}. [${item.priority}] ${item.area}`, 20, y);
            y += 7; doc.setFont(undefined, 'normal');
            const lines = doc.splitTextToSize(`${item.title}: ${item.message}`, 170);
            doc.text(lines, 25, y); y += (lines.length * 7) + 10;
        });
        doc.save(`Reporte_CIO_${turno}.pdf`);
    }

    function openHistory() {
        const list = document.getElementById("listItems");
        list.innerHTML = dataStore.length ? dataStore.map((item, i) => `
            <div class="history-item" style="margin-bottom:12px; background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; border-left:4px solid var(--primary);">
                <small style="color:var(--primary); font-weight:800;">${item.type.toUpperCase()} - ${item.area}</small>
                <div style="font-weight:bold; margin:5px 0; font-size:1.1rem;">${item.title}</div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button onclick="onEdit(${i})" style="flex:1; padding:8px; border-radius:8px; border:none; background:var(--primary); font-weight:bold;">EDITAR</button>
                    <button onclick="onDelete(${i})" style="flex:1; padding:8px; border-radius:8px; border:none; background:#ff4d4d; color:#fff; font-weight:bold;">BORRAR</button>
                </div>
            </div>
        `).join('') : "<p style='text-align:center; opacity:0.5;'>Sin novedades.</p>";
        document.getElementById("panelHistory").classList.add("active");
        document.getElementById("overlay-cio").classList.add("active");
    }

    window.onEdit = (i) => {
        const item = dataStore[i];
        document.getElementById("editId").value = i;
        document.getElementById("f-area").value = item.area;
        document.getElementById("f-prio").value = item.priority;
        document.getElementById("f-title").value = item.title;
        document.getElementById("f-msg").value = item.message;
        document.getElementById("f-type").value = item.type;
        closeAll();
        document.getElementById("panelForm").classList.add("active");
        document.getElementById("overlay-cio").classList.add("active");
    };

    window.onDelete = async (i) => {
        if(!confirm("¿Eliminar?")) return;
        dataStore.splice(i, 1);
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore.length ? dataStore : null) });
        openHistory(); syncData();
    };

    function openForm() { 
        document.getElementById("editId").value = "-1"; 
        document.getElementById("mainForm").reset();
        document.getElementById("panelForm").classList.add("active"); 
        document.getElementById("overlay-cio").classList.add("active"); 
    }
    function closeAll() { 
        document.querySelectorAll('.side-panel, #overlay-cio').forEach(el => el.classList.remove('active')); 
        document.getElementById('mobileMenu').classList.remove('active');
        document.getElementById('menu-toggle').textContent = '☰';
    }
    function toggleFS() { 
        const app = document.getElementById('cio-app');
        if (!document.fullscreenElement) app.requestFullscreen(); else document.exitFullscreen(); 
    }

    function runLoop(ts) {
        if(!dataStore.length) { requestAnimationFrame(runLoop); return; }
        if(!timerStart) timerStart = ts;
        const elapsed = (ts - timerStart) / 1000;
        document.getElementById("progressLine").style.width = Math.min((elapsed / DISPLAY_TIME) * 100, 100) + "%";
        if(elapsed >= DISPLAY_TIME){ currentIndex++; refreshView(); timerStart = ts; }
        requestAnimationFrame(runLoop);
    }

    setInterval(() => { document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}); }, 1000);
    setInterval(syncData, 15000);
    syncData();
    requestAnimationFrame(runLoop);
</script>
</body>
</html>
