<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Masterson Edition</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        #cio-app {
            --primary: #C5A059; /* Oro Champagne */
            --dark-bg: #0D0D0D;
            --surface: #161616;
            --text-main: #F2F2F2;
            --text-dim: #666666;
            --critico: #E63946;
            
            --color-monitoreo: #E63946;
            --color-atencion: #A8DADC;
            --color-freschat: #457B9D;
            --color-interna: #F1FAEE;
            
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: var(--text-main) !important;
            font-family: 'Inter', -apple-system, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
        }

        /* FONDO EDITORIAL (GRANO DE PELÍCULA Y LOGO SUTIL) */
        #cio-app::before {
            content: ""; position: absolute; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.05; pointer-events: none; z-index: 1;
        }

        /* HEADER ASIMÉTRICO */
        #cio-app .main-header {
            height: 100px; display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 60px 20px 60px; background: transparent; z-index: 10;
        }
        #cio-app:fullscreen .main-header { display: none !important; }

        #clockDisplay { font-size: 2.5rem; font-weight: 200; letter-spacing: -2px; color: var(--primary); }

        /* DASHBOARD - STATS FLOTANTES */
        .stats-grid { display: flex; gap: 40px; margin-bottom: 20px; }
        .stat-card { text-align: left; position: relative; }
        .stat-card b { font-size: 1.2rem; font-weight: 700; display: block; line-height: 1; }
        .stat-card span { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
        .stat-card.alert b { color: var(--critico); }

        /* BOTÓN FLOTANTE (ESTILO CÁPSULA) */
        #cio-app #menu-toggle-float {
            display: none; position: fixed; bottom: 40px; right: 40px;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--primary); color: #000; border: none;
            font-size: 24px; cursor: pointer; z-index: 10015;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5); align-items: center; justify-content: center;
        }

        #cio-app #mobile-menu {
            position: fixed; bottom: 110px; right: 40px; width: 240px;
            background: var(--surface); display: none; flex-direction: column;
            padding: 20px; gap: 15px; border-radius: 20px; z-index: 10010;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(197, 160, 89, 0.2);
        }

        /* PANTALLA CENTRAL (BRUTALISMO ELEGANTE) */
        #cio-app #display-board { flex: 1; display: flex; justify-content: flex-start; align-items: center; padding: 0 10%; }
        
        #infoCont { text-align: left; max-width: 1100px; }
        #areaLabel { font-size: 0.7rem; font-weight: 800; letter-spacing: 5px; text-transform: uppercase; color: var(--primary); margin-bottom: 5px; }
        #prioBadge { display: inline-block; font-size: 0.6rem; font-weight: 900; letter-spacing: 2px; padding: 2px 0; border-bottom: 2px solid var(--primary); margin-bottom: 30px; }
        #titleDisplay { font-size: 110px; font-weight: 900; line-height: 0.85; letter-spacing: -6px; margin: 0; text-transform: uppercase; transition: color 0.5s ease; }
        #messageDisplay { font-size: 1.4rem; font-weight: 400; color: #999; margin-top: 40px; line-height: 1.6; max-width: 700px; border-left: 1px solid #333; padding-left: 30px; }

        /* PANELES (TIPO OVERLAY) */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 500px; height: 100%;
            background: #000; padding: 60px; transform: translateX(100%); transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1);
            z-index: 10020; box-sizing: border-box;
        }
        #cio-app .side-panel.active { transform: translateX(0); }

        /* INPUTS CENTRADOS Y LIMPIOS */
        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; padding: 15px 0; background: transparent; color: #fff; 
            border: none; border-bottom: 1px solid #333; margin-bottom: 20px; 
            font-size: 1.1rem; transition: 0.3s;
        }
        #cio-app input:focus { border-bottom-color: var(--primary); outline: none; }

        #cio-app button.btn-main {
            background: var(--primary); color: #000; border: none; padding: 15px 30px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;
        }

        /* TICKER (STREET STYLE) */
        #cio-app #ticker-bar { height: 60px; background: #000; display: flex; align-items: center; border-top: 1px solid #1a1a1a; }
        #cio-app #ticker-content { font-size: 0.9rem; font-weight: 200; opacity: 0.4; text-transform: uppercase; letter-spacing: 3px; }

        #progressLine { position: fixed; top: 0; height: 4px; width: 0%; transition: width 0.1s linear; background: var(--primary); z-index: 10030; }

        @media (max-width: 768px) {
            #cio-app .main-header { padding: 0 30px 10px 30px; height: 80px; }
            #cio-app #menu-toggle-float { display: flex; }
            #titleDisplay { font-size: 55px; letter-spacing: -3px; }
            #cio-app .side-panel { width: 100%; padding: 40px 20px; }
            #messageDisplay { font-size: 1.1rem; padding-left: 15px; }
        }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div id="cio-app">
    <div id="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; z-index:10002; backdrop-filter:blur(15px);" onclick="closePanels()"></div>

    <div id="progressLine"></div>

    <header class="main-header">
        <div id="clockDisplay">00:00</div>
        <div class="header-actions">
            <button onclick="openForm()" class="btn-main">NUEVO REPORTE</button>
            <button onclick="openHistory()" style="background:none; color:var(--text-dim); border:none; margin-left:20px; cursor:pointer; font-weight:800; font-size:0.7rem; letter-spacing:2px;">LOGS</button>
            <button onclick="toggleFS()" style="background:none; border:none; color:#333; margin-left:20px; font-size:10px;">Fullscreen</button>
        </div>
        <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="40" style="filter: grayscale(1) brightness(2); opacity: 0.3;">
    </header>

    <button id="menu-toggle-float" onclick="toggleMobileMenu(event)">☰</button>
    <div id="mobile-menu">
        <button onclick="openForm(); toggleMobileMenu();" class="btn-main">＋ CREAR</button>
        <button onclick="openHistory(); toggleMobileMenu();" style="background:transparent; color:#fff; border:1px solid #333; padding:12px; border-radius:10px;">REVISAR LOGS</button>
        <button onclick="openOfflinePanel(); toggleMobileMenu();" id="btn-offline-mob" style="background:rgba(230,57,70,0.1); color:var(--critico); border:none; padding:12px; border-radius:10px; font-weight:bold;">OFFLINE (<span id="count-offline-mob">0</span>)</button>
    </div>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">MASTERSON SYSTEM</div>
            <div id="prioBadge">STATUS: CALIBRATING</div>
            <h1 id="titleDisplay">SISTEMA<br>READY</h1>
            <p id="messageDisplay">Monitoreo de central operativa en espera de datos entrantes...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">CARGANDO FLUJO DE DATOS — MASTERSON SECURITY — CENTRALIZADO</div>
    </div>

    <div id="quickEdit" style="background:#111; border:1px solid var(--primary); padding:30px; border-radius:4px; margin-top:20px; display:none;">
        <input type="hidden" id="e-index">
        <select id="e-area"><option>Monitoreo</option><option>Freschat</option><option>Atención</option><option>Novedad Interna</option></select>
        <select id="e-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
        <input type="text" id="e-title">
        <textarea id="e-msg" rows="3"></textarea>
        <div style="display:flex; gap:15px;">
            <button onclick="saveQuickEdit()" class="btn-main" style="flex:1;">ACTUALIZAR</button>
            <button onclick="hideEdit()" style="flex:1; background:none; border:1px solid #333; color:white; cursor:pointer;">CERRAR</button>
        </div>
    </div>

    <aside id="panelHistory" class="side-panel">
        <h2 style="font-size:3rem; font-weight:900; letter-spacing:-2px; margin-bottom:40px;">REGISTROS</h2>
        <div class="stats-grid">
            <div class="stat-card" id="card-off"><b>0</b><span>OFFLINE</span></div>
            <div class="stat-card" id="card-crit"><b>0</b><span>CRÍTICO</span></div>
            <div class="stat-card"><b>0</b><span id="card-total">TOTAL</span></div>
        </div>
        <div id="historyList" style="margin-top:40px;"></div>
        <button onclick="closePanels()" style="width:100%; margin-top:40px; background:none; border:1px solid #333; color:#444; padding:15px; cursor:pointer; text-transform:uppercase; font-size:0.7rem;">Cerrar Panel</button>
    </aside>

    <aside id="panelForm" class="side-panel">
        <h2 style="font-size:3rem; font-weight:900; letter-spacing:-2px; margin-bottom:40px;">NUEVO</h2>
        <form onsubmit="saveNew(event)">
            <select id="f-area"><option>Monitoreo</option><option>Freschat</option><option>Atención</option><option>Novedad Interna</option></select>
            <select id="f-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
            <input type="text" id="f-title" placeholder="Título del Evento" required>
            <textarea id="f-msg" rows="5" placeholder="Descripción detallada..." required></textarea>
            <button type="submit" class="btn-main" style="width:100%; padding:20px;">Publicar Entrada</button>
        </form>
    </aside>

    <aside id="panelOffline" class="side-panel">
        <h2 style="color:var(--critico); font-size:3rem; font-weight:900; letter-spacing:-2px;">ALERTAS</h2>
        <div id="offlineList" style="margin-top:40px;"></div>
        <button onclick="closePanels()" style="width:100%; margin-top:40px; background:none; border:1px solid #333; color:white; padding:15px;">VOLVER</button>
    </aside>
</div>

<script>
    const DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    let logs = []; let currentIdx = 0; let startTime = null; const SLIDE_TIME = 15;

    function handleGlobalClick(e) {
        const menu = document.getElementById("mobile-menu");
        const btn = document.getElementById("menu-toggle-float");
        if (menu.style.display === "flex" && !menu.contains(e.target) && !btn.contains(e.target)) toggleMobileMenu();
    }

    function toggleMobileMenu() {
        const menu = document.getElementById("mobile-menu");
        const isVisible = menu.style.display === "flex";
        menu.style.display = isVisible ? "none" : "flex";
        document.getElementById("overlay").style.display = isVisible ? "none" : "block";
    }

    async function updateNetwork() {
        try {
            const resp = await fetch(RED_URL);
            const status = await resp.json();
            const ticker = document.getElementById("ticker-content");
            let caidos = [];
            if(status) {
                Object.keys(status).forEach(id => { 
                    if(status[id].estado === "offline") caidos.push(id.replace(/_/g, ' ')); 
                });
            }
            const cardOff = document.getElementById("card-off");
            cardOff.querySelector('b').textContent = caidos.length;
            if(caidos.length > 0) {
                cardOff.classList.add('alert');
                ticker.innerHTML = `⚠️ ATENCIÓN: ` + caidos.map(n => `<span style="color:var(--critico); font-weight:900;">${n}</span>`).join(' — ');
                document.getElementById("offlineList").innerHTML = caidos.map(n => `<div style="padding:20px 0; border-bottom:1px solid #222; font-weight:900; font-size:1.5rem; color:var(--critico);">● ${n}</div>`).join('');
            } else {
                cardOff.classList.remove('alert');
                ticker.innerHTML = `SISTEMAS OPERATIVOS — MASTERSON SECURITY — FLOW: STABLE — `;
                document.getElementById("offlineList").innerHTML = `<p style="color:#333; letter-spacing:2px;">RED ESTABLE</p>`;
            }
            document.getElementById("count-offline-mob").textContent = caidos.length;
        } catch(e) {}
    }

    async function syncEvents() {
        try {
            const resp = await fetch(DB_URL);
            const data = await resp.json();
            logs = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
            updateDashboardCounters();
            if(logs.length > 0 && !startTime) renderSlide();
        } catch(e) {}
    }

    function updateDashboardCounters() {
        const criticos = logs.filter(l => l.priority === "Crítica").length;
        const cardCrit = document.getElementById("card-crit");
        cardCrit.querySelector('b').textContent = criticos;
        if(criticos > 0) cardCrit.classList.add('alert'); else cardCrit.classList.remove('alert');
        document.getElementById("card-total").previousElementSibling.textContent = logs.length;
    }

    function renderSlide() {
        if(!logs.length) return;
        const cont = document.getElementById("infoCont");
        cont.style.opacity = "0";
        cont.style.transform = "translateY(10px)";

        setTimeout(() => {
            const item = logs[currentIdx % logs.length];
            const areaColors = { "Monitoreo": "var(--color-monitoreo)", "Atención": "var(--color-atencion)", "Freschat": "var(--color-freschat)", "Novedad Interna": "var(--color-interna)" };
            
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("prioBadge").textContent = `LEVEL: ${item.priority.toUpperCase()}`;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            
            const prioColors = {"Baja":"#444", "Media":"#ffd60a", "Alta":"#ff9f0a", "Crítica":"var(--critico)"};
            const pColor = prioColors[item.priority] || "#fff";
            document.getElementById("prioBadge").style.borderColor = pColor;
            document.getElementById("prioBadge").style.color = pColor;
            document.getElementById("titleDisplay").style.color = (item.priority === "Crítica") ? "var(--critico)" : "white";
            document.getElementById("progressLine").style.background = pColor;

            autoSizeText();
            cont.style.opacity = "1";
            cont.style.transform = "translateY(0)";
            cont.style.transition = "all 0.8s ease";
        }, 800);
    }

    function autoSizeText() {
        const t = document.getElementById('titleDisplay');
        t.style.fontSize = window.innerWidth < 768 ? "55px" : "110px";
    }

    function openHistory() { renderHistoryList(); document.getElementById("panelHistory").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function openForm() { document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    function openOfflinePanel() { document.getElementById("panelOffline").classList.add("active"); document.getElementById("overlay").style.display = "block"; }
    
    function closePanels() { 
        document.querySelectorAll('.side-panel').forEach(el => el.classList.remove('active')); 
        document.getElementById("overlay").style.display = "none";
        hideEdit();
    }

    function renderHistoryList() {
        const list = document.getElementById("historyList");
        list.innerHTML = logs.map((it, i) => `
            <div style="padding:20px 0; border-bottom:1px solid #1a1a1a;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div style="text-align:left"><strong style="font-size:1.1rem; letter-spacing:-1px;">${it.title}</strong><br><small style="color:#444; text-transform:uppercase; font-size:0.6rem; letter-spacing:1px;">${it.area}</small></div>
                    <div style="display:flex; gap:15px;">
                        <button onclick="showQuickEdit(${i})" style="background:none; color:var(--primary); border:none; font-size:0.6rem; font-weight:900; cursor:pointer;">EDIT</button>
                        <button onclick="deleteEntry(${i})" style="background:none; color:#333; border:none; font-size:0.6rem; cursor:pointer;">DELETE</button>
                    </div>
                </div>
                <div id="edit-anchor-${i}"></div>
            </div>
        `).join('');
    }

    function showQuickEdit(idx) {
        const item = logs[idx];
        const editBox = document.getElementById("quickEdit");
        document.getElementById("e-index").value = idx;
        document.getElementById("e-area").value = item.area;
        document.getElementById("e-prio").value = item.priority;
        document.getElementById("e-title").value = item.title;
        document.getElementById("e-msg").value = item.message;
        document.getElementById(`edit-anchor-${idx}`).appendChild(editBox);
        editBox.style.display = "block";
    }

    function hideEdit() { 
        const eb = document.getElementById("quickEdit");
        eb.style.display = "none";
        document.body.appendChild(eb);
    }

    async function saveQuickEdit() {
        const idx = document.getElementById("e-index").value;
        logs[idx] = { area: document.getElementById("e-area").value, priority: document.getElementById("e-prio").value, title: document.getElementById("e-title").value, message: document.getElementById("e-msg").value };
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        hideEdit(); renderHistoryList(); syncEvents();
    }

    async function saveNew(e) {
        e.preventDefault();
        const entry = { area: document.getElementById("f-area").value, priority: document.getElementById("f-prio").value, title: document.getElementById("f-title").value, message: document.getElementById("f-msg").value };
        logs.push(entry);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs) });
        closePanels(); syncEvents();
    }

    async function deleteEntry(idx) {
        if(!confirm("DELETE LOG?")) return;
        logs.splice(idx, 1);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(logs.length ? logs : null) });
        renderHistoryList(); syncEvents();
    }

    function toggleFS() { 
        const app = document.getElementById("cio-app");
        if (!document.fullscreenElement) {
            if (app.requestFullscreen) app.requestFullscreen();
            else if (app.webkitRequestFullscreen) app.webkitRequestFullscreen();
        } else { document.exitFullscreen(); }
    }

    function mainLoop(ts) {
        if(!logs.length) { requestAnimationFrame(mainLoop); return; }
        if(!startTime) startTime = ts;
        const progress = (ts - startTime) / (SLIDE_TIME * 1000);
        document.getElementById("progressLine").style.width = (progress * 100) + "%";
        if(progress >= 1) { currentIdx++; renderSlide(); startTime = ts; }
        requestAnimationFrame(mainLoop);
    }

    setInterval(() => { document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString('es-UY', { hour12: false, hour: '2-digit', minute: '2-digit' }); }, 1000);
    setInterval(updateNetwork, 5000);
    setInterval(syncEvents, 10000);
    updateNetwork(); syncEvents(); requestAnimationFrame(mainLoop);
    window.onresize = autoSizeText;
</script>
</body>
</html>
