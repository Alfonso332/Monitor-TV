<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO MONITOR PRO | MASTERSON v3.0</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* ============================================================
           ESTILOS ENCAPSULADOS (#cio-app)
           ============================================================ */
        #cio-app {
            --primary: #006465;
            --accent: #00d1d1;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --online: #2ecc71;
            --warning: #f1c40f;
            --bg-emergencia: #1a0000; 

            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif !important;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 999999;
            margin: 0; padding: 0;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Estado Crítico Global */
        #cio-app.pantalla-critica {
            background: radial-gradient(circle, #2a0000 0%, #000000 100%) !important;
        }

        #cio-app * { box-sizing: border-box !important; -webkit-tap-highlight-color: transparent; }

        /* === HEADER === */
        #cio-app .main-header {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 100, 101, 0.4);
            z-index: 1000;
        }

        /* Fullscreen: Ocultar controles */
        #cio-app:fullscreen .main-header { display: none !important; }

        /* Reloj en modo TV */
        #cio-app .fs-clock { display: none; }
        #cio-app:fullscreen .fs-clock {
            display: block;
            position: absolute;
            top: 40px; right: 50px;
            font-family: 'Courier New', monospace;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
            z-index: 2000;
            text-shadow: 0 0 25px rgba(0, 100, 101, 0.7);
        }

        /* === DISPLAY CENTRAL (SLIDES) === */
        #cio-app #display-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px;
            perspective: 1000px;
        }

        #cio-app #titleDisplay {
            font-size: clamp(40px, 8vw, 95px);
            font-weight: 900;
            margin: 20px 0;
            text-transform: uppercase;
            line-height: 0.85;
            letter-spacing: -3px;
        }

        #cio-app .info-container {
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            max-width: 1100px;
        }

        #cio-app .oculto {
            opacity: 0;
            transform: rotateX(-10deg) translateY(30px);
            filter: blur(20px);
        }

        /* === TICKER (ANIMACIÓN CONTINUA) === */
        #cio-app #ticker-bar {
            height: 90px;
            background: #030303;
            border-top: 1px solid #111;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #cio-app #ticker-content {
            display: flex;
            align-items: center;
            gap: 120px;
            white-space: nowrap;
            position: absolute;
            will-change: transform;
            animation: scroll-ticker 40s linear infinite;
        }

        @keyframes scroll-ticker {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        #cio-app .status-badge {
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        #cio-app .status-badge.offline {
            background: rgba(255, 77, 77, 0.1);
            border: 4px solid var(--critico);
            color: var(--critico);
        }

        #cio-app .status-badge.restored {
            background: rgba(46, 204, 113, 0.1);
            border: 4px solid var(--online);
            color: var(--online);
        }

        #cio-app .status-badge small {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 6px;
            letter-spacing: 3px;
        }

        /* === PANELES LATERALES === */
        #cio-app .side-panel {
            position: fixed;
            right: 0; top: 0;
            width: 500px; height: 100%;
            background: #050505;
            border-left: 3px solid var(--primary);
            padding: 40px;
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10100;
            overflow-y: auto;
            box-shadow: -20px 0 50px rgba(0,0,0,0.9);
        }

        #cio-app .side-panel.active { transform: translateX(0); }

        /* === CAMPOS DE EDICIÓN CENTRADOS === */
        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%;
            padding: 20px;
            background: #0f0f0f !important;
            color: #ffffff !important;
            border: 1px solid #222 !important;
            border-radius: 18px;
            text-align: center; /* Requisito: Centrado */
            margin-bottom: 20px;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        #cio-app input:focus, #cio-app textarea:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 15px rgba(0, 209, 209, 0.2);
            outline: none;
        }

        #cio-app .btn-pill {
            background: var(--primary) !important;
            color: #fff !important;
            border: none;
            padding: 20px;
            border-radius: 60px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        #cio-app .btn-pill:hover { transform: translateY(-2px); background: var(--accent) !important; }
        #cio-app .btn-sec { background: #151515 !important; border: 1px solid #333; }

        /* === HISTORIAL === */
        #cio-app .history-item {
            background: #0a0a0a;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 15px;
            border-left: 6px solid var(--primary);
            border-top: 1px solid #111;
        }

        /* === MOBILE === */
        #cio-app #mobile-fab {
            display: none;
            position: fixed;
            bottom: 40px;
            right: 35px;
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            z-index: 1000005;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 3px solid var(--accent);
        }

        @media (max-width: 768px) {
            #cio-app .main-header { display: none !important; }
            #cio-app #ticker-bar { display: none !important; }
            #cio-app #mobile-fab { display: flex; }
            #cio-app .side-panel { width: 100%; padding: 25px; }
            #cio-app #titleDisplay { font-size: 42px !important; }
        }

        /* Offline Dropdown */
        #cio-app #offline-details {
            max-height: 0; overflow: hidden; transition: max-height 0.5s ease;
            background: #080000; border-radius: 20px; margin-bottom: 25px;
        }
        #cio-app #offline-details.show { max-height: 800px; border: 1px solid #300; padding: 20px; }
        
        /* Stats Grid */
        #cio-app .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        #cio-app .stat-box { background: #0c0c0c; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #151515; }
        #cio-app .stat-box b { font-size: 2rem; display: block; line-height: 1; }
        #cio-app .stat-box small { font-size: 0.75rem; opacity: 0.4; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="fsClockDisplay" class="fs-clock">00:00:00</div>
    
    <div id="cio-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; z-index:10090; backdrop-filter:blur(10px);" onclick="closePanels()"></div>

    <header class="main-header">
        <div style="display:flex; gap:15px;">
            <button onclick="openFormPanel()" class="btn-pill" style="padding:10px 30px; width:auto; margin:0;">＋ REGISTRAR</button>
            <button onclick="openPanel('panelHistory')" class="btn-pill btn-sec" style="padding:10px 30px; width:auto; margin:0;">📋 CONTROL</button>
            <button onclick="toggleFS()" style="background:none; border:1px solid #333; color:#555; padding:10px 20px; border-radius:12px; cursor:pointer;">⛶ TV</button>
        </div>
        <div id="clockDisplay" style="font-family:monospace; font-size:2.2rem; font-weight:900; color:var(--primary);">00:00:00</div>
        <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="50">
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel" style="letter-spacing: 10px; font-weight: 900; font-size: 1rem; margin-bottom: 20px; color: var(--accent);">MONITOR DE OPERACIONES</div>
            <h1 id="titleDisplay">CONECTANDO...</h1>
            <p id="messageDisplay" style="font-size:2.2rem; opacity:0.6; line-height: 1.6; font-weight: 300;">Estableciendo enlace con la base de datos maestra.</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">
            </div>
    </div>
    
    <div id="progressLine" style="position: fixed; bottom: 90px; height: 8px; width: 0%; background: var(--primary); z-index: 50; transition: width 0.1s linear; border-radius: 0 5px 5px 0;"></div>

    <div id="mobile-fab" onclick="openPanel('panelHistory')">
        <span style="font-size: 45px; color:white;">☰</span>
    </div>

    <aside id="panelForm" class="side-panel">
        <h2 style="color:var(--primary); text-align:center; margin-bottom:35px; font-weight:900;">NUEVA NOVEDAD</h2>
        <form id="mainForm" onsubmit="saveEntry(event)">
            <input type="hidden" id="f-id" value="">
            
            <label style="font-size:0.8rem; opacity:0.4; margin-left:15px;">ÁREA</label>
            <select id="f-area">
                <option>Monitoreo</option>
                <option>Freschat</option>
                <option>Atención al cliente</option>
                <option>Servidores</option>
                <option>Novedad Interna</option>
            </select>

            <label style="font-size:0.8rem; opacity:0.4; margin-left:15px;">PRIORIDAD</label>
            <select id="f-prio">
                <option>Baja</option>
                <option>Media</option>
                <option>Alta</option>
                <option>Crítica</option>
            </select>

            <input type="text" id="f-title" placeholder="TÍTULO DEL EVENTO" required>
            <textarea id="f-msg" rows="8" placeholder="DESCRIPCIÓN TÉCNICA O MENSAJE..." required></textarea>
            
            <button type="submit" class="btn-pill">PUBLICAR EN MONITOR</button>
            <button type="button" onclick="closePanels()" class="btn-pill btn-sec">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:30px; font-weight:900;">PANEL OPERATIVO</h2>
        
        <div class="stats-grid">
            <div class="stat-box" onclick="openFormPanel()"><b style="color:var(--primary)">＋</b><small>Añadir</small></div>
            <div class="stat-box"><b id="stat-total">0</b><small>Eventos</small></div>
            <div class="stat-box" onclick="toggleOfflineDetails()">
                <b id="stat-off" style="color:var(--critico)">0</b>
                <small>Caídos ▾</small>
            </div>
        </div>

        <div id="offline-details"></div>

        <button onclick="downloadPDF()" class="btn-pill" style="background:#111 !important; border:1px solid #444; height: 65px;">⬇ DESCARGAR REPORTE TURNO</button>

        <div id="historyList" style="margin-top: 30px;"></div>
        
        <button onclick="closePanels()" class="btn-pill btn-sec" style="margin-top:25px;">CERRAR</button>
    </aside>
</div>

<script>
    /* ============================================================
       CONFIGURACIÓN Y VARIABLES GLOBALES
       ============================================================ */
    const cio_DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const cio_RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let cio_logs = [], cio_currentIdx = 0, cio_startTime = null;
    let recentlyRestored = {}; 
    let offlineTracker = {}; // Control de 100 segundos
    const cio_SLIDE_TIME = 45; // Segundos por cada slide

    /* ============================================================
       LÓGICA DE RED (100 SEGUNDOS GRACE PERIOD)
       ============================================================ */
    async function updateNetwork() {
        try {
            const resp = await fetch(cio_RED_URL);
            if (!resp.ok) throw new Error();
            const status = await resp.json();
            
            const ticker = document.getElementById("ticker-content");
            const offDetails = document.getElementById("offline-details");
            let tickerHTML = "", detailsHTML = "";
            let offCount = 0;
            const NOW = Date.now();

            if(status) {
                Object.keys(status).forEach(id => {
                    const currentItem = status[id];
                    const name = id.replace(/_/g, ' ');
                    
                    if (currentItem.estado === "offline") {
                        // Si es la primera vez que falla, marcamos el tiempo
                        if (!offlineTracker[id]) offlineTracker[id] = NOW;

                        const diffSecs = (NOW - offlineTracker[id]) / 1000;

                        // Solo denunciar después de 100 segundos reales de caída
                        if (diffSecs >= 100) {
                            const horaFallo = new Date(offlineTracker[id]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            tickerHTML += `
                                <div class="status-badge offline">
                                    ⚠️ FALLO RED: ${name}
                                    <small>DETECTADO: ${horaFallo}</small>
                                </div>`;
                            detailsHTML += `
                                <div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #200; color:var(--critico);">
                                    <span>● ${name}</span>
                                    <span>${horaFallo}</span>
                                </div>`;
                            offCount++;
                            delete recentlyRestored[id];
                        }
                    } else {
                        // Si vuelve y estuvo caído más de 100s, avisar que volvió
                        if (offlineTracker[id] && (NOW - offlineTracker[id]) / 1000 >= 100) {
                            recentlyRestored[id] = 4; // Ciclos que durará en pantalla
                        }
                        delete offlineTracker[id];
                        if (recentlyRestored[id] > 0) {
                            tickerHTML += `<div class="status-badge restored">✔ ${name}: SERVICIO RESTABLECIDO</div>`;
                            recentlyRestored[id]--;
                        }
                    }
                });
            }

            // Actualización del Ticker con animación fluida
            if(tickerHTML !== "") {
                ticker.innerHTML = tickerHTML;
                const itemsCount = offCount + Object.keys(recentlyRestored).filter(k => recentlyRestored[k] > 0).length;
                // Velocidad dinámica: más items = más rápido
                const duration = Math.max(15, itemsCount * 8); 
                ticker.style.animation = `scroll-ticker ${duration}s linear infinite`;
                offDetails.innerHTML = detailsHTML;
            } else {
                ticker.innerHTML = `<span style="color:var(--primary); font-size:1.8rem; font-weight:900; width:100vw; text-align:center; letter-spacing:5px;">SISTEMAS OPERATIVOS EN RANGO NOMINAL</span>`;
                ticker.style.animation = "none";
                ticker.style.left = "0";
                offDetails.innerHTML = "<div style='color:#444; text-align:center; padding:20px;'>No se registran interrupciones prolongadas</div>";
            }
            document.getElementById("stat-off").textContent = offCount;

        } catch(e) {
            console.warn("Reintentando conexión de red...");
        }
    }

    /* ============================================================
       LÓGICA DE EVENTOS Y FIREBASE
       ============================================================ */
    async function syncEvents() {
        try {
            const resp = await fetch(cio_DB_URL);
            const data = await resp.json();
            const now = Date.now();
            
            // Filtrar solo las últimas 24 horas para no saturar
            cio_logs = (data ? (Array.isArray(data) ? data : Object.values(data)) : [])
                        .filter(it => !it.timestamp || (now - it.timestamp < 86400000));
            
            document.getElementById("stat-total").textContent = cio_logs.length;
            
            if(cio_logs.length > 0 && !cio_startTime) {
                renderSlide();
            } else if (cio_logs.length === 0) {
                document.getElementById("titleDisplay").textContent = "SIN NOVEDADES";
                document.getElementById("messageDisplay").textContent = "El monitor está a la espera de nuevos registros.";
            }
            renderHistory();
        } catch(e) {
            console.error("Error sincronizando eventos.");
        }
    }

    function renderSlide() {
        if(!cio_logs.length) return;
        const cont = document.getElementById("infoCont");
        const app = document.getElementById("cio-app");
        
        cont.classList.add("oculto");
        
        setTimeout(() => {
            const item = cio_logs[cio_currentIdx % cio_logs.length];
            const colorMap = {"Baja":"var(--accent)", "Media":"var(--warning)", "Alta":"#e67e22", "Crítica":"var(--critico)"};
            const color = colorMap[item.priority] || "#fff";
            
            // Modo de emergencia si es Crítica
            app.classList.toggle("pantalla-critica", item.priority === "Crítica");
            
            document.getElementById("areaLabel").textContent = item.area.toUpperCase();
            document.getElementById("areaLabel").style.color = color;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            document.getElementById("progressLine").style.background = color;
            
            cont.classList.remove("oculto");
        }, 800);
    }

    function renderHistory() {
        const list = document.getElementById("historyList");
        list.innerHTML = cio_logs.map((it, i) => {
            const h = it.timestamp ? new Date(it.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
            return `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span style="color:var(--accent); font-weight:900; font-size:0.8rem;">${it.area}</span>
                    <span style="opacity:0.4; font-size:0.8rem;">${h}</span>
                </div>
                <div style="font-weight:900; font-size:1.3rem; margin-bottom:10px;">${it.title}</div>
                <div style="font-size:1rem; opacity:0.7; line-height:1.4; margin-bottom:20px;">${it.message}</div>
                <div style="display:flex; gap:25px; border-top:1px solid #222; padding-top:15px;">
                    <button onclick="editEntry(${i})" style="color:var(--accent); background:none; border:none; cursor:pointer; font-weight:bold; font-size:0.9rem;">EDITAR</button>
                    <button onclick="deleteEntry(${i})" style="color:var(--critico); background:none; border:none; cursor:pointer; font-weight:bold; font-size:0.9rem;">ELIMINAR</button>
                </div>
            </div>`;
        }).reverse().join('');
    }

    /* ============================================================
       ACCIONES Y CRUD
       ============================================================ */
    async function saveEntry(e) {
        e.preventDefault();
        const id = document.getElementById("f-id").value;
        const entry = {
            area: document.getElementById("f-area").value, 
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value, 
            message: document.getElementById("f-msg").value,
            timestamp: id !== "" ? cio_logs[id].timestamp : Date.now()
        };

        if(id !== "") cio_logs[id] = entry; 
        else cio_logs.push(entry);

        await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
        closePanels(); 
        syncEvents();
    }

    function editEntry(idx) {
        const it = cio_logs[idx];
        document.getElementById("f-id").value = idx;
        document.getElementById("f-area").value = it.area;
        document.getElementById("f-prio").value = it.priority;
        document.getElementById("f-title").value = it.title;
        document.getElementById("f-msg").value = it.message;
        openPanel('panelForm');
    }

    async function deleteEntry(idx) {
        if(confirm("¿Confirmar eliminación permanente?")) {
            cio_logs.splice(idx, 1);
            await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
            syncEvents();
        }
    }

    /* ============================================================
       REPORTE PDF PROFESIONAL
       ============================================================ */
    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = jsPDF();
        const now = new Date();
        const h = now.getHours();
        
        let turno = "Turno Noche (22:00 - 06:00)";
        if (h >= 6 && h < 14) turno = "Turno Mañana (06:00 - 14:00)";
        else if (h >= 14 && h < 22) turno = "Turno Tarde (14:00 - 22:00)";

        doc.setFontSize(24); doc.setTextColor(0, 100, 101);
        doc.text("MASTERSON | REPORTE CIO", 14, 25);
        
        doc.setFontSize(12); doc.setTextColor(120);
        doc.text(`Identificador de Turno: ${turno}`, 14, 35);
        doc.text(`Fecha de Emisión: ${now.toLocaleString()}`, 14, 42);

        doc.autoTable({
            startY: 50,
            head: [['HORA', 'ÁREA', 'NIVEL', 'EVENTO', 'DESCRIPCIÓN']],
            body: cio_logs.map(it => [
                new Date(it.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                it.area, it.priority, it.title, it.message
            ]),
            headStyles: { fillColor: [0, 100, 101], fontSize: 11, halign: 'center' },
            styles: { fontSize: 10, cellPadding: 5 },
            alternateRowStyles: { fillColor: [250, 250, 250] },
            margin: { top: 50 }
        });

        doc.save(`Reporte_Operativo_CIO_${now.toISOString().split('T')[0]}.pdf`);
    }

    /* ============================================================
       UTILIDADES DE INTERFAZ (UI)
       ============================================================ */
    function openPanel(id) { 
        closePanels(); 
        document.getElementById(id).classList.add("active"); 
        document.getElementById("cio-overlay").style.display = "block"; 
    }
    
    function closePanels() { 
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); 
        document.getElementById("cio-overlay").style.display = "none"; 
    }

    function toggleFS() { 
        const app = document.getElementById("cio-app");
        if (!document.fullscreenElement) app.requestFullscreen(); 
        else document.exitFullscreen(); 
    }

    function openFormPanel() { 
        document.getElementById("mainForm").reset(); 
        document.getElementById("f-id").value = ""; 
        openPanel('panelForm'); 
    }

    function toggleOfflineDetails() { 
        document.getElementById("offline-details").classList.toggle("show"); 
    }
    
    // Bucle de animación suave para la barra de progreso
    function loop(ts) {
        if(cio_logs.length) {
            if(!cio_startTime) cio_startTime = ts;
            const progress = (ts - cio_startTime) / (cio_SLIDE_TIME * 1000);
            document.getElementById("progressLine").style.width = (Math.min(progress, 1) * 100) + "%";
            
            if(progress >= 1) { 
                cio_currentIdx++; 
                renderSlide(); 
                cio_startTime = ts; 
            }
        }
        requestAnimationFrame(loop);
    }

    // Relojes duales
    setInterval(() => {
        const t = new Date().toLocaleTimeString('es-UY', { hour12: false });
        document.getElementById("clockDisplay").textContent = t;
        if(document.getElementById("fsClockDisplay")) {
            document.getElementById("fsClockDisplay").textContent = t;
        }
    }, 1000);

    // Ciclos de sincronización
    setInterval(updateNetwork, 5000); 
    setInterval(syncEvents, 12000);
    
    // Arranque Inicial
    updateNetwork(); 
    syncEvents(); 
    requestAnimationFrame(loop);
</script>
</body>
</html>
