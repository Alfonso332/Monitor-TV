<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO Monitor | Masterson</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* === BASE CIO === */
        #cio-app {
            --primary: #006465;
            --accent: #00d1d1;
            --dark-bg: #000000;
            --critico: #ff4d4d;
            --online: #2ecc71;
            --bg-emergencia: #1a0000; 

            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--dark-bg) !important;
            color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, sans-serif !important;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 999999; margin: 0; padding: 0;
            transition: background 0.8s ease;
        }

        #cio-app.pantalla-critica { background: var(--bg-emergencia) !important; }
        #cio-app * { box-sizing: border-box !important; }

        /* HEADER */
        #cio-app .main-header {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--primary); z-index: 10;
        }
        #cio-app:fullscreen .main-header { display: none !important; }
        #cio-app .fs-clock { display: none; }
        #cio-app:fullscreen .fs-clock { 
            display: block; position: absolute; top: 20px; right: 30px; 
            font-family: monospace; font-size: 2.5rem; font-weight: 900; 
            color: var(--primary); z-index: 100;
        }

        /* DISPLAY CENTRAL */
        #cio-app #display-board { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        #cio-app #titleDisplay { font-size: 75px; font-weight: 900; margin: 10px 0; text-transform: uppercase; }
        #cio-app .info-container { transition: all 0.6s ease; }
        #cio-app .oculto { opacity: 0; transform: scale(0.95); filter: blur(10px); }

        /* TICKER CONFIGURADO */
        #cio-app #ticker-bar { 
            height: 75px; background: #050505; border-top: 1px solid #111; 
            display: flex; align-items: center; overflow: hidden; position: relative; 
        }

        #cio-app #ticker-content { 
            display: flex; align-items: center; gap: 80px; white-space: nowrap; 
            position: absolute; left: 0;
            animation: scroll-ticker 25s linear infinite; 
        }

        @keyframes scroll-ticker {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        #cio-app .status-badge { 
            padding: 12px 30px; border-radius: 8px; font-size: 1.6rem; 
            font-weight: 900; text-transform: uppercase; flex-shrink: 0;
        }
        #cio-app .status-badge.offline { 
            background: rgba(255, 77, 77, 0.15); border: 3px solid var(--critico); 
            color: var(--critico); box-shadow: 0 0 15px rgba(255, 77, 77, 0.3);
        }
        #cio-app .status-badge.restored { 
            background: rgba(46, 204, 113, 0.15); border: 3px solid var(--online); 
            color: var(--online); box-shadow: 0 0 15px rgba(46, 204, 113, 0.3);
        }

        /* PANELES */
        #cio-app .side-panel {
            position: fixed; right: 0; top: 0; width: 400px; height: 100%;
            background: #0a0a0a; border-left: 1px solid var(--primary); padding: 30px;
            transform: translateX(100%); transition: 0.4s ease; z-index: 10100;
            overflow-y: auto; touch-action: pan-y;
        }
        #cio-app .side-panel.active { transform: translateX(0); }

        /* ESTADISTICAS */
        #cio-app .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; margin-bottom: 15px; }
        #cio-app .stat-box { background: #111; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
        #cio-app .stat-box b { display: block; font-size: 1.3rem; }
        #cio-app .stat-box small { font-size: 0.65rem; opacity: 0.6; text-transform: uppercase; }

        /* DETALLES OFFLINE */
        #cio-app #offline-details {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out;
            background: #111; border-radius: 12px; margin-bottom: 20px;
        }
        #cio-app #offline-details.show { max-height: 400px; border: 1px solid #444; padding: 10px; margin-top: -5px; }
        #cio-app .off-item { font-size: 0.85rem; color: #ff4d4d; padding: 10px; border-bottom: 1px solid #222; }

        /* INPUTS Y BOTONES */
        #cio-app input, #cio-app textarea, #cio-app select {
            width: 100%; padding: 14px; background: #151515 !important;
            color: #fff !important; border: 1px solid #252525 !important; border-radius: 12px; text-align: center; margin-bottom: 12px;
        }
        #cio-app .btn-pill {
            background: var(--primary) !important; color: #fff !important; border: none; padding: 12px 24px; border-radius: 50px;
            font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; margin-bottom: 10px; text-align: center;
        }
        #cio-app .btn-sec { background: #1a1a1a !important; border: 1px solid #333; }

        /* HISTORIAL CARDS */
        #cio-app .history-item {
            background: #111; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }

        /* === AJUSTES EXCLUSIVOS CELULAR === */
        #mobile-fab { display: none; }

        @media (max-width: 768px) {
            #cio-app { overflow: hidden; position: fixed; height: 100vh; }
            #cio-app .main-header, #cio-app #ticker-bar, #cio-app #progressLine { display: none !important; }
            #cio-app #display-board { padding: 15px; }
            #cio-app #titleDisplay { font-size: 28px !important; margin: 5px 0; }
            #cio-app #messageDisplay { font-size: 1.1rem !important; }
            #cio-app .side-panel { width: 100%; border-left: none; }
            
            #mobile-fab {
                display: flex; position: fixed; bottom: 30px; right: 25px; 
                width: 65px; height: 65px; background: var(--primary);
                border-radius: 50%; z-index: 1000005; align-items: center; justify-content: center;
                box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid var(--accent);
            }
            #mobile-fab span { font-size: 30px; color: white; }
        }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="fsClockDisplay" class="fs-clock">00:00:00</div>
    <div id="cio-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; z-index:10090; backdrop-filter:blur(5px);" onclick="closePanels()"></div>

    <header class="main-header">
        <div class="header-actions" style="display:flex; gap:10px;">
            <button onclick="openFormPanel()" class="btn-pill" style="padding:8px 20px; width:auto;">＋ NUEVA</button>
            <button onclick="openPanel('panelHistory')" class="btn-pill btn-sec" style="padding:8px 20px; width:auto;">📋 HISTORIAL</button>
            <button onclick="toggleFS()" style="background:none; border:1px solid #333; color:#555; padding:8px 12px; border-radius:8px; cursor:pointer;">⛶ TV</button>
        </div>
        <div id="clockDisplay" style="font-family:monospace; font-size:1.6rem; font-weight:900; color:var(--primary);">00:00:00</div>
        <img src="https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png" height="35">
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel" style="letter-spacing: 5px; font-weight: 900; font-size: 0.75rem;">MASTERSON MONITOR</div>
            <h1 id="titleDisplay">SISTEMA CIO</h1>
            <p id="messageDisplay" style="font-size:1.6rem; opacity:0.6;">Sincronizando...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">
            <span style="font-size: 1.2rem; color: #333; font-weight: bold;">ESCANEANDO...</span>
        </div>
    </div>
    
    <div id="progressLine" style="position: fixed; bottom: 75px; height: 4px; width: 0%; background: var(--primary); z-index: 5;"></div>

    <div id="mobile-fab" onclick="openPanel('panelHistory')">
        <span>☰</span>
    </div>

    <aside id="panelForm" class="side-panel">
        <h2 id="formTitle" style="color:var(--primary); text-align:center;">NOVEDAD</h2>
        <form id="mainForm" onsubmit="saveEntry(event)">
            <input type="hidden" id="f-id" value="">
            <select id="f-area"><option>Monitoreo</option><option>Freschat</option><option>Atención al cliente</option><option>Novedad Interna</option></select>
            <select id="f-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
            <input type="text" id="f-title" placeholder="Título novedad" required>
            <textarea id="f-msg" rows="5" placeholder="Descripción..." required></textarea>
            <button type="submit" class="btn-pill">PUBLICAR</button>
            <button type="button" onclick="closePanels()" class="btn-pill btn-sec">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2 style="color:var(--accent); text-align:center; margin-bottom:15px;">ESTADO OPERATIVO</h2>
        
        <div class="stats-grid">
            <div class="stat-box" onclick="openFormPanel()"><b style="color:var(--primary)">＋</b><small>Nueva</small></div>
            <div class="stat-box"><b id="stat-total">0</b><small>Total</small></div>
            <div class="stat-box" onclick="toggleOfflineDetails()">
                <b id="stat-off" style="color:var(--accent)">0</b>
                <small>Off ▾</small>
            </div>
        </div>

        <div id="offline-details"></div>

        <button onclick="downloadPDF()" class="btn-pill" style="background:#222 !important; margin-bottom:20px; font-size:0.75rem;">⬇ DESCARGAR REPORTE POR TURNOS</button>

        <div id="historyList"></div>
        <button onclick="closePanels()" class="btn-pill btn-sec" style="margin-top:20px;">CERRAR</button>
    </aside>
</div>

<script>
    const cio_DB_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const cio_RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let cio_logs = [], cio_currentIdx = 0, cio_startTime = null;
    let prevStatus = {}; 
    let recentlyRestored = {}; 
    const cio_SLIDE_TIME = 45;

    // Lógica de Deslizamiento (Swipe to close)
    let touchStartX = 0;
    document.querySelectorAll('.side-panel').forEach(panel => {
        panel.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        panel.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchEndX - touchStartX > 100) closePanels(); 
        });
    });

    async function updateNetwork() {
        try {
            const resp = await fetch(cio_RED_URL);
            const status = await resp.json();
            const ticker = document.getElementById("ticker-content");
            const offDetails = document.getElementById("offline-details");
            let tickerHTML = "", detailsHTML = "";
            let offCount = 0;

            if(status) {
                Object.keys(status).forEach(id => {
                    const currentItem = status[id];
                    const name = id.replace(/_/g, ' ');
                    if (prevStatus[id] && prevStatus[id].estado === "offline" && currentItem.estado === "online") {
                        recentlyRestored[id] = 2;
                    }
                    if (currentItem.estado === "offline") {
                        tickerHTML += `<div class="status-badge offline">⚠️ OFF: ${name}</div>`;
                        detailsHTML += `<div class="off-item">● ${name}</div>`;
                        offCount++;
                        delete recentlyRestored[id];
                    } else if (recentlyRestored[id] > 0) {
                        tickerHTML += `<div class="status-badge restored">✔ ${name}: RESTABLECIDO</div>`;
                        recentlyRestored[id]--;
                    }
                });
                prevStatus = JSON.parse(JSON.stringify(status));
            }

            if(tickerHTML !== "") {
                ticker.innerHTML = tickerHTML;
                const itemsCount = offCount + Object.keys(recentlyRestored).filter(k => recentlyRestored[k] > 0).length;
                ticker.style.animation = `scroll-ticker ${itemsCount * 8 + 5}s linear infinite`;
                offDetails.innerHTML = detailsHTML;
            } else {
                ticker.innerHTML = `<span style="color:var(--primary); font-size:1.3rem; font-weight:bold; width:100vw; text-align:center;">✔ TODOS LOS SERVICIOS OPERATIVOS</span>`;
                ticker.style.animation = "none"; ticker.style.left = "0";
                offDetails.innerHTML = "<div class='off-item' style='color:#666'>No hay servicios offline</div>";
            }
            document.getElementById("stat-off").textContent = offCount;
        } catch(e) {}
    }

    async function syncEvents() {
        try {
            const resp = await fetch(cio_DB_URL);
            const data = await resp.json();
            const now = Date.now();
            cio_logs = (data ? (Array.isArray(data) ? data : Object.values(data)) : []).filter(it => !it.timestamp || (now - it.timestamp < 86400000));
            document.getElementById("stat-total").textContent = cio_logs.length;
            if(cio_logs.length > 0 && !cio_startTime) renderSlide();
            renderHistory();
        } catch(e) {}
    }

    function renderSlide() {
        if(!cio_logs.length) return;
        const cont = document.getElementById("infoCont"), app = document.getElementById("cio-app");
        cont.classList.add("oculto");
        setTimeout(() => {
            const item = cio_logs[cio_currentIdx % cio_logs.length];
            const color = {"Baja":"var(--accent)", "Media":"#f1c40f", "Alta":"#e67e22", "Crítica":"#ff4d4d"}[item.priority] || "#fff";
            if(item.priority === "Crítica") app.classList.add("pantalla-critica"); else app.classList.remove("pantalla-critica");
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("areaLabel").style.color = color;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            document.getElementById("progressLine").style.background = color;
            cont.classList.remove("oculto");
        }, 600);
    }

    function renderHistory() {
        document.getElementById("historyList").innerHTML = cio_logs.map((it, i) => `
            <div class="history-item">
                <small style="color:var(--accent); font-weight:bold;">${it.area}</small>
                <div style="font-weight:bold; margin:5px 0;">${it.title}</div>
                <div style="font-size:0.8rem; opacity:0.7; margin-bottom:10px;">${it.message}</div>
                <div style="display:flex; gap:10px;">
                    <button onclick="editEntry(${i})" style="color:var(--accent); background:none; border:none; padding:0; cursor:pointer; font-size:0.7rem; font-weight:bold;">EDITAR</button>
                    <button onclick="deleteEntry(${i})" style="color:var(--critico); background:none; border:none; padding:0; cursor:pointer; font-size:0.7rem; font-weight:bold;">ELIMINAR</button>
                </div>
            </div>
        `).join('');
    }

    async function deleteEntry(idx) {
        if(confirm("¿Eliminar?")) {
            cio_logs.splice(idx, 1);
            await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
            syncEvents();
        }
    }

    async function saveEntry(e) {
        e.preventDefault();
        const id = document.getElementById("f-id").value;
        const entry = {
            area: document.getElementById("f-area").value, priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value, message: document.getElementById("f-msg").value,
            timestamp: id !== "" ? cio_logs[id].timestamp : Date.now()
        };
        if(id !== "") cio_logs[id] = entry; else cio_logs.push(entry);
        await fetch(cio_DB_URL, { method: 'PUT', body: JSON.stringify(cio_logs) });
        closePanels(); syncEvents();
    }

    function editEntry(idx) {
        const it = cio_logs[idx];
        document.getElementById("f-id").value = idx;
        document.getElementById("f-area").value = it.area;
        document.getElementById("f-prio").value = it.priority;
        document.getElementById("f-title").value = it.title;
        document.getElementById("f-msg").value = it.message;
        openPanel('panelForm');
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = jsPDF();
        const now = new Date();
        doc.setFontSize(16); doc.text("REPORTE MASTERSON", 14, 20);
        const getTurno = (ts) => {
            const h = new Date(ts).getHours();
            if(h >= 6 && h < 14) return "Turno Mañana (06:00 - 14:00)";
            if(h >= 14 && h < 22) return "Turno Tarde (14:00 - 22:00)";
            return "Turno Noche (22:00 - 06:00)";
        };
        const turnos = ["Turno Mañana (06:00 - 14:00)", "Turno Tarde (14:00 - 22:00)", "Turno Noche (22:00 - 06:00)"];
        let currentY = 35;
        turnos.forEach(turno => {
            const filtered = cio_logs.filter(it => getTurno(it.timestamp) === turno);
            doc.setFontSize(12); doc.setTextColor(0, 100, 101); doc.text(turno, 14, currentY);
            doc.autoTable({
                startY: currentY + 4, head: [['Área', 'Prio', 'Título', 'Mensaje']],
                body: filtered.length ? filtered.map(it => [it.area, it.priority, it.title, it.message]) : [['-', '-', 'Sin novedades', '-']],
                theme: 'striped', headStyles: { fillColor: [0, 100, 101] }
            });
            currentY = doc.lastAutoTable.finalY + 15;
        });
        doc.save(`Reporte_CIO_${now.toLocaleDateString()}.pdf`);
    }

    function openPanel(id) { closePanels(); document.getElementById(id).classList.add("active"); document.getElementById("cio-overlay").style.display = "block"; }
    function closePanels() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); document.getElementById("cio-overlay").style.display = "none"; }
    function toggleFS() { if (!document.fullscreenElement) document.getElementById("cio-app").requestFullscreen(); else document.exitFullscreen(); }
    function openFormPanel() { document.getElementById("mainForm").reset(); document.getElementById("f-id").value = ""; openPanel('panelForm'); }
    function toggleOfflineDetails() { document.getElementById("offline-details").classList.toggle("show"); }
    
    function loop(ts) {
        if(cio_logs.length) {
            if(!cio_startTime) cio_startTime = ts;
            const progress = (ts - cio_startTime) / (cio_SLIDE_TIME * 1000);
            document.getElementById("progressLine").style.width = (Math.min(progress, 1) * 100) + "%";
            if(progress >= 1) { cio_currentIdx++; renderSlide(); cio_startTime = ts; }
        }
        requestAnimationFrame(loop);
    }

    setInterval(() => {
        const t = new Date().toLocaleTimeString('es-UY', { hour12: false });
        document.getElementById("clockDisplay").textContent = t;
        document.getElementById("fsClockDisplay").textContent = t;
    }, 1000);

    setInterval(updateNetwork, 5000); setInterval(syncEvents, 10000);
    updateNetwork(); syncEvents(); requestAnimationFrame(loop);
</script>
</body>
</html>
