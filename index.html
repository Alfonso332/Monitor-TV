<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantenimiento</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: #0b0b0b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, Helvetica, sans-serif;
        color: #fff;
    }

    .modal {
        background: #006465;
        padding: 30px 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        max-width: 400px;
        width: 90%;
    }

    .modal h1 {
        margin: 0 0 10px;
        font-size: 22px;
    }

    .modal p {
        margin: 0;
        font-size: 15px;
        opacity: 0.9;
    }
</style>

</head>
<body>

<div class="modal">
    <h1>🔧 En mantenimiento</h1>
    <p>El programa se encuentra en mantenimiento.<br>
    Estará siendo acondicionado en el correr del día.</p>
</div>

</body>
</html>
