<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CIO - Monitor Operativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        #cio-app {
            --primary: #00d4d8;
            --accent: #006465;
            --dark-bg: #000000;
            --critico-pulso: #4d0000;
            --ticker-bg: #0a1a1b;
            --bg-url: url('https://i.postimg.cc/8zKZJGHs/Chat-GPT-Image-21-feb-2026-06-45-24-p-m.png');
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            background: var(--dark-bg) !important; color: #ffffff !important;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
            overflow: hidden; margin: 0; padding: 0; z-index: 9999;
        }

        #cio-app:fullscreen .main-header { display: none; }

        #cio-app::before {
            content: ""; position: absolute; inset: 0;
            background-image: var(--bg-url); background-size: contain;
            background-position: center; background-repeat: no-repeat;
            opacity: 0.15; filter: brightness(0.5); z-index: -1;
        }

        .main-header {
            height: 70px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 212, 216, 0.2); z-index: 100;
        }

        /* ESTILO DE LOS INDICADORES DE RED */
        #network-status { display: flex; gap: 15px; margin-top: 5px; justify-content: center; }
        .status-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .dot.online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .dot.offline { background: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; }

        .header-actions button {
            background: rgba(0, 212, 216, 0.1); border: 1px solid var(--primary);
            color: #fff; padding: 8px 16px; border-radius: 15px; font-size: 12px;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-right: 8px;
        }

        #clockDisplay { font-family: 'Courier New', monospace; font-size: 1.5rem; color: var(--primary); font-weight: bold; }

        #display-board {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.8) 100%);
        }

        @keyframes pulso-cio {
            0% { background-color: transparent; }
            50% { background-color: var(--critico-pulso); }
            100% { background-color: transparent; }
        }
        #cio-app.es-critico #display-board { animation: pulso-cio 2s infinite ease-in-out; }

        .info-container { width: 100%; max-width: 1100px; transition: all 0.6s; z-index: 10; }
        .oculto { opacity: 0; transform: scale(0.95); filter: blur(10px); }

        #areaLabel { font-size: clamp(0.9rem, 2.5vw, 1.4rem); color: var(--primary); letter-spacing: 4px; font-weight: bold; }
        #prioBadge { display: inline-block; padding: 6px 20px; border-radius: 50px; font-weight: 800; border: 1px solid var(--primary); margin: 15px 0; background: rgba(0,0,0,0.6); }
        #titleDisplay { font-weight: 800; text-transform: uppercase; line-height: 1.1; margin-bottom: 20px; }
        #messageDisplay { line-height: 1.5; max-width: 850px; margin: 0 auto; white-space: pre-wrap; }

        #ticker-bar { height: 40px; background: rgba(10, 26, 27, 0.95); border-top: 1px solid var(--primary); display: flex; align-items: center; overflow: hidden; }
        #ticker-content { white-space: nowrap; animation: ticker-scroll-cio 30s linear infinite; color: var(--primary); font-weight: bold; }
        @keyframes ticker-scroll-cio { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .nav-mobile {
            display: none; height: 95px; background: rgba(7, 18, 19, 0.98); border-top: 1px solid var(--primary);
            justify-content: space-around; align-items: flex-start; padding-top: 15px;
        }
        .nav-mobile button { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: bold; }

        .side-panel {
            position: fixed; right: 0; top: 0; width: 350px; height: 100%;
            background: #091718; border-left: 2px solid var(--primary); padding: 30px;
            transform: translateX(100%); transition: 0.4s; z-index: 1100; box-sizing: border-box; overflow-y: auto;
        }
        .side-panel.active { transform: translateX(0); }
        #overlay-cio { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1050; }
        #overlay-cio.active { display: block; }

        input, textarea, select { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid var(--accent); border-radius: 15px; margin-bottom: 15px; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 20px; }
        .btn-cancel { width: 100%; padding: 12px; background: none; color:#ff4d4d; border: 1px solid #ff4d4d; border-radius: 20px; margin-top: 10px; }

        .history-item { background: rgba(255,255,255,0.08); padding: 15px; margin-bottom: 10px; border-radius: 15px; }

        @media (max-width: 768px) {
            .header-actions { display: none; }
            .nav-mobile { display: flex; }
            .side-panel { width: 100%; height: 90%; top: auto; bottom: 0; transform: translateY(100%); border-radius: 30px 30px 0 0; }
            .side-panel.active { transform: translateY(0); }
            #network-status { flex-direction: row; flex-wrap: wrap; gap: 10px; }
        }
        #progressLine { position: fixed; bottom: 40px; height: 3px; width: 0%; z-index: 999; }
    </style>
</head>
<body>

<div id="cio-app">
    <div id="overlay-cio" onclick="closeAll()"></div>

    <header class="main-header">
        <div class="header-actions">
            <button onclick="openForm()">＋ NUEVA NOVEDAD</button>
            <button onclick="openHistory()">📋 HISTORIAL</button>
            <button onclick="handleCerrarTurno()" style="border-color: #ff4d4d; color: #ff4d4d;">🔒 CERRAR TURNO</button>
            <button onclick="toggleFS()">⛶ TV</button>
        </div>
        
        <div style="text-align: center;">
            <div id="clockDisplay">00:00:00</div>
            <div id="network-status">
                <span style="font-size: 10px; opacity: 0.5;">CARGANDO RED...</span>
            </div>
        </div>
    </header>

    <main id="display-board">
        <div id="infoCont" class="info-container">
            <div id="areaLabel">SISTEMA CIO</div>
            <div id="prioBadge">CONECTANDO</div>
            <h1 id="titleDisplay">Monitor Operativo</h1>
            <p id="messageDisplay">Sincronizando flujo de datos...</p>
        </div>
    </main>

    <div id="ticker-bar">
        <div id="ticker-content">CARGANDO ÚLTIMAS NOVEDADES...</div>
    </div>

    <nav class="nav-mobile">
        <button onclick="openForm()"><span>➕</span>NUEVO</button>
        <button onclick="openHistory()"><span>📋</span>LISTA</button>
        <button onclick="handleCerrarTurno()"><span>🔒</span>TURNO</button>
    </nav>

    <aside id="panelForm" class="side-panel">
        <h2>Nueva Entrada</h2>
        <form id="mainForm" onsubmit="handleSave(event)">
            <input type="hidden" id="editId" value="-1">
            <label>Tipo</label>
            <select id="f-type"><option value="turno">Turno</option><option value="diaria">Diaria</option></select>
            <label>Área</label>
            <select id="f-area">
                <option value="Freschat">Freschat</option>
                <option value="Monitoreo">Monitoreo</option>
                <option value="Atención al Cliente">Atención al Cliente</option>
                <option value="Interno">Interno</option>
            </select>
            <label>Prioridad</label>
            <select id="f-prio"><option>Baja</option><option>Media</option><option>Alta</option><option>Crítica</option></select>
            <input type="text" id="f-title" placeholder="Título" required>
            <textarea id="f-msg" rows="4" placeholder="Mensaje..." required></textarea>
            <button type="submit" class="btn-save">GUARDAR</button>
            <button type="button" onclick="closeAll()" class="btn-cancel">CANCELAR</button>
        </form>
    </aside>

    <aside id="panelHistory" class="side-panel">
        <h2>Historial</h2>
        <div id="listItems"></div>
        <button type="button" onclick="closeAll()" class="btn-cancel">CERRAR</button>
    </aside>

    <div id="progressLine"></div>
</div>

<script>
    const API_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/eventos.json";
    const RED_URL = "https://monitor-tv-3745c-default-rtdb.firebaseio.com/estatus_red.json";
    
    let dataStore = [];
    let currentIndex = 0;
    let timerStart = null;
    const DISPLAY_TIME = 15;

    // --- SINCRONIZACIÓN DE RED ---
    async function syncNetwork() {
        try {
            const r = await fetch(RED_URL);
            const statusData = await r.json();
            if(!statusData) return;

            let html = "";
            Object.keys(statusData).forEach(key => {
                const item = statusData[key];
                const dotClass = item.estado === "online" ? "online" : "offline";
                html += `
                    <div class="status-item">
                        <div class="dot ${dotClass}"></div>
                        ${key.replace('_', ' ')}
                    </div>
                `;
            });
            document.getElementById("network-status").innerHTML = html;
        } catch(e) { console.error("Error Red:", e); }
    }

    async function syncData() {
        try {
            const r = await fetch(API_URL);
            const d = await r.json();
            dataStore = d || [];
            if(dataStore.length > 0) {
                const last = dataStore[dataStore.length - 1];
                document.getElementById("ticker-content").textContent = `[ÚLTIMO] ${last.area}: ${last.title} ——— `;
                if(document.getElementById("prioBadge").textContent === "CONECTANDO") refreshView();
            }
        } catch(e) { console.error("Error Sync"); }
    }

    function refreshView() {
        if(!dataStore.length) return;
        const cont = document.getElementById("infoCont");
        cont.classList.add("oculto");
        setTimeout(() => {
            const item = dataStore[currentIndex % dataStore.length];
            const app = document.getElementById("cio-app");
            const badge = document.getElementById("prioBadge");
            
            if(item.priority === "Crítica") app.classList.add("es-critico");
            else app.classList.remove("es-critico");
            
            badge.textContent = `PRIORIDAD ${item.priority}`;
            document.getElementById("areaLabel").textContent = item.area;
            document.getElementById("titleDisplay").textContent = item.title;
            document.getElementById("messageDisplay").textContent = item.message;
            
            const colors = {"Baja":"#00d4d8", "Media":"#00ccff", "Alta":"#ffcc00", "Crítica":"#ff4d4d"};
            document.getElementById("progressLine").style.background = colors[item.priority] || "#fff";
            
            adjustText();
            cont.classList.remove("oculto");
        }, 600); 
    }

    async function handleSave(e) {
        e.preventDefault();
        const id = parseInt(document.getElementById("editId").value);
        const entry = {
            area: document.getElementById("f-area").value,
            priority: document.getElementById("f-prio").value,
            title: document.getElementById("f-title").value,
            message: document.getElementById("f-msg").value,
            type: document.getElementById("f-type").value,
            timestamp: Date.now()
        };
        if(id === -1) dataStore.push(entry); else dataStore[id] = entry;
        await fetch(API_URL, { method: 'PUT', body: JSON.stringify(dataStore) });
        closeAll(); syncData();
    }

    function adjustText() {
        const t = document.getElementById('titleDisplay');
        const m = document.getElementById('messageDisplay');
        const container = document.getElementById('display-board');
        let sizeT = window.innerWidth <= 768 ? 30 : 70; 
        let sizeM = window.innerWidth <= 768 ? 18 : 35;
        t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
        let limit = 0;
        while ((t.offsetHeight + m.offsetHeight > container.offsetHeight * 0.7) && limit < 30) {
            sizeT -= 2; sizeM -= 1;
            t.style.fontSize = sizeT + "px"; m.style.fontSize = sizeM + "px";
            limit++;
        }
    }

    function openForm() { document.getElementById("mainForm").reset(); document.getElementById("editId").value="-1"; document.getElementById("panelForm").classList.add("active"); document.getElementById("overlay-cio").classList.add("active"); }
    function openHistory() { 
        document.getElementById("listItems").innerHTML = dataStore.map((item, i) => `<div class="history-item"><b>${item.title}</b><br><button onclick="onDelete(${i})">Borrar</button></div>`).join('');
        document.getElementById("panelHistory").classList.add("active"); document.getElementById("overlay-cio").classList.add("active"); 
    }
    window.onDelete = async (i) => { dataStore.splice(i,1); await fetch(API_URL,{method:'PUT', body:JSON.stringify(dataStore)}); syncData(); openHistory(); };
    function closeAll() { document.querySelectorAll('.side-panel, #overlay-cio').forEach(el => el.classList.remove('active')); }
    function toggleFS() { const app = document.getElementById('cio-app'); if (!document.fullscreenElement) app.requestFullscreen(); else document.exitFullscreen(); }

    function runLoop(ts) {
        if(!dataStore.length) { requestAnimationFrame(runLoop); return; }
        if(!timerStart) timerStart = ts;
        const elapsed = (ts - timerStart) / 1000;
        document.getElementById("progressLine").style.width = Math.min((elapsed / DISPLAY_TIME) * 100, 100) + "%";
        if(elapsed >= DISPLAY_TIME){ currentIndex++; refreshView(); timerStart = ts; }
        requestAnimationFrame(runLoop);
    }

    setInterval(() => { document.getElementById("clockDisplay").textContent = new Date().toLocaleTimeString("es-UY",{hour12:false}); }, 1000);
    setInterval(syncData, 10000);
    setInterval(syncNetwork, 5000); // Actualiza la red cada 5 segundos
    window.addEventListener('resize', adjustText);
    syncData(); syncNetwork(); requestAnimationFrame(runLoop);
</script>
</body>
</html>
